<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修辭與標點 - 拔尖擴充挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #f5f3ff; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #e9d5ff 1px, transparent 1px), linear-gradient(to bottom, #e9d5ff 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #c084fc; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #f3e8ff; border-color: #9333ea; color: #581c87; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        /* 重組句子專用按鈕 */
        .chunk-btn { transition: all 0.2s; box-shadow: 0 4px 0 #7e22ce; }
        .chunk-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .chunk-slot { transition: all 0.2s; border: 2px dashed #d8b4fe; background-color: #f5f3ff; }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 (Violet 配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-violet-700 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-violet-800 p-1 rounded transition bg-violet-900">⬅️ 返回</a>
                <span>🎓 修辭與標點 (拔尖版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-violet-900 px-3 py-1.5 rounded-full border border-violet-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🚀 高級修辭與轉換特訓</h2>
                <div class="bg-violet-50 border border-violet-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-violet-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+30)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 經提示過關 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 未完成</div>
                    </div>
                </div>
                <div id="directory-content" class="flex flex-col gap-8"></div>
            </div>
            
            <div id="quest-play" class="w-full hidden flex-col items-center"></div>
        </div>
    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-violet-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-violet-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-violet-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-xl text-center transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-2">🎉</div>
            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-4 text-base md:text-lg leading-relaxed text-left overflow-y-auto pr-2 flex-1 w-full"></div>
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-violet-600 hover:bg-violet-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-violet-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態與大腦字典 =================
        let advExp = parseInt(localStorage.getItem('rhetAdvExp')) || 0;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1;
        let currentQuestionIdx = -1;
        window.currentHints = []; 
        
        let reorderSource = []; 
        let reorderTarget = []; 
        let reorderCorrect = []; 

        document.getElementById('exp-display').innerText = advExp;

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】]/g, '').replace(/&nbsp;/g, ' ');
                cleanText = cleanText.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDC00-\uDFFF]/g, '');
                let msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'zh-HK';
                msg.rate = 0.9; 
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const genericExplanations = {
            '表示特定稱謂': '引號：標示特定的名稱、綽號或專有名詞。',
            '表示強調': '引號：標示句子中需要讀者特別注意、強調的詞語。',
            '表示反語(諷刺)': '引號：表示該詞語的意思與字面完全相反，帶有諷刺意味。',
            '表示直接引用': '引號：標示直接引用別人說的話或文獻內容。',
            '表示解釋說明': '破折號：對前面的內容進行補充或解釋。',
            '表示意思轉折': '破折號：表示話題突然轉變或意思出現大轉折。',
            '表示聲音延長': '破折號：表示聲音的延續或拖長。',
            '表示話語中斷': '破折號：表示話說到一半突然停頓或被打斷。',
            '表示列舉的省略': '省略號：表示還有很多同類事物，沒有全部列出。',
            '表示說話斷續': '省略號：表示因為緊張、害怕或虛弱而說話結結巴巴。',
            '表示語意未盡': '省略號：表示話未說完，留給讀者想像空間。',
            '表示靜默': '省略號：表示沉默不語或無言以對。',
            '借代': '借代：不直接說出名稱，借用與它密切相關的特徵或物品代替（如「白衣天使」代護士）。',
            '借喻': '借喻：比喻最高級，不出現本體和喻詞，直接把喻體當本體說。',
            '明喻': '明喻：有本體、喻體，並使用「像」、「好像」、「猶如」等喻詞。',
            '暗喻': '暗喻：有本體、喻體，不用「像」，而是用「是」、「變成」連接。',
            '層遞': '層遞：把三個或以上事物，按大小、時間、輕重等順序，一層層遞進排列。',
            '排比': '排比：把三個或以上結構相同、意思相關的短語或句子並列在一起。',
            '頂真': '頂真：上一句的結尾，作為下一句的開頭，首尾相連（山接水，水連天）。',
            '反復': '反復：同一個詞語或句子重複出現，用來強調語氣或情感（盼望著，盼望著）。',
            '誇張': '誇張：故意放大或縮小事物的特徵，令人印象深刻。',
            '雙關': '雙關：利用同音或多義，一句話包含兩種意思。',
            '呼告': '呼告：突然拋開聽眾，直接對不在面前的人或物呼喚。',
            '引用': '引用：故意借用古詩、名言、諺語來加強說服力。',
            '反問': '反問：只問不答，答案已在問題中（難道...），加強語氣。',
            '設問': '設問：為了引起注意，自己提出問題自己回答。',
            '擬人': '擬人：把死物或動植物當「人」來寫，賦予人的動作或情感。',
            '對偶': '對偶：兩句話字數相等、結構相同、意思相對或相關（如春聯）。'
        };

        function getGenericExp(term) {
            return genericExplanations[term] || '這是一種修辭或標點手法。';
        }

        // ================= 2. 學習錦囊 (教學庫) =================
        const tutorialContents = {
            'r-punc-master': `
                <div class="text-center mb-4"><span class="text-6xl">🕵️‍♂️ 💬</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">標點大師：引號與破折號的秘密</p>
                <div class="bg-violet-50 p-4 rounded-xl border-2 border-violet-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-violet-800 text-lg mb-1">「引號」的三種分身：</p>
                        <p class="text-slate-700">1. <span class="font-bold text-violet-600">特定稱謂</span>：他被稱為「飛毛腿」。</p>
                        <p class="text-slate-700">2. <span class="font-bold text-violet-600">強調</span>：請注意「安全」二字。</p>
                        <p class="text-slate-700">3. <span class="font-bold text-violet-600">反語(諷刺)</span>：你這房間可真「乾淨」啊！(其實很髒)</p>
                    </div>
                    <hr class="border-violet-200">
                    <div>
                        <p class="font-black text-fuchsia-800 text-lg mb-1">——破折號的三種分身：</p>
                        <p class="text-slate-700">1. <span class="font-bold text-fuchsia-600">解釋說明</span>：我最愛的水果——蘋果。</p>
                        <p class="text-slate-700">2. <span class="font-bold text-fuchsia-600">意思轉折</span>：這天氣真好——哎呀，下雨了！</p>
                        <p class="text-slate-700">3. <span class="font-bold text-fuchsia-600">聲音延長</span>：汪——汪——</p>
                    </div>
                </div>
            `,
            'r-rhet-sub': `
                <div class="text-center mb-4"><span class="text-6xl">🎭 🔄</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">高階修辭：借代 VS 借喻</p>
                <p class="text-slate-600 mb-3">這兩個修辭都是「用B代替A」，但原理完全不同！</p>
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-blue-800 text-lg mb-1">🎭 借代 (用特徵代整體)</p>
                        <p class="text-slate-700">因為它們有<span class="font-bold text-blue-600">相關性</span>。<br>例：用「白衣天使」代替護士；用「烽火」代替戰爭。</p>
                    </div>
                    <hr class="border-blue-200">
                    <div>
                        <p class="font-black text-teal-800 text-lg mb-1">🥷 借喻 (不露痕跡的比喻)</p>
                        <p class="text-slate-700">因為它們有<span class="font-bold text-teal-600">相似點</span>，只是省略了「像」字。<br>例：天上的「白玉盤」亮晶晶。(用白玉盤比喻月亮)</p>
                    </div>
                </div>
            `,
            'r-rhet-logic': `
                <div class="text-center mb-4"><span class="text-6xl"> پ 🧱</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">邏輯修辭：層遞、排比、頂真與反復</p>
                <div class="bg-rose-50 p-4 rounded-xl border-2 border-rose-200 mb-3 space-y-3">
                    <p class="text-lg"><span class="bg-white font-black text-rose-700 border border-rose-300 px-2 py-1 rounded">排比</span> 👉 至少<span class="font-bold text-rose-600">三個</span>相同結構的句子<span class="font-bold text-rose-600">並列</span>。<br>例：有山，有水，有花，有草。</p>
                    <p class="text-lg"><span class="bg-white font-black text-orange-700 border border-orange-300 px-2 py-1 rounded">層遞</span> 👉 按大小、時間等順序<span class="font-bold text-orange-600">一級級遞進</span>。<br>例：一天、一月、一年，他都在等。</p>
                    <p class="text-lg"><span class="bg-white font-black text-purple-700 border border-purple-300 px-2 py-1 rounded">頂真</span> 👉 上一句的<span class="font-bold text-purple-600">結尾</span> = 下一句的<span class="font-bold text-purple-600">開頭</span>。<br>例：山接<span class="font-bold bg-white px-1">水</span>，<span class="font-bold bg-white px-1">水</span>連天。</p>
                    <p class="text-lg"><span class="bg-white font-black text-indigo-700 border border-indigo-300 px-2 py-1 rounded">反復</span> 👉 同一個詞語<span class="font-bold text-indigo-600">重複出現</span>強調語氣。<br>例：盼望著，盼望著，東風來了。</p>
                    <p class="text-lg"><span class="bg-white font-black text-pink-700 border border-pink-300 px-2 py-1 rounded">對偶</span> 👉 兩句話<span class="font-bold text-pink-600">字數相等、結構相同</span>。<br>例：白日依山盡，黃河入海流。</p>
                </div>
            `,
            'r-rhet-quote': `
                <div class="text-center mb-4"><span class="text-6xl">🗣️ 💬</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">引用、呼告 與 雙關</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-emerald-800 text-lg mb-1">📢 呼告</p>
                        <p class="text-slate-700">突然拋開讀者，直接對著不在面前的人或物<span class="font-bold text-emerald-600">呼喊</span>。<br>例：啊！祖國！我為你自豪。</p>
                    </div>
                    <hr class="border-emerald-200">
                    <div>
                        <p class="font-black text-cyan-800 text-lg mb-1">📖 引用</p>
                        <p class="text-slate-700">借用<span class="font-bold text-cyan-600">名言、古詩、諺語</span>來加強說服力。<br>例：俗話說：「失敗乃成功之母」。</p>
                    </div>
                    <hr class="border-emerald-200">
                    <div>
                        <p class="font-black text-indigo-800 text-lg mb-1">🎭 雙關</p>
                        <p class="text-slate-700">利用同音字或多義詞，一句話<span class="font-bold text-indigo-600">藏著兩種意思</span>。<br>例：春蠶到死「絲」(思)方盡。</p>
                    </div>
                </div>
            `,
            'r-rhet-transform': `
                <div class="text-center mb-4"><span class="text-6xl">✨ ✍️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">實戰：原句轉修辭句</p>
                <p class="text-slate-600 mb-3">這關考驗你的綜合能力！把平淡的句子加上魔法：</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 space-y-3 font-bold text-amber-900">
                    <p>🎯 <span class="bg-white px-2 rounded">轉誇張句</span> 👉 必須故意<span class="text-rose-600">放大或縮小</span>事實。<br><span class="text-sm font-normal text-slate-600">例：很熱 ➡️ 熱得快把我烤熟了。</span></p>
                    <p>🎯 <span class="bg-white px-2 rounded">轉擬人句</span> 👉 必須加上<span class="text-emerald-600">人類的動作或感情</span>。<br><span class="text-sm font-normal text-slate-600">例：花開了 ➡️ 花兒開心地笑了。</span></p>
                    <p>🎯 <span class="bg-white px-2 rounded">轉反問句</span> 👉 加上<span class="text-blue-600">「難道...嗎？」</span>且意思不變。<br><span class="text-sm font-normal text-slate-600">例：我不能去 ➡️ 我難道能去嗎？</span></p>
                    <p class="text-sm text-slate-500 font-normal mt-2">💡 秘訣：仔細看清楚題目要求的是哪一種修辭，不要被其他漂亮的選項騙了！</p>
                </div>
            `,
            'r-rhet-reorder': `
                <div class="text-center mb-4"><span class="text-6xl">🧩 🏗️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">實戰：修辭句重組</p>

        function updateTotalProgress() {
            let solved = userProgress.filter(p => p === 1 || p === 2).length;
            let percent = (solved / rawQuestDataObj.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';

        function shuffleOptions(correct, wrongs) {
            let opts = [correct, ...wrongs];
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                options: opts,
                ansIdx: opts.indexOf(correct)
            };
        }

        function startQuestion(idx, forceStart = false) {
            const qData = rawQuestDataObj[idx];
            const qType = qData.category;
            let tutKey = qType === 'r-rhet-complex-reorder' ? 'r-rhet-reorder' : qType;
            
            if (!forceStart && !localStorage.getItem('tut_seen_' + tutKey)) {
                pendingQuestionIdx = idx; 
                showTutorial(tutKey);      
                return;                   
            }

            currentQuestionMistakes = 0; 
            currentQuestionIdx = idx;
            window.currentHints = []; 
            
            // 每次進入新題目時，確保隱藏動態提示框
            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');

            document.getElementById('quest-directory').style.display = 'none';
            const questPlay = document.getElementById('quest-play');

            if (qType.includes('reorder')) {

        // --- 重組句子相關邏輯 ---
        function renderReorderUI() {
            const tArea = document.getElementById('reorder-target-area');
            const sArea = document.getElementById('reorder-source-area');
            if(!tArea || !sArea) return;

            let tHtml = '';
            if (reorderTarget.length === 0) {
                tHtml = '<span class="text-slate-400 font-bold m-auto">點擊下方詞語排成句子...</span>';
            } else {
                reorderTarget.forEach((chunk, idx) => {
                    tHtml += `<button onclick="removeFromTarget(${idx})" class="chunk-btn bg-violet-600 text-white font-black text-xl md:text-2xl py-3 px-5 rounded-xl shadow-md pop">${chunk}</button>`;
                });
            }
            tArea.innerHTML = tHtml;

            let sHtml = '';
            reorderSource.forEach((chunk, idx) => {
                if (chunk === null) {
                    sHtml += `<div class="chunk-slot w-24 h-14 md:w-32 md:h-16 rounded-xl"></div>`; 
                } else {
                    sHtml += `<button onclick="moveToTarget(${idx})" class="chunk-btn bg-white border-2 border-slate-300 text-slate-700 hover:border-violet-400 hover:bg-violet-50 font-black text-xl md:text-2xl py-3 px-5 rounded-xl shadow">${chunk}</button>`;
                }
            });
            sArea.innerHTML = sHtml;

            if (reorderTarget.length > 0 && reorderTarget.length === reorderCorrect.length) {
                checkReorderAnswer();
            }
        }

        function moveToTarget(sourceIdx) {
            let chunk = reorderSource[sourceIdx];
            reorderSource[sourceIdx] = null; 
            reorderTarget.push(chunk);
            speakText(chunk);
            renderReorderUI();
        }

        function removeFromTarget(targetIdx) {
            let chunk = reorderTarget[targetIdx];
            reorderTarget.splice(targetIdx, 1);
            let emptyIdx = reorderSource.indexOf(null);
            if(emptyIdx !== -1) reorderSource[emptyIdx] = chunk;
            renderReorderUI();
        }

        function checkReorderAnswer() {
            let isCorrect = true;
            let correctCount = 0;
            // 找出前面正確排列的數量
            for(let i=0; i<reorderTarget.length; i++) {
                if(reorderTarget[i] === reorderCorrect[i]) {
                    correctCount++;
                } else {
                    isCorrect = false;
                    break;
                }
            }

            const qData = rawQuestDataObj[currentQuestionIdx];

            if (isCorrect && reorderTarget.length === reorderCorrect.length) {
                speakText("完美的重組！" + reorderCorrect.join(''));
                triggerSuccess(qData.explanation);
            } else if (reorderTarget.length === reorderCorrect.length) {
                // 只有當全部填滿才進行檢查
                currentQuestionMistakes++;
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('rhetAdvProgress', JSON.stringify(userProgress));
                
                // 將排錯的部分退回 Source
                let chunksToReturn = reorderTarget.splice(correctCount);
                for (let chunk of chunksToReturn) {
                    let emptyIdx = reorderSource.indexOf(null);
                    if(emptyIdx !== -1) {
                        reorderSource[emptyIdx] = chunk;
                    } else {
                        reorderSource.push(chunk);
                    }
                }

                // 產生專屬提示：告訴他下一個正確的積木是什麼
                let hintWord = reorderCorrect[correctCount];
                let newHint = `排錯了喔！正確的部分已保留。<br>👉 下一個詞語應該是：「<span class="text-rose-600">${hintWord}</span>」<br>💡 技巧：${qData.hint}`;

                document.getElementById('hint-text').innerHTML = newHint;
                document.getElementById('hint-tts-btn').onclick = () => speakText(`排錯了喔。下一個詞語應該是，${hintWord}`);
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("順序不對喔，請看提示！");
                
                const tArea = document.getElementById('reorder-target-area');
                tArea.classList.add('bg-rose-100', 'border-rose-400', 'shake');
                setTimeout(() => tArea.classList.remove('bg-rose-100', 'border-rose-400', 'shake'), 800);

                renderReorderUI();
            }
        }

        // --- 選擇題檢查邏輯 ---
        function checkAnswer(btnElement, isCorrect, clickedOptText) {
            const allBtns = document.querySelectorAll('.option-btn');
            const qData = rawQuestDataObj[currentQuestionIdx];
            
            if (isCorrect) {
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                btnElement.classList.add('correct');
                speakText("完美的判斷！");
                triggerSuccess(qData.explanation);
            } else {
                btnElement.classList.add('wrong', 'shake');
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('rhetAdvProgress', JSON.stringify(userProgress));
                
                let lines = qData.explanation.split('<br>');
                let matchedLine = lines.find(l => l.includes(clickedOptText));
                let newHint = "請再仔細想一想喔！";
                
                if (matchedLine) {
                    newHint = matchedLine.replace(/^[✅❌]\s*/, ''); 
                }

                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(newHint)) window.currentHints.push(newHint);

                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-1 last:border-0 last:pb-0">💡 ${h}</div>`).join('');
                document.getElementById('hint-text').innerHTML = combinedHintsHtml;
                document.getElementById('hint-tts-btn').onclick = () => speakText(window.currentHints.join('。'));
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("不對喔，" + newHint);
                setTimeout(() => { btnElement.classList.remove('shake'); }, 500);
            }
        }

        // --- 成功處理共通邏輯 ---
        function triggerSuccess(expText) {
            let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentQuestionIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 30 : 10;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 20; 
            }

            if (expGained > 0) {
                advExp += expGained;
                localStorage.setItem('rhetAdvExp', advExp);
                document.getElementById('exp-display').innerText = advExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentQuestionIdx] = finalStatus;
                localStorage.setItem('rhetAdvProgress', JSON.stringify(userProgress));
            }

            let modalIcon = finalStatus === 1 ? '🌟' : '✅';
            let modalTitle = finalStatus === 1 ? '完美答對！' : '成功過關！';
            let expMsg = expGained > 0 
                ? `<span class="text-violet-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
            
            let combinedDesc = expMsg + `
                <div class="bg-violet-50 border-l-4 border-violet-500 p-4 text-left text-violet-900 rounded-r-lg font-bold">
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-violet-200">
                        <span class="text-xl">📚 深度解析</span>
                        <button onclick="speakText('${expText}')" class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm hover:bg-violet-100 text-xl transition active:scale-95">🔊</button>
                    </div>
                    <div class="space-y-3 text-base leading-relaxed">${expText}</div>
                </div>`;

            setTimeout(() => { showModal(modalIcon, modalTitle, combinedDesc); }, 800);
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    let nextIdx = currentQuestionIdx + 1;
                    if (nextIdx < rawQuestDataObj.length) startQuestion(nextIdx);
                    else { showToast("恭喜完成所有挑戰！"); backToDirectory(); }
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function backToDirectory() {
            // 在返回目錄時隱藏可能殘留的提示框
            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');
            
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function backToDirectoryFromModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = advExp;
            renderDirectory();
        }
    </script>
</body>
</html>
