<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字詞基礎 - 標準常規訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #eff6ff;
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .mi-zi-ge {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, transparent 49.5%, #ef4444 49.5%, #ef4444 50.5%, transparent 50.5%),
                linear-gradient(to bottom, transparent 49.5%, #ef4444 49.5%, #ef4444 50.5%, transparent 50.5%),
                linear-gradient(45deg, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%),
                linear-gradient(-45deg, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%);
            border: 4px solid #ef4444; border-radius: 8px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #94a3b8; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #dbeafe; border-color: #3b82f6; color: #1e3a8a; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }
        
        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }

        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .tab-inactive { background-color: white; color: #475569; border-color: #cbd5e1; }
        
        .filter-btn { transition: all 0.2s; }
        .filter-active { background-color: #3b82f6; color: white; border-color: #2563eb; font-weight: bold; }

        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽 -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-blue-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-blue-700 p-1 rounded transition bg-blue-800">⬅️ 返回</a>
                <span>📚 字詞基礎 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-blue-800 px-3 py-1.5 rounded-full border border-blue-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('quest')" id="tab-quest" class="tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-blue-600">
                📝 綜合字詞特訓
            </button>
            <button onclick="switchMode('sandbox')" id="tab-sandbox" class="tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200">
                ✍️ 進階字庫 (中英對照)
            </button>
        </div>
        
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-orange-500 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主內容區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <!-- 闖關模式 -->
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2">🎯 常規題型特訓地圖</h2>
                    <button onclick="showTutorial('intro')" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-blue-300 hover:bg-blue-200 transition">📘 學習錦囊</button>
                </div>
                <div id="directory-content" class="flex flex-col gap-8"></div>
            </div>
            <div id="quest-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- 寫字板模式 -->
        <div id="sandbox-wrapper" class="hidden w-full h-full pb-6">
            <div class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-4 lg:gap-6 h-full min-h-[600px]">
                
                <div class="lg:w-1/3 flex flex-col gap-3 h-full lg:max-h-[700px]">
                    <div class="bg-white rounded-xl shadow-sm border border-blue-200 p-3 flex flex-col gap-2 relative flex-shrink-0">
                        <h3 class="font-bold text-blue-800 text-sm">🔍 搜尋小學習字表：</h3>
                        <div class="flex gap-2">
                            <input type="text" id="custom-char-input" maxlength="1" placeholder="輸入任何中文字..." class="flex-1 px-3 py-2 border-2 border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 text-lg text-center font-bold">
                            <button onclick="searchCustomChar()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-sm transition whitespace-nowrap">生成</button>
                        </div>
                    </div>
                    <div id="word-grid-container" class="bg-white rounded-xl shadow-md border-2 border-slate-200 p-3 flex-1 overflow-y-auto no-scrollbar min-h-[250px]">
                        <div id="word-grid" class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-4 xl:grid-cols-5 gap-2"></div>
                    </div>
                </div>

                <div class="lg:w-2/3 bg-white rounded-2xl shadow-xl border-t-8 border-blue-600 p-4 lg:p-8 flex flex-col items-center justify-center relative min-h-[450px] h-full lg:max-h-[700px]">
                    <div id="sandbox-placeholder" class="text-slate-400 font-bold text-xl text-center flex flex-col items-center gap-4">
                        <span class="text-6xl animate-bounce">👈</span>請從左側選擇
                    </div>
                    <div id="sandbox-content" class="hidden w-full flex-col items-center justify-center h-full">
                        <div class="flex justify-between w-full mb-6 items-center border-b-2 border-slate-100 pb-4">
                            <div class="flex flex-col md:flex-row items-center md:items-end gap-3 md:gap-4">
                                <h2 id="sb-char" class="text-5xl lg:text-7xl font-black text-slate-800 leading-none">字</h2>
                                <div class="flex flex-wrap gap-2 items-center">
                                    <span class="bg-orange-100 text-orange-800 px-3 py-1 rounded-lg border border-orange-200 font-bold text-sm lg:text-base">部首：<span id="sb-radical"></span></span>
                                    <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-lg border border-indigo-200 font-bold text-sm lg:text-base" id="sb-english">English</span>
                                </div>
                            </div>
                            <button onclick="speakText(document.getElementById('sb-char').innerText)" class="tts-btn bg-blue-100 text-blue-700 w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-sm border-2 border-blue-200">🔊</button>
                        </div>
                        <div class="relative w-[240px] h-[240px] md:w-[320px] md:h-[320px] mi-zi-ge mb-8 shadow-inner touch-none mx-auto flex-shrink-0" id="sandbox-canvas"></div>
                        <div class="flex flex-wrap justify-center gap-3 w-full mt-auto">
                            <button onclick="sbWriter.animateCharacter()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-base md:text-lg">👀 看筆順</button>
                            <button onclick="startSandboxQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-base md:text-lg">✍️ 試寫</button>
                            <button onclick="sbWriter.hideCharacter(); sbWriter.showCharacter()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-6 rounded-xl transition text-base md:text-lg">🔄 重設</button>
                        </div>
                        <div id="sb-feedback" class="mt-4 text-xl font-bold text-blue-600 h-8 opacity-0 transition-opacity"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-blue-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-blue-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="window.closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="window.closeTutorial()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-lg text-center transform scale-90 transition-transform" id="feedback-content">
            <div id="feedback-icon" class="text-7xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-6 text-lg leading-relaxed text-center"></div>
            <div class="flex gap-3 w-full mt-4 border-t border-slate-100 pt-4">
                <button onclick="window.backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心邏輯 =================
        let wordStdExp = parseInt(localStorage.getItem('wordStdExp')) || 0;
        document.getElementById('exp-display').innerText = wordStdExp;
        let currentQuestionMistakes = 0; 
        let currentQuestionIdx = -1;
        let sbWriter = null;

        window.cleanTextForSpeech = function(text) {
            if(!text) return "";
            return text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】_]/g, '').replace(/&nbsp;/g, ' ').replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDC00-\uDFFF]/g, ''); 
        };

        window.speakText = function(text, rate = 0.95) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(window.cleanTextForSpeech(text));
                msg.lang = 'zh-HK';
                msg.rate = rate; 
                window.speechSynthesis.speak(msg);
            }
        };

        window.showToast = function(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        };

        const tutorialContents = {
            'intro': `
                <div class="text-center mb-4"><span class="text-6xl">📚 ✍️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">標準常規訓練 核心指南</p>
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200 mb-3 space-y-3">
                    <p class="text-lg"><span class="bg-white font-black text-blue-700 border border-blue-300 px-2 py-1 rounded">1. 綜合字詞</span> 👉 包含部首、筆順、反義詞等常規考點。</p>
                    <p class="text-lg"><span class="bg-white font-black text-indigo-700 border border-indigo-300 px-2 py-1 rounded">2. 字庫練習</span> 👉 中英對照，還可以在米字格中練習寫字！</p>
                </div>
            `
        };

        window.showTutorial = function(key) {
            if (tutorialContents[key]) {
                document.getElementById('tutorial-body').innerHTML = tutorialContents[key];
                const modal = document.getElementById('tutorial-modal');
                const content = document.getElementById('tutorial-content');
                modal.classList.remove('hidden');
                setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            }
        };

        window.closeTutorial = function() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        // ================= 2. 數據庫 =================
        const questPool = [
            ['「這」的部首是什麼？', '辵 (辶)', '文', '言', '走', '「這」的部首是辶部。'],
            ['「和」的反義詞是？', '爭', '平', '合', '分', '「和」的反義詞可以是「爭」或「戰」。'],
            ['「美麗」的近義詞是？', '漂亮', '醜陋', '難看', '普通', '「美麗」和「漂亮」意思相近。'],
            ['「大」的反義詞是？', '小', '中', '高', '低', '「大」的反義詞是「小」。'],
            ['「快」的反義詞是？', '慢', '早', '遲', '遠', '「快」的反義詞是「慢」。'],
            ['「簡單」的反義詞是？', '複雜', '容易', '困難', '深奧', '「簡單」的反義詞是「複雜」。'],
            ['「成功」的反義詞是？', '失敗', '成就', '結果', '過程', '「成功」的反義詞是「失敗」。'],
            ['「勇敢」的近義詞是？', '果敢', '懦弱', '膽小', '害怕', '「勇敢」和「果敢」意思相近。'],
            ['「開心」的近義詞是？', '快樂', '難過', '傷心', '憤怒', '「開心」和「快樂」意思相近。'],
            ['「明亮」的反義詞是？', '黑暗', '光亮', '閃耀', '昏暗', '「明亮」的反義詞是「黑暗」。']
        ];

        const sandboxWords = [
            { char: '天', radical: '大', english: 'Sky/Day', cat: 'nature' },
            { char: '地', radical: '土', english: 'Earth/Ground', cat: 'nature' },
            { char: '人', radical: '人', english: 'Person', cat: 'body' },
            { char: '手', radical: '手', english: 'Hand', cat: 'body' },
            { char: '心', radical: '心', english: 'Heart', cat: 'body' },
            { char: '走', radical: '走', english: 'Walk', cat: 'action' },
            { char: '看', radical: '目', english: 'See/Look', cat: 'action' },
            { char: '聽', radical: '耳', english: 'Listen', cat: 'action' },
            { char: '說', radical: '言', english: 'Speak/Say', cat: 'action' },
            { char: '愛', radical: '心', english: 'Love', cat: 'emotion' },
            { char: '家', radical: '宀', english: 'Home/Family', cat: 'social' },
            { char: '學', radical: '子', english: 'Learn/Study', cat: 'social' },
            { char: '書', radical: '曰', english: 'Book', cat: 'object' },
            { char: '筆', radical: '竹', english: 'Pen/Brush', cat: 'object' },
            { char: '友', radical: '又', english: 'Friend', cat: 'social' }
        ];

        const categories = [
            { id: 'std-comprehensive', title: '📝 綜合字詞特訓', color: 'blue', pool: questPool }
        ];

        let flatQuestData = [];
        categories.forEach(cat => {
            cat.pool.forEach(q => {
                flatQuestData.push({ ...cat, data: q });
            });
        });

        let userProgress = JSON.parse(localStorage.getItem('wordStdProgress')) || new Array(flatQuestData.length).fill(0);

        // ================= 3. 邏輯函數 =================
        function renderDirectory() {
            const dirContainer = document.getElementById('directory-content');
            let html = '';
            let currentFlatIdx = 0;

            categories.forEach(cat => {
                html += `
                    <div class="mb-4">
                        <div class="flex items-center justify-between border-b-2 border-${cat.color}-100 pb-2 mb-3">
                            <h3 class="text-xl font-bold text-${cat.color}-700">${cat.title}</h3>
                        </div>
                        <div class="flex flex-wrap gap-3">
                `;
                cat.pool.forEach(() => {
                    let status = userProgress[currentFlatIdx];
                    let btnClass = status === 1 ? 'bg-yellow-100 border-yellow-400 text-yellow-700' : (status === 2 ? 'bg-emerald-100 border-emerald-400 text-emerald-700' : 'bg-white border-slate-300 text-slate-400');
                    let icon = status === 1 ? '🌟' : (status === 2 ? '✅' : (currentFlatIdx + 1));
                    let idx = currentFlatIdx;
                    html += `
                        <button onclick="window.startQuestion(${idx})" class="lvl-btn ${btnClass} w-12 h-12 lg:w-14 lg:h-14 rounded-2xl font-black text-lg border-b-4 flex items-center justify-center shadow-sm">
                            ${icon}
                        </button>
                    `;
                    currentFlatIdx++;
                });
                html += `</div></div>`;
            });
            dirContainer.innerHTML = html;
            updateTotalProgress();
        }

        function updateTotalProgress() {
            let solved = userProgress.filter(p => p > 0).length;
            let percent = (solved / flatQuestData.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        window.startQuestion = function(idx) {
            currentQuestionIdx = idx;
            currentQuestionMistakes = 0;
            document.getElementById('quest-directory').style.display = 'none';
            const questPlay = document.getElementById('quest-play');
            questPlay.style.display = 'flex';
            
            const q = flatQuestData[idx].data;
            const options = [q[1], q[2], q[3], q[4]].sort(() => Math.random() - 0.5);

            questPlay.innerHTML = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="window.backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 目錄</button>
                    <span class="bg-blue-100 text-blue-800 px-4 py-2 rounded-xl font-bold text-sm">第 ${idx + 1} 題 / 共 ${flatQuestData.length} 題</span>
                </div>
                <div class="w-full bg-white rounded-3xl p-6 md:p-10 shadow-xl border-2 border-blue-100 slide-up flex flex-col items-center">
                    <div class="flex items-center gap-3 mb-8 w-full justify-center">
                        <button onclick="speakText('${q[0]}')" class="tts-btn bg-blue-50 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center border border-blue-200 shadow-sm">🔊</button>
                        <h2 class="text-2xl md:text-3xl font-black text-slate-800">${q[0]}</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                        ${options.map(opt => `
                            <button onclick="window.checkAnswer(this, '${opt}', '${q[1]}')" class="option-btn bg-white border-4 border-slate-200 text-slate-700 text-xl font-bold py-5 px-4 rounded-2xl hover:bg-blue-50 hover:border-blue-300 transition w-full text-center">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.checkAnswer = function(btn, choice, correct) {
            if (choice === correct) {
                btn.classList.add('correct');
                const explanation = flatQuestData[currentQuestionIdx].data[5];
                
                let status = currentQuestionMistakes === 0 ? 1 : 2;
                let gain = status === 1 ? 30 : 10;

                if (userProgress[currentQuestionIdx] === 0) {
                    wordStdExp += gain;
                    localStorage.setItem('wordStdExp', wordStdExp);
                    document.getElementById('exp-display').innerText = wordStdExp;
                }
                
                userProgress[currentQuestionIdx] = status;
                localStorage.setItem('wordStdProgress', JSON.stringify(userProgress));

                speakText("答對了！" + explanation);
                window.showFeedbackModal(explanation);
            } else {
                currentQuestionMistakes++;
                btn.classList.add('wrong', 'shake');
                speakText("不對喔，再想想看！");
                setTimeout(() => btn.classList.remove('shake'), 500);
            }
        };

        window.showFeedbackModal = function(desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    let nextIdx = currentQuestionIdx + 1;
                    if (nextIdx < flatQuestData.length) window.startQuestion(nextIdx);
                    else window.backToDirectory();
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        };

        window.backToDirectory = function() {
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        };

        window.backToDirectoryFromModal = function() {
            const modal = document.getElementById('feedback-modal');
            modal.classList.add('hidden');
            window.backToDirectory();
        };

        window.switchMode = function(mode) {
            const questTab = document.getElementById('tab-quest');
            const sandboxTab = document.getElementById('tab-sandbox');
            const questMode = document.getElementById('quest-mode');
            const sandboxMode = document.getElementById('sandbox-wrapper');

            if (mode === 'quest') {
                questTab.className = 'tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-blue-600';
                sandboxTab.className = 'tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200';
                questMode.style.display = 'flex';
                sandboxMode.classList.add('hidden');
            } else {
                sandboxTab.className = 'tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-blue-600';
                questTab.className = 'tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200';
                questMode.style.display = 'none';
                sandboxMode.classList.remove('hidden');
                renderSandboxWords();
            }
        };

        function renderSandboxWords() {
            const grid = document.getElementById('word-grid');
            grid.innerHTML = sandboxWords.map(w => `
                <button onclick="selectSandboxWord('${w.char}', '${w.radical}', '${w.english}')" class="bg-white border-2 border-slate-200 rounded-xl p-2 font-black text-xl hover:border-blue-400 hover:bg-blue-50 transition aspect-square flex items-center justify-center">
                    ${w.char}
                </button>
            `).join('');
        }

        window.selectSandboxWord = function(char, radical, english) {
            document.getElementById('sandbox-placeholder').classList.add('hidden');
            document.getElementById('sandbox-content').classList.remove('hidden');
            document.getElementById('sb-char').innerText = char;
            document.getElementById('sb-radical').innerText = radical;
            document.getElementById('sb-english').innerText = english;
            document.getElementById('sb-feedback').style.opacity = '0';
            
            document.getElementById('sandbox-canvas').innerHTML = '';
            let size = window.innerWidth < 768 ? 240 : 320;
            sbWriter = HanziWriter.create('sandbox-canvas', char, {
                width: size, height: size, padding: 20, strokeAnimationSpeed: 1, delayBetweenStrokes: 150,
                strokeColor: '#1e293b', radicalColor: '#3b82f6', showOutline: true, showCharacter: true
            });
        };

        window.startSandboxQuiz = function() {
            if (!sbWriter) return;
            const feedback = document.getElementById('sb-feedback');
            feedback.innerText = "請開始書寫...";
            feedback.className = "mt-4 text-xl font-bold text-blue-600 opacity-100";
            sbWriter.quiz({
                onMistake: function() {
                    feedback.innerText = "❌ 筆畫不對喔！";
                    feedback.className = "mt-4 text-xl font-bold text-rose-500 opacity-100 shake";
                    speakText("不對喔，再試試看");
                    setTimeout(() => feedback.classList.remove('shake'), 400);
                },
                onComplete: function() {
                    feedback.innerText = "✅ 太棒了！書寫正確！";
                    feedback.className = "mt-4 text-2xl font-black text-emerald-600 opacity-100 pop";
                    speakText("太棒了！");
                }
            });
        };

        window.searchCustomChar = function() {
            const input = document.getElementById('custom-char-input').value.trim();
            if (input && /^[\u4e00-\u9fa5]$/.test(input)) {
                selectSandboxWord(input, '查詢中', 'Custom');
            } else {
                showToast("請輸入一個中文字喔！");
            }
        };

        window.onload = () => {
            renderDirectory();
        };
    </script>
</body>
</html>
