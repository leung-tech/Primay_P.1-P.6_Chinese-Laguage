<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字詞基礎 - 標準常規訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #eff6ff;
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .mi-zi-ge {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, transparent 49.5%, #ef4444 49.5%, #ef4444 50.5%, transparent 50.5%),
                linear-gradient(to bottom, transparent 49.5%, #ef4444 49.5%, #ef4444 50.5%, transparent 50.5%),
                linear-gradient(45deg, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%),
                linear-gradient(-45deg, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%);
            border: 4px solid #ef4444; border-radius: 8px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #94a3b8; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #dbeafe; border-color: #3b82f6; color: #1e3a8a; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }
        
        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }

        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .tab-inactive { background-color: white; color: #475569; border-color: #cbd5e1; }
        
        .filter-btn { transition: all 0.2s; }
        .filter-active { background-color: #3b82f6; color: white; border-color: #2563eb; font-weight: bold; }

        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-blue-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-blue-700 p-1 rounded transition bg-blue-800">⬅️ 返回</a>
                <span>📚 字詞基礎 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-blue-800 px-3 py-1.5 rounded-full border border-blue-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('quest')" id="tab-quest" class="tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-blue-600">
                📝 綜合字詞特訓 (300題)
            </button>
            <button onclick="switchMode('sandbox')" id="tab-sandbox" class="tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200">
                ✍️ 進階字庫 (中英對照)
            </button>
        </div>
        
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-orange-500 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <!-- ================= 模式 1：闖關地圖 ================= -->
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🎯 常規題型特訓地圖</h2>
                
                <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-blue-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 經嘗試後答對</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 答錯未完成</div>
                    </div>
                </div>

                <div id="directory-content" class="flex flex-col gap-8">
                    <!-- 目錄動態生成 -->
                </div>
            </div>
            <div id="quest-play" class="w-full hidden flex-col items-center">
                <!-- 題目動態生成 -->
            </div>
        </div>

        <!-- ================= 模式 2：常見字寫字板 ================= -->
        <div id="sandbox-wrapper" class="hidden w-full h-full">
            <div class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-4 lg:gap-6 h-full min-h-[500px]">
                <div class="lg:w-1/3 flex flex-col gap-3 min-h-[300px] lg:h-[600px]">
                    <div class="bg-white rounded-xl shadow-sm border border-blue-200 p-3 flex flex-col gap-2 relative">
                        <h3 class="font-bold text-blue-800 text-sm">🔍 搜尋小學習字表：</h3>
                        <div class="flex gap-2">
                            <input type="text" id="custom-char-input" maxlength="1" placeholder="輸入任何中文字..." class="flex-1 px-3 py-2 border-2 border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 text-lg text-center font-bold">
                            <button onclick="searchCustomChar()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-sm transition">生成</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-2 flex overflow-x-auto no-scrollbar gap-2 flex-shrink-0">
                        <button onclick="filterWords('all')" id="flt-all" class="filter-btn filter-active px-4 py-2 rounded-lg whitespace-nowrap text-sm border">全部</button>
                        <button onclick="filterWords('nature')" id="flt-nature" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">自然</button>
                        <button onclick="filterWords('action')" id="flt-action" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">動作</button>
                        <button onclick="filterWords('body')" id="flt-body" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">身體</button>
                        <button onclick="filterWords('object')" id="flt-object" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">物品</button>
                        <button onclick="filterWords('time')" id="flt-time" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">時間</button>
                        <button onclick="filterWords('emotion')" id="flt-emotion" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">情感</button>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md border-2 border-slate-200 p-4 flex-1 overflow-y-auto no-scrollbar min-h-[250px]">
                        <div id="word-grid" class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-3 gap-2"></div>
                    </div>
                </div>

                <div class="lg:w-2/3 bg-white rounded-2xl shadow-xl border-t-8 border-blue-600 p-4 lg:p-6 flex flex-col items-center justify-center relative min-h-[400px]">
                    <div id="sandbox-placeholder" class="text-slate-400 font-bold text-xl text-center flex flex-col items-center gap-4">
                        <span class="text-6xl animate-bounce">👈</span>請從左側選擇，或直接搜尋中文字
                    </div>
                    <div id="sandbox-content" class="hidden w-full flex flex-col items-center">
                        <div class="flex justify-between w-full mb-4 items-end border-b-2 border-slate-100 pb-4">
                            <div>
                                <h2 id="sb-char" class="text-5xl lg:text-6xl font-black text-slate-800 mb-3">字</h2>
                                <div class="flex flex-wrap gap-2">
                                    <span class="bg-orange-100 text-orange-800 px-3 py-1 rounded-lg border border-orange-200 font-bold text-sm lg:text-base">部首：<span id="sb-radical"></span></span>
                                    <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-lg border border-indigo-200 font-bold text-sm lg:text-base" id="sb-english">English</span>
                                </div>
                            </div>
                            <button onclick="speakText(document.getElementById('sb-char').innerText)" class="tts-btn bg-blue-100 text-blue-700 w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-sm border-2 border-blue-200">🔊</button>
                        </div>
                        <div class="relative w-64 h-64 md:w-80 md:h-80 mi-zi-ge mb-6 shadow-inner touch-none" id="sandbox-canvas"></div>
                        <div class="flex flex-wrap justify-center gap-3 w-full">
                            <button onclick="sbWriter.animateCharacter()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-lg">👀 看筆順</button>
                            <button onclick="startSandboxQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-lg">✍️ 試寫</button>
                            <button onclick="sbWriter.hideCharacter(); sbWriter.showCharacter()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-6 rounded-xl transition text-lg">🔄 重設</button>
                        </div>
                        <div id="sb-feedback" class="mt-4 text-xl font-bold text-blue-600 h-8 opacity-0 transition-opacity"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-blue-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-blue-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4">
                <!-- 教學內容動態載入 -->
            </div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 反饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-sm text-center transform scale-90 transition-transform" id="feedback-content">
            <div id="feedback-icon" class="text-7xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-6 text-lg leading-relaxed"></div>
            <div class="flex gap-3 w-full">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心設定 =================
        let stdExp = parseInt(localStorage.getItem('stdExp')) || 0;
        document.getElementById('exp-display').innerText = stdExp;
        let typoStep = 1; 
        let currentQuestionMistakes = 0;
        let currentQuestionIdx = -1;
        let pendingQuestionIdx = -1; // 用於教學攔截

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-HK';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // ================= 1.5 學習錦囊內容 (教學資源庫) =================
        const tutorialContents = {
            'c-pic': `
                <div class="text-center mb-4"><span class="text-6xl">🎨 ➡️ 字</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">古人怎麼發明文字的？</p>
                <p class="mb-4 text-slate-600">中文字的祖先是「畫畫」！</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 space-y-4 text-center">
                    <div>
                        <p class="font-black text-amber-800 text-xl mb-1">【象形字】</p>
                        <p class="text-base text-slate-700">照著東西的形狀畫出來。<br>例：畫一座山峰 ⛰️ 變成「<span class="text-amber-600 font-bold">山</span>」</p>
                    </div>
                    <hr class="border-amber-200">
                    <div>
                        <p class="font-black text-teal-800 text-xl mb-1">【指事字】</p>
                        <p class="text-base text-slate-700">用點或線「做記號」來表示位置。<br>例：在橫線下面點一點 ⬇️ 變成「<span class="text-teal-600 font-bold">下</span>」</p>
                    </div>
                </div>
            `,
            'c-measure': `
                <div class="text-center mb-4"><span class="text-6xl">📏 🐶 🐟</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">什麼是「量詞」？</p>
                <p class="mb-4 text-slate-600">量詞就是用來計算東西數量的單位。不同的東西有不同的好朋友：</p>
                <div class="bg-teal-50 p-4 rounded-xl border-2 border-teal-200 mb-3 space-y-3">
                    <p class="text-lg">🐶 動物通常用 <span class="bg-white font-black text-teal-700 border border-teal-300 px-2 py-1 rounded">隻</span> 或 <span class="bg-white font-black text-teal-700 border border-teal-300 px-2 py-1 rounded">頭</span></p>
                    <p class="text-lg">🐟 長條形的東西用 <span class="bg-white font-black text-teal-700 border border-teal-300 px-2 py-1 rounded">條</span></p>
                    <p class="text-lg">🚗 車子、機器用 <span class="bg-white font-black text-teal-700 border border-teal-300 px-2 py-1 rounded">輛</span> 或 <span class="bg-white font-black text-teal-700 border border-teal-300 px-2 py-1 rounded">部</span></p>
                    <p class="text-lg">☔ 有手柄的東西用 <span class="bg-white font-black text-teal-700 border border-teal-300 px-2 py-1 rounded">把</span></p>
                </div>
            `,
            'c-similar': `
                <div class="text-center mb-4"><span class="text-6xl">👯‍♂️ 🔎</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">分辨「形近字」的秘訣</p>
                <p class="mb-4 text-slate-600">長得很像的字，要看它們的<span class="text-blue-600 font-bold">部首</span>或<span class="text-blue-600 font-bold">小細節</span>！</p>
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200 mb-3 space-y-4 text-center">
                    <div>
                        <p class="text-2xl font-black mb-1">喝 <span class="text-slate-400 font-normal">VS</span> 渴</p>
                        <p class="text-base text-slate-700">用 <span class="font-bold text-rose-500 bg-white px-1 rounded">口</span> 喝水<br>身體缺 <span class="font-bold text-rose-500 bg-white px-1 rounded">水 (氵)</span> 會口渴</p>
                    </div>
                    <hr class="border-blue-200">
                    <div>
                        <p class="text-2xl font-black mb-1">坐 <span class="text-slate-400 font-normal">VS</span> 座</p>
                        <p class="text-base text-slate-700">「坐」下是一個<span class="font-bold text-blue-600">動作</span><br>「座」位是一個<span class="font-bold text-blue-600">地方(广)</span></p>
                    </div>
                </div>
            `,
            'c-typo': `
                <div class="text-center mb-4"><span class="text-6xl">🩺 ❌</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">如何成為「錯別字醫生」？</p>
                <p class="mb-4 text-slate-600">當句子裡混進了同音字或形近字，就會變成錯字。請跟著以下步驟：</p>
                <div class="bg-rose-50 p-4 rounded-xl border-2 border-rose-200 mb-3 space-y-3 font-bold text-rose-800 text-lg">
                    <p>1️⃣ 先大聲讀一次句子，覺得哪個字怪怪的？</p>
                    <p>2️⃣ <span class="bg-white px-2 py-1 rounded border border-rose-300 text-rose-600">點擊</span>那個怪怪的字。</p>
                    <p>3️⃣ 從選項中選出<span class="bg-white px-2 py-1 rounded border border-rose-300 text-rose-600">正確的字</span>把它治好！</p>
                </div>
            `,
            'c-synant': `
                <div class="text-center mb-4"><span class="text-6xl">🔄 🎭</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">近義詞 與 反義詞</p>
                <div class="bg-purple-50 p-4 rounded-xl border-2 border-purple-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-purple-800 text-xl border-b border-purple-200 pb-1 mb-2">🤝 近義詞 (好朋友)</p>
                        <p class="text-base text-slate-700">意思相近的詞語，可以互相替換。<br>例：美麗 ➡️ <span class="font-bold text-purple-600 bg-white px-1 rounded">漂亮</span></p>
                    </div>
                    <div>
                        <p class="font-black text-orange-800 text-xl border-b border-orange-200 pb-1 mb-2">⚔️ 反義詞 (敵人)</p>
                        <p class="text-base text-slate-700">意思完全相反的詞語。<br>例：美麗 ➡️ <span class="font-bold text-orange-600 bg-white px-1 rounded">醜陋</span></p>
                    </div>
                </div>
            `,
            'c-meaning': `
                <div class="text-center mb-4"><span class="text-6xl">📖 🕵️‍♂️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">詞義理解與運用</p>
                <p class="mb-4 text-slate-600">這關考驗你對詞語的熟悉度。遇到不會的詞，要像偵探一樣尋找<span class="text-emerald-600 font-bold">上下文線索</span>！</p>

        const rawQuestData = [...picData, ...measureData, ...similarData, ...typoData, ...synantData, ...meaningData, ...collocData, ...idiomData];

        let userProgress = JSON.parse(localStorage.getItem('stdQuestProgress')) || new Array(300).fill(0);

        function renderDirectory() {
            const dirContainer = document.getElementById('directory-content');
            let html = '';
            categories.forEach(cat => {
                html += `
                    <div class="mb-6">
                        <div class="flex items-center justify-between border-b-2 border-${cat.color}-100 pb-2 mb-3">
                            <h3 class="text-xl font-bold text-${cat.color}-700">${cat.title}</h3>
                            <button onclick="showTutorial('${cat.id}')" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-blue-300 hover:bg-blue-200 transition flex items-center gap-1 active:scale-95">📘 學習錦囊</button>
                        </div>
                        <div class="flex flex-wrap gap-3">
                `;
                rawQuestData.forEach((q, idx) => {
                    if(q[1] === cat.id) {
                        let status = userProgress[idx];
                        let btnClass = 'bg-white border-slate-300 text-slate-500 hover:bg-slate-50';
                        let icon = (idx + 1);

                        if (status === 1) {
                            btnClass = 'bg-yellow-100 border-yellow-400 text-yellow-700';
                            icon = '🌟';
                        } else if (status === 2) {
                            btnClass = 'bg-emerald-100 border-emerald-400 text-emerald-700';
                            icon = '✅';
                        } else if (status === -1) {
                            btnClass = 'bg-rose-100 border-rose-400 text-rose-700';
                            icon = '❌';
                        }

                        html += `<button onclick="startQuestion(${idx})" class="lvl-btn ${btnClass} w-12 h-12 lg:w-14 lg:h-14 rounded-xl font-black text-base lg:text-lg border-b-4 flex items-center justify-center shadow-sm">${icon}</button>`;
                    }
                });
                html += `</div></div>`;
            });
            dirContainer.innerHTML = html;
            updateTotalProgress();
        }

        function updateTotalProgress() {
            let solved = userProgress.filter(p => p === 1 || p === 2).length;
            let percent = (solved / 300) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        function startQuestion(idx, forceStart = false) {
            const qData = rawQuestData[idx];
            const catId = qData[1];
            
            // 🌟 自動教學攔截
            if (!forceStart && !localStorage.getItem('tut_seen_' + catId)) {
                pendingQuestionIdx = idx;
                showTutorial(catId);
                return;
            }

            typoStep = 1; 
            currentQuestionMistakes = 0; 
            currentQuestionIdx = idx;
            document.getElementById('quest-directory').style.display = 'none';
            const questPlay = document.getElementById('quest-play');
            questPlay.style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;
            
            const qType = qData[0];
            const qCatTitle = categories.find(c => c.id === catId).title;
            const qTask = qData[2];
            let qSentence, options, ansIdx, typoChar, extraData;

            if (qType === 'c-typo') {
                qSentence = qData[3];
                typoChar = qData[4];
                options = qData[5];
                ansIdx = qData[6];
            } else {
                qSentence = qData[3];
                options = qData[4];
                ansIdx = qData[5];
                extraData = qData[7]; 
            }

            let ttsText = qSentence.replace('___', '什麼');
            if (qType === 'c-synant') ttsText = qTask + " " + qSentence; 
            if (qType === 'c-typo') ttsText = qTask + " " + qSentence;

            let html = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-blue-100 text-blue-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">第 ${idx + 1} 題 / 共 300 題</span>
                </div>
                
                <div class="slide-up w-full bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-blue-600 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">
                        ${qCatTitle}
                    </span>
                    
                    <div class="w-full flex items-center gap-3 mt-4 mb-6">
                        <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">任務</span>
                        <h2 class="text-lg md:text-xl font-bold text-slate-600">${qTask}</h2>
                    </div>
            `;

            if (qType === 'c-pic' && extraData) {
                html += `<div class="text-8xl md:text-9xl mb-6 bg-amber-50 p-8 rounded-3xl border-4 border-amber-200 w-full text-center shadow-inner select-none cursor-default">${extraData}</div>`;
            } else if (qType === 'c-measure' && extraData) {
                html += `<div class="text-7xl md:text-8xl mb-6 text-center animate-bounce drop-shadow-md cursor-default select-none">${extraData}</div>`;
            } else if (qType === 'c-idiom' && extraData) {
                html += `
                    <div class="w-full flex justify-center mb-6">
                        <button onclick="document.getElementById('idiom-hint').classList.toggle('hidden')" class="bg-orange-100 text-orange-700 font-bold px-6 py-2 rounded-xl border-2 border-orange-300 hover:bg-orange-200 transition shadow-sm flex items-center gap-2">
                            💡 需要提示嗎？點擊看成語解釋
                        </button>
                    </div>
                    <div id="idiom-hint" class="hidden mb-6 bg-yellow-50 text-yellow-800 p-5 rounded-2xl border-2 border-yellow-200 shadow-inner font-bold text-lg w-full leading-relaxed text-center">
                        ${extraData}
                    </div>
                `;
            }

            if (qType === 'c-typo') {
                let sentenceHtml = '';
                for(let char of qSentence) {
                    if(/[，。、？！]/.test(char)) {
                        sentenceHtml += char;
                    } else {
                        sentenceHtml += `<span onclick="checkTypoChar(this, '${char}', '${typoChar}')" class="cursor-pointer hover:bg-rose-200 px-1 rounded transition">${char}</span>`;
                    }
                }
                
                html += `
                    <div class="w-full flex items-start gap-4 mb-8 bg-blue-50 p-6 rounded-2xl border border-blue-100 shadow-inner">
                        <button onclick="speakText('${ttsText}')" class="tts-btn flex-shrink-0 bg-white text-blue-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-blue-200">🔊</button>
                        <div class="text-2xl md:text-3xl font-bold text-slate-800 leading-loose">${sentenceHtml}</div>
                    </div>
                    <div class="flex flex-col gap-3 w-full max-w-lg mt-auto" id="options-container">
                        <div class="text-center text-rose-500 font-bold text-xl animate-pulse bg-rose-50 py-4 rounded-xl border border-rose-200">👆 步驟一：請在上方句子中找出並點擊「錯別字」</div>
                    </div>
                `;
            } else {
                let sentenceHtml = qSentence.replace('___', '<span class="text-orange-500 border-b-4 border-orange-500 px-6 font-black bg-orange-50">?</span>');
                html += `
                    <div class="w-full flex items-start gap-4 mb-8 bg-blue-50 p-6 rounded-2xl border border-blue-100 shadow-inner">
                        <button onclick="speakText('${ttsText}')" class="tts-btn flex-shrink-0 bg-white text-blue-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-blue-200">🔊</button>
                        <div class="text-2xl md:text-3xl font-bold text-slate-800 leading-loose">${sentenceHtml}</div>
                    </div>

                    <div class="flex flex-col gap-3 w-full max-w-lg mt-auto" id="options-container">
                `;
                options.forEach((optText, oIdx) => {
                    const isCorr = (oIdx === ansIdx);
                    html += `<button onclick="checkAnswer(this, ${isCorr})" class="option-btn bg-white border-2 border-slate-200 text-slate-700 text-xl font-bold py-4 rounded-xl hover:bg-slate-50 transition w-full text-center">${optText}</button>`;
                });
                html += `</div>`;
            }

            html += `
                <div id="post-answer-view" class="hidden w-full flex-col items-center mt-6 pt-6 border-t border-slate-200">
                    <h3 class="text-xl font-bold text-blue-600 mb-4">✨ 一起來學寫正確的字吧！</h3>
                    <div id="post-canvas" class="w-48 h-48 mi-zi-ge mb-4 touch-none"></div>
                    <div class="flex gap-4 w-full max-w-[400px]">
                        <button onclick="backToDirectory()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                        <button onclick="goToNextQuestion()" class="flex-[1.5] bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
                    </div>
                </div>
            </div>`;

            questPlay.innerHTML = html;
        }

        function checkTypoChar(element, char, typoChar) {
            if (typoStep !== 1) return;
            
            if (char === typoChar) {
                speakText("找對了！請選擇正確的字。");
                typoStep = 2; 
                
                element.className = "text-rose-500 font-black border-b-4 border-rose-500 px-1 scale-110 inline-block bg-rose-100 rounded transition";
                
                const qData = rawQuestData[currentQuestionIdx];
                const options = qData[5];
                const ansIdx = qData[6];
                
                let optsHtml = `<div class="text-center text-emerald-600 font-bold text-lg mb-2">步驟二：「${typoChar}」是錯字！應該改成哪一個？</div>`;
                options.forEach((optText, oIdx) => {
                    const isCorr = (oIdx === ansIdx);
                    optsHtml += `<button onclick="checkAnswer(this, ${isCorr})" class="option-btn bg-white border-2 border-slate-200 text-slate-700 text-xl font-bold py-4 rounded-xl hover:bg-slate-50 transition w-full text-center">${optText}</button>`;
                });
                document.getElementById('options-container').innerHTML = optsHtml;
            } else {
                speakText("這不是錯字喔，再找找看！");
                element.classList.add('bg-rose-300', 'shake');
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('stdQuestProgress', JSON.stringify(userProgress));
                setTimeout(() => element.classList.remove('bg-rose-300', 'shake'), 500);
            }
        }

        function backToDirectory() {
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function goToNextQuestion() {
            let nextIdx = currentQuestionIdx + 1;
            if (nextIdx < rawQuestData.length) {
                startQuestion(nextIdx);
            } else {
                showToast("恭喜！這已經是最後一題囉！");
                backToDirectory();
            }
        }

        function backToDirectoryFromModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        function checkAnswer(btnElement, isCorrect) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.classList.add('correct');
                handleCorrectAnswer(false);
            } else {
                btnElement.classList.add('wrong', 'shake');
                speakText("不對喔，請再試一次！");
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('stdQuestProgress', JSON.stringify(userProgress));
                
                setTimeout(() => {
                    btnElement.classList.remove('wrong', 'shake');
                    allBtns.forEach(b => { if (!b.classList.contains('correct')) b.style.pointerEvents = 'auto'; });
                }, 1500);
            }
        }

        function handleCorrectAnswer(isWriteTask) {
            const qData = rawQuestData[currentQuestionIdx];
            const qType = qData[0];
            const expText = qType === 'c-typo' ? qData[7] : qData[6];
            
            let targetChar = null;
            if (qType === 'c-typo') targetChar = qData[5][qData[6]].charAt(0);
            else if (qData[8]) targetChar = qData[8]; 

            if (!isWriteTask) {
                speakText("答對了！" + expText);
            }
            
            let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentQuestionIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 20 : 10;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 10; 
            }

            if (expGained > 0) {
                stdExp += expGained;
                localStorage.setItem('stdExp', stdExp);
                document.getElementById('exp-display').innerText = stdExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentQuestionIdx] = finalStatus;
                localStorage.setItem('stdQuestProgress', JSON.stringify(userProgress));
            }

            let modalIcon = finalStatus === 1 ? '🌟' : '✅';
            let modalTitle = finalStatus === 1 ? '完美答對！' : '成功過關！';
            
            let expMsg = "";
            if (expGained > 0) {
                if (finalStatus === 1) {
                    expMsg = `<span class="text-blue-600 block text-xl mb-3">一次答對！獲得 20 點經驗值 ✨</span>`;
                } else {
                    expMsg = `<span class="text-emerald-600 block text-xl mb-3">經嘗試後答對！獲得 10 點經驗值 ✨</span>`;
                }
            } else {
                expMsg = `<span class="text-slate-500 block text-lg mb-3">這題已經成功過關囉！</span>`;
            }
            
            let combinedDesc = expMsg + expText;

            if (!isWriteTask && targetChar && (qType === 'c-pic' || qType === 'c-similar' || qType === 'c-typo')) {
                setTimeout(() => {
                    const optionsContainer = document.getElementById('options-container');
                    if (optionsContainer) optionsContainer.classList.add('hidden');
                    
                    const postView = document.getElementById('post-answer-view');
                    if (postView) {
                        postView.classList.remove('hidden');
                        postView.classList.add('flex', 'slide-up');
                        
                        document.getElementById('post-canvas').innerHTML = ''; 
                        try {
                            const postWriter = HanziWriter.create('post-canvas', targetChar, {
                                width: 192, height: 192, padding: 10, strokeAnimationSpeed: 1, delayBetweenStrokes: 100,
                                strokeColor: '#1e293b', radicalColor: '#3b82f6'
                            });
                            setTimeout(() => postWriter.animateCharacter(), 500);
                        } catch(e) {
                            showModal(modalIcon, modalTitle, combinedDesc);
                        }
                    } else {
                        showModal(modalIcon, modalTitle, combinedDesc);
                    }
                }, 1000);
            } else {
                setTimeout(() => { showModal(modalIcon, modalTitle, combinedDesc); }, 1000);
            }
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    goToNextQuestion();
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        // ================= 3. 無盡字庫寫字板 =================
        const rawWordData = "nature|霧:雨:Fog,露:雨:Dew,霞:雨:Sunset clouds,雷:雨:Thunder,電:雨:Electricity,峰:山:Peak,嶺:山:Ridge,崖:山:Cliff,泉:水:Spring,瀑:水:Waterfall,溪:水:Stream,潮:水:Tide,濤:水:Waves,旱:日:Drought,晨:日:Morning,暮:日:Dusk|person|腦:頁:Brain,肺:肉:Lung,胃:肉:Stomach,腸:肉:Intestine,膚:皮:Skin,骨:骨:Bone,脈:肉:Vein,額:頁:Forehead,頸:頁:Neck,肩:肉:Shoulder,臂:肉:Arm,腿:肉:Leg,智:日:Wisdom,慧:心:Intelligence|action|觀:見:Observe,聽:耳:Listen,思:心:Think,探:手:Explore,創:刀:Create,駕:馬:Drive,航:舟:Sail,藏:艸:Hide,找:手:Search,救:攴:Save,毀:殳:Destroy,建:廴:Build,測:水:Measure|object|鏡:金:Mirror,鐘:金:Clock,錶:金:Watch,鍵:金:Key,盤:皿:Plate,碗:石:Bowl,筷:竹:Chopsticks,劍:刀:Sword,盾:目:Shield,箭:竹:Arrow,箱:竹:Box,櫃:木:Cabinet,琴:玉:Piano,棋:木:Chess|emotion|憤:心:Angry,恨:心:Hate,愁:心:Worry,悲:心:Sad,恐:心:Fear,懼:心:Dread,慕:心:Admire,戀:心:Love,慰:心:Comfort,愧:心:Ashamed,驚:馬:Surprised,喜:口:Joy,怒:心:Anger,哀:口:Sorrow|time|年:干:Year,月:月:Month,日:日:Day,時:日:Hour,分:刀:Minute,秒:禾:Second,早:日:Early,晚:日:Late,晝:日:Daytime,夜:夕:Night,春:日:Spring,夏:夊:Summer,秋:禾:Autumn,冬:冫:Winter";

        let parsedWords = [];
        rawWordData.split('|').forEach((chunk, index, arr) => {
            if(index % 2 === 0) {
                let cat = chunk;
                let pairs = arr[index+1].split(',');
                pairs.forEach(p => { 
                    let [char, rad, eng] = p.split(':'); 
                    if (char && rad) parsedWords.push({ cat, char, rad, eng }); 
                });
            }
        });

        let sbWriter;
        let isSandboxInitialized = false;

        function initSandbox() { filterWords('all'); }

        function filterWords(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('filter-active', 'bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-50', 'text-slate-600');
            });
            let activeBtn = document.getElementById('flt-' + category);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-50', 'text-slate-600');
                activeBtn.classList.add('filter-active');
            }

            const grid = document.getElementById('word-grid');
            let html = '';
            parsedWords.forEach((item) => {
                if (category === 'all' || item.cat === category) {
                    const itemStr = encodeURIComponent(JSON.stringify(item));
                    html += `<button onclick="selectSandboxChar('${itemStr}')" class="bg-slate-50 border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-2xl lg:text-3xl font-bold py-3 lg:py-4 rounded-xl transition shadow-sm text-slate-700">${item.char}</button>`;
                }
            });
            grid.innerHTML = html;
        }

        function searchCustomChar() {
            const input = document.getElementById('custom-char-input').value.trim();
            const chars = input.match(/[\u4e00-\u9fa5]/g);
            if (!chars || chars.length === 0) { showToast("請輸入一個有效的中文字！"); return; }
            selectSandboxChar(encodeURIComponent(JSON.stringify({ char: chars[0], rad: '檢索字', eng: 'Custom' })));
            document.getElementById('custom-char-input').value = ''; 
        }

        function selectSandboxChar(itemStr) {
            document.getElementById('sandbox-placeholder').classList.add('hidden');
            document.getElementById('sandbox-content').classList.remove('hidden');
            const data = JSON.parse(decodeURIComponent(itemStr));
            document.getElementById('sb-char').innerText = data.char;
            document.getElementById('sb-radical').innerText = data.rad;
            document.getElementById('sb-english').innerText = data.eng || 'Translation';
            document.getElementById('sb-feedback').style.opacity = '0';
            speakText(data.char);

            const canvasDiv = document.getElementById('sandbox-canvas');
            canvasDiv.innerHTML = ''; 
            const size = window.innerWidth < 768 ? 256 : 320; 
            
            try {
                sbWriter = HanziWriter.create('sandbox-canvas', data.char, {
                    width: size, height: size, padding: 15, strokeAnimationSpeed: 1, delayBetweenStrokes: 100,
                    strokeColor: '#1e293b', radicalColor: '#2563eb', showHintAfterMisses: 2, leniency: 2.0,
                    onLoadCharDataError: function(reason) {
                        canvasDiv.innerHTML = `
                            <div class="flex flex-col items-center justify-center h-full px-4 text-center">
                                <span class="text-5xl mb-3">📭</span>
                                <p class="text-rose-500 font-bold text-lg">系統字庫暫時未收錄「${data.char}」字的筆順資料喔！</p>
                                <p class="text-slate-500 font-medium text-sm mt-2">請嘗試搜尋其他中文字。</p>
                            </div>
                        `;
                        sbWriter = null;
                    }
                });
            } catch(e) {
                // Error catching
            }
        }

        function startSandboxQuiz() {
            if (!sbWriter) { showToast("這個字沒有筆順資料，無法練習試寫喔！"); return; }
            document.getElementById('sb-feedback').style.opacity = '0';
            sbWriter.quiz({
                onMistake: function() {
                    const fb = document.getElementById('sb-feedback');
                    fb.innerText = "❌ 筆順不正確！";
                    fb.className = "mt-4 text-lg font-bold text-rose-500 h-8 transition-opacity opacity-100 shake";
                    speakText("筆順不正確");
                    setTimeout(() => fb.classList.remove('shake'), 400);
                },
                onComplete: function() {
                    const fb = document.getElementById('sb-feedback');
                    fb.innerText = "✨ 書寫正確！(獲得 5 EXP)";
                    fb.className = "mt-4 text-xl font-bold text-blue-600 h-8 transition-opacity opacity-100 pop";
                    speakText("書寫正確！");
                    stdExp += 5;
                    localStorage.setItem('stdExp', stdExp);
                    document.getElementById('exp-display').innerText = stdExp;
                    document.getElementById('exp-display').classList.add('pop');
                    setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                }
            });
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = stdExp;
            switchMode('quest'); 
            renderDirectory();
            document.getElementById('custom-char-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchCustomChar();
            });
        }
    </script>
</body>
</html>
