<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字詞基礎 - 趣味多感官訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdf4; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-dot-pattern { background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNlMmU4ZjAiIGZpbGwtb3BhY2l0eT0iMC40Ii8+PC9zdmc+'); }
        
        .mi-zi-ge {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, transparent 49.5%, #ef4444 49.5%, #ef4444 50.5%, transparent 50.5%),
                linear-gradient(to bottom, transparent 49.5%, #ef4444 49.5%, #ef4444 50.5%, transparent 50.5%),
                linear-gradient(45deg, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%),
                linear-gradient(-45deg, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%);
            border: 4px solid #ef4444; border-radius: 8px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #94a3b8; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #dcfce7; border-color: #22c55e; color: #166534; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }
        
        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }

        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #10b981; color: white; border-color: #059669; }
        .tab-inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }
        
        .filter-btn { transition: all 0.2s; }
        .filter-active { background-color: #34d399; color: white; border-color: #059669; font-weight: bold; }

        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }
        .lvl-correct { background-color: #dcfce7; border-color: #22c55e; color: #166534; }
        .lvl-wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .lvl-unplayed { background-color: white; border-color: #cbd5e1; color: #475569; }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-emerald-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-emerald-700 p-1 rounded transition bg-emerald-800">⬅️ 返回</a>
                <span>🌱 字詞基礎 (趣味訓練)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-emerald-800 px-3 py-1.5 rounded-full border border-emerald-500 shadow-inner">
                <span class="text-lg lg:text-xl">⭐</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('quest')" id="tab-quest" class="tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-emerald-600">
                🗺️ 闖關地圖
            </button>
            <button onclick="switchMode('sandbox')" id="tab-sandbox" class="tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200">
                ✍️ 無盡寫字板
            </button>
        </div>
        
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-dot-pattern" id="main-scroll-area">
        
        <!-- 模式 1：闖關地圖與挑戰 -->
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🗺️ 學習地圖</h2>
                <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-emerald-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 已過關</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 未完成</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-white border-2 border-slate-300 flex items-center justify-center text-lg shadow-sm text-slate-400">#</span> 尚未挑戰</div>
                    </div>
                </div>
                <div id="directory-content" class="flex flex-col gap-8">
                    <!-- 目錄動態生成 -->
                </div>
            </div>

            <div id="quest-play" class="w-full hidden flex-col items-center">
                <!-- 題目動態生成 -->
            </div>
        </div>

        <!-- 模式 2：常見字寫字板 -->
        <div id="sandbox-wrapper" class="hidden w-full h-full">
            <div class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-4 lg:gap-6 h-full min-h-[500px]">
                
                <div class="lg:w-1/3 flex flex-col gap-3 min-h-[300px] lg:h-[600px]">
                    <div class="bg-white rounded-xl shadow-sm border border-emerald-200 p-3 flex flex-col gap-2 relative">
                        <h3 class="font-bold text-emerald-800 text-sm">🔍 想寫小學習字表上的字？</h3>
                        <div class="flex gap-2">
                            <input type="text" id="custom-char-input" maxlength="1" placeholder="輸入任何一個中文字..." class="flex-1 px-3 py-2 border-2 border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 text-lg text-center font-bold">
                            <button onclick="searchCustomChar()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-emerald-600 shadow-sm transition">生成</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-2 flex overflow-x-auto no-scrollbar gap-2 flex-shrink-0">
                        <button onclick="filterWords('all')" id="flt-all" class="filter-btn filter-active px-4 py-2 rounded-lg whitespace-nowrap text-sm border">全部</button>
                        <button onclick="filterWords('nature')" id="flt-nature" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">自然</button>
                        <button onclick="filterWords('person')" id="flt-person" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">人物</button>
                        <button onclick="filterWords('action')" id="flt-action" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">動作</button>
                        <button onclick="filterWords('object')" id="flt-object" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">物品</button>
                        <button onclick="filterWords('animal')" id="flt-animal" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">動物</button>
                        <button onclick="filterWords('food')" id="flt-food" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">飲食</button>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md border-2 border-slate-200 p-4 flex-1 overflow-y-auto no-scrollbar min-h-[200px]">
                        <div id="word-grid" class="grid grid-cols-4 sm:grid-cols-5 lg:grid-cols-4 gap-2"></div>
                    </div>
                </div>

                <div class="lg:w-2/3 bg-white rounded-2xl shadow-xl border-t-8 border-emerald-500 p-4 lg:p-6 flex flex-col items-center justify-center relative min-h-[400px]">
                    <div id="sandbox-placeholder" class="text-slate-400 font-bold text-xl text-center flex flex-col items-center gap-4">
                        <span class="text-6xl animate-bounce">👈</span>請從左側選擇，或直接搜尋中文字
                    </div>
                    <div id="sandbox-content" class="hidden w-full flex flex-col items-center">
                        <div class="flex justify-between w-full mb-4 items-end border-b-2 border-slate-100 pb-2">
                            <div>
                                <h2 id="sb-char" class="text-5xl lg:text-6xl font-black text-slate-800 mb-2">字</h2>
                                <p class="text-slate-500 font-bold text-base lg:text-lg"><span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-lg border border-blue-200">部首：<span id="sb-radical"></span></span></p>
                            </div>
                            <button onclick="speakText(document.getElementById('sb-char').innerText)" class="tts-btn bg-emerald-100 text-emerald-700 w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-sm border-2 border-emerald-200">🔊</button>
                        </div>
                        <div class="relative w-64 h-64 md:w-80 md:h-80 mi-zi-ge mb-6 shadow-inner touch-none" id="sandbox-canvas"></div>
                        <div class="flex flex-wrap justify-center gap-3 w-full">
                            <button onclick="sbWriter.animateCharacter()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-lg">👀 看筆順</button>
                            <button onclick="startSandboxQuiz()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-lg">✍️ 試寫</button>
                            <button onclick="sbWriter.hideCharacter(); sbWriter.showCharacter()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-6 rounded-xl transition text-lg">🔄 重設</button>
                        </div>
                        <div id="sb-feedback" class="mt-4 text-xl font-bold text-emerald-600 h-8 opacity-0 transition-opacity"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-emerald-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-emerald-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4">
            </div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 闖關回饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-sm text-center transform scale-90 transition-transform" id="feedback-content">
            <div id="feedback-icon" class="text-7xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-6 text-xl leading-relaxed"></div>
            <div class="flex gap-3 w-full">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-emerald-500 hover:bg-emerald-600 text-white font-black py-3 rounded-xl shadow-lg transition border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心邏輯與初始化 =================
        let totalExp = parseInt(localStorage.getItem('userExp')) || 0;
        document.getElementById('exp-display').innerText = totalExp;
        let currentQuestionIdx = -1;
        let pendingQuestionIdx = -1;
        let questWriter = null;

        window.cleanTextForSpeech = function(text) {
            if(!text) return "";
            return text.replace(/___/g, '什麼').replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】_]/g, '').replace(/&nbsp;/g, ' ').replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDC00-\uDFFF]/g, ''); 
        };

        window.speakText = function(text, rate = 0.95) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(window.cleanTextForSpeech(text));
                msg.lang = 'zh-HK';
                msg.rate = rate; 
                window.speechSynthesis.speak(msg);
            }
        };

        window.showToast = function(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        };

        const tutorialContents = {
            'c-radical': `
                <div class="text-center mb-4"><span class="text-6xl">🧩 ➕</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">字詞小加法：認識部首</p>
                <p class="mb-4 text-slate-600">中文字就像積木一樣，可以由不同的部分組成。左邊的部分通常代表意思，我們叫它<span class="text-emerald-600 font-bold">部首</span>。</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-100 space-y-2 text-base">
                    <p>🌲 <span class="font-bold">木部</span>：通常與樹木、木材有關。</p>
                    <p>✋ <span class="font-bold">手部 (扌)</span>：通常與動作有關。</p>
                    <p>🦶 <span class="font-bold">足部</span>：通常與腳部動作有關。</p>
                </div>
            `,
            'tw-similar': `
                <div class="text-center mb-4"><span class="text-6xl">🕵️‍♂️ 🔍</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">火眼金睛：分辨易混淆字</p>
                <p class="mb-4 text-slate-600">有些字長得很像，但意思完全不同。觀察它們的<span class="text-rose-500 font-bold">部首</span>是分辨它們的好方法！</p>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-rose-50 p-3 rounded-lg border border-rose-100 text-center">
                        <p class="text-2xl font-bold">泡 / 抱</p>
                        <p class="text-xs text-slate-500">三點水 vs 提手旁</p>
                    </div>
                    <div class="bg-rose-50 p-3 rounded-lg border border-rose-100 text-center">
                        <p class="text-2xl font-bold">園 / 圓</p>
                        <p class="text-xs text-slate-500">裡面是「元」或「員」</p>
                    </div>
                </div>
            `,
            's-stroke': `
                <div class="text-center mb-4"><span class="text-6xl">✍️ ✨</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">寫好中文字的小秘密</p>
                <p class="mb-4 text-slate-600">中文字有自己的「排隊規則」，叫做<span class="text-indigo-600 font-bold">筆順</span>。跟著規則寫，字就會變漂亮！</p>
                <div class="bg-indigo-50 p-4 rounded-xl border-2 border-indigo-100 space-y-2 text-base">
                    <p>1️⃣ <span class="font-bold">從上到下</span>：例如「三」</p>
                    <p>2️⃣ <span class="font-bold">從左到右</span>：例如「州」</p>
                    <p>3️⃣ <span class="font-bold">先橫後豎</span>：例如「十」</p>
                    <p>4️⃣ <span class="font-bold">先撇後捺</span>：例如「人」</p>
                </div>
            `,
            'w-write': `
                <div class="text-center mb-4"><span class="text-6xl">🎨 🏆</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">成為寫字小達人</p>
                <p class="mb-4 text-slate-600">現在輪到你大顯身手了！請在紅色的<span class="text-rose-500 font-bold">米字格</span>裡練習寫字。</p>
                <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <div class="w-12 h-12 bg-white border-2 border-rose-300 rounded flex items-center justify-center text-rose-400 font-bold">米</div>
                    <p class="text-sm text-slate-500">米字格能幫你找準每一筆的位置，讓字體端正不歪斜。</p>
                </div>
            `
        };

        function showTutorial(catId) {
            let key = '';
            if (catId.startsWith('c-')) key = 'c-radical';
            else if (catId.startsWith('tw-')) key = 'tw-similar';
            else if (catId.startsWith('s-')) key = 's-stroke';
            else if (catId.startsWith('w-')) key = 'w-write';

            if (tutorialContents[key]) {
                document.getElementById('tutorial-body').innerHTML = tutorialContents[key];
                const modal = document.getElementById('tutorial-modal');
                const content = document.getElementById('tutorial-content');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('scale-90');
                }, 10);
                localStorage.setItem('tut_seen_' + key, 'true');
            }
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    startQuestion(pendingQuestionIdx, true);
                    pendingQuestionIdx = -1;
                }
            }, 300);
        }

        // ================= 2. 題庫數據庫 =================
        const categories = [
            { id: 'c-wood', title: '🌿 自然與木部', color: 'emerald' },
            { id: 'c-action', title: '✋ 動作與手部', color: 'blue' },
            { id: 'c-other', title: '🏠 房屋與路途', color: 'amber' },
            { id: 'c-animal', title: '🐕 動物與昆蟲', color: 'rose' },
            { id: 'tw-1', title: '🔍 易混淆字 (一)', color: 'indigo' },
            { id: 'tw-2', title: '🔍 易混淆字 (二)', color: 'violet' },
            { id: 's-1', title: '✍️ 筆順與部首 (一)', color: 'cyan' },
            { id: 's-2', title: '✍️ 筆順與部首 (二)', color: 'teal' },
            { id: 'w-1', title: '🎨 常用字書寫 (一)', color: 'pink' },
            { id: 'w-2', title: '🎨 常用字書寫 (二)', color: 'orange' }
        ];

            if (catId.startsWith('s-')) tutKey = 's-stroke';
            if (catId.startsWith('w-')) tutKey = 'w-write';

            if (!forceStart && !localStorage.getItem('tut_seen_' + tutKey)) {
                pendingQuestionIdx = idx;

            currentQuestionIdx = idx;
            document.getElementById('quest-directory').style.display = 'none';

            const hintEle = document.getElementById('write-hint');

            hintEle.className = "text-emerald-600 font-bold text-lg h-6 mb-3";
            questWriter.quiz({

                    hintEle.innerText = "❌ 筆畫或方向不對喔！";
                    hintEle.className = "text-rose-500 font-bold text-lg h-6 mb-3 shake";
                    speakText("寫錯了，請看提示重試");
                    setTimeout(() => hintEle.classList.remove('shake'), 400);

                onComplete: function() {
                    hintEle.innerText = "✅ 書寫完美！";
                    hintEle.className = "text-emerald-600 font-bold text-2xl h-6 mb-3 pop";
                    speakText("寫得太漂亮了！");
                    handleCorrectAnswer(true);
                }
            });

        function checkAnswer(btnElement, isCorrect) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.classList.add('correct');
                handleCorrectAnswer(false);
            } else {
                btnElement.classList.add('wrong', 'shake');
                speakText("不對喔，再想想看！");
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('questProgress', JSON.stringify(userProgress));
                
                setTimeout(() => {
                    btnElement.classList.remove('wrong', 'shake');
                    allBtns.forEach(b => { if (!b.classList.contains('correct')) b.style.pointerEvents = 'auto'; });
                }, 1500);
            }
        }

            const targetChar = qData[8];

            if (userProgress[currentQuestionIdx] !== 1) {
                totalExp += 10;
                localStorage.setItem('userExp', totalExp);
                document.getElementById('exp-display').innerText = totalExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);

            userProgress[currentQuestionIdx] = 1; 
            localStorage.setItem('questProgress', JSON.stringify(userProgress));

                setTimeout(() => {
                    document.getElementById('options-container').classList.add('hidden');

                setTimeout(() => { showModal('🎉', '太棒了！', expText); }, 1000);

                .map(char => list.find(a => a.char === char));

            grid.innerHTML = uniqueList.map(item => `
                <button onclick="selectSandboxChar('${item.char}', '${item.radical}')" class="bg-white border-2 border-slate-100 p-2 rounded-xl shadow-sm hover:border-emerald-300 hover:bg-emerald-50 transition text-2xl font-bold flex items-center justify-center aspect-square">
                    ${item.char}
                </button>
            `).join('');
        }

        function selectSandboxChar(char, radical) {
            currentSbChar = char;
            document.getElementById('sandbox-placeholder').style.display = 'none';
            document.getElementById('sandbox-content').style.display = 'flex';
            document.getElementById('sb-char').innerText = char;
            document.getElementById('sb-radical').innerText = radical;
            document.getElementById('sb-feedback').style.opacity = '0';
            
            document.getElementById('sandbox-canvas').innerHTML = '';
            let size = window.innerWidth < 768 ? 256 : 320;
            sbWriter = HanziWriter.create('sandbox-canvas', char, {
                width: size, height: size, padding: 20, strokeAnimationSpeed: 1, delayBetweenStrokes: 150,
                strokeColor: '#1e293b', radicalColor: '#10b981', showOutline: true, showCharacter: true
            });
        }

        function searchCustomChar() {
            const input = document.getElementById('custom-char-input');
            const char = input.value.trim();
            if (char && /^[\u4e00-\u9fa5]$/.test(char)) {
                selectSandboxChar(char, '字典部首');
            } else {
                showToast("請輸入一個中文字喔！");
            }
        }

        function startSandboxQuiz() {
            if (!sbWriter) {
                showToast("請先選擇一個字！");
                return;
            }
            const feedback = document.getElementById('sb-feedback');
            feedback.innerText = "請開始書寫...";
            feedback.className = "mt-4 text-xl font-bold text-blue-600 opacity-100";
            sbWriter.quiz({
                onMistake: function() {
                    feedback.innerText = "❌ 筆畫不對喔！";
                    feedback.className = "mt-4 text-xl font-bold text-rose-500 opacity-100 shake";
                    speakText("不對喔，再試試看");
                    setTimeout(() => feedback.classList.remove('shake'), 400);
                },
                onComplete: function() {
                    feedback.innerText = "✅ 太棒了！書寫正確！";
                    feedback.className = "mt-4 text-2xl font-black text-emerald-600 opacity-100 pop";
                    speakText("太棒了！");
                    setTimeout(() => feedback.classList.remove('pop'), 400);
                }
            });
        }

        window.onload = () => {
            renderDirectory();
        };
    </script>
</body>
</html>
