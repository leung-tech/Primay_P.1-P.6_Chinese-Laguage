<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字詞基礎 - 趣味多感官訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdf4; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-dot-pattern { background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNlMmU4ZjAiIGZpbGwtb3BhY2l0eT0iMC40Ii8+PC9zdmc+'); }
        
        /* 米字格背景 */
        .mi-zi-ge {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, transparent 49.5%, #ef4444 49.5%, #ef4444 50.5%, transparent 50.5%),
                linear-gradient(to bottom, transparent 49.5%, #ef4444 49.5%, #ef4444 50.5%, transparent 50.5%),
                linear-gradient(45deg, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%),
                linear-gradient(-45deg, transparent 49.5%, #fca5a5 49.5%, #fca5a5 50.5%, transparent 50.5%);
            border: 4px solid #ef4444; border-radius: 8px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 5px 0 #cbd5e1; }
        .option-btn:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #dcfce7; border-color: #22c55e; color: #166534; box-shadow: 0 0 0 transparent; transform: translateY(5px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }
        
        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }

        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #10b981; color: white; border-color: #059669; }
        .tab-inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }
        
        .filter-btn { transition: all 0.2s; }
        .filter-active { background-color: #34d399; color: white; border-color: #059669; font-weight: bold; }

        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }
        .lvl-correct { background-color: #dcfce7; border-color: #22c55e; color: #166534; }
        .lvl-wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .lvl-unplayed { background-color: white; border-color: #cbd5e1; color: #475569; }

        /* 隱藏彈出視窗初始狀態 */
        .toast-msg {
            visibility: hidden;
            min-width: 250px;
            background-color: #ef4444;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show {
            visibility: visible;
            animation: slideUp 0.5s, fadeOut 0.5s 2.5s;
        }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-emerald-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-emerald-700 p-1 rounded transition bg-emerald-800">⬅️ 返回</a>
                <span>🌱 字詞基礎 (趣味訓練)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-emerald-800 px-3 py-1.5 rounded-full border border-emerald-500 shadow-inner">
                <span class="text-lg lg:text-xl">⭐</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('quest')" id="tab-quest" class="tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-emerald-600">
                🗺️ 闖關地圖 (200題)
            </button>
            <button onclick="switchMode('sandbox')" id="tab-sandbox" class="tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200">
                ✍️ 無盡寫字板
            </button>
        </div>
        
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-dot-pattern" id="main-scroll-area">
        
        <!-- ================= 模式 1：闖關地圖與挑戰 ================= -->
        <div id="quest-mode" class="w-full max-w-4xl mx-auto flex flex-col gap-4 lg:gap-6">
            
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🗺️ 學習地圖</h2>
                <p class="text-slate-500 font-bold mb-6">請選擇類別。答對會獲得 ✅，答錯會顯示 ❌，你可以隨時點擊重溫！</p>
                <div id="directory-content" class="flex flex-col gap-8">
                    <!-- 目錄動態生成 -->
                </div>
            </div>

            <div id="quest-play" class="w-full hidden flex-col items-center">
                <!-- 題目動態生成 -->
            </div>

        </div>

        <!-- ================= 模式 2：常見字寫字板 (包含自訂搜尋系統) ================= -->
        <div id="sandbox-wrapper" class="hidden w-full h-full">
            <div class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-4 lg:gap-6 h-full">
                
                <!-- 左側：搜尋列 + 字庫列表 -->
                <div class="lg:w-1/3 flex flex-col gap-3 min-h-[450px] lg:h-[650px]">
                    
                    <!-- 🌟 升級：搜尋任何中文字 (對應 4762 字) -->
                    <div class="bg-white rounded-xl shadow-sm border border-emerald-200 p-3 flex flex-col gap-2 relative">
                        <h3 class="font-bold text-emerald-800 text-sm">🔍 想寫小學習字表上的字？</h3>
                        <div class="flex gap-2">
                            <input type="text" id="custom-char-input" maxlength="1" placeholder="輸入任何一個中文字..." class="flex-1 px-3 py-2 border-2 border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 text-lg text-center font-bold">
                            <button onclick="searchCustomChar()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-emerald-600 shadow-sm transition">生成</button>
                        </div>
                    </div>

                    <!-- 擴充的分類按鈕 -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-2 flex overflow-x-auto no-scrollbar gap-2 flex-shrink-0">
                        <button onclick="filterWords('all')" id="flt-all" class="filter-btn filter-active px-4 py-2 rounded-lg whitespace-nowrap text-sm border">全部</button>
                        <button onclick="filterWords('nature')" id="flt-nature" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">自然</button>
                        <button onclick="filterWords('person')" id="flt-person" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">人物</button>
                        <button onclick="filterWords('action')" id="flt-action" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">動作</button>
                        <button onclick="filterWords('object')" id="flt-object" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">物品</button>
                        <button onclick="filterWords('animal')" id="flt-animal" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">動物</button>
                        <button onclick="filterWords('food')" id="flt-food" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">飲食</button>
                        <button onclick="filterWords('number')" id="flt-number" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">數字</button>
                        <button onclick="filterWords('color')" id="flt-color" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">顏色</button>
                        <button onclick="filterWords('emotion')" id="flt-emotion" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">情感</button>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md border-2 border-slate-200 p-4 flex-1 overflow-y-auto no-scrollbar min-h-[250px]">
                        <div id="word-grid" class="grid grid-cols-4 sm:grid-cols-5 lg:grid-cols-4 gap-2"></div>
                    </div>
                </div>

                <!-- 右側：寫字板 -->
                <div class="lg:w-2/3 bg-white rounded-2xl shadow-xl border-t-8 border-emerald-500 p-4 lg:p-6 flex flex-col items-center justify-center relative min-h-[450px]">
                    <div id="sandbox-placeholder" class="text-slate-400 font-bold text-xl text-center flex flex-col items-center gap-4">
                        <span class="text-6xl animate-bounce">👈</span>請從左側選擇，或直接搜尋中文字
                    </div>
                    <div id="sandbox-content" class="hidden w-full flex flex-col items-center">
                        <div class="flex justify-between w-full mb-4 items-end border-b-2 border-slate-100 pb-2">
                            <div>
                                <h2 id="sb-char" class="text-5xl lg:text-6xl font-black text-slate-800 mb-2">字</h2>
                                <p class="text-slate-500 font-bold text-base lg:text-lg"><span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-lg border border-blue-200">部首：<span id="sb-radical"></span></span></p>
                            </div>
                            <button onclick="speakText(document.getElementById('sb-char').innerText)" class="tts-btn bg-emerald-100 text-emerald-700 w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-sm border-2 border-emerald-200">🔊</button>
                        </div>
                        <!-- 米字格 -->
                        <div class="relative w-64 h-64 md:w-80 md:h-80 mi-zi-ge mb-6 shadow-inner touch-none" id="sandbox-canvas"></div>
                        
                        <div class="flex flex-wrap justify-center gap-3 w-full">
                            <button onclick="sbWriter.animateCharacter()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-lg">👀 看筆順</button>
                            <button onclick="startSandboxQuiz()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-lg">✍️ 試寫</button>
                            <button onclick="sbWriter.hideCharacter(); sbWriter.showCharacter()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-6 rounded-xl transition text-lg">🔄 重設</button>
                        </div>
                        <div id="sb-feedback" class="mt-4 text-xl font-bold text-emerald-600 h-8 opacity-0 transition-opacity"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- 闖關回饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-sm text-center transform scale-90 transition-transform" id="feedback-content">
            <div id="feedback-icon" class="text-7xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <p id="feedback-desc" class="text-slate-600 font-bold mb-6 text-xl leading-relaxed">獲得 10 點經驗值</p>
            <button onclick="nextLevel()" id="next-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1">下一關 ➡️</button>
        </div>
    </div>

    <!-- 輕量級警告提示 (Toast) -->
    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心設定與語音 =================
        let totalExp = parseInt(localStorage.getItem('userExp')) || 0;
        document.getElementById('exp-display').innerText = totalExp;

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-HK';
                msg.rate = 0.8; 
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function switchMode(mode) {
            const tabQuest = document.getElementById('tab-quest');
            const tabSandbox = document.getElementById('tab-sandbox');
            const questMode = document.getElementById('quest-mode');
            const sandboxWrapper = document.getElementById('sandbox-wrapper');
            const progress = document.getElementById('progress-container');

            if (mode === 'quest') {
                tabQuest.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-emerald-600";
                tabSandbox.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                
                questMode.style.display = 'flex';
                sandboxWrapper.style.display = 'none';
                progress.style.display = 'block';
                updateTotalProgress();
            } else {
                tabSandbox.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-emerald-600";
                tabQuest.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                
                questMode.style.display = 'none';
                sandboxWrapper.style.display = 'block'; 
                progress.style.display = 'none';
                if(!isSandboxInitialized) { initSandbox(); isSandboxInitialized = true; }
            }
        }

        // ================= 2. 200 題終極旗艦題庫 =================
        const categories = [
            { id: 'c-wood', title: '🌳 植物與自然部首 (木/艸/水/火)', color: 'emerald' },
            { id: 'c-action', title: '🚶 人物與動作部首 (人/手/足/口)', color: 'blue' },
            { id: 'c-other', title: '🏠 建築與物品部首 (宀/广/辶/門)', color: 'indigo' },
            { id: 'c-animal', title: '🐾 動物與自然部首 (犬/鳥/虫/魚)', color: 'teal' },
            { id: 'tw-1', title: '👯 形近字防錯 (第一階段)', color: 'rose' },
            { id: 'tw-2', title: '👯 形近字防錯 (第二階段)', color: 'pink' },
            { id: 's-1', title: '👀 觀察筆順與找部首 (一)', color: 'purple' },
            { id: 's-2', title: '👀 觀察筆順與找部首 (二)', color: 'fuchsia' },
            { id: 'w-1', title: '✍️ 動手寫字訓練 (基礎)', color: 'amber' },
            { id: 'w-2', title: '✍️ 動手寫字訓練 (進階)', color: 'orange' }
        ];

        // 總共 200 題：10 個類別，每個類別 20 題
        const rawQuestData = [
            // 1. 植物與自然 (20題)
            ['c', 'c-wood', '哪一個部首加上「木🌳」，會變成休息的「休🛌」？', '❓ + 木 = 休', '亻 (人) 🚶', '氵 (水) 💧', 0, '人字部代表與人有關。', '休'],
            ['c', 'c-wood', '「木🌳」加上「木🌳」，會變成什麼字？', '木 + 木 = ❓', '林 🌲', '森 🌲🌲', 0, '兩個木是樹林。', '林'],
            ['c', 'c-wood', '三個「木🌳」加在一起，會變成什麼字？', '木 + 木 + 木 = ❓', '森 🌲🌲', '林 🌲', 0, '三個木代表非常茂密的「森」林。', '森'],
            ['c', 'c-wood', '哪一個部首加上「交」，會變成學校的「校🏫」？', '❓ + 交 = 校', '木 🪵', '手 ✋', 0, '學校以前多是用木頭建的。', '校'],
            ['c', 'c-wood', '哪一個部首加上「寸」，會變成樹木的「樹🌲」？', '❓ + 寸 = 樹', '木 🪵', '水 💧', 0, '樹木當然是木字部！', '樹'],
            ['c', 'c-wood', '「木🌳」加上「奇」，會變成什麼字？', '木 + 奇 = ❓', '椅 🪑', '桌 🪑', 0, '椅子是用木頭做的。', '椅'],
            ['c', 'c-wood', '「木🌳」加上「喬」，會變成什麼字？', '木 + 喬 = ❓', '橋 🌉', '校 🏫', 0, '橋是用木頭建的。', '橋'],
            ['c', 'c-wood', '「氵💧」加上「工」，會變成什麼字？', '氵 + 工 = ❓', '江 🌊', '河 🌊', 0, '水加工就是長「江」。', '江'],
            ['c', 'c-wood', '「氵💧」加上「可」，會變成什麼字？', '氵 + 可 = ❓', '河 🌊', '海 🌊', 0, '水加可就是「河」流。', '河'],
            ['c', 'c-wood', '「氵💧」加上「每」，會變成什麼字？', '氵 + 每 = ❓', '海 🌊', '洋 🌊', 0, '水加每就是大「海」。', '海'],
            ['c', 'c-wood', '哪一個部首加上「干」，會變成流汗的「汗💦」？', '❓ + 干 = 汗', '氵 (水) 💧', '火 🔥', 0, '流汗會流水出來。', '汗'],
            ['c', 'c-wood', '哪一個部首加上「十」，會變成汁液的「汁🧃」？', '❓ + 十 = 汁', '氵 (水) 💧', '木 🪵', 0, '果汁都是有水份的。', '汁'],
            ['c', 'c-wood', '「火🔥」加上「火🔥」，會變成什麼字？', '火 + 火 = ❓', '炎 🥵', '熱 🥵', 0, '兩個火疊在一起，代表非常「炎」熱。', '炎'],
            ['c', 'c-wood', '「火🔥」(灬) 加上「然」，會變成什麼字？', '灬 + 然 = ❓', '熱 🥵', '冷 🥶', 0, '底下的四點(灬)代表火，所以很熱。', '熱'],
            ['c', 'c-wood', '哪一個部首加上「者」，會變成煮飯的「煮🍳」？', '❓ + 者 = 煮', '灬 (火) 🔥', '氵 (水) 💧', 0, '煮東西需要用火。', '煮'],
            ['c', 'c-wood', '「艸🌿」加上「早」，會變成什麼字？', '艹 + 早 = ❓', '草 🌱', '花 🌸', 0, '草字頭代表植物。', '草'],
            ['c', 'c-wood', '「艸🌿」加上「化」，會變成什麼字？', '艹 + 化 = ❓', '花 🌸', '草 🌱', 0, '花也是植物。', '花'],
            ['c', 'c-wood', '哪一個部首加上「世」，會變成樹葉的「葉🍂」？', '❓ + 世 + 木 = 葉', '艹 (草) 🌿', '竹 🎋', 0, '樹葉也是植物的一部分。', '葉'],
            ['c', 'c-wood', '「艸🌿」加上「牙」，會變成什麼字？', '艹 + 牙 = ❓', '芽 🌱', '花 🌸', 0, '發芽是植物生長。', '芽'],

            }
            
            html += `
                <div id="post-answer-view" class="hidden w-full flex-col items-center mt-6 pt-6 border-t border-slate-200">
                    <h3 class="text-xl font-bold text-emerald-600 mb-4">✨ 一起來學寫這個字吧！</h3>
                    <div id="post-canvas" class="w-48 h-48 mi-zi-ge mb-4 touch-none"></div>
                    <button onclick="nextDirectoryOrQuestion()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-xl font-black shadow-lg text-xl border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1 w-full max-w-[250px]">完成！回到目錄 ➡️</button>
                </div>
            </div>`;

            questPlay.innerHTML = html;

            if (qType === 's' || qType === 'w') {
                setTimeout(() => {
                    document.getElementById('quest-canvas').innerHTML = ''; // 清除舊畫布
                    let size = qType === 'w' ? (window.innerWidth < 768 ? 256 : 288) : (window.innerWidth < 768 ? 160 : 192);
                    questWriter = HanziWriter.create('quest-canvas', targetChar, {
                        width: size, height: size, padding: 15, strokeAnimationSpeed: 1, delayBetweenStrokes: 100,
                        strokeColor: '#1e293b', radicalColor: '#10b981', 
                        showCharacter: qType !== 'w', showOutline: true,
                        showHintAfterMisses: 1, leniency: 3.0 // 最高容錯率
                    });
                    if (qType === 'w') startQuestWriting();
                }, 50);
            }
        }

        function backToDirectory() {
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function startQuestWriting() {
            const hintEle = document.getElementById('write-hint');
            hintEle.innerText = "請開始書寫...";
            hintEle.className = "text-emerald-600 font-bold text-lg h-6 mb-3";
            questWriter.quiz({
                onMistake: function() {
                    hintEle.innerText = "❌ 筆畫或方向不對喔！";
                    hintEle.className = "text-rose-500 font-bold text-lg h-6 mb-3 shake";
                    speakText("寫錯了，請看提示重試");
                    setTimeout(() => hintEle.classList.remove('shake'), 400);
                },
                onComplete: function() {
                    hintEle.innerText = "✅ 書寫完美！";
                    hintEle.className = "text-emerald-600 font-bold text-2xl h-6 mb-3 pop";
                    speakText("寫得太漂亮了！");
                    handleCorrectAnswer(true);
                }
            });
        }

        function checkAnswer(btnElement, isCorrect) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.classList.add('correct');
                handleCorrectAnswer(false);
            } else {
                btnElement.classList.add('wrong', 'shake');
                speakText("不對喔，再想想看！");
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('questProgress', JSON.stringify(userProgress));
                
                setTimeout(() => {
                    btnElement.classList.remove('wrong', 'shake');
                    allBtns.forEach(b => { if (!b.classList.contains('correct')) b.style.pointerEvents = 'auto'; });
                }, 1500);
            }
        }

        function handleCorrectAnswer(isWriteTask) {
            const qData = rawQuestData[currentQuestionIdx];
            const expText = qData[7];
            const targetChar = qData[8];

            speakText("答對了！" + expText);
            
            if (userProgress[currentQuestionIdx] !== 1) {
                totalExp += 10;
                localStorage.setItem('userExp', totalExp);
                document.getElementById('exp-display').innerText = totalExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }
            
            userProgress[currentQuestionIdx] = 1; 
            localStorage.setItem('questProgress', JSON.stringify(userProgress));

            if (qData[0] === 'c' || qData[0] === 'tw') {
                setTimeout(() => {
                    document.getElementById('options-container').classList.add('hidden');
                    const postView = document.getElementById('post-answer-view');
                    postView.classList.remove('hidden');
                    postView.classList.add('flex', 'slide-up');
                    
                    document.getElementById('post-canvas').innerHTML = ''; // 清空以防疊加
                    try {
                        const postWriter = HanziWriter.create('post-canvas', targetChar, {
                            width: 192, height: 192, padding: 10, strokeAnimationSpeed: 1, delayBetweenStrokes: 100,
                            strokeColor: '#1e293b', radicalColor: '#10b981'
                        });
                        setTimeout(() => postWriter.animateCharacter(), 500);
                    } catch(e) { console.error(e); }
                }, 1000);
            } else {
                setTimeout(() => { showModal('🎉', '太棒了！', expText); }, 1000);
            }
        }

        function nextDirectoryOrQuestion() {
            backToDirectory();
            window.scrollTo(0, 0);
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerText = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    backToDirectory();
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        // ================= 4. 無盡字庫搜尋與寫字板 =================
        const rawWordData = "nature|天:大,地:土,日:日,月:月,星:日,雲:雨,風:風,雨:雨,雷:雨,電:雨,山:山,石:石,田:田,土:土,水:水,火:火,春:日,夏:夊,秋:禾,冬:冫,花:艸,草:艸,樹:木,葉:艸,木:木,林:木,森:木,海:水,江:水,河:水,光:儿,冰:冫,雪:雨,霜:雨,波:水,浪:水|person|人:人,我:戈,你:人,他:人,她:女,它:宀,男:田,女:女,父:父,母:毋,子:子,哥:口,弟:弓,姐:女,妹:女,爺:父,奶:女,頭:頁,目:目,耳:耳,口:口,手:手,足:足,心:心,牙:牙,舌:舌,皮:皮,肉:肉,血:血,骨:骨,身:身,臉:肉,鼻:鼻,髮:髟,腿:肉|action|走:走,跑:足,跳:足,飛:飛,游:水,看:目,聽:耳,說:言,讀:言,寫:宀,畫:田,吃:口,喝:口,玩:玉,學:子,做:人,打:手,拍:手,拉:手,推:手,拿:手,放:攴,開:門,關:門,坐:土,立:立,睡:目,醒:酉,笑:竹,哭:口,想:心,去:厶,來:人,給:糸,要:襾,唱:口|object|書:曰,包:勹,筆:竹,紙:糸,尺:尸,桌:木,椅:木,床:广,房:戶,門:門,窗:穴,家:宀,車:車,船:舟,路:足,街:行,市:巾,店:广,錢:金,衣:衣,褲:衣,鞋:革,帽:巾,杯:木,碗:石,碟:石,刀:刀,叉:又,匙:匕,燈:火,鐘:金,錶:金,傘:人,鏡:金|animal|狗:犬,貓:豸,豬:豕,牛:牛,羊:羊,馬:馬,雞:隹,鴨:鳥,鵝:鳥,魚:魚,蝦:虫,蟹:虫,龜:龜,兔:儿,鼠:鼠,鳥:鳥,蟲:虫,蛇:虫,蛙:虫,蚊:虫,蟻:虫,蝶:虫,蛛:虫,象:豕,熊:火,獅:犬,虎:虍,鹿:鹿,猴:犬,狼:犬,鷹:鳥,蜂:虫|food|飯:食,麵:麥,粥:米,粉:米,肉:肉,蛋:虫,菜:艸,果:木,瓜:瓜,豆:豆,奶:女,茶:艸,水:水,湯:水,糖:米,鹽:鹵,油:水,醋:酉,餅:食,包:勹,餃:食,糕:米,蔥:艸,蒜:艸,薑:艸,冰:冫|number|一:一,二:二,三:一,四:囗,五:二,六:八,七:一,八:八,九:乙,十:十,百:白,千:十,萬:艸,零:雨,兩:入,半:十,多:夕,少:小|color|紅:糸,黃:黃,藍:艸,綠:糸,黑:黑,白:白,紫:糸,灰:火,粉:米,棕:木,青:青,金:金,銀:金|emotion|愛:心,恨:心,喜:口,怒:心,哀:口,樂:木,愁:心,怕:心,驚:馬,喜:口,歡:欠,氣:气,急:心,悶:心,苦:艸,甜:甘,酸:酉,辣:辛";

        let parsedWords = [];
        rawWordData.split('|').forEach((chunk, index, arr) => {
            if(index % 2 === 0) {
                let cat = chunk;
                let pairs = arr[index+1].split(',');
                pairs.forEach(p => {
                    let [char, rad] = p.split(':');
                    if (char && rad) {
                        parsedWords.push({ cat, char, rad });
                    }
                });
            }
        });

        let sbWriter;
        let isSandboxInitialized = false;

        function initSandbox() { filterWords('all'); }

        function filterWords(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('filter-active', 'bg-emerald-500', 'text-white');
                btn.classList.add('bg-slate-50', 'text-slate-600');
            });
            let activeBtn = document.getElementById('flt-' + category);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-50', 'text-slate-600');
                activeBtn.classList.add('filter-active');
            }

            const grid = document.getElementById('word-grid');
            let html = '';
            parsedWords.forEach((item) => {
                if (category === 'all' || item.cat === category) {
                    const itemStr = encodeURIComponent(JSON.stringify(item));
                    html += `<button onclick="selectSandboxChar('${itemStr}')" class="bg-slate-50 border-2 border-slate-200 hover:border-emerald-400 hover:bg-emerald-50 text-2xl lg:text-3xl font-bold py-3 lg:py-4 rounded-xl transition shadow-sm text-slate-700">${item.char}</button>`;
                }
            });
            grid.innerHTML = html;
        }

        // 🌟 搜尋自訂文字功能 (支援 4762+ 漢字) 🌟
        function searchCustomChar() {
            const input = document.getElementById('custom-char-input').value.trim();
            // 提取輸入的第一個中文字
            const chars = input.match(/[\u4e00-\u9fa5]/g);
            if (!chars || chars.length === 0) {
                showToast("請輸入一個有效的中文字！");
                return;
            }
            const char = chars[0];
            const customItem = { char: char, rad: '自訂檢索' };
            selectSandboxChar(encodeURIComponent(JSON.stringify(customItem)));
            document.getElementById('custom-char-input').value = ''; 
        }

        function selectSandboxChar(itemStr) {
            document.getElementById('sandbox-placeholder').classList.add('hidden');
            document.getElementById('sandbox-content').classList.remove('hidden');
            
            const data = JSON.parse(decodeURIComponent(itemStr));
            document.getElementById('sb-char').innerText = data.char;
            
            const radicalDisplay = document.getElementById('sb-radical');
            radicalDisplay.innerText = data.rad;
            
            document.getElementById('sb-feedback').style.opacity = '0';
            speakText(data.char);

            const canvasDiv = document.getElementById('sandbox-canvas');
            canvasDiv.innerHTML = ''; // 徹底清空畫布防止疊加
            
            const size = window.innerWidth < 768 ? 256 : 320; 
            
            // 升級：加入非同步錯誤捕捉機制，處理字庫中沒有的罕見字 (如：乸)
            sbWriter = HanziWriter.create('sandbox-canvas', data.char, {
                width: size, height: size, padding: 15,
                strokeAnimationSpeed: 1, delayBetweenStrokes: 100,
                strokeColor: '#1e293b', radicalColor: '#10b981',
                showHintAfterMisses: 1, leniency: 3.0,
                onLoadCharDataError: function(reason) {
                    canvasDiv.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full px-4 text-center">
                            <span class="text-5xl mb-3">📭</span>
                            <p class="text-rose-500 font-bold text-lg">系統字庫暫時未收錄「${data.char}」字的筆順資料喔！</p>
                            <p class="text-slate-500 font-medium text-sm mt-2">這可能是一個比較少見的字或方言字。<br>請嘗試搜尋其他常用中文字。</p>
                        </div>
                    `;
                    sbWriter = null; // 清除實例，防止按鈕觸發錯誤
                }
            });
        }

        function startSandboxQuiz() {
            if (!sbWriter) {
                showToast("這個字沒有筆順資料，無法練習試寫喔！");
                return;
            }
            document.getElementById('sb-feedback').style.opacity = '0';
            sbWriter.quiz({
                onMistake: function() {
                    const fb = document.getElementById('sb-feedback');
                    fb.innerText = "❌ 筆順錯了，看提示寫！";
                    fb.className = "mt-4 text-lg font-bold text-rose-500 h-8 transition-opacity opacity-100 shake";
                    speakText("筆順錯了");
                    setTimeout(() => fb.classList.remove('shake'), 400);
                },
                onComplete: function() {
                    const fb = document.getElementById('sb-feedback');
                    fb.innerText = "✨ 寫得非常好！(獲得 2 EXP)";
                    fb.className = "mt-4 text-xl font-bold text-emerald-600 h-8 transition-opacity opacity-100 pop";
                    speakText("寫得好！");
                    
                    totalExp += 2;
                    localStorage.setItem('userExp', totalExp);
                    document.getElementById('exp-display').innerText = totalExp;
                    document.getElementById('exp-display').classList.add('pop');
                    setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                }
            });
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = totalExp;
            switchMode('quest'); 
            renderDirectory();
            
            // 讓搜尋框支援 Enter 鍵
            document.getElementById('custom-char-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchCustomChar();
                }
            });
        }
    </script>
</body>
</html>
