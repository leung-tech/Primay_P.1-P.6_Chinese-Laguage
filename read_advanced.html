        function updateTotalProgress() {
            let solved = userProgress.filter(p => p === 1 || p === 2).length;
            let percent = (solved / rawQuestDataObj.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        function shuffleOptions(optionsArray, correctIndex) {
            let opts = optionsArray.map((opt, i) => ({ text: opt, isCorrect: i === correctIndex }));
            return opts.sort(() => Math.random() - 0.5);
        }

        function startPassage(idx, forceStart = false) {
            const passage = rawQuestDataObj[idx];
            let tutKey = passage.category;
            
            if (!forceStart && !localStorage.getItem('tut_seen_' + tutKey)) {
                pendingPassageIdx = idx; 
                showTutorial(tutKey);      
                return;                   
            }

            currentQuestionMistakes = 0; 
            currentPassageMistakes = 0;
            currentPassageIdx = idx;
            currentQuestionIdx = 0;
            window.currentHints = []; 
            
            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');

            document.getElementById('quest-mode').style.display = 'none';
            document.getElementById('tips-hub-mode').style.display = 'none';
            const questPlay = document.getElementById('quest-play');
            questPlay.style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;
            
            const qCatTitle = categories.find(c => c.id === passage.category).title;

            let html = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-violet-100 text-violet-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">第 ${idx + 1} 篇 / 共 ${rawQuestDataObj.length} 篇</span>
                </div>
                
                <div class="slide-up w-full bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-violet-600 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">
                        ${qCatTitle}
                    </span>
                    
                    <div class="w-full flex items-center gap-3 mt-4 mb-6">
                        <span class="bg-violet-100 text-violet-800 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">閱讀篇章</span>
                        <h2 class="text-lg md:text-xl font-bold text-slate-700">${passage.title}</h2>
                    </div>
            `;

            let textHtml = '';
            if (passage.category === 'p-adv-classic') {
                let parts = passage.text.split('<p>【譯文】');
                let classicPart = parts[0].replace('<p>', '').replace('</p>', '');
                let modernPart = parts[1] ? '【譯文】' + parts[1].replace('</p>', '') : '';
                textHtml = `
                    <p class="classic-text">${classicPart}</p>
                    <p class="mt-4 leading-relaxed text-slate-600 text-sm md:text-base">${modernPart}</p>
                `;
            } else {
                textHtml = passage.text;
            }

            html += `
                <div class="w-full flex flex-col lg:flex-row gap-6">
                    <div class="lg:w-1/2 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                        <div class="p-3 bg-purple-50 border-b border-purple-100 flex justify-between items-center flex-shrink-0">
                            <span class="font-bold text-purple-800">📖 閱讀文本</span>
                            <button onclick="speakPassage()" id="btn-read-all" class="bg-white text-purple-600 px-3 py-1 rounded-lg text-sm font-bold shadow-sm border border-purple-200 hover:bg-purple-100 transition">▶️ 全文朗讀</button>
                        </div>
                        <div class="p-4 md:p-6 overflow-y-auto flex-1 no-scrollbar max-h-[40vh] lg:max-h-[60vh] text-justify" id="passage-content">
                            ${parseAndWrapSentences(textHtml)}
                        </div>
                    </div>

                    <div class="lg:w-1/2 flex flex-col gap-4">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <span id="sub-question-type" class="bg-fuchsia-100 text-fuchsia-800 px-2 py-1 rounded text-xs font-bold mb-2 inline-block"></span>
                            <div class="flex gap-2">
                                <button onclick="speakQuestion()" class="tts-btn flex-shrink-0 bg-white text-purple-500 w-8 h-8 rounded-full flex items-center justify-center shadow-sm border border-purple-200">🔊</button>
                                <h3 class="text-base md:text-lg font-bold text-slate-800" id="current-question-text"></h3>
                            </div>
                        </div>

                        <div class="flex flex-col gap-3" id="options-container">
                        </div>

                        <div id="dynamic-hint-box" class="hidden w-full mt-2 bg-yellow-50 border-l-4 border-yellow-400 p-3 rounded-r-xl shadow-sm text-yellow-800 font-bold text-sm flex items-start gap-2 slide-up">
                            <div class="flex-1" id="hint-text"></div>
                        </div>
                        
                        <div class="mt-auto flex justify-between items-center border-t border-slate-100 pt-3">
                            <span class="text-sm font-bold text-slate-400" id="question-progress-indicator"></span>
                        </div>
                    </div>
                </div>
            </div>`;

            questPlay.innerHTML = html;
            window.currentSubQuestionIdx = 0;
            renderSubQuestion(idx, 0);
        }

        function renderSubQuestion(passageIdx, subIdx) {
            const qData = rawQuestDataObj[passageIdx];
            const sqData = qData.questions[subIdx];
            
            document.getElementById('question-progress-indicator').innerText = `題 ${subIdx + 1} / ${qData.questions.length}`;
            document.getElementById('current-question-text').innerText = sqData.q;
            document.getElementById('sub-question-type').innerText = sqData.type;
            document.getElementById('dynamic-hint-box').classList.add('hidden');

            const options = shuffleOptions(sqData.options, sqData.ans);
            
            let html = '';
            options.forEach((opt, oIdx) => {
                const letter = ['A','B','C','D'][oIdx];
                const safeOpt = opt.text.replace(/'/g, "\\'");
                html += `
                <div class="flex items-stretch gap-2 w-full">
                    <button onclick="checkAnswer(this, ${opt.isCorrect}, '${safeOpt}')" class="option-btn flex-1 bg-white border-2 border-slate-200 text-slate-700 text-base md:text-lg font-bold py-3 px-4 rounded-xl hover:bg-purple-50 hover:border-purple-300 transition text-left flex items-center gap-3">
                        <span class="bg-slate-100 text-slate-500 w-6 h-6 rounded-full flex items-center justify-center text-xs flex-shrink-0">${letter}</span> 
                        <span>${opt.text}</span>
                    </button>
                    <button onclick="speakText('${safeOpt}', 0.95)" class="tts-btn flex-shrink-0 bg-purple-50 text-purple-500 w-12 rounded-xl flex items-center justify-center shadow-sm border border-purple-200 hover:bg-purple-100 transition" title="朗讀此選項">🔊</button>
                </div>`;
            });
            document.getElementById('options-container').innerHTML = html;
        }

        function speakQuestion(subIdx) {
            let actualIdx = subIdx !== undefined ? subIdx : window.currentSubQuestionIdx;
            const qData = rawQuestDataObj[currentPassageIdx]; 
            const sqData = qData.questions[actualIdx];
            speakText(sqData.q);
        }

        function checkAnswer(btnElement, isCorrect, clickedOptText) {
            if (btnElement.style.pointerEvents === 'none') return;
            
            const qData = rawQuestDataObj[currentPassageIdx]; 
            const sqData = qData.questions[window.currentSubQuestionIdx];

            if (isCorrect) {
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                
                btnElement.classList.add('correct');
                speakText("精準！");
                
                let expGained = currentQuestionMistakes === 0 ? 10 : 5;
                readExp += expGained;
                localStorage.setItem('readAdvExp', readExp);
                document.getElementById('exp-display').innerText = readExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);

                let expText = sqData.exp;
                let combinedDesc = `
                    <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 text-left text-indigo-900 rounded-r-lg font-bold">
                        <div class="flex justify-between items-center mb-3 pb-2 border-b border-indigo-200">
                            <span class="text-xl">📚 深度解析</span>
                            <button onclick="speakText('${expText}')" class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm hover:bg-indigo-100 text-xl transition active:scale-95">🔊</button>
                        </div>
                        <div class="space-y-3 text-base leading-relaxed">${expText}</div>
                    </div>`;

                let modalTitle = currentQuestionMistakes === 0 ? '完美答對！' : '成功找出正解！';
                showModal('🌟', modalTitle, combinedDesc);
                
            } else {
                btnElement.classList.add('wrong', 'shake');
                btnElement.style.pointerEvents = 'none'; 
                
                currentQuestionMistakes++; 
                currentPassageMistakes++;
                
                let newHint = sqData.hint;
                
                document.getElementById('hint-text').innerHTML = `💡 提示：${newHint}`;
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("不對喔，請看提示再找找看！");
                
                setTimeout(() => {
                    btnElement.classList.remove('shake');
                }, 800);
            }
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    
                    const qData = rawQuestDataObj[currentPassageIdx];
                    if (window.currentSubQuestionIdx < qData.questions.length - 1) {
                        window.currentSubQuestionIdx++;
                        currentQuestionMistakes = 0;
                        renderSubQuestion(currentPassageIdx, window.currentSubQuestionIdx);
                    } else {
                        finishPassage();
                    }
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function finishPassage() {
            stopAllSpeechAndHighlights();
            let finalStatus = currentPassageMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentPassageIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 80 : 40;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 40; 
            }

            if (expGained > 0) {
                readExp += expGained;
                localStorage.setItem('readAdvExp', readExp);
                document.getElementById('exp-display').innerText = readExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentPassageIdx] = finalStatus;
                localStorage.setItem('advQuestProgress', JSON.stringify(userProgress));
            }

            let expMsg = expGained > 0 
                ? `<span class="text-purple-600 block text-2xl mt-4">獲得 ${expGained} 點篇章通關經驗值 ✨</span>` 
                : `<span class="text-slate-500 block text-lg mt-4">你已經完美掌握這篇文章囉！</span>`;

            const finishModal = document.getElementById('finish-modal');
            const finishContent = document.getElementById('finish-content');

            document.getElementById('finish-desc').innerHTML = `你成功運用高階閱讀策略回答了所有問題！${expMsg}`;
            
            finishModal.classList.remove('hidden');
            setTimeout(() => {
                finishModal.classList.remove('opacity-0');
                finishContent.classList.remove('scale-90');
            }, 10);
            
            if(userProgress.filter(p => p > 0).length === rawQuestDataObj.length) {
                localStorage.setItem('t_read_3', 'true');
            }
        }

        function backToDirectory() {
            stopAllSpeechAndHighlights();
            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');
            
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('tips-hub-mode').style.display = 'none';
            document.getElementById('quest-mode').style.display = 'flex';
            renderDirectory();
        }

        function backToDirectoryFromFinish() {
            const finishModal = document.getElementById('finish-modal');
            const finishContent = document.getElementById('finish-content');
            finishModal.classList.add('opacity-0');
            finishContent.classList.add('scale-90');
            setTimeout(() => {
                finishModal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = readExp;
            renderTipsHub();
            renderDirectory();
        }
    </script>
</body>
</html>
