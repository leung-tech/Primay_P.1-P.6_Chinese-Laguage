<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學語文區 - 中小學中國語文學習平台</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #e8f4f8; margin: 0; padding: 20px; }
        .nav-back { margin-bottom: 20px; cursor: pointer; color: #3498db; font-weight: bold; }
        .header-section { text-align: center; margin-bottom: 30px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .menu-item { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 8px solid #3498db; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { background-color: #f0f9ff; transform: scale(1.02); }
        .menu-item h3 { margin: 0 0 10px 0; color: #2c3e50; }
        .tag { display: inline-block; padding: 3px 8px; background: #eee; border-radius: 4px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="nav-back" onclick="window.location.href='index.html'">⬅ 返回主目錄</div>

    <div class="header-section">
        <h1>👦 小一至小六語文課程</h1>
        <p>請選擇學習範疇：</p>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="alert('進入字詞基礎練習...')">
            <h3>字（部首部件）</h3>
            <span class="tag">基礎</span> <span class="tag">識字</span>
        </div>
        <div class="menu-item" onclick="alert('進入成語練習...')">
            <h3>詞語與成語</h3>
            <span class="tag">擴展詞彙</span>
        </div>
        <div class="menu-item" onclick="alert('進入句子練習...')">
            <h3>重組/改寫句子</h3>
            <span class="tag">語法訓練</span>
        </div>
        <div class="menu-item" onclick="alert('進入修辭練習...')">
            <h3>修辭技巧</h3>
            <span class="tag">寫作基礎</span>
        </div>
        <div class="menu-item" onclick="alert('進入閱讀理解練習...')">
            <h3>閱讀理解</h3>
            <span class="tag">綜合能力</span>
        </div>
        <div class="menu-item" style="border-left-color: #27ae60;">
            <h3>📊 我的學習報告</h3>
            <p>查看已完成章節與分析</p>
        </div>
    </div>

</body>
</html>
