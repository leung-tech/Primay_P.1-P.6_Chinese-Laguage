<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>綜合寫作專區 - 拔尖思維特訓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #faf5ff; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #f3e8ff 1px, transparent 1px), linear-gradient(to bottom, #f3e8ff 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 🌟 積木與槽位樣式 */
        .chunk-btn { transition: all 0.2s; cursor: pointer; user-select: none; }
        .chunk-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent !important; }
        
        /* 句子及碎片槽位 */
        .inline-slot { border: 2px dashed #c084fc; background-color: #faf5ff; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; padding: 8px 14px; border-radius: 8px; color: #a855f7; font-weight: bold; min-height: 52px; margin: 4px; }
        .inline-slot.filled { border-style: solid; border-color: #9333ea; background-color: #a855f7; color: white; box-shadow: 0 3px 0 #7e22ce; }
        .inline-slot.filled:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }
        .inline-slot.locked { border-style: solid; border-color: #7e22ce; background-color: #9333ea; color: white; cursor: not-allowed; box-shadow: none; transform: translateY(3px); }

        .block-slot { border: 2px dashed #c084fc; background-color: #faf5ff; transition: all 0.2s; display: flex; align-items: center; justify-content: flex-start; padding: 12px 16px; border-radius: 8px; color: #a855f7; font-weight: bold; width: 100%; min-height: 64px; margin-bottom: 8px; line-height: 1.6; text-align: left; }
        .block-slot.filled { border-style: solid; border-color: #9333ea; background-color: #a855f7; color: white; box-shadow: 0 4px 0 #7e22ce; }
        .block-slot.filled:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .block-slot.locked { border-style: solid; border-color: #6b21a8; background-color: #8b5cf6; color: white; cursor: not-allowed; box-shadow: none; transform: translateY(4px); }

        /* 🚨 強制錯誤紅標樣式 */
        .wrong-slot { background-color: #ef4444 !important; border-color: #b91c1c !important; color: white !important; box-shadow: 0 4px 0 #991b1b !important; }

        /* 📝 稿紙排版 (嚴格對齊橫線) */
        .notebook-paper {
            background-color: #ffffff;
            background-image: repeating-linear-gradient(transparent, transparent 39px, #e9d5ff 39px, #e9d5ff 40px);
            background-attachment: local;
            line-height: 40px;
            font-size: 1.15rem;
            color: #3b0764;
            padding: 0 24px 40px 24px;
            text-align: justify;
        }
        .notebook-paper p { margin: 0; padding: 0; line-height: 40px; text-indent: 2em; }
        .notebook-paper .title { font-weight: 900; font-size: 1.25rem; text-align: center; color: #1e1b4b; margin: 0; padding: 0; line-height: 40px; text-indent: 0; }
        
        /* 螢光筆高亮樣式 */
        .hl-transition { background-color: #fef08a; border-bottom: 2px solid #eab308; cursor: pointer; transition: background 0.3s; }
        .hl-sensory { background-color: #93c5fd; border-bottom: 2px solid #3b82f6; cursor: pointer; transition: background 0.3s; }
        .hl-rhetoric { background-color: #a7f3d0; border-bottom: 2px solid #10b981; cursor: pointer; transition: background 0.3s; }
        
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #a855f7; color: white; border-color: #7e22ce; }
        .tab-inactive { background-color: white; color: #6b7280; border-color: #d1d5db; }

        .toast-msg { visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden bg-grid-pattern">

    <!-- 頂部導覽列 -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-purple-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-purple-700 p-1 rounded transition bg-purple-800">⬅️ 返回</a>
                <span>✍️ 綜合寫作專區 (拔尖版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-purple-800 px-3 py-1.5 rounded-full border border-purple-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-300">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300 overflow-x-auto no-scrollbar">
            <button onclick="switchMode('vocab')" id="tab-vocab" class="tab-btn tab-active flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-purple-600 whitespace-nowrap">🛠️ 詞彙解鎖</button>
            <button onclick="switchMode('analyze')" id="tab-analyze" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">🔍 範文解剖</button>
            <button onclick="switchMode('outline')" id="tab-outline" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">🦴 大綱搭建</button>
            <button onclick="switchMode('write')" id="tab-write" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">🏗️ 結構拼裝</button>
            <button onclick="switchMode('edit')" id="tab-edit" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">🩺 小編輯診所</button>
        </div>

        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth" id="main-scroll-area">
        
        <!-- 各模式的目錄與遊玩區塊 -->
        <div id="vocab-mode" class="w-full max-w-6xl mx-auto flex flex-col gap-6">
            <div id="vocab-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-purple-900 mb-2">🛠️ 第一步：寫作詞彙彈藥庫</h2>
                <p class="text-slate-600 font-bold mb-6">請將左側的高級成語與右側的釋義完美配對解鎖，收錄進大師詞庫吧！</p>
                <div id="vocab-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div id="vocab-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <div id="analyze-mode" class="w-full max-w-6xl mx-auto hidden flex-col gap-6">
            <div id="analyze-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-purple-900 mb-2">🔍 第二步：範文解剖賞析</h2>
                <p class="text-slate-600 font-bold mb-4">請使用彩色螢光筆，點擊標出範文中的關鍵寫作板塊。</p>
                <div id="analyze-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div id="analyze-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <div id="outline-mode" class="w-full max-w-6xl mx-auto hidden flex-col gap-6">
            <div id="outline-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-purple-900 mb-2">🦴 第三步：寫作骨架大綱搭建</h2>
                <p class="text-slate-600 font-bold mb-4">下筆前先謀篇佈局！閱讀碎片內容，將起、承、轉、合拖放至正確位置。</p>
                <div id="outline-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div id="outline-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <div id="write-mode" class="w-full max-w-6xl mx-auto hidden flex-col gap-6">
            <div id="write-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-purple-900 mb-2">🏗️ 第四步：宏觀與微觀結構重組</h2>
                <p class="text-slate-600 font-bold mb-4">挑戰三階大師重組：特徵一段落 👉 特徵二段落 👉 完整排段成章。</p>
                <div id="write-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div id="write-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <div id="edit-mode" class="w-full max-w-6xl mx-auto hidden flex-col gap-6">
            <div id="edit-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-purple-900 mb-2">🩺 第五步：小編輯潤飾診所</h2>
                <p class="text-slate-600 font-bold mb-4">請找出段落中的錯別字、病句和標點錯誤，並將其完美修正！</p>
                <div id="edit-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div id="edit-play" class="w-full hidden flex-col items-center"></div>
        </div>

    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 pointer-events-none">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl flex flex-col max-h-[90vh] pointer-events-auto transform scale-90 transition-transform duration-300" id="feedback-content">
            
            <div class="flex-shrink-0 text-center mb-3">
                <div id="feedback-icon" class="text-5xl md:text-6xl mb-2">🎉</div>
                <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-1">太棒了！</h2>
                <p id="feedback-exp-text" class="text-purple-600 font-bold text-lg md:text-xl"></p>
            </div>

            <div class="flex-1 overflow-y-auto no-scrollbar flex flex-col gap-4 min-h-0 py-1">
                <div id="feedback-desc" class="hidden text-left text-base leading-loose font-bold p-4 rounded-xl border border-purple-200 bg-purple-50 text-purple-900 flex-shrink-0"></div>

                <div id="feedback-essay-container" class="hidden flex-col shadow-md rounded-xl overflow-hidden border-2 border-purple-200 flex-shrink-0">
                    <div id="feedback-story-header" class="bg-purple-50 px-5 py-3 border-b-2 border-purple-200 flex justify-between items-center flex-shrink-0">
                        <h3 class="text-purple-800 font-black text-lg md:text-xl flex items-center gap-2"><span>📝 你的完美作品：</span></h3>
                        <button onclick="speakFullStory()" class="bg-white text-purple-600 w-10 h-10 rounded-full flex items-center justify-center shadow hover:bg-purple-100 transition text-xl border border-purple-200">🔊</button>
                    </div>
                    <div id="feedback-story" class="notebook-paper w-full bg-white"></div>
                </div>
            </div>

            <div class="flex-shrink-0 flex gap-3 w-full pt-4 mt-2 border-t border-slate-100">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg md:text-xl">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-purple-600 hover:bg-purple-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg md:text-xl border-b-4 border-purple-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>

        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心大擴充題庫資料 =================
        
        // 🛠️ 第一步：詞彙解鎖 (10 個高階主題)
        const vocabData = [
            {
                title: "暴雨狂風景物描寫", emoji: "⛈️💨",
                pairs: [
                    { word: "狂風怒號", mean: "形容風聲極大，像在憤怒地咆哮。" },
                    { word: "傾盆大雨", mean: "形容雨水像盆子倒水一樣極其猛烈。" },
                    { word: "烏雲密佈", mean: "黑色的雲層佈滿天空，形容暴雨將至。" },
                    { word: "雷電交加", mean: "電光和雷聲同時出現，十分驚心動魄。" }
                ],
                exp: "這些成語能極佳地豐富環境描寫，擺脫『下大雨、颳大風』的流水帳敘述。"
            },
            {
                title: "人物極度憤怒描寫", emoji: "😡💥",
                pairs: [
                    { word: "怒髮衝冠", mean: "憤怒得頭髮直豎，把帽子都頂了起來。" },
                    { word: "咬牙切齒", mean: "極度憤怒時雙牙緊咬，發出咯咯聲。" },
                    { word: "火冒三丈", mean: "形容怒氣升得極高，無法遏止。" },
                    { word: "暴跳如雷", mean: "大跳大叫，像雷聲一樣憤怒咆哮。" }
                ],
                exp: "描寫人物生氣時，配合動作細節與高級成語，能大幅增強故事張力。"
            },
            {
                title: "悲痛欲絕情緒描寫", emoji: "😭💔",
                pairs: [
                    { word: "淚流滿面", mean: "眼淚流了一臉，形容極度悲傷。" },
                    { word: "痛不欲生", mean: "悲痛得不想活下去了，形容極度痛苦。" },
                    { word: "肝腸寸斷", mean: "形容悲痛到了極點，像腸子斷成一寸寸。" },
                    { word: "撕心裂肺", mean: "形容悲傷到了極點，痛徹心扉。" }
                ],
                exp: "描寫人物悲傷時，避免只用『很傷心』，這些成語能讓情感更具渲染力。"
            },
            {
                title: "欣喜若狂快樂描寫", emoji: "😆🎉",
                pairs: [
                    { word: "喜出望外", mean: "遇到意想不到的好事而感到極度高興。" },
                    { word: "眉飛色舞", mean: "形容非常高興，臉上流露出得意的神情。" },
                    { word: "手舞足蹈", mean: "高興得雙手舞動，雙腳跳躍。" },
                    { word: "歡天喜地", mean: "形容非常高興，充滿歡樂的氣氛。" }
                ],
                exp: "結合人物的面部表情和肢體動作，能把『開心』寫得活靈活現。"
            },
            {
                title: "極度緊張恐懼描寫", emoji: "😨🥶",
                pairs: [
                    { word: "心驚肉跳", mean: "形容非常害怕，心神不寧。" },
                    { word: "魂飛魄散", mean: "嚇得連靈魂都離開了身體，形容極度恐懼。" },
                    { word: "戰戰兢兢", mean: "形容因害怕而全身發抖的樣子。" },
                    { word: "毛骨悚然", mean: "形容遇到可怕的事，身上的寒毛都豎了起來。" }
                ],
                exp: "寫懸疑或驚險情節時，這些成語能讓讀者也跟著緊張起來。"
            },
            {
                title: "優美自然景色描寫", emoji: "🏞️🌸",
                pairs: [
                    { word: "山清水秀", mean: "山脈青翠，水流清澈，風景優美。" },
                    { word: "鳥語花香", mean: "鳥兒啼唱，花兒飄香，形容春天的美好景象。" },
                    { word: "繁花似錦", mean: "形容花朵盛開，像美麗的錦緞一樣。" },
                    { word: "湖光山色", mean: "湖水的波光和山上的景色交相輝映。" }
                ],
                exp: "在遊記或寫景文中，這些成語能迅速建立起一幅美麗的自然畫卷。"
            },
            {
                title: "酷熱難耐天氣描寫", emoji: "☀️🥵",
                pairs: [
                    { word: "驕陽似火", mean: "強烈的陽光像火一樣燃燒著。" },
                    { word: "烈日當空", mean: "炎熱的太陽高高掛在天空中。" },
                    { word: "汗流浹背", mean: "汗水流得滿背都是，形容非常熱或非常累。" },
                    { word: "酷暑難耐", mean: "極度的炎熱讓人難以忍受。" }
                ],
                exp: "炎熱的夏天不僅可以寫溫度，還可以寫人們被熱到流汗的生理反應。"
            },
            {
                title: "寒冬凜冽天氣描寫", emoji: "❄️🥶",
                pairs: [
                    { word: "冰天雪地", mean: "形容冰雪漫天蓋地，非常寒冷的地方。" },
                    { word: "寒風刺骨", mean: "冷風吹過，感覺像刺穿了骨頭一樣冷。" },
                    { word: "鵝毛大雪", mean: "形容雪下得很大，像鵝毛一樣飄落。" },
                    { word: "白雪皚皚", mean: "形容雪很潔白，覆蓋了整個大地。" }

            {
                title: "時間飛逝感嘆描寫", emoji: "⏳🕰️",
                pairs: [
                    { word: "光陰似箭", mean: "時間過得就像射出去的箭一樣快。" },
                    { word: "日月如梭", mean: "太陽和月亮像織布機上的梭子一樣快速穿梭。" },
                    { word: "白駒過隙", mean: "時間過得極快，就像白色的駿馬在縫隙前飛過。" },
                    { word: "轉瞬即逝", mean: "一轉眼的時間就消失了，形容極短的時間。" }
                ],
                exp: "在寫回憶或抒發對時光流逝的感慨時，這些成語能提升文章的文學意境。"
            },
            {
                title: "激烈戰鬥場面描寫", emoji: "⚔️🛡️",
                pairs: [
                    { word: "槍林彈雨", mean: "形容戰場上子彈像雨一樣密集。" },
                    { word: "硝煙彌漫", mean: "戰場上火藥爆炸的煙霧到處都是。" },
                    { word: "衝鋒陷陣", mean: "不顧一切地向敵人的陣地發起進攻。" },
                    { word: "驚心動魄", mean: "形容事情非常驚險，讓人感到十分震撼。" }
                ],
                exp: "寫歷史故事或科幻戰鬥時，這些成語能帶出極強的畫面衝擊力。"
            }
        ];

        // 🔍 第二步：範文解剖 (5 篇，無括號提示)
        const analyzeData = [

        // ================= 1. 全局變數與數據存檔 =================

            return text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】_]/g, '').replace(/&nbsp;/g, ' ');

        // ================= 3. 碎片重組引擎 (支援 Outline 與 Write) =================
        function initReorderState(correctArr) {
            reorderCorrect = [...correctArr];
            reorderSource = [...reorderCorrect].sort(() => Math.random() - 0.5);
            targetSlots = new Array(correctArr.length).fill(null);
            lockedSlots = new Array(correctArr.length).fill(false);
            wrongSlots = []; 
            window.currentHints = []; 
        }

        function getFirstEmptySlot() { return targetSlots.indexOf(null); }

        function moveToTarget(sourceIdx) {
            let emptyIdx = getFirstEmptySlot();
            if (emptyIdx !== -1) {
                let chunk = reorderSource[sourceIdx];
                reorderSource[sourceIdx] = null; 
                targetSlots[emptyIdx] = chunk;
                speakText(chunk.replace(/【.*?】/, ''));
                
                if (currentMode === 'outline') {
                    renderOutlineUI();
                    if (!targetSlots.includes(null)) setTimeout(() => checkReorderLogic(advanceOutlinePhase), 50);
                } else if (currentMode === 'write') {
                    renderWriteUI();
                    if (!targetSlots.includes(null)) setTimeout(() => checkReorderLogic(advanceWritePhase), 50);
                }
            }
        }

        function removeFromTarget(targetIdx) {
            if (lockedSlots[targetIdx]) return; 
            let chunk = targetSlots[targetIdx];
            if (chunk) {
                speakText("已移出");
                targetSlots[targetIdx] = null;
                wrongSlots = wrongSlots.filter(idx => idx !== targetIdx); 
                let emptySourceIdx = reorderSource.indexOf(null);
                if(emptySourceIdx !== -1) reorderSource[emptySourceIdx] = chunk;
                else reorderSource.push(chunk);
                
                if (currentMode === 'outline') renderOutlineUI();
                else if (currentMode === 'write') renderWriteUI();
            }
        }

        function checkReorderLogic(onComplete) {
            let isAllFilled = !targetSlots.includes(null);
            if (!isAllFilled) return;

            let isAllCorrect = true;
            let wrongIndices = [];

            for (let i = 0; i < targetSlots.length; i++) {
                if (targetSlots[i] === reorderCorrect[i]) {
                    lockedSlots[i] = true;
                } else {
                    isAllCorrect = false;
                    wrongIndices.push(i);
                }
            }

            if (isAllCorrect) {
                window.currentHints = []; 
                wrongSlots = [];
                onComplete();
            } else {
                currentMistakes++;
                let hintText = "";

                if (currentMode === 'outline') { 
                    userProgress.outline[currentIdx] = -1; 
                    hintText = outlineData[currentIdx].hint;
                }
                else if (currentMode === 'write') { 
                    userProgress.write[currentIdx] = -1; 
                    hintText = writeData[currentIdx].stages[currentSubTask].hint;
                }
                saveProgress();

                wrongSlots = wrongIndices; 

                wrongIndices.forEach(idx => {
                    let slotId = currentMode === 'outline' ? `trans-slot-${idx}` : `expand-slot-${idx}`; 
                    let slotElem = document.getElementById(slotId);
                    if (slotElem) {
                        slotElem.classList.remove('bg-purple-500', 'bg-purple-600', 'bg-amber-500', 'bg-amber-600', 'border-purple-600', 'border-amber-600', 'text-white', 'text-slate-400');
                        slotElem.classList.add('wrong-slot', 'shake');
                    }
                });
                
                speakText("排錯了喔，請看提示再試一次！");
                
                const hintBox = document.getElementById('dynamic-hint-box');
                document.getElementById('hint-text').innerHTML = "💡 提示：" + hintText;
                document.getElementById('hint-tts-btn').onclick = () => speakText("提示：" + hintText);
                hintBox.classList.remove('hidden');

                // 3.5秒後自動退回錯的積木
                setTimeout(() => {
                    let changed = false;
                    wrongIndices.forEach(idx => {
                        let chunk = targetSlots[idx];
                        if (chunk !== null && wrongSlots.includes(idx)) {
                            targetSlots[idx] = null;
                            
                            let slotId = currentMode === 'outline' ? `trans-slot-${idx}` : `expand-slot-${idx}`;
                            let slotElem = document.getElementById(slotId);
                            if (slotElem) slotElem.classList.remove('wrong-slot', 'shake');

                            let emptySourceIdx = reorderSource.indexOf(null);
                            if(emptySourceIdx !== -1) reorderSource[emptySourceIdx] = chunk;
                            else reorderSource.push(chunk);
                            
                            changed = true;
                        }
                    });
                    wrongSlots = [];
                    if (changed) {
                        if (currentMode === 'outline') renderOutlineUI();
                        else if (currentMode === 'write') renderWriteUI();
                    }
                }, 3500);
            }
        }

        function renderVocabMatching(words, means) {
            const wordsCol = document.getElementById('vocab-words-col');

            wordsCol.innerHTML = '';

            words.forEach(w => {

                btn.innerText = w.text;
                btn.onclick = () => selectWord(w.key, btn, words, means);
                wordsCol.appendChild(btn);

            means.forEach(m => {
                let btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border-2 border-slate-200 rounded-xl font-bold text-sm hover:bg-slate-50 transition leading-relaxed";
                btn.innerText = m.text;

        function selectWord(key, btn, words, means) {
            document.querySelectorAll('#vocab-words-col button').forEach(b => b.classList.remove('bg-purple-200', 'border-purple-500'));
            selectedWordIdx = key;
            btn.classList.add('bg-purple-200', 'border-purple-500');
            speakText(btn.innerText);
            checkVocabMatch(words, means);
        }

        function selectMean(key, btn, words, means) {
            document.querySelectorAll('#vocab-means-col button').forEach(b => b.classList.remove('bg-purple-200', 'border-purple-500'));
            selectedMeanIdx = key;
            btn.classList.add('bg-purple-200', 'border-purple-500');
            checkVocabMatch(words, means);

        function checkVocabMatch(words, means) {
            if (selectedWordIdx === null || selectedMeanIdx === null) return;

            if (selectedWordIdx === selectedMeanIdx) {
                speakText("配對正確！");
                showToast("🎉 配對正確！");
                
                words = words.filter(w => w.key !== selectedWordIdx);
                means = means.filter(m => m.key !== selectedMeanIdx);

            // 逐句拆分，確保每句獨立成塊
            let sentences = data.text.split(/([。！？])/).filter(Boolean);
            let combinedSentences = [];
            for (let i = 0; i < sentences.length; i += 2) {
                let s = sentences[i] + (sentences[i+1] || "");
                combinedSentences.push(s.trim());
            }

            const data = analyzeData[currentIdx];
            const elem = document.getElementById(`analyze-sentence-${sIdx}`);
            
            let target = data.targets.find(t => sentenceText.includes(t.sentence));

            if (target && target.type === activePen) {
                speakText("標記正確！" + target.label);
                showToast("🎉 標記正確！");
                
                // 移除基礎卡片樣式
                elem.classList.remove('bg-white', 'border-slate-100', 'hover:border-purple-400', 'hover:bg-purple-50', 'text-slate-700');
                
                // 套用成功高亮卡片樣式
                if (activePen === 'transition') {
                    elem.classList.add('bg-yellow-100', 'border-yellow-400', 'text-yellow-900', 'font-black');
                } else if (activePen === 'sensory') {
                    elem.classList.add('bg-blue-100', 'border-blue-400', 'text-blue-900', 'font-black');
                } else if (activePen === 'rhetoric') {
                    elem.classList.add('bg-emerald-100', 'border-emerald-400', 'text-emerald-900', 'font-black');
                }
                
                elem.onclick = null;

                let allCorrect = true;
                data.targets.forEach((t, i) => {
                    let matchingElem = Array.from(document.querySelectorAll('#analyze-play div[id^="analyze-sentence-"]')).find(div => div.innerText.includes(t.sentence));
                    if (matchingElem && !matchingElem.classList.contains('font-black')) {
                        allCorrect = false;
                    }
                });

                speakText("這句不是此類型的寫作板塊喔！");

            essayBox.className = "flex flex-col shadow-md rounded-xl overflow-hidden border-2 border-purple-200 flex-shrink-0 w-full";
            document.getElementById('feedback-story-header').className = "bg-purple-50 px-5 py-3 border-b-2 border-purple-200 flex justify-between items-center";
            document.getElementById('feedback-story-header').innerHTML = `<h3 class="text-purple-800 font-black text-lg md:text-xl flex items-center gap-2"><span>📝 你的拔尖重組作品：</span></h3><button onclick="speakFullStory()" class="bg-white text-purple-600 w-10 h-10 rounded-full flex items-center justify-center shadow hover:bg-purple-100 transition text-xl border border-purple-200">🔊</button>`;
            document.getElementById('next-btn').className = "flex-[1.5] bg-purple-600 hover:bg-purple-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg md:text-xl border-b-4 border-purple-800 active:border-b-0 active:translate-y-1";

            showFeedbackModal(expGained, () => {
                currentSubTask++;
                currentMistakes = 0;
                if (currentSubTask < data.stages.length) {
                    setupWritePhase();
                } else {
                    userProgress.write[currentIdx] = 1;
                    saveProgress();
                    showToast("恭喜完成三階大綱拼裝挑戰！");
                    switchMode('write');
                }
            });
        }

        // ================= 8. 第五步：小編輯診所邏輯 =================
        let editCorrectCount = 0;

        function renderEditDirectory() {
            const container = document.getElementById('edit-content');
            let html = '';
            editData.forEach((item, idx) => {
                let status = userProgress.edit[idx];
                let bgClass = status > 0 ? 'bg-rose-50 border-rose-400' : 'bg-white border-slate-200';
                let icon = status > 0 ? '🌟 已看診' : '# 未看診';
                html += `
                    <button onclick="startEdit(${idx})" class="w-full text-left p-5 rounded-2xl border-2 ${bgClass} hover:shadow-md transition group active:scale-95 flex flex-col gap-2 justify-between h-full min-h-[140px]">
                        <div class="flex justify-between items-center w-full mb-2">
                            <span class="bg-rose-100 text-rose-900 text-xs px-2 py-1 rounded font-bold border border-rose-200 shadow-sm">病句修正</span>
                            <span class="text-sm font-bold text-rose-700 whitespace-nowrap ml-2 flex-shrink-0">${icon}</span>
                        </div>
                        <h3 class="text-xl md:text-2xl font-black text-slate-800 group-hover:text-rose-600 transition leading-snug mb-3">${item.emoji} ${item.title}</h3>
                        <div class="mt-auto text-sm font-bold text-slate-400 group-hover:text-rose-500 transition flex items-center gap-1">
                            點擊開始挑戰 <span class="text-lg">➡️</span>
                        </div>
                    </button>
                `;
            });
            container.innerHTML = html;
        }

        function startEdit(idx) {
            currentIdx = idx;
            currentMistakes = 0;
            editCorrectCount = 0;
            const data = editData[idx];

            document.getElementById('edit-directory').style.display = 'none';
            const playArea = document.getElementById('edit-play');
            playArea.style.display = 'flex';

            let textHtml = data.badText;
            data.targets.forEach((t, tIdx) => {
                textHtml = textHtml.replace(t.wrong, `<span id="edit-target-${tIdx}" onclick="clickEditTarget(${tIdx})" class="bg-amber-100 border-b-2 border-dashed border-amber-500 px-1 py-0.5 cursor-pointer font-bold text-amber-950 hover:bg-amber-200 transition duration-200">${t.wrong}</span>`);
            });

            playArea.innerHTML = `
                <div class="w-full max-w-3xl flex justify-between items-center mb-4">
                    <button onclick="switchMode('edit')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-purple-100 text-purple-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">小編輯診所</span>
                </div>
                <div class="slide-up w-full max-w-3xl bg-white border-2 border-slate-200 rounded-3xl p-6 shadow-xl flex flex-col">
                    <h2 class="text-xl font-black text-purple-900 mb-4 text-center">🩺 請點擊段落中「有病」的黃色句子，並進行修改</h2>
                    
                    <div class="border-2 border-slate-200 rounded-2xl p-6 bg-slate-50 mb-6 text-xl leading-loose">
                        ${textHtml}
                    </div>

                    <div id="edit-sandbox" class="hidden bg-purple-50 border-2 border-purple-200 rounded-2xl p-5 mb-4">
                        <p class="font-black text-purple-900 mb-3 text-lg flex items-center gap-2"><span>🩺</span> 診斷：這裡有錯！</p>
                        <p id="edit-sandbox-wrong" class="text-slate-500 font-bold mb-4 line-through"></p>
                        
                        <div class="flex flex-col gap-2 mb-4" id="edit-sandbox-options"></div>
                    </div>

                    <div id="edit-hint-box" class="hidden bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-xl text-yellow-800 font-bold mb-4"></div>
                </div>
            `;
        }

        function clickEditTarget(tIdx) {
            const data = editData[currentIdx];
            const target = data.targets[tIdx];
            const sandbox = document.getElementById('edit-sandbox');
            
            sandbox.classList.remove('hidden');
            document.getElementById('edit-sandbox-wrong').innerText = "原始內容：" + target.wrong;

            // 🌟 核心修復：使用 target 裡自定義的 opts 干擾項，避免沒有錯誤和無須修改並存
            let opts = target.opts ? [...target.opts] : [target.right, "刪除此處", "無須修改"];
            opts.sort(() => Math.random() - 0.5);

            const optContainer = document.getElementById('edit-sandbox-options');
            optContainer.innerHTML = '';

            opts.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = "w-full text-left py-3 px-4 border-2 border-slate-200 rounded-xl font-bold text-sm bg-white hover:bg-slate-50 transition";
                btn.innerText = opt;
                btn.onclick = () => chooseEditOpt(tIdx, opt, btn);
                optContainer.appendChild(btn);
            });
        }

        function chooseEditOpt(tIdx, opt, btn) {
            const data = editData[currentIdx];
            const target = data.targets[tIdx];
            const elem = document.getElementById(`edit-target-${tIdx}`);

            if (opt === target.right) {
                speakText("修改正確！");
                showToast("🎉 修改正確！");
                
                // 若正確答案是刪除，則不顯示文字
                elem.innerText = target.right.includes('刪除') ? '' : target.right;
                if(target.right.includes('刪除')) {
                    elem.className = "hidden";
                } else {
                    elem.className = "bg-emerald-100 border-b-2 border-emerald-500 px-1 py-0.5 font-bold text-emerald-900 pointer-events-none";
                }
                elem.onclick = null;

                document.getElementById('edit-sandbox').classList.add('hidden');
                editCorrectCount++;

                if (editCorrectCount === data.targets.length) {
                    finishEditLevel();
                }
            } else {
                speakText("修改錯誤喔！");
                currentMistakes++;
                btn.classList.add('bg-rose-100', 'border-rose-400', 'shake');
                document.getElementById('edit-hint-box').classList.remove('hidden');
                document.getElementById('edit-hint-box').innerText = "💡 提示：" + target.hint;
            }
        }

        function finishEditLevel() {
            const data = editData[currentIdx];
            userProgress.edit[currentIdx] = currentMistakes === 0 ? 1 : 2;
            saveProgress();

            let bonusExp = currentMistakes === 0 ? 20 : 10;
            writeExp += bonusExp;
            localStorage.setItem('writeAdvExp_v1', writeExp);
            updateExpDisplay();

            let finalStoryHtml = `
                <div class="title">${data.title}（修正後）</div>
                <p class="leading-relaxed mt-4 p-4">${data.badText.replace(/睛朗/g, "晴朗").replace(/雖然/g, "由於").replace(/大聲地討論/g, "小聲地討論").replace(/豐富極了/g, "豐富").replace(/大約一定/g, "一定").replace(/紀綠/g, "紀錄").replace(/打粹/g, "打碎").replace(/反而更/g, "而且").replace(/驕傲/g, "誠實").replace(/教島/g, "教導").replace(/雖然/g, "如果").replace(/辨法/g, "辦法").replace(/飄下落下來/g, "飄落下來").replace(/發揮/g, "養成").replace(/生病了。/g, "生病了！").replace(/列害/g, "厲害").replace(/即使是/g, "只有按時").replace(/即使/g, "只有按時").replace(/優愁/g, "憂愁").replace(/列烈/g, "激烈").replace(/但是/g, "所以").replace(/歡呼。/g, "歡呼！").replace(/光陰似劍/g, "光陰似箭").replace(/因為/g, "否則").replace(/來不急/g, "來不及").replace(/宣佈：明/g, "宣佈：「明").replace(/永躍/g, "踴躍").replace(/出一番力氣/g, "出一分力").replace(/只要/g, "即使").replace(/說：失/g, "說：「失").replace(/到達/g, "達到")}</p>
            `;

            document.getElementById('feedback-exp-text').className = "text-purple-600 font-bold text-xl mb-4";
            document.getElementById('feedback-exp-text').innerText = `獲得 ${bonusExp} 點經驗值 ✨`;
            
            let descBox = document.getElementById('feedback-desc');
            descBox.className = "bg-purple-50 border border-purple-200 text-purple-900 text-left text-base leading-loose p-4 rounded-xl mt-4 font-bold block flex-shrink-0";
            descBox.innerHTML = `💡 解析：${data.exp}`;
            descBox.classList.remove('hidden');

            let essayBox = document.getElementById('feedback-essay-container');
            document.getElementById('feedback-story').innerHTML = finalStoryHtml;
            essayBox.classList.remove('hidden');
            essayBox.className = "flex flex-col shadow-md rounded-xl overflow-hidden border-2 border-purple-200 flex-shrink-0 w-full";
            document.getElementById('feedback-story-header').className = "bg-purple-50 px-5 py-3 border-b-2 border-purple-200 flex justify-between items-center";
            document.getElementById('feedback-story-header').innerHTML = `<h3 class="text-purple-800 font-black text-lg md:text-xl flex items-center gap-2"><span>📝 你的完美作品：</span></h3><button onclick="speakFullStory()" class="bg-white text-purple-600 w-10 h-10 rounded-full flex items-center justify-center shadow hover:bg-purple-100 transition text-xl border border-purple-200">🔊</button>`;
            document.getElementById('next-btn').className = "flex-[1.5] bg-purple-600 hover:bg-purple-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg md:text-xl border-b-4 border-purple-800 active:border-b-0 active:translate-y-1";

            showFeedbackModal(bonusExp, () => switchMode('edit'));
        }

        // ================= 8. 導航模式切換邏輯 =================
        function switchMode(mode) {
            currentMode = mode;
            const tabs = ['vocab', 'analyze', 'outline', 'write', 'edit'];
            tabs.forEach(t => {
                const tabBtn = document.getElementById('tab-' + t);
                const tabMode = document.getElementById(t + '-mode');
                const tabPlay = document.getElementById(t + '-play');
                
                if (t === mode) {
                    if (tabBtn) tabBtn.className = "tab-btn tab-active flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-purple-600 whitespace-nowrap";
                    if (tabMode) tabMode.style.display = 'flex';
                } else {
                    if (tabBtn) tabBtn.className = "tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap";
                    if (tabMode) tabMode.style.display = 'none';
                    if (tabPlay) tabPlay.style.display = 'none';
                }
            });

            if (mode === 'vocab') {
                document.getElementById('vocab-directory').style.display = 'block';
                document.getElementById('vocab-play').style.display = 'none';
                renderVocabDirectory();
            } else if (mode === 'analyze') {
                document.getElementById('analyze-directory').style.display = 'block';
                document.getElementById('analyze-play').style.display = 'none';
                renderAnalyzeDirectory();
            } else if (mode === 'outline') {
                document.getElementById('outline-directory').style.display = 'block';
                document.getElementById('outline-play').style.display = 'none';
                renderOutlineDirectory();
            } else if (mode === 'write') {
                document.getElementById('write-directory').style.display = 'block';
                document.getElementById('write-play').style.display = 'none';
                renderWriteDirectory();
            } else if (mode === 'edit') {
                document.getElementById('edit-directory').style.display = 'block';
                document.getElementById('edit-play').style.display = 'none';
                renderEditDirectory();
            }
            
            updateTotalProgress();
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = writeExp;
            switchMode('vocab');
        }
    </script>
</body>
</html>
