<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>段落與實用文 - 基礎訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #eef2ff; /* 靛藍/淺紫背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #e0e7ff 1px, transparent 1px), linear-gradient(to bottom, #e0e7ff 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #818cf8; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #e0e7ff; border-color: #4f46e5; color: #312e81; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        /* 段落重組專用按鈕 (長條狀，支援多行文字) */
        .chunk-btn { transition: all 0.2s; box-shadow: 0 4px 0 #4f46e5; width: 100%; text-align: left; white-space: normal; line-height: 1.5; }
        .chunk-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .chunk-slot { transition: all 0.2s; border: 2px dashed #a5b4fc; background-color: #eef2ff; width: 100%; height: 60px; border-radius: 0.75rem; margin-bottom: 0.5rem; }

        /* 模擬信紙背景 */
        .letter-pad {
            background-color: #fffbeb;
            background-image: repeating-linear-gradient(transparent, transparent 39px, #fde68a 39px, #fde68a 40px);
            border: 2px solid #fcd34d;
        }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 (Indigo 配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-indigo-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-indigo-700 p-1 rounded transition bg-indigo-800">⬅️ 返回</a>
                <span>📝 段落與實用文 (基礎版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-indigo-800 px-3 py-1.5 rounded-full border border-indigo-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🎯 兩大核心：排句成段 ＆ 實用文格式</h2>
                <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-indigo-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+30)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 經提示過關 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 未完成</div>
                    </div>
                </div>
                <div id="directory-content" class="flex flex-col gap-8"></div>
            </div>
            
            <div id="quest-play" class="w-full hidden flex-col items-center"></div>
        </div>
    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-indigo-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-indigo-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-indigo-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-xl text-center transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-2">🎉</div>
            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-4 text-base md:text-lg leading-relaxed text-left overflow-y-auto pr-2 flex-1 w-full"></div>
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-indigo-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態與大腦字典 =================
        let paraExp = parseInt(localStorage.getItem('paraBasicExp')) || 0;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1;
        let currentQuestionIdx = -1;
        window.currentHints = []; 
        
        let reorderSource = []; 
        let reorderTarget = []; 
        let reorderCorrect = []; 

        document.getElementById('exp-display').innerText = paraExp;

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】]/g, '').replace(/&nbsp;/g, ' ');
                let msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'zh-HK';
                msg.rate = 0.9; 
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const genericExplanations = {
            '上款': '上款：寫在信件最開頭，稱呼收信人（如：親愛的媽媽：）。',
            '下款': '下款：寫在信件最後，署名寫信人是誰（如：兒子 小明 上）。',
            '問候語': '問候語：在正文開始前，向收信人打招呼（如：你好嗎？）。',
            '祝頌語': '祝頌語：在正文結束後，對收信人的祝福（如：祝 身體健康）。',
            '正文': '正文：信件或日記的主要內容，你想說的話。',
            '日期': '日期：寫信或寫日記的那一天（如：十月一日）。',
            '天氣': '天氣：寫日記時，通常在第一行記錄當天的天氣（如：晴）。',
            '稱呼': '稱呼：與上款類似，指叫對方的名字。',
            '署名': '署名：與下款類似，指簽上自己的名字。',
            '標題': '標題：文章或通告最上方的名字，告訴別人這篇文的主題。'
        };

        function getGenericExp(term) {
            return genericExplanations[term] || '這是實用文的一個重要部分。';
        }

        // ================= 2. 學習錦囊 (教學庫) =================
        const tutorialContents = {
            'p-reorder-time': `
                <div class="text-center mb-4"><span class="text-6xl">⏰ ➡️ 🏁</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">Part 1：排句成段 (時間順序)</p>
                <p class="mb-4 text-slate-600">把散亂的句子排成一段通順的文章，最簡單的方法就是找<span class="text-indigo-600 font-bold">「時間提示詞」</span>！</p>
                <div class="bg-indigo-50 p-4 rounded-xl border-2 border-indigo-200 mb-3 space-y-3 font-bold text-indigo-900">
                    <p>1️⃣ <span class="bg-white px-2 py-1 rounded shadow-sm text-indigo-600">先 / 首先 / 早上</span> 👉 通常排在<span class="text-rose-500">最前面</span>。</p>
                    <p>2️⃣ <span class="bg-white px-2 py-1 rounded shadow-sm text-indigo-600">接著 / 然後 / 中午</span> 👉 排在<span class="text-blue-500">中間</span>。</p>
                    <p>3️⃣ <span class="bg-white px-2 py-1 rounded shadow-sm text-indigo-600">最後 / 終於 / 晚上</span> 👉 通常排在<span class="text-emerald-500">最後面</span>。</p>
                </div>
            `,
            'p-reorder-logic': `
                <div class="text-center mb-4"><span class="text-6xl">🧠 🔗</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">Part 1：排句成段 (邏輯因果)</p>
                <p class="mb-4 text-slate-600">如果沒有時間詞，我們就要找句子裡的<span class="text-teal-600 font-bold">「因果關係」</span>或<span class="text-teal-600 font-bold">「代名詞」</span>！</p>
                <div class="bg-teal-50 p-4 rounded-xl border-2 border-teal-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-teal-800 text-lg mb-1">因果線索：</p>
                        <p class="text-slate-700">一定要先發生「<span class="font-bold text-rose-500">因為...</span>」，才會導致「<span class="font-bold text-blue-500">所以...</span>」的結果。</p>
                    </div>
                    <hr class="border-teal-200">
                    <div>
                        <p class="font-black text-teal-800 text-lg mb-1">代名詞線索：</p>
                        <p class="text-slate-700">看到「<span class="font-bold text-emerald-600">他/這/那</span>」，代表前面一定有一句話已經提過這個人或東西了！</p>
                    </div>
                </div>
            `,
            'p-practical-letter': `
                <div class="text-center mb-4"><span class="text-6xl">✉️ ✍️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">Part 2：書信的六大金剛</p>
                <p class="mb-4 text-slate-600">寫信有一定的格式，就像穿衣服不能穿反一樣！</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 text-sm font-bold text-amber-900 leading-loose">
                    <p><span class="bg-white px-2 rounded text-amber-700">親愛的媽媽：</span> 👈 <span class="text-rose-500">上款 (收信人)</span></p>
                    <p class="pl-4"><span class="bg-white px-2 rounded text-amber-700">你好嗎？</span> 👈 <span class="text-blue-500">問候語</span></p>
                    <p class="pl-4"><span class="bg-white px-2 rounded text-amber-700">我今天在學校很開心...</span> 👈 <span class="text-emerald-500">正文 (主要內容)</span></p>
                    <p class="pl-4"><span class="bg-white px-2 rounded text-amber-700">祝 身體健康</span> 👈 <span class="text-purple-500">祝頌語 (祝福)</span></p>
                    <p class="text-right"><span class="bg-white px-2 rounded text-amber-700">兒子 小明 上</span> 👈 <span class="text-orange-500">下款 (寫信人)</span></p>
                    <p class="text-right"><span class="bg-white px-2 rounded text-amber-700">十月一日</span> 👈 <span class="text-teal-500">日期</span></p>
                </div>
            `,
            'p-practical-diary': `
                <div class="text-center mb-4"><span class="text-6xl">📓 🌤️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">Part 2：日記與便條格式</p>
                <div class="bg-cyan-50 p-4 rounded-xl border-2 border-cyan-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-cyan-800 text-lg mb-1">📓 日記的秘密</p>
                        <p class="text-slate-700">日記是寫給自己看的，所以<span class="font-bold text-rose-500">不需要上款和下款</span>！但第一行一定要寫：<br><span class="bg-white px-2 py-1 rounded font-bold text-cyan-700 shadow-sm">日期 ＋ 星期 ＋ 天氣</span></p>
                    </div>
                    <hr class="border-cyan-200">
                    <div>
                        <p class="font-black text-blue-800 text-lg mb-1">📝 便條的秘密</p>
                        <p class="text-slate-700">便條是「簡短的信」，所以<span class="font-bold text-blue-600">有上款、正文、下款和日期</span>，但通常省略問候語和祝頌語，因為重點是快點交代事情！</p>
                    </div>
                </div>
            `,
            'p-practical-reorder': `
                <div class="text-center mb-4"><span class="text-6xl">🧩 🏗️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">實用文：全文重組實戰</p>
                <p class="mb-4 text-slate-600">這關你要把整篇實用文拼出來！點擊下方段落，依正確的上下格式排列到上方信紙中。</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 mb-3 text-emerald-900 font-bold">
                    <p class="mb-2">1. 判斷這是一封<span class="bg-white px-2 rounded text-emerald-700">書信、便條還是日記</span>。</p>
                    <p class="mb-2">2. 回想它的<span class="bg-white px-2 rounded text-emerald-700">格式順序</span>（例如書信是：上款 👉 問候語 👉 正文 👉 祝頌語 👉 下款 👉 日期）。</p>
                    <p>3. 依順序點擊段落，排錯了系統會自動退回並給你提示喔！</p>
                </div>
            `
        };

        function showTutorial(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId];
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    startQuestion(targetIdx, true); 
                }
            }, 300);
        }

        // ================= 3. 段落與實用文題庫 (200題) =================
        const categories = [
            { id: 'p-reorder-time', title: '⏳ 排句成段：時間與順序 (40題)', color: 'indigo' },
            { id: 'p-reorder-logic', title: '🧠 排句成段：邏輯與因果 (40題)', color: 'blue' },
            { id: 'p-practical-letter', title: '✉️ 實用文結構：書信篇 (40題)', color: 'amber' },
            { id: 'p-practical-diary', title: '📓 實用文結構：日記與便條 (40題)', color: 'cyan' },
            { id: 'p-practical-reorder', title: '🧩 實用文實戰：全文格式重組 (40題)', color: 'emerald' }
        ];

        // 資料產生器 1：排句成段 (傳入 chunks 和提示)
        function formatReorderData(pool, category, task) {
            return pool.map(item => {
                return { category: category, task: task, isReorder: true, chunks: item[0], hint: item[1] };
            });
        }

        // 資料產生器 2：實用文選擇題
        function formatMCQData(pool, category, task) {
            return pool.map(item => {
                let correctOpt = item[1];
                let w1 = item[2], w2 = item[3], w3 = item[4];
                let specificHint = item[5]; 
                let exp = `✅ ${correctOpt}：${specificHint}<br>❌ ${w1}：${getGenericExp(w1)}<br>❌ ${w2}：${getGenericExp(w2)}<br>❌ ${w3}：${getGenericExp(w3)}`;
                return { category: category, task: task, sentence: item[0], isReorder: false, correct: correctOpt, wrongs: [w1, w2, w3], explanation: exp };
            });
        }

        // 資料產生器 3：實用文全文格式重組
        function formatPracticalReorderData(pool, category, task) {
            return pool.map(item => {
                // pool 格式: [標題, [全文組件], 實用文類型, 提示]
                return { category: category, task: task, isReorder: true, sentence: '目標格式：' + item[2] + ' (' + item[0] + ')', chunks: item[1], target: item[2], hint: item[3] };
            });
        }

        // --- 1. 排句成段：時間順序 (40題) ---
        const reorderTimePool = [
            [['早上起床後，', '我先刷牙洗臉，', '然後吃早餐，', '最後背著書包上學去。'], '注意「先、然後、最後」的時間順序。'],
            [['春天播種，', '夏天生長，', '秋天收割，', '冬天儲藏。'], '依照春夏秋冬的四季順序。'],
            [['第一節上中文課，', '小息時去操場玩，', '第三節上數學課，', '中午在學校吃午飯。'], '按照學校一天的時間順序。'],
            [['走進公園大門，', '先看到一個大噴水池，', '再往前走是一片草地，', '草地盡頭有一個涼亭。'], '按照遊覽的空間順序(走進、先、再、盡頭)。'],

            let opts = [correct, ...wrongs];
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                options: opts,
                ansIdx: opts.indexOf(correct)
            };
        }

                const { options, ansIdx } = shuffleOptions(qData.correct, qData.wrongs);

        // --- 重組句子相關邏輯 ---
        function renderReorderUI(isParagraph = true) {
            const tArea = document.getElementById('reorder-target-area');
            const sArea = document.getElementById('reorder-source-area');
            if(!tArea || !sArea) return;

            let btnClassBase = "chunk-btn bg-indigo-600 text-white font-bold text-lg md:text-xl py-4 px-5 rounded-xl shadow-md pop w-full text-left leading-relaxed";
            let sourceBtnClassBase = "chunk-btn bg-white border-2 border-slate-300 text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 font-bold text-lg md:text-xl py-4 px-5 rounded-xl shadow w-full text-left leading-relaxed";
            let slotClassBase = "chunk-slot w-full h-16 rounded-xl";

            let tHtml = '';
            if (reorderTarget.length === 0) {
                tHtml = '<span class="text-slate-400 font-bold m-auto">點擊下方句子排在這裡...</span>';
            } else {
                reorderTarget.forEach((chunk, idx) => {
                    // 對於排句成段加數字序號，對於實用文重組不加數字，保持原味
                    let prefix = rawQuestDataObj[currentQuestionIdx].category.includes('practical') ? '' : (idx+1)+'. ';
                    tHtml += `<button onclick="removeFromTarget(${idx})" class="${btnClassBase}">${prefix}${chunk}</button>`;
                });
            }
            tArea.innerHTML = tHtml;

            let sHtml = '';
            reorderSource.forEach((chunk, idx) => {
                if (chunk === null) {
                    sHtml += `<div class="${slotClassBase}"></div>`; 
                } else {
                    sHtml += `<button onclick="moveToTarget(${idx})" class="${sourceBtnClassBase}">${chunk}</button>`;
                }
            });
            sArea.innerHTML = sHtml;

            if (reorderTarget.length > 0 && reorderTarget.length === reorderCorrect.length) {
                checkReorderAnswer();
            }
        }

        function moveToTarget(sourceIdx) {
            let chunk = reorderSource[sourceIdx];
            reorderSource[sourceIdx] = null; 
            reorderTarget.push(chunk);
            speakText(chunk);
            renderReorderUI();
        }

        function removeFromTarget(targetIdx) {
            let chunk = reorderTarget[targetIdx];
            reorderTarget.splice(targetIdx, 1);
            let emptyIdx = reorderSource.indexOf(null);
            if(emptyIdx !== -1) reorderSource[emptyIdx] = chunk;
            renderReorderUI();
        }

        function checkReorderAnswer() {
            let isCorrect = true;
            let correctCount = 0;
            for(let i=0; i<reorderTarget.length; i++) {
                if(reorderTarget[i] === reorderCorrect[i]) {
                    correctCount++;
                } else {
                    isCorrect = false;
                    break;
                }
            }

            const qData = rawQuestDataObj[currentQuestionIdx];

            if (isCorrect && reorderTarget.length === reorderCorrect.length) {
                speakText("完美的重組！");
                let joinChar = qData.category.includes('practical') ? '<br><br>' : ' ';
                let expText = `✅ 正確順序：<br><br>${reorderCorrect.join(joinChar)}<br><br>💡 解析：${qData.hint}`;
                triggerSuccess(expText);
            } else if (reorderTarget.length === reorderCorrect.length) {
                currentQuestionMistakes++;
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('paraBasicProgress', JSON.stringify(userProgress));
                
                let chunksToReturn = reorderTarget.splice(correctCount);
                for (let chunk of chunksToReturn) {
                    let emptyIdx = reorderSource.indexOf(null);
                    if(emptyIdx !== -1) {
                        reorderSource[emptyIdx] = chunk;
                    } else {
                        reorderSource.push(chunk);
                    }
                }

                let hintWord = reorderCorrect[correctCount];
                let newHint = `排錯了喔！正確的部分已保留。<br>👉 下接的應該是：「<span class="text-rose-600">${hintWord}</span>」<br>💡 技巧：${qData.hint}`;

                document.getElementById('hint-text').innerHTML = newHint;
                document.getElementById('hint-tts-btn').onclick = () => speakText(`排錯了喔。下一個應該是，${hintWord}`);
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("順序不對喔，請看提示！");
                
                const tArea = document.getElementById('reorder-target-area');
                tArea.classList.add('bg-rose-100', 'border-rose-400', 'shake');
                setTimeout(() => tArea.classList.remove('bg-rose-100', 'border-rose-400', 'shake'), 800);

                renderReorderUI();
            }
        }

        // --- 選擇題檢查邏輯 ---
        function checkAnswer(btnElement, isCorrect, clickedOptText) {
            const allBtns = document.querySelectorAll('.option-btn');
            const qData = rawQuestDataObj[currentQuestionIdx];
            
            if (isCorrect) {
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                btnElement.classList.add('correct');
                const expText = qData.explanation; 
                
                speakText("完美的判斷！");
                triggerSuccess(expText);
            } else {
                btnElement.classList.add('wrong', 'shake');
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('paraBasicProgress', JSON.stringify(userProgress));
                
                let lines = qData.explanation.split('<br>');
                let matchedLine = lines.find(l => l.includes(clickedOptText));
                let newHint = "請再仔細想一想喔！";
                
                if (matchedLine) {
                    newHint = matchedLine.replace(/^[✅❌]\s*/, ''); 
                }

                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(newHint)) window.currentHints.push(newHint);

                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-1 last:border-0 last:pb-0">💡 ${h}</div>`).join('');
                document.getElementById('hint-text').innerHTML = combinedHintsHtml;
                document.getElementById('hint-tts-btn').onclick = () => speakText(window.currentHints.join('。'));
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("不對喔，" + newHint);
                setTimeout(() => { btnElement.classList.remove('shake'); }, 500);
            }
        }

        // --- 成功處理共通邏輯 ---
        function triggerSuccess(expText) {
            let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentQuestionIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 30 : 10;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 20; 
            }

            if (expGained > 0) {
                paraExp += expGained;
                localStorage.setItem('paraBasicExp', paraExp);
                document.getElementById('exp-display').innerText = paraExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentQuestionIdx] = finalStatus;
                localStorage.setItem('paraBasicProgress', JSON.stringify(userProgress));
            }

            let modalIcon = finalStatus === 1 ? '🌟' : '✅';
            let modalTitle = finalStatus === 1 ? '完美答對！' : '成功過關！';
            let expMsg = expGained > 0 
                ? `<span class="text-indigo-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
            
            let combinedDesc = expMsg + `
                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 text-left text-indigo-900 rounded-r-lg font-bold">
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-indigo-200">
                        <span class="text-xl">📚 深度解析</span>
                        <button onclick="speakText('${expText}')" class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm hover:bg-indigo-100 text-xl transition active:scale-95">🔊</button>
                    </div>
                    <div class="space-y-3 text-base leading-relaxed">${expText}</div>
                </div>`;

            setTimeout(() => { showModal(modalIcon, modalTitle, combinedDesc); }, 800);
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    let nextIdx = currentQuestionIdx + 1;
                    if (nextIdx < rawQuestDataObj.length) startQuestion(nextIdx);
                    else { showToast("恭喜完成所有挑戰！"); backToDirectory(); }
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function backToDirectory() {
            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function backToDirectoryFromModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = paraExp;
            renderDirectory();
        }
    </script>
</body>
</html>
