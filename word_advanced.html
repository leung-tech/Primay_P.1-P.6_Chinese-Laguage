<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字詞擴充挑戰 - 拔尖訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #faf5ff;
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #f3e8ff 1px, transparent 1px), linear-gradient(to bottom, #f3e8ff 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .mi-zi-ge {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, transparent 49.5%, #c084fc 49.5%, #c084fc 50.5%, transparent 50.5%),
                linear-gradient(to bottom, transparent 49.5%, #c084fc 49.5%, #c084fc 50.5%, transparent 50.5%),
                linear-gradient(45deg, transparent 49.5%, #e9d5ff 49.5%, #e9d5ff 50.5%, transparent 50.5%),
                linear-gradient(-45deg, transparent 49.5%, #e9d5ff 49.5%, #e9d5ff 50.5%, transparent 50.5%);
            border: 4px solid #a855f7; border-radius: 8px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #cbd5e1; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #f3e8ff; border-color: #a855f7; color: #6b21a8; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }
        
        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }

        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #7e22ce; color: white; border-color: #581c87; }
        .tab-inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }
        
        .filter-btn { transition: all 0.2s; }
        .filter-active { background-color: #9333ea; color: white; border-color: #7e22ce; font-weight: bold; }

        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 (紫金配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-purple-700 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-purple-800 p-1 rounded transition bg-purple-900">⬅️ 返回</a>
                <span>🎓 詞彙擴充挑戰 (拔尖版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-purple-900 px-3 py-1.5 rounded-full border border-purple-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏅</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('quest')" id="tab-quest" class="tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-purple-700">
                🚀 深度語感特訓 (800題)
            </button>
            <button onclick="switchMode('sandbox')" id="tab-sandbox" class="tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200">
                📖 高級字詞寶庫
            </button>
        </div>
        
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <!-- ================= 模式 1：闖關地圖 ================= -->
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🚀 深度語感與精準表達特訓</h2>
                
                <div class="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-purple-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+30)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 嘗試後答對 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 答錯未完成</div>
                    </div>
                </div>

                <div id="directory-content" class="flex flex-col gap-8">
                    <!-- 目錄動態生成 -->
                </div>
            </div>
            
            <div id="quest-play" class="w-full hidden flex-col items-center">
                <!-- 題目動態生成 -->
            </div>
        </div>

        <!-- ================= 模式 2：高級字詞寶庫 ================= -->
        <div id="sandbox-wrapper" class="hidden w-full h-full">
            <div class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-4 lg:gap-6 h-full min-h-[500px]">
                <div class="lg:w-1/3 flex flex-col gap-3 min-h-[300px] lg:h-[600px]">
                    <div class="bg-white rounded-xl shadow-sm border border-purple-200 p-3 flex flex-col gap-2 relative">
                        <h3 class="font-bold text-purple-800 text-sm">🔍 搜尋高級生字：</h3>
                        <div class="flex gap-2">
                            <input type="text" id="custom-char-input" maxlength="1" placeholder="輸入古文或罕見字..." class="flex-1 px-3 py-2 border-2 border-slate-200 rounded-lg focus:outline-none focus:border-purple-500 text-lg text-center font-bold">
                            <button onclick="searchCustomChar()" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-purple-700 shadow-sm transition">生成</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-2 flex overflow-x-auto no-scrollbar gap-2 flex-shrink-0">
                        <button onclick="filterWords('all')" id="flt-all" class="filter-btn filter-active px-4 py-2 rounded-lg whitespace-nowrap text-sm border">全部</button>
                        <button onclick="filterWords('advanced')" id="flt-advanced" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">深字</button>
                        <button onclick="filterWords('classic')" id="flt-classic" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">古文</button>
                        <button onclick="filterWords('emotion')" id="flt-emotion" class="filter-btn bg-slate-50 text-slate-600 px-4 py-2 rounded-lg whitespace-nowrap text-sm border">情感</button>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md border-2 border-slate-200 p-4 flex-1 overflow-y-auto no-scrollbar min-h-[250px]">
                        <div id="word-grid" class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-3 gap-2"></div>
                    </div>
                </div>

                <div class="lg:w-2/3 bg-white rounded-2xl shadow-xl border-t-8 border-purple-600 p-4 lg:p-6 flex flex-col items-center justify-center relative min-h-[400px]">
                    <div id="sandbox-placeholder" class="text-slate-400 font-bold text-xl text-center flex flex-col items-center gap-4">
                        <span class="text-6xl animate-bounce">👈</span>請從左側選擇，或直接搜尋中文字
                    </div>
                    <div id="sandbox-content" class="hidden w-full flex flex-col items-center">
                        <div class="flex justify-between w-full mb-4 items-end border-b-2 border-slate-100 pb-4">
                            <div>
                                <h2 id="sb-char" class="text-5xl lg:text-6xl font-black text-slate-800 mb-3">字</h2>
                                <div class="flex flex-wrap gap-2">
                                    <span class="bg-purple-100 text-purple-800 px-3 py-1 rounded-lg border border-purple-200 font-bold text-sm lg:text-base">部首：<span id="sb-radical"></span></span>
                                    <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-lg border border-indigo-200 font-bold text-sm lg:text-base" id="sb-english">English</span>
                                </div>
                            </div>
                            <button onclick="speakText(document.getElementById('sb-char').innerText)" class="tts-btn bg-purple-100 text-purple-700 w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-sm border-2 border-purple-200">🔊</button>
                        </div>
                        <div class="relative w-64 h-64 md:w-80 md:h-80 mi-zi-ge mb-6 shadow-inner touch-none" id="sandbox-canvas"></div>
                        <div class="flex flex-wrap justify-center gap-3 w-full">
                            <button onclick="sbWriter.animateCharacter()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-lg">👀 看筆順</button>
                            <button onclick="startSandboxQuiz()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-xl shadow transition flex items-center gap-2 text-lg">✍️ 試寫</button>
                            <button onclick="sbWriter.hideCharacter(); sbWriter.showCharacter()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-6 rounded-xl transition text-lg">🔄 重設</button>
                        </div>
                        <div id="sb-feedback" class="mt-4 text-xl font-bold text-purple-600 h-8 opacity-0 transition-opacity"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 反饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-sm text-center transform scale-90 transition-transform" id="feedback-content">
            <div id="feedback-icon" class="text-7xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-6 text-lg leading-relaxed text-left"></div>
            <div class="flex gap-3 w-full mt-4">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-purple-600 hover:bg-purple-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-purple-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心設定 =================
        let advExp = parseInt(localStorage.getItem('advExp')) || 0;
        document.getElementById('exp-display').innerText = advExp;
        let currentQuestionMistakes = 0; 

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-HK';
                msg.rate = 0.95; 
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function switchMode(mode) {
            const tabQuest = document.getElementById('tab-quest');
            const tabSandbox = document.getElementById('tab-sandbox');
            const questMode = document.getElementById('quest-mode');
            const sandboxWrapper = document.getElementById('sandbox-wrapper');
            const progress = document.getElementById('progress-container');

            if (mode === 'quest') {
                tabQuest.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-purple-700";
                tabSandbox.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                questMode.style.display = 'flex';
                sandboxWrapper.style.display = 'none';
                progress.style.display = 'block';
                updateTotalProgress();
            } else {
                tabSandbox.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-purple-700";
                tabQuest.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                questMode.style.display = 'none';
                sandboxWrapper.style.display = 'block'; 
                progress.style.display = 'none';
                if(!isSandboxInitialized) { initSandbox(); isSandboxInitialized = true; }
            }
        }

        // ================= 2. 800題 終極旗艦題庫 (隨機 4選1) =================
        const categories = [
            { id: 'c-redup', title: '🔤 疊字語感與畫面感 (100題)', color: 'fuchsia' },
            { id: 'c-xiehou', title: '🎭 歇後語情境精準配對 (100題)', color: 'pink' },
            { id: 'c-proverb', title: '📜 經典諺語與明理 (100題)', color: 'rose' },
            { id: 'c-idiom-sentiment', title: '⚖️ 成語歸類與褒貶辨析 (150題)', color: 'purple' },
            { id: 'c-idiom-story', title: '📚 成語故事寓意配對 (150題)', color: 'indigo' },
            { id: 'c-classic', title: '🏛️ 文言基礎單字解釋 (100題)', color: 'blue' },
            { id: 'c-adv-synonym', title: '🎯 高級近義詞精準辨析 (100題)', color: 'teal' }
        ];

        // 核心資料池：[題目/語境, 正確答案, [3個錯誤干擾項], 解析]
        const redupPool = [
            ['春雨過後，遠處的山峰顯得___的，充滿生機。', '綠油油', ['綠蔥蔥', '青湛湛', '白茫茫'], '「綠油油」形容濃綠而有光澤，最適合描繪雨後的植物。'],
            ['夏天的夜晚，天上的星星___的，像無數顆寶石。', '亮晶晶', ['閃閃亮', '亮堂堂', '黑漆漆'], '「亮晶晶」專門形容物體閃爍發光。'],
            ['這孩子長得___的，十分惹人喜愛。', '胖乎乎', ['瘦巴巴', '乾巴巴', '圓滾滾'], '「胖乎乎」帶有可愛、親切的感情色彩。'],
            ['他處理事情總是___，經常出錯，讓人很不放心。', '馬馬虎虎', ['風風火火', '吞吞吐吐', '仔仔細細'], '「馬馬虎虎」形容做事草率不認真。'],
            ['快過年了，大家把屋子打掃得___。', '乾乾淨淨', ['整整齊齊', '明明白白', '辛辛苦苦'], '「乾乾淨淨」強調沒有灰塵和雜物。'],
            ['他做起事來總是___的，非常有活力和效率。', '風風火火', ['急急忙忙', '慌慌張張', '慢慢吞吞'], '「風風火火」形容動作迅速且充滿氣勢。'],
            ['遇到不懂的問題，我們應該互相___，尋求解答。', '討論討論', ['打聽打聽', '思考思考', '猶豫猶豫'], '「討論討論」是 ABAB 式動詞疊用，表示短暫或嘗試性的動作。'],
            ['秋風吹過，樹葉___地飄落下來。', '紛紛揚揚', ['洋洋灑灑', '沸沸揚揚', '零零落落'], '「紛紛」強調數量多且雜亂，「揚揚」形容飛舞的樣子。'],
            ['他把這件事調查得___，連一點細節都沒漏掉。', '清清楚楚', ['明明白白', '真真切切', '糊裡糊塗'], '「清清楚楚」強調沒有絲毫模糊。'],
            ['這朵花香氣撲鼻，花瓣___的，真好看。', '紅彤彤', ['紅艷艷', '紅撲撲', '黑壓壓'], '「紅彤彤」形容顏色極紅。']
        ];

        const xiehouPool = [
            ['他自己都快破產了，你還找他借錢？這簡直是「___」啊！', '泥菩薩過江——自身難保', ['肉包子打狗——有去無回', '竹籃打水——一場空', '飛蛾撲火——自取滅亡'], '泥菩薩過水自身都會融化，比喻連保全自己都困難。'],
            ['你把錢交給那個騙子投資，肯定是「___」了。', '肉包子打狗——有去無回', ['姜太公釣魚——願者上鉤', '瞎子吃湯圓——心裡有數', '老鼠過街——人人喊打'], '狗愛吃肉包子，丟過去就不會還回來了。比喻東西給了出去再也收不回。'],
            ['這次比賽他明明被人犯規干擾，卻沒有證據，只能「___」。', '啞巴吃黃連——有苦說不出', ['狗咬呂洞賓——不識好人心', '老鼠過街——人人喊打', '貓哭老鼠——假慈悲'], '啞巴吃到苦黃連卻說不出來，比喻有苦難言。'],
            ['他明知道這家公司有問題還去應徵，真是「___」！', '飛蛾撲火——自取滅亡', ['姜太公釣魚——願者上鉤', '千里送鵝毛——禮輕情意重', '黃鼠狼給雞拜年——沒安好心'], '飛蛾撲向火光會被燒死，比喻自尋死路。'],
            ['這點小禮物只是「___」，希望能表達我的一點心意。', '千里送鵝毛——禮輕情意重', ['八仙過海——各顯神通', '狗拿耗子——多管閒事', '丈二和尚——摸不著頭腦'], '即使禮物像鵝毛一樣輕，但由於大老遠送來，代表情意非常深重。'],
            ['你這不是「___」嗎？這本來就是別人的工作，你插手做什麼？', '狗拿耗子——多管閒事', ['黃鼠狼給雞拜年——沒安好心', '老虎掛念珠——假慈悲', '司馬昭之心——路人皆知'], '抓老鼠是貓的工作，狗去抓就是多管閒事。'],

        function generateData(pool, category, task, count) {
            let result = [];

                let item = pool[i % pool.length];

                    task: task,
                    sentence: item[0],
                    correct: item[1],
                    wrongs: item[2],
                    explanation: item[3]
                });
            }
            return result;
        }

        // 核心：四選項隨機打亂演算法
        function shuffleOptions(correct, wrongs) {
            let opts = [correct, ...wrongs];
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                options: opts,
                ansIdx: opts.indexOf(correct)
            };
        }

                ttsText = qData.task + "。 " + qData.sentence.replace('___', '什麼');
            }

            let sentenceHtml = qData.sentence.replace('___', '<span class="text-purple-600 border-b-4 border-purple-500 px-6 font-black bg-purple-50">?</span>');

            let html = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-purple-100 text-purple-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">第 ${idx + 1} 題 / 共 800 題</span>
                </div>
                
                <div class="slide-up w-full bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-purple-600 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">
                        ${qCatTitle}
                    </span>
                    
                    <div class="w-full flex items-center gap-3 mt-4 mb-6">
                        <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">進階任務</span>
                        <h2 class="text-lg md:text-xl font-bold text-slate-700">${qData.task}</h2>
                    </div>

                    <div class="w-full flex items-start gap-4 mb-8 bg-purple-50 p-6 rounded-2xl border border-purple-100 shadow-inner">
                        <button onclick="speakText('${ttsText}')" class="tts-btn flex-shrink-0 bg-white text-purple-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-purple-200">🔊</button>
                        <div class="text-2xl md:text-3xl font-bold text-slate-800 leading-loose">${sentenceHtml}</div>
                    </div>

                    <div class="flex flex-col gap-4 w-full max-w-lg mt-auto" id="options-container">
            `;

            options.forEach((optText, oIdx) => {
                const isCorr = (oIdx === ansIdx);
                const letter = ['A','B','C','D'][oIdx];
                html += `<button onclick="checkAnswer(this, ${isCorr})" class="option-btn bg-white border-2 border-slate-200 text-slate-700 text-xl font-bold py-4 px-6 rounded-xl hover:bg-purple-50 hover:border-purple-300 transition w-full text-left flex items-center gap-4"><span class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full flex items-center justify-center text-sm">${letter}</span> <span>${optText}</span></button>`;
            });
            
            html += `
                    </div>
                </div>
            `;
            questPlay.innerHTML = html;
        }

        function backToDirectory() {
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function checkAnswer(btnElement, isCorrect) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.classList.add('correct');
                const qData = rawQuestDataObj[currentQuestionIdx];
                const expText = qData.explanation; 
                
                speakText("精準！" + (expText.split('：')[1] || expText));
                
                let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
                let previousStatus = userProgress[currentQuestionIdx];
                let expGained = 0;

                // 拔尖版經驗值更高，激勵學習
                if (previousStatus !== 1 && previousStatus !== 2) {
                    expGained = finalStatus === 1 ? 30 : 10;
                } else if (previousStatus === 2 && finalStatus === 1) {
                    expGained = 20; 
                }

                if (expGained > 0) {
                    advExp += expGained;
                    localStorage.setItem('advExp', advExp);
                    document.getElementById('exp-display').innerText = advExp;
                    document.getElementById('exp-display').classList.add('pop');
                    setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                }

                if (finalStatus === 1 || previousStatus !== 1) {
                    userProgress[currentQuestionIdx] = finalStatus;
                    localStorage.setItem('advQuestProgress', JSON.stringify(userProgress));
                }

                let modalIcon = finalStatus === 1 ? '🌟' : '✅';
                let modalTitle = finalStatus === 1 ? '完美答對！語感極佳！' : '成功找出正解！';
                let expMsg = expGained > 0 
                    ? `<span class="text-purple-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                    : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
                
                let combinedDesc = expMsg + `<div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 text-left text-indigo-900 rounded-r-lg font-bold">${expText}</div>`;

                setTimeout(() => { showModal(modalIcon, modalTitle, combinedDesc); }, 800);
            } else {
                btnElement.classList.add('wrong', 'shake');
                speakText("請再仔細推敲語境！");
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('advQuestProgress', JSON.stringify(userProgress));
                
                setTimeout(() => {
                    btnElement.classList.remove('wrong', 'shake');
                    allBtns.forEach(b => { if (!b.classList.contains('correct')) b.style.pointerEvents = 'auto'; });
                }, 1500);
            }
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    let nextIdx = currentQuestionIdx + 1;
                    if (nextIdx < 800) startQuestion(nextIdx);
                    else { showToast("恭喜完成所有挑戰！"); backToDirectory(); }
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function backToDirectoryFromModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        // ================= 3. 拔尖字庫 (高級生字與古文單字) =================
        const rawWordData = "advanced|躊:足:Hesitate,躇:足:Hesitate,尷:尢:Embarrassed,尬:尢:Embarrassed,忐:心:Nervous,忑:心:Nervous,璀:玉:Bright,璨:玉:Bright,翱:舟:Soar,翔:羽:Soar,憧:心:Yearn for,憬:心:Yearn for,湛:水:Deep/Clear,蔚:艸:Lush,浩:水:Vast,瀚:水:Vast|classic|走:走:Run (Ancient),湯:水:Hot water (Ancient),兵:八:Weapon (Ancient),股:肉:Thigh (Ancient),臭:自:Smell (Ancient),涕:水:Tear (Ancient),妻:女:Wife,子:子:Children,布:巾:Cloth/Commoner,衣:衣:Clothes/Commoner|emotion|憤:心:Angry,恨:心:Hate,愁:心:Worry,悲:心:Sad,恐:心:Fear,懼:心:Dread,慕:心:Admire,戀:心:Love,慰:心:Comfort,愧:心:Ashamed,驚:馬:Surprised,喜:口:Joy,怒:心:Anger,哀:口:Sorrow";

        let parsedWords = [];
        rawWordData.split('|').forEach((chunk, index, arr) => {
            if(index % 2 === 0) {
                let cat = chunk;
                let pairs = arr[index+1].split(',');
                pairs.forEach(p => { 
                    let [char, rad, eng] = p.split(':'); 
                    if (char && rad) parsedWords.push({ cat, char, rad, eng }); 
                });
            }
        });

        let sbWriter;
        let isSandboxInitialized = false;

        function initSandbox() { filterWords('all'); }

        function filterWords(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('filter-active', 'bg-purple-600', 'text-white');
                btn.classList.add('bg-slate-50', 'text-slate-600');
            });
            let activeBtn = document.getElementById('flt-' + category);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-50', 'text-slate-600');
                activeBtn.classList.add('filter-active');
            }

            const grid = document.getElementById('word-grid');
            let html = '';
            parsedWords.forEach((item) => {
                if (category === 'all' || item.cat === category) {
                    const itemStr = encodeURIComponent(JSON.stringify(item));
                    html += `<button onclick="selectSandboxChar('${itemStr}')" class="bg-slate-50 border-2 border-slate-200 hover:border-purple-400 hover:bg-purple-50 text-2xl lg:text-3xl font-bold py-3 lg:py-4 rounded-xl transition shadow-sm text-slate-700">${item.char}</button>`;
                }
            });
            grid.innerHTML = html;
        }

        function searchCustomChar() {
            const input = document.getElementById('custom-char-input').value.trim();
            const chars = input.match(/[\u4e00-\u9fa5]/g);
            if (!chars || chars.length === 0) { showToast("請輸入一個有效的中文字！"); return; }
            selectSandboxChar(encodeURIComponent(JSON.stringify({ char: chars[0], rad: '檢索', eng: 'Dictionary' })));
            document.getElementById('custom-char-input').value = ''; 
        }

        function selectSandboxChar(itemStr) {
            document.getElementById('sandbox-placeholder').classList.add('hidden');
            document.getElementById('sandbox-content').classList.remove('hidden');
            const data = JSON.parse(decodeURIComponent(itemStr));
            document.getElementById('sb-char').innerText = data.char;
            document.getElementById('sb-radical').innerText = data.rad;
            document.getElementById('sb-english').innerText = data.eng || 'Translation';
            document.getElementById('sb-feedback').style.opacity = '0';
            speakText(data.char);

            const canvasDiv = document.getElementById('sandbox-canvas');
            canvasDiv.innerHTML = ''; 
            const size = window.innerWidth < 768 ? 256 : 320; 
            
            try {
                sbWriter = HanziWriter.create('sandbox-canvas', data.char, {
                    width: size, height: size, padding: 15, strokeAnimationSpeed: 1, delayBetweenStrokes: 100,
                    strokeColor: '#1e293b', radicalColor: '#7e22ce', showHintAfterMisses: 2, leniency: 2.0 
                });
            } catch(e) {
                canvasDiv.innerHTML = `<div class="flex flex-col items-center justify-center h-full px-4 text-center"><span class="text-5xl mb-3">📭</span><p class="text-rose-500 font-bold text-lg">字庫暫未收錄「${data.char}」的筆順。</p></div>`;
                sbWriter = null;
            }
        }

        function startSandboxQuiz() {
            if (!sbWriter) { showToast("無法練習試寫喔！"); return; }
            document.getElementById('sb-feedback').style.opacity = '0';
            sbWriter.quiz({
                onMistake: function() {
                    const fb = document.getElementById('sb-feedback');
                    fb.innerText = "❌ 筆順不正確！";
                    fb.className = "mt-4 text-lg font-bold text-rose-500 h-8 transition-opacity opacity-100 shake";
                    speakText("筆順不正確");
                    setTimeout(() => fb.classList.remove('shake'), 400);
                },
                onComplete: function() {
                    const fb = document.getElementById('sb-feedback');
                    fb.innerText = "✨ 書寫精確！(獲得 5 EXP)";
                    fb.className = "mt-4 text-xl font-bold text-purple-600 h-8 transition-opacity opacity-100 pop";
                    speakText("書寫精確！");
                    advExp += 5;
                    localStorage.setItem('advExp', advExp);
                    document.getElementById('exp-display').innerText = advExp;
                    document.getElementById('exp-display').classList.add('pop');
                    setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                }
            });
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = advExp;
            switchMode('quest'); 
            renderDirectory();
            document.getElementById('custom-char-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchCustomChar();
            });
        }
    </script>
</body>
</html>
