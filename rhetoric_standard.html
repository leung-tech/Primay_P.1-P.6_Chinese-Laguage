<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修辭與標點 - 標準常規訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #ecfeff; /* 清新的海洋青/淺藍綠背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #cffafe 1px, transparent 1px), linear-gradient(to bottom, #cffafe 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #67e8f9; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #cffafe; border-color: #06b6d4; color: #164e63; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden bg-grid-pattern">

    <!-- 頂部導覽列 (Cyan 配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-cyan-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-cyan-700 p-1 rounded transition bg-cyan-800">⬅️ 返回</a>
                <span>📝 修辭與標點 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-cyan-800 px-3 py-1.5 rounded-full border border-cyan-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-300">0</span></span>
            </div>
        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth" id="main-scroll-area">
        
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🎯 標點與修辭常規特訓</h2>
                <div class="bg-cyan-50 border border-cyan-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-cyan-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+20)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 經提示答對 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 未完成</div>
                    </div>
                </div>
                <div id="directory-content" class="flex flex-col gap-8"></div>
            </div>
            
            <div id="quest-play" class="w-full hidden flex-col items-center"></div>
        </div>
    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-cyan-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-cyan-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="window.closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="window.closeTutorial()" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-cyan-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-xl text-center transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-2">🎉</div>
            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-4 text-base md:text-lg leading-relaxed text-left overflow-y-auto pr-2 flex-1 w-full"></div>
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">
                <button onclick="window.backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-cyan-600 hover:bg-cyan-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-cyan-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態與輔助函數 =================
        let stdExp = parseInt(localStorage.getItem('rhetStdExp')) || 0;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1;
        let currentQuestionIdx = -1;
        window.currentHints = []; 

        document.getElementById('exp-display').innerText = stdExp;

        window.cleanTextForSpeech = function(text) {
            if(!text) return "";
            return text.replace(/<br\s*\/?>/gi, '。')
                       .replace(/<[^>]*>?/gm, '')
                       .replace(/[✅❌💡【】_]/g, '')
                       .replace(/&nbsp;/g, ' ')
                       .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDC00-\uDFFF]/g, ''); 
        };

        window.speakText = function(text, rate = 0.95) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(window.cleanTextForSpeech(text));
                msg.lang = 'zh-HK';
                msg.rate = rate; 
                window.speechSynthesis.speak(msg);
            }
        };

        window.showToast = function(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        };

        // 🌟 新增：針對標點符號的語音轉譯器 (照顧 SEN 學生)
        window.getTTSOptionText = function(opt) {
            if(opt === '。') return '句號';
            if(opt === '，') return '逗號';
            if(opt === '？') return '問號';
            if(opt === '！') return '感嘆號';
            if(opt === '、') return '頓號';
            if(opt === '：') return '冒號';
            if(opt === '；') return '分號';
            if(opt === '《》') return '書名號';
            if(opt === '「」') return '引號';
            if(opt === '（）') return '括號';
            if(opt === '……') return '省略號';
            if(opt === '——') return '破折號';
            return opt;
        };

        // 標點與修辭的通用解釋字典 (包含所有錯誤選項的合理解釋)
        const genericExplanations = {
            '。': '句號：表示一句話完整說完了。',
            '，': '逗號：表示句子中間的短暫停頓。',
            '？': '問號：表示這是一句發問的話。',
            '！': '感嘆號：表示帶有強烈的感情或語氣。',
            '、': '頓號：用來分開連續相同種類的物品。',
            '：': '冒號：用在提示語後面，引起下文。',
            '；': '分號：用來分開兩個結構相同、意思並列的長句子。',
            '《》': '書名號：用來標示書本、文章、電影、報紙等的名稱。',
            '「」': '引號：用來標示人物說的話，或特別強調的詞語。',
            '（）': '括號：用來對句子中的詞語進行補充說明。',
            '……': '省略號：表示話未說完、語意未盡，或列舉的省略。',
            '——': '破折號：表示聲音的延長，或意思的轉折、解釋說明。',
            '明喻': '明喻：有本體、喻體，並使用「像」、「好像」、「猶如」等喻詞。',
            '暗喻': '暗喻：有本體、喻體，但不使用「像」，而是用「是」、「變成」等連接。',
            '借喻': '借喻：不出現本體和喻詞，直接把喻體（比喻的東西）當作本體來說。',
            '擬人': '擬人：把死物或動植物當作「人」來寫，賦予人的動作或情感。',
            '擬物': '擬物：把人當作「物」來寫，或把甲物當作乙物來寫。',
            '誇張': '誇張：故意言過其實，放大或縮小事物的特徵，令人印象深刻。',
            '排比': '排比：把三個或以上結構相同、意思相關的短語或句子排列在一起。',
            '反問': '反問：只問不答，答案已經包含在問題中（常用「難道」），用來加強語氣。',
            '設問': '設問：為了引起注意，自己提出問題，然後自己回答（自問自答）。',
            '對偶': '對偶：兩句話字數相等、結構相同、意思相對或相關（如春聯）。'
        };

        window.getGenericExp = function(term) {
            return genericExplanations[term] || '這是一個修辭或標點符號。';
        };

        // ================= 2. 學習錦囊 (教學庫) =================
        const tutorialContents = {
            'r-punc-adv': `
                <div class="text-center mb-4"><span class="text-6xl">📖 ⋯ 💨</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">進階標點符號魔法！</p>
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200 mb-3 space-y-3">
                    <p class="text-lg"><span class="bg-white font-black text-blue-700 border border-blue-300 px-2 py-1 rounded">《 》書名號</span> 👉 用來標示書本、電影、報紙的名字。例：《西遊記》</p>
                    <p class="text-lg"><span class="bg-white font-black text-teal-700 border border-teal-300 px-2 py-1 rounded">…… 省略號</span> 👉 表示話還沒說完，或者列舉還沒完。例：有蘋果、橙……</p>
                    <p class="text-lg"><span class="bg-white font-black text-rose-700 border border-rose-300 px-2 py-1 rounded">—— 破折號</span> 👉 表示聲音拉長，或者補充解釋。例：嗚——火車開了。</p>
                    <p class="text-lg"><span class="bg-white font-black text-purple-700 border border-purple-300 px-2 py-1 rounded">； 分號</span> 👉 分開兩個並列的長句。例：春天百花開；秋天落葉飛。</p>
                </div>
            `,
            'r-rhet-meta': `
                <div class="text-center mb-4"><span class="text-6xl">🍎 👦🏻</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">比喻三兄弟：明喻、暗喻、借喻</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-amber-800 text-lg">👦🏻 明喻 (明顯的比喻)</p>
                        <p class="text-slate-700">特徵：有「<span class="text-amber-600 font-bold">像、好像、宛如</span>」。<br>例：弟弟的臉蛋<span class="text-amber-600 font-bold">像</span>紅蘋果。</p>
                    </div>
                    <hr class="border-amber-200">
                    <div>
                        <p class="font-black text-orange-800 text-lg">🕵️‍♂️ 暗喻 (暗中的比喻)</p>
                        <p class="text-slate-700">特徵：沒有「像」，用「<span class="text-orange-600 font-bold">是、變成</span>」。<br>例：弟弟的臉蛋<span class="text-orange-600 font-bold">是</span>紅蘋果。</p>
                    </div>
                    <hr class="border-amber-200">
                    <div>
                        <p class="font-black text-rose-800 text-lg">🥷 借喻 (最高級的比喻)</p>
                        <p class="text-slate-700">特徵：<span class="text-rose-600 font-bold">不寫出本體，直接用喻體代替</span>。<br>例：那個<span class="text-rose-600 font-bold">紅蘋果</span>(指弟弟的臉)真可愛。</p>
                    </div>
                </div>
            `,
            'r-rhet-person': `
                <div class="text-center mb-4"><span class="text-6xl">🌸 🐘</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">擬人 VS 誇張</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-emerald-800 text-lg">💃 擬人 (死物變活人)</p>
                        <p class="text-slate-700">把東西當作人，給它<span class="font-bold text-emerald-600">人的動作或感情</span>。<br>例：桃花開心地<span class="text-emerald-600 font-bold bg-white px-1 rounded">笑了</span>。</p>
                    </div>
                    <hr class="border-emerald-200">
                    <div>
                        <p class="font-black text-indigo-800 text-lg">🐘 誇張 (吹牛皮)</p>
                        <p class="text-slate-700">故意把事情<span class="font-bold text-indigo-600">放大或縮小</span>到不合常理。<br>例：這個課室小得<span class="text-indigo-600 font-bold bg-white px-1 rounded">只有巴掌大</span>。</p>
                    </div>
                </div>
            `,
            'r-rhet-struct': `
                <div class="text-center mb-4"><span class="text-6xl">❓ ❗</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">排比、設問 與 反問</p>
                <div class="bg-cyan-50 p-4 rounded-xl border-2 border-cyan-200 mb-3 space-y-3">
                    <p class="text-lg"><span class="bg-white font-black text-cyan-700 border border-cyan-300 px-2 py-1 rounded">排比</span> 👉 連續 <span class="font-bold text-cyan-600">三個或以上</span> 結構相同的句子。<br>例：書本是海洋，是鑰匙，是導師。</p>
                    <p class="text-lg"><span class="bg-white font-black text-teal-700 border border-teal-300 px-2 py-1 rounded">設問</span> 👉 自己問，<span class="font-bold text-teal-600">自己答</span>。<br>例：什麼是快樂？快樂是助人。</p>
                    <p class="text-lg"><span class="bg-white font-black text-rose-700 border border-rose-300 px-2 py-1 rounded">反問</span> 👉 只問不答，答案就在問題裡 (常用<span class="font-bold text-rose-600">難道</span>)。<br>例：難道我們不該環保嗎？</p>
                </div>
            `
        };

        window.showTutorial = function(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId];
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        };

        window.closeTutorial = function() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    window.startQuestion(targetIdx, true); 
                }
            }, 300);
        };

        // ================= 3. 基礎標點與修辭題庫 (160題 全解析版) =================
        const categories = [
            { id: 'r-punc-adv', title: '🔴 進階標點符號辨析 (40題)', color: 'rose' },
            { id: 'r-rhet-meta', title: '🟠 比喻三兄弟辨析 (40題)', color: 'orange' },
            { id: 'r-rhet-person', title: '🟢 擬人與誇張辨析 (40題)', color: 'emerald' },
            { id: 'r-rhet-struct', title: '🔵 排比與問句辨析 (40題)', color: 'blue' }
        ];

        // 🌟 資料產生器：將精簡陣列轉為完整物件，並自動綁定通用解釋
        window.formatData = function(pool, category, task) {
            return pool.map(item => {
                let correctOpt = item[1];
                let w1 = item[2];
                let w2 = item[3];
                let w3 = item[4];
                let specificExp = item[5];
                
                let exp = `✅ ${correctOpt}：${specificExp}<br>❌ ${w1}：${window.getGenericExp(w1)}<br>❌ ${w2}：${window.getGenericExp(w2)}<br>❌ ${w3}：${window.getGenericExp(w3)}`;
                
                return { category: category, task: task, sentence: item[0], correct: correctOpt, wrongs: [w1, w2, w3], explanation: exp };
            });
        };

        // --- 1. 進階標點 (40題) ---
        // 格式: [句子, 正確, 錯1, 錯2, 錯3, 具體解釋]
        const puncAdvPool = [
            ['這本___西遊記___是我最喜歡的書。', '《》', '「」', '（）', '……', '西遊記是一本書的名稱，必須用書名號。'],
            ['他大聲喊道___「快點過來！」', '：', '，', '；', '。', '在引號前面提示別人說的話，要用冒號。'],
            ['操場上有滑梯、鞦韆、攀爬架___', '……', '。', '！', '——', '表示還有很多設施沒有列舉完，用省略號。'],
            ['「這___這怎麼可能？」他結結巴巴地說。', '……', '——', '，', '。', '表示說話結巴、斷斷續續，用省略號。'],
            ['這是一列長長的火車，嗚___', '——', '……', '！', '。', '表示火車聲音的延長，用破折號。'],

            ['這裡有山，有水，有花，有草。', '排比', '設問', '反問', '借喻', '連續四個「有…」構成排比。'],
            ['明天的天氣如何？天氣預報說會下雨。', '設問', '反問', '排比', '明喻', '自問自答。'],
            ['你做錯了事，怎麼能不道歉呢？', '反問', '設問', '排比', '暗喻', '強調「必須道歉」。'],
            ['我們需要知識，需要勇氣，需要毅力。', '排比', '設問', '反問', '擬人', '連續三個「需要…」構成排比。'],
            ['是誰發明了電燈？是愛迪生。', '設問', '反問', '排比', '誇張', '自問自答。'],
            ['說謊難道能被原諒嗎？', '反問', '設問', '排比', '借喻', '強調「說謊不能被原諒」。'],
            ['風吹過樹林，吹過草地，吹過湖面。', '排比', '設問', '反問', '明喻', '連續三個「吹過…」構成排比。'],
            ['你知道這本書的作者是誰嗎？他就是魯迅。', '設問', '反問', '排比', '暗喻', '自問自答。'],
            ['這點困難算得了什麼？', '反問', '設問', '排比', '擬人', '強調「這點困難不算什麼」。'],
            ['童年是美好的，是純真的，是快樂的。', '排比', '設問', '反問', '誇張', '三個句式相同的短句排列。'],
            ['為什麼要學習？為了擁有更好的未來。', '設問', '反問', '排比', '借喻', '自問自答。'],
            ['難道這不是大家的責任嗎？', '反問', '設問', '排比', '明喻', '強調「這是大家的責任」。'],
            ['我喜歡唱歌，喜歡跳舞，喜歡畫畫。', '排比', '設問', '反問', '暗喻', '連續三個「喜歡…」構成排比。'],
            ['這個魔術是怎麼變的？讓我來告訴你。', '設問', '反問', '排比', '擬人', '自問自答。'],
            ['我們怎能欺負弱小呢？', '反問', '設問', '排比', '誇張', '強調「不能欺負弱小」。'],
            ['天上的星星，亮亮的，閃閃的，美美的。', '排比', '設問', '反問', '借喻', '三個結構相似的詞語排列。'],
            ['誰是我們班的班長？是小明。', '設問', '反問', '排比', '明喻', '自問自答。'],
            ['隨地吐痰難道是有公德心的表現嗎？', '反問', '設問', '排比', '暗喻', '強調「隨地吐痰沒有公德心」。'],
            ['秋天帶來了涼爽，帶來了豐收，帶來了喜悅。', '排比', '設問', '反問', '擬人', '連續三個「帶來了…」構成排比。'],
            ['這部電影好看嗎？我覺得非常精彩。', '設問', '反問', '排比', '誇張', '自問自答。'],
            ['這麼簡單的問題，你怎麼會不懂呢？', '反問', '設問', '排比', '借喻', '強調「你應該懂」。']
        ];

        const rawQuestDataObj = [
            ...window.formatData(puncAdvPool, 'r-punc-adv', '進階標點：選出適合放在 ___ 位置的標點符號。'),
            ...window.formatData(metaAdvPool, 'r-rhet-meta', '比喻辨析：這句話運用了哪種修辭手法？'),
            ...window.formatData(personHyperPool, 'r-rhet-person', '修辭辨析：這句話運用了哪種修辭手法？'),
            ...window.formatData(structPool, 'r-rhet-struct', '句型辨析：這句話運用了哪種修辭手法？')
        ];

        let userProgress = JSON.parse(localStorage.getItem('rhetStdProgress')) || new Array(rawQuestDataObj.length).fill(0);

        window.renderDirectory = function() {
            const dirContainer = document.getElementById('directory-content');
            let html = '';
            categories.forEach(cat => {
                let hasQuestions = rawQuestDataObj.some(q => q.category === cat.id);
                if (hasQuestions) {
                    html += `
                        <div class="mb-6">
                            <div class="flex items-center justify-between border-b-2 border-${cat.color}-100 pb-2 mb-3">
                                <h3 class="text-xl font-bold text-${cat.color}-700">${cat.title}</h3>
                                <button onclick="window.showTutorial('${cat.id}')" class="bg-cyan-100 text-cyan-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-cyan-300 hover:bg-cyan-200 transition flex items-center gap-1 active:scale-95">📘 學習錦囊</button>
                            </div>
                            <div class="flex flex-wrap gap-3">
                    `;
                    rawQuestDataObj.forEach((q, idx) => {
                        if(q.category === cat.id) {
                            let status = userProgress[idx];
                            let btnClass = 'bg-white border-slate-300 text-slate-500 hover:bg-slate-50';
                            let icon = (idx + 1);

                            if (status === 1) {
                                btnClass = 'bg-yellow-100 border-yellow-400 text-yellow-700 shadow-inner';
                                icon = '🌟';
                            } else if (status === 2) {
                                btnClass = 'bg-emerald-100 border-emerald-400 text-emerald-700 shadow-inner';
                                icon = '✅';
                            } else if (status === -1) {
                                btnClass = 'bg-rose-100 border-rose-400 text-rose-700 shadow-inner';
                                icon = '❌';
                            }

                            html += `<button onclick="window.startQuestion(${idx})" class="lvl-btn ${btnClass} w-12 h-12 lg:w-14 lg:h-14 rounded-xl font-black text-base lg:text-lg border-b-4 flex items-center justify-center shadow-sm transition-transform">${icon}</button>`;
                        }
                    });
                    html += `</div></div>`;
                }
            });
            dirContainer.innerHTML = html;
            window.updateTotalProgress();
        };

        window.updateTotalProgress = function() {
            let solved = userProgress.filter(p => p === 1 || p === 2).length;
            let percent = (solved / rawQuestDataObj.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        };

        window.shuffleOptions = function(correct, wrongs) {
            let opts = [ { text: correct, isCorrect: true } ];
            if (Array.isArray(wrongs)) {
                wrongs.forEach(w => {
                    if (w !== undefined && w !== null) {
                        opts.push({ text: String(w), isCorrect: false });
                    }
                });
            }
            return opts.sort(() => Math.random() - 0.5);
        };

        window.startQuestion = function(idx, forceStart = false) {
            const qData = rawQuestDataObj[idx];
            const qType = qData.category;
            
            if (!forceStart && !localStorage.getItem('tut_seen_' + qType)) {
                pendingQuestionIdx = idx; 
                window.showTutorial(qType);      
                return;                   
            }

            currentQuestionMistakes = 0; 
            currentQuestionIdx = idx;
            window.currentHints = []; 
            
            document.getElementById('quest-directory').style.display = 'none';
            const questPlay = document.getElementById('quest-play');
            questPlay.style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;
            
            const qCatTitle = categories.find(c => c.id === qType).title;
            const options = window.shuffleOptions(qData.correct, qData.wrongs);

            let ttsText = qData.sentence.replace(/___/g, '什麼');
            let sentenceHtml = qData.sentence.replace(/___/g, '<span class="text-cyan-600 border-b-4 border-cyan-500 px-6 font-black bg-cyan-50 inline-block mx-1">?</span>');

            let html = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="window.backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-cyan-100 text-cyan-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">第 ${idx + 1} 題 / 共 160 題</span>
                </div>
                
                <div class="slide-up w-full bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-cyan-600 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">
                        ${qCatTitle}
                    </span>
                    
                    <div class="w-full flex items-center gap-3 mt-4 mb-6">
                        <span class="bg-cyan-100 text-cyan-800 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">任務</span>
                        <h2 class="text-lg md:text-xl font-bold text-slate-700">${qData.task}</h2>
                    </div>

                    <div class="w-full flex items-start gap-4 mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-inner mt-2">
                        <button onclick="window.speakText('${ttsText.replace(/'/g, "\\'")}')" class="tts-btn flex-shrink-0 bg-white text-cyan-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-cyan-200 mt-1">🔊</button>
                        <div class="text-2xl md:text-3xl font-bold text-slate-800 leading-loose">${sentenceHtml}</div>
                    </div>

                    <div class="flex flex-col gap-3 w-full max-w-2xl mt-auto" id="options-container">
            `;
            
            // 標點符號的按鈕特別放大，修辭則是普通文字
            let isPunc = qType.includes('punc');
            let textClass = isPunc ? 'text-4xl md:text-5xl pb-6 pt-3' : 'text-2xl md:text-3xl py-6';

            options.forEach((optItem, oIdx) => {
                const isCorr = optItem.isCorrect;
                const letter = ['A','B','C','D'][oIdx];
                const safeOpt = optItem.text.replace(/'/g, "\\'");
                html += `
                <div class="flex items-stretch gap-2 w-full">
                    <button onclick="window.checkAnswer(this, ${isCorr}, '${safeOpt}')" class="option-btn flex-1 bg-white border-4 border-slate-200 text-slate-700 font-bold ${textClass} rounded-2xl hover:bg-cyan-50 hover:border-cyan-300 transition text-left flex items-center gap-4 px-6">
                        <span class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 mt-0.5">${letter}</span> 
                        <span class="leading-relaxed break-words option-text-span">${optItem.text}</span>
                    </button>
                    <button onclick="window.speakText(window.getTTSOptionText(this.previousElementSibling.querySelector('.option-text-span').innerText), 0.95)" class="tts-btn flex-shrink-0 bg-cyan-50 text-cyan-600 w-16 rounded-2xl text-3xl flex items-center justify-center shadow-sm border-2 border-cyan-200 hover:bg-cyan-100 transition" title="朗讀此選項">🔊</button>
                </div>`;
            });
            
            html += `
                    </div>
                    <!-- 💡 動態提示框 -->
                    <div id="dynamic-hint-box" class="hidden w-full max-w-2xl mt-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm text-yellow-800 font-bold text-lg flex items-start gap-3 slide-up">
                        <div class="flex-1 space-y-2" id="hint-text"></div>
                        <button id="hint-tts-btn" class="text-2xl hover:scale-110 transition bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>
                    </div>
                </div>
            `;
            document.getElementById('quest-play').innerHTML = html;
        };

        window.backToDirectory = function() {
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            window.renderDirectory();
        };

        window.checkAnswer = function(btnElement, isCorrect, clickedOptText) {
            const allBtns = document.querySelectorAll('.option-btn');
            const qData = rawQuestDataObj[currentQuestionIdx];
            
            if (isCorrect) {
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                btnElement.classList.add('correct');
                const expText = qData.explanation; 
                
                let completeSentence = qData.sentence.replace('___', clickedOptText);
                window.speakText("答對了！" + completeSentence);
                
                let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
                let previousStatus = userProgress[currentQuestionIdx];
                let expGained = 0;

                if (previousStatus !== 1 && previousStatus !== 2) {
                    expGained = finalStatus === 1 ? 20 : 10;
                } else if (previousStatus === 2 && finalStatus === 1) {
                    expGained = 10; 
                }

                if (expGained > 0) {
                    stdExp += expGained;
                    localStorage.setItem('rhetStdExp', stdExp);
                    document.getElementById('exp-display').innerText = stdExp;
                    document.getElementById('exp-display').classList.add('pop');
                    setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                }

                if (finalStatus === 1 || previousStatus !== 1) {
                    userProgress[currentQuestionIdx] = finalStatus;
                    localStorage.setItem('rhetStdProgress', JSON.stringify(userProgress));
                }

                let modalIcon = finalStatus === 1 ? '🌟' : '✅';
                let modalTitle = finalStatus === 1 ? '太棒了！一次答對！' : '成功找出正解！';
                let expMsg = expGained > 0 
                    ? `<span class="text-cyan-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                    : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
                
                // 🔥 全選項深度解析
                let combinedDesc = expMsg + `
                    <div class="bg-cyan-50 border-l-4 border-cyan-500 p-4 text-left text-cyan-900 rounded-r-lg font-bold">
                        <div class="flex justify-between items-center mb-3 pb-2 border-b border-cyan-200">
                            <span class="text-xl">📚 選項全解析</span>
                            <button onclick="window.speakText('${expText.replace(/'/g, "\\'")}')" class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm hover:bg-cyan-100 text-xl transition active:scale-95">🔊</button>
                        </div>
                        <div class="space-y-3 text-base leading-relaxed">${expText}</div>
                    </div>`;

                setTimeout(() => { window.showModal(modalIcon, modalTitle, combinedDesc); }, 800);
            } else {
                // ❌ 答錯邏輯：動態累積提示
                btnElement.classList.add('wrong', 'shake');
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('rhetStdProgress', JSON.stringify(userProgress));
                
                // 找出被點擊選項的解釋
                let lines = qData.explanation.split('<br>');
                let matchedLine = lines.find(l => l.includes(clickedOptText));
                let newHint = "請再仔細想一想喔！";
                
                if (matchedLine) {
                    newHint = matchedLine.replace(/^[✅❌]\s*/, ''); 
                }

                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(newHint)) {
                    window.currentHints.push(newHint);
                }

                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-2 mb-2 last:border-0 last:pb-0 last:mb-0">💡 ${h}</div>`).join('');
                
                document.getElementById('hint-text').innerHTML = combinedHintsHtml;
                document.getElementById('hint-tts-btn').onclick = () => window.speakText(window.currentHints.join('。'));
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                window.speakText("不對喔，" + newHint);
                
                setTimeout(() => {
                    btnElement.classList.remove('shake');
                }, 500);
            }
        };

        window.showModal = function(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    let nextIdx = currentQuestionIdx + 1;
                    if (nextIdx < rawQuestDataObj.length) window.startQuestion(nextIdx);
                    else { window.showToast("恭喜完成所有挑戰！"); window.backToDirectory(); }
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        };

        window.backToDirectoryFromModal = function() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                window.backToDirectory();
            }, 300);
        };

        window.onload = function() {
            document.getElementById('exp-display').innerText = stdExp;
            window.renderDirectory();
        };
    </script>
</body>
