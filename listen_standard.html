<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聆聽與說話 - 標準常規特訓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #eff6ff; -webkit-tap-highlight-color: transparent; }
        .bg-grid-pattern { background-image: linear-gradient(to right, #e0e7ff 1px, transparent 1px), linear-gradient(to bottom, #e0e7ff 1px, transparent 1px); background-size: 40px 40px; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #93c5fd; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #eff6ff; border-color: #3b82f6; color: #1e3a8a; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }
        
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .tab-inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }
        
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg { visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }

        /* 標籤顏色區分 */
        .tag-infer { background-color: #e0e7ff; color: #3730a3; border-color: #a5b4fc; }
        .tag-tone { background-color: #fce7f3; color: #9d174d; border-color: #fbcfe8; }
        .tag-main { background-color: #fef3c7; color: #b45309; border-color: #fde68a; }
        .tag-detail { background-color: #d1fae5; color: #065f46; border-color: #6ee7b7; }
        
        /* 過渡詞序列卡片 */
        .seq-card { background: white; border: 2px solid #cbd5e1; border-radius: 1rem; padding: 1rem; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .seq-arrow { position: absolute; right: -1.25rem; top: 50%; transform: translateY(-50%); font-size: 1.5rem; color: #94a3b8; z-index: 10; }
        @media (max-width: 768px) {
            .seq-arrow { right: 50%; top: auto; bottom: -1.5rem; transform: translateX(50%) rotate(90deg); }
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 (Blue 配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-blue-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-blue-700 p-1 rounded transition bg-blue-800">⬅️ 返回</a>
                <span>🗣️ 聆聽與說話 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-blue-800 px-3 py-1.5 rounded-full border border-blue-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('listen')" id="tab-listen" class="tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-blue-600">🎧 聆聽推論 (弦外之音)</button>
            <button onclick="switchMode('speak')" id="tab-speak" class="tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200">🗣️ 看圖說話 (邏輯連貫)</button>
        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <!-- 聆聽推論目錄 -->
        <div id="listen-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="listen-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2">🎧 弦外之音盲聽挑戰</h2>
                    <button onclick="showTutorial('t-infer')" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-blue-300 hover:bg-blue-200 transition">📘 學習錦囊</button>
                </div>
                <p class="text-slate-600 font-bold mb-4">不再只是找答案！請仔細聆聽，推斷角色的「心情、語氣」與故事的「深刻道理」。</p>
                <div id="listen-content" class="flex flex-wrap gap-4"></div>
            </div>
            
            <div id="listen-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- 看圖順序說話目錄 -->
        <div id="speak-mode" class="w-full max-w-5xl mx-auto hidden flex-col gap-4 lg:gap-6">
            <div id="speak-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2">🗣️ 順序連貫說話特訓</h2>
                    <button onclick="showTutorial('t-connect')" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-blue-300 hover:bg-blue-200 transition">📘 學習錦囊</button>
                </div>
                <p class="text-slate-600 font-bold mb-4">根據 4 張圖片的順序，運用「首先、接著、然後、最後」連貫地說出一個好故事！</p>
                <div id="speak-content" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="speak-play" class="w-full hidden flex-col items-center"></div>
        </div>

    </div>

    <!-- 學習錦囊 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform duration-300 flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-blue-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-blue-600 flex items-center gap-2">📘 聆聽與說話錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 pointer-events-none">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-sm text-center transform scale-90 transition-transform duration-300 pointer-events-auto" id="feedback-content">
            <div class="text-7xl mb-4">🎉</div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">精準推斷！</h2>
            <p id="feedback-desc" class="text-blue-600 font-bold mb-6 text-xl leading-relaxed">成功捕捉弦外之音！</p>
            <div class="flex gap-3 w-full mt-4">
                <button id="next-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-lg transition text-xl border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態與語音 =================
        let stdExp = parseInt(localStorage.getItem('listenStandardExp')) || 0;
        document.getElementById('exp-display').innerText = stdExp;
        
        let currentMode = 'listen'; 
        let currentStoryIdx = -1;
        let currentQuestionIdx = -1;
        let storyUtterance = null; 
        let pendingTaskIdx = -1;
        let pendingTaskType = '';

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message; toast.className = "toast-msg show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // 強制廣東話 (zh-HK)
        function speakText(text, rate = 0.85) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-HK'; 
                msg.rate = rate; 
                window.speechSynthesis.speak(msg);
            }
        }

        // 播放與停止廣播
        function playStoryTTS() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const story = listenData[currentStoryIdx];
                let cleanText = story.text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】]/g, '').replace(/&nbsp;/g, ' ');
                
                storyUtterance = new SpeechSynthesisUtterance(cleanText);
                storyUtterance.lang = 'zh-HK'; 
                storyUtterance.rate = 0.85; 

                storyUtterance.onstart = function() {
                    document.getElementById('btn-play-story').classList.add('hidden');
                    document.getElementById('btn-stop-story').classList.remove('hidden');
                };
                storyUtterance.onend = function() {
                    document.getElementById('btn-play-story').classList.remove('hidden');
                    document.getElementById('btn-stop-story').classList.add('hidden');
                };
                storyUtterance.onerror = function() {
                    document.getElementById('btn-play-story').classList.remove('hidden');
                    document.getElementById('btn-stop-story').classList.add('hidden');
                };

                window.speechSynthesis.speak(storyUtterance);
            } else {
                showToast("您的瀏覽器不支援語音功能。");
            }
        }

        function stopStoryTTS() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const btnPlay = document.getElementById('btn-play-story');
                const btnStop = document.getElementById('btn-stop-story');
                if (btnPlay && btnStop) {
                    btnPlay.classList.remove('hidden');
                    btnStop.classList.add('hidden');
                }
            }
        }

        // ================= 2. 教學內容 =================
        const tutorialData = {
            't-infer': `
                <div class="text-center mb-4"><span class="text-6xl">🎭 🕵️‍♂️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">聽出「弦外之音」</p>
                <p class="mb-4 text-slate-600">到了呈分試，答案不會直接告訴你！你要像偵探一樣推斷：</p>
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200 mb-3 space-y-3 font-bold text-blue-900">
                    <p>💡 <span class="bg-white px-2 py-1 rounded shadow-sm text-blue-600">聽語氣</span> 👉 如果他說話結結巴巴，可能代表<span class="text-rose-500">心虛或害怕</span>。</p>
                    <p>💡 <span class="bg-white px-2 py-1 rounded shadow-sm text-blue-600">聽動作</span> 👉 狠狠地摔門，代表他<span class="text-rose-500">非常生氣</span>。</p>
                    <p>💡 <span class="bg-white px-2 py-1 rounded shadow-sm text-blue-600">聽結果</span> 👉 故事最後發生的事，通常隱藏著<span class="text-emerald-600">文章的主旨和道理</span>。</p>
                </div>
            `,
            't-connect': `
                <div class="text-center mb-4"><span class="text-6xl">🔗 🗣️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">讓故事變通順的「過渡詞」</p>
                <p class="mb-4 text-slate-600">看圖說話時，如果只是一張張分開說，會顯得支離破碎。我們要用「過渡詞」把它們串起來！</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 space-y-2 text-base font-bold text-slate-700">
                    <p>圖一 👉 加上 <span class="bg-white text-amber-600 px-2 rounded">首先 / 剛開始</span></p>
                    <p>圖二 👉 加上 <span class="bg-white text-orange-600 px-2 rounded">接著 / 後來</span></p>
                    <p>圖三 👉 加上 <span class="bg-white text-rose-500 px-2 rounded">然後 / 突然</span></p>
                    <p>圖四 👉 加上 <span class="bg-white text-blue-600 px-2 rounded">最後 / 終於</span></p>
                </div>
            `
        };

        function showTutorial(tutKey) {
            document.getElementById('tutorial-body').innerHTML = tutorialData[tutKey];
            const modal = document.getElementById('tutorial-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); document.getElementById('tutorial-content').classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + tutKey, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingTaskIdx !== -1) {
                    let targetIdx = pendingTaskIdx;
                    let targetType = pendingTaskType;
                    pendingTaskIdx = -1;
                    pendingTaskType = '';
                    if (targetType === 'listen') startListen(targetIdx, true);
                    else if (targetType === 'speak') startSpeak(targetIdx, true);
                }
            }, 300);
        }

        function updateTotalProgress() {
            let lDone = listenProgress.filter(p => p === 1).length;
            let sDone = speakProgress.filter(p => p === 1).length;
            let total = listenData.length + speakData.length;
            let percent = ((lDone + sDone) / total) * 100;
            const pb = document.getElementById('progress-bar');
            if (pb) pb.style.width = percent + '%';
        }

        function switchMode(mode) {
            stopStoryTTS();
            currentMode = mode;
            const tL = document.getElementById('tab-listen'), tS = document.getElementById('tab-speak');
            const mL = document.getElementById('listen-mode'), mS = document.getElementById('speak-mode');
            
            if(mode === 'listen') {
                tL.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-blue-600";
                tS.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                mL.style.display = 'flex'; mS.style.display = 'none';
                document.getElementById('listen-play').style.display = 'none';
                document.getElementById('listen-directory').style.display = 'block';
                renderListenDirectory();
            } else {
                tS.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-blue-600";
                tL.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                mL.style.display = 'none'; mS.style.display = 'flex';
                document.getElementById('speak-play').style.display = 'none';
                document.getElementById('speak-directory').style.display = 'block';
                renderSpeakDirectory();
            }
            updateTotalProgress();
        }

        // ================= 3. 聆聽推論題庫 (10篇, 每篇5題) =================
        const listenData = [
            {
                title: '打破花瓶', text: '媽媽出門前叮囑小明別在客廳踢球。小明沒有聽話，一腳把球踢到了櫃子上，「哐啷」一聲，媽媽最心愛的花瓶碎了一地。小明嚇得臉都白了。媽媽回來後，小明低著頭，小聲地說：「媽媽，對不起，是我打破了花瓶。」媽媽看著一地的碎片，深吸了一口氣，摸著小明的頭說：「花瓶碎了雖然可惜，但你願意誠實認錯，這比花瓶更珍貴。」',
                qs: [
                    { t: '推論細節', cls: 'tag-infer', q: '「哐啷」一聲代表什麼事情發生了？', opts: ['外面打雷了', '小明踢破了花瓶', '媽媽生氣了', '門被關上了'], ans: 1 },
                    { t: '人物心理', cls: 'tag-infer', q: '小明「嚇得臉都白了」，這反映他當時什麼心理？', opts: ['覺得很冷', '非常害怕被責罵', '覺得很好玩', '生病了'], ans: 1 },
                    { t: '語氣判斷', cls: 'tag-tone', q: '小明「低著頭，小聲地說」，這表現出他怎樣的態度？', opts: ['理直氣壯', '感到羞愧和內疚', '非常驕傲', '不以為然'], ans: 1 },
                    { t: '動作推論', cls: 'tag-infer', q: '媽媽「深吸了一口氣」再說話，這動作暗示了什麼？', opts: ['媽媽覺得客廳很香', '媽媽在努力平復自己生氣的情緒', '媽媽準備大聲罵人', '媽媽覺得很累'], ans: 1 },
                    { t: '主旨歸納', cls: 'tag-main', q: '這篇故事主要想告訴我們什麼道理？', opts: ['客廳不能踢球', '花瓶很昂貴', '誠實認錯的品格比打破的物品更珍貴', '媽媽脾氣很好'], ans: 2 }
                ]
            },
            {
                title: '忘記帶功課', text: '小美來到學校，打開書包準備交功課，卻發現數學作業不見了。她急得像熱鍋上的螞蟻，眼淚在眼眶裡打轉：「糟糕！昨天明明放在桌子上的，一定是忘記放進書包了，老師一定會罵我的！」同桌小強見狀，立刻拿出借來的手機說：「別急，趕快打電話請你媽媽送過來吧。」',
                qs: [
                    { t: '修辭理解', cls: 'tag-infer', q: '「急得像熱鍋上的螞蟻」是形容小美怎樣？', opts: ['覺得天氣很熱', '非常焦急、慌亂無措', '覺得被螞蟻咬', '跑得很快'], ans: 1 },
                    { t: '人物心理', cls: 'tag-infer', q: '小美眼淚在眼眶裡打轉，主要是因為什麼？', opts: ['眼睛進了沙子', '害怕因為忘帶功課而被老師責罵', '和同學吵架了', '不想上學'], ans: 1 },
                    { t: '細節推斷', cls: 'tag-detail', q: '小美的功課最可能在哪裡？', opts: ['被小狗吃了', '留在家裡的桌子上', '掉在路上', '被同學拿走了'], ans: 1 },
                    { t: '人物評價', cls: 'tag-infer', q: '小強的行為說明他是一個怎樣的人？', opts: ['喜歡玩手機', '多管閒事', '熱心助人、能冷靜解決問題', '喜歡看熱鬧'], ans: 2 },
                    { t: '結果推論', cls: 'tag-infer', q: '如果媽媽把功課送來了，小美接下來最可能做什麼？', opts: ['繼續哭泣', '向小強和媽媽道謝，並交上功課', '把功課扔掉', '逃學回家'], ans: 1 }
                ]

                let borderClass = 'border-slate-200';
                let icon = ' <span class="text-slate-400 font-bold ml-2"># 未挑戰</span>';

                        <h3 class="text-lg font-black text-slate-800">${item.title}</h3>
                    </button>
                `;
            });
            dirContainer.innerHTML = html;

                    <!-- 🌟 原生廣東話播放器 -->
                    <div class="w-full bg-slate-800 text-white rounded-2xl p-6 text-center mb-6 shadow-inner relative overflow-hidden flex flex-col items-center justify-center min-h-[160px]">
                        <div class="absolute inset-0 opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiPjxwYXRoIGQ9Ik0xMiAyYTMgMyAwIDAgMCAzIDN2N2EzIDMgMCAwIDEtNiAweiIvPjxwYXRoIGQ9Ik0xOSAxbS0yIDJhMiAyIDAgMCAxIDQgMHYyYTIgMiAwIDAgMS00IDB6Ii8+PHBhdGggZD0iTTIyIDEydjFhMTAgMTAgMCAwIDEtMjAgMHYtMSIvPjxwb2x5Z29uIHBvaW50cz0iMTQgMTcgMTIgMjAgMTAgMTciLz48L3N2Zz4=')] bg-center bg-no-repeat bg-[length:100px_100px]"></div>
                        <h3 class="text-xl font-bold mb-4 relative z-10 text-slate-300">請聆聽廣播後推斷答案</h3>
                        
                        <div class="relative z-10 flex gap-4 justify-center w-full">
                            <button id="btn-play-story" onclick="playStoryTTS()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-full text-xl font-bold flex items-center justify-center shadow-lg pop border-4 border-blue-400 transition">▶️ 播放故事</button>
                            <button id="btn-stop-story" onclick="stopStoryTTS()" class="bg-slate-600 hover:bg-slate-500 text-white px-6 py-3 rounded-full text-xl font-bold flex items-center justify-center shadow-lg transition hidden">⏹️ 停止廣播</button>
                        </div>
                    </div>

                    <div class="w-full flex items-center gap-3 mb-4">
                        <span class="${qData.cls} px-3 py-1 rounded-lg text-sm font-bold border-2">${qTitle}</span>
                    </div>

                    <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-6 w-full flex items-start gap-2">
                        <button onclick="speakText('${qData.q}')" class="tts-btn flex-shrink-0 bg-blue-50 text-blue-500 w-10 h-10 rounded-full text-xl flex items-center justify-center shadow-sm border border-blue-200 mt-1">🔊</button>
                        <span>${qData.q}</span>
                    </h3>

                    <div class="flex flex-col gap-3 w-full" id="options-container">
            `;

            qOpts.forEach((opt, oIdx) => {
                const isCorr = (oIdx === qData.ans);
                html += `<div class="flex gap-2 w-full"><button onclick="checkListenAnswer(this, ${isCorr})" class="option-btn bg-white border-2 border-slate-200 text-slate-700 text-lg font-bold py-4 px-6 rounded-2xl hover:bg-slate-50 transition w-full text-left flex-1">${opt}</button><button onclick="speakText('${opt}')" class="tts-btn flex-shrink-0 bg-blue-50 text-blue-500 w-14 rounded-2xl text-2xl flex items-center justify-center shadow-sm border border-blue-200 hover:bg-blue-100 transition">🔊</button></div>`;
            });

            html += `</div></div>`;
            document.getElementById('listen-play').innerHTML = html;
        }

        function checkListenAnswer(btn, isCorr) {
            stopStoryTTS(); 
            const allBtns = document.querySelectorAll('#options-container .option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');
            
            if (isCorr) {
                btn.classList.add('correct');
                speakText("推斷正確！");
                
                setTimeout(() => {
                    if (currentQuestionIdx < 4) {
                        currentQuestionIdx++;
                        renderListenQuestion();
                    } else {
                        if (listenProgress[currentStoryIdx] !== 1) {
                            stdExp += 30;
                            localStorage.setItem('listenStandardExp', stdExp);
                            document.getElementById('exp-display').innerText = stdExp;
                            listenProgress[currentStoryIdx] = 1;
                            localStorage.setItem('listenStandardProgress', JSON.stringify(listenProgress));
                        }
                        
                        document.getElementById('feedback-desc').innerText = "你成功聽出了所有的弦外之音！獲得 30 EXP！";
                        const modal = document.getElementById('feedback-modal');
                        const content = document.getElementById('feedback-content');
                        
                        modal.classList.remove('hidden');
                        setTimeout(() => {
                            modal.classList.remove('opacity-0');
                            content.classList.remove('scale-90');
                        }, 10);
                        
                        document.getElementById('next-btn').onclick = () => {
                            modal.classList.add('opacity-0');
                            content.classList.add('scale-90');
                            setTimeout(() => {
                                modal.classList.add('hidden');
                                switchMode('listen');
                            }, 300);
                        };
                    }
                }, 1000);
            } else {
                btn.classList.add('wrong', 'shake');
                speakText("推斷有誤喔，請再仔細聽一次！");
                setTimeout(() => {
                    btn.classList.remove('wrong', 'shake');
                    allBtns.forEach(b => { if (!b.classList.contains('correct')) b.style.pointerEvents = 'auto'; });
                }, 1500);
            }
        }

        // ================= 4. 看圖說話 (邏輯連貫) =================
        const speakData = [
            { e: ['👦🏃‍♂️', '🍌👟', '💥🤕', '😭🏥'], t: '不小心的後果', sample: '首先，小明在路上開心地奔跑。接著，他沒有注意到地上有一塊香蕉皮，一腳踩了上去。然後，他重重地摔在地上，痛得大哭起來。最後，他被送去了醫院包紮傷口。' },
            { e: ['👧🧹', '🛋️💰', '👩💬', '💖👍'], t: '拾金不昧', sample: '首先，週末早上小麗在客廳打掃。接著，她在沙發底下發現了一枚硬幣。然後，她立刻跑去把錢交給媽媽。最後，媽媽稱讚她是一個誠實的好孩子。' },
            { e: ['👨‍🍳🥚', '🔥🔥', '💨🔥', '🍲❌'], t: '煎蛋失敗', sample: '首先，爸爸在廚房裡準備煎蛋。接著，他不小心把爐火開得太大了。然後，平底鍋裡的蛋燒焦了，冒出陣陣黑煙。最後，我們晚上的餐桌上少了一道菜。' },
            { e: ['👦📖', '🪟🕊️', '👀🏃‍♂️', '📝❌'], t: '分心的代價', sample: '首先，小強正坐在書桌前認真溫習。接著，窗外飛來了一隻可愛的小鳥。然後，他忍不住跑去窗邊看鳥，把功課拋諸腦後。最後，他的功課沒有做完，被老師批評了。' },
            { e: ['☁️⛈️', '👧🌂', '🐕🌧️', '🏠❤️'], t: '雨中救狗', sample: '首先，天空突然烏雲密佈，下起了大雨。接著，小美趕緊撐開雨傘。然後，她看到一隻流浪狗在雨中發抖，便好心地幫牠遮雨。最後，小美把這隻小狗帶回家照顧。' },
            { e: ['🛒👩👦', '🧸😭', '👨❌', '🚶‍♂️😔'], t: '買玩具風波', sample: '首先，小明和媽媽去超級市場買菜。接著，小明看到一個喜歡的玩具，便吵著要買。然後，媽媽堅決地搖頭拒絕了他。最後，小明只好失望地跟著媽媽回家。' },
            { e: ['🌱💧', '☀️🌳', '🍎🍎', '😋👍'], t: '種樹的收穫', sample: '首先，農夫在春天種下一棵小樹苗，並勤力澆水。接著，在陽光的照耀下，小樹慢慢長成了大樹。然後，到了秋天，樹上結滿了紅紅的蘋果。最後，大家吃著美味的蘋果，都覺得非常滿足。' },
            { e: ['🏫🏃‍♂️', '🔔🏃‍♂️', '👨‍🏫😠', '🙇‍♂️😔'], t: '遲到的早晨', sample: '首先，哥哥早上起晚了，匆匆忙忙地跑向學校。接著，他跑到校門時，上課的鐘聲已經響起了。然後，老師看到他遲到，嚴厲地批評了他。最後，哥哥羞愧地低下頭，保證下次不敢了。' },
            { e: ['🎂🎉', '🎁🤔', '📖😕', '👩‍👦❤️'], t: '意外的禮物', sample: '首先，今天是小華的生日，家裡舉辦了派對。接著，媽媽拿出一份禮物，小華以為是玩具。然後，拆開一看原來是一本書，小華感到有些失望。最後，媽媽溫柔地解釋讀書的好處，小華終於開心地接受了。' },
            { e: ['🚴‍♂️🏞️', '🪨💥', '🤕🩹', '🤝😊'], t: '互助的友誼', sample: '首先，大雄和胖虎一起去公園騎單車。接著，大雄不小心撞到石頭跌倒了。然後，胖虎立刻停下來，幫大雄貼上膠布包紮傷口。最後，他們握手言和，友誼變得更加深厚了。' }
        ];

        let speakProgress = JSON.parse(localStorage.getItem('speakStandardProgress')) || new Array(speakData.length).fill(0);

        function renderSpeakDirectory() {
            const dirContainer = document.getElementById('speak-content');
            let html = '';
            speakData.forEach((item, idx) => {
                let status = speakProgress[idx];
                let bgClass = 'bg-white';
                let borderClass = 'border-slate-200';
                if (status === 1) { bgClass = 'bg-blue-50'; borderClass = 'border-blue-400'; }
                
                html += `
                    <button onclick="startSpeak(${idx})" class="w-full text-left p-5 rounded-2xl border-2 ${borderClass} ${bgClass} hover:shadow-md transition active:scale-95 flex flex-col items-center gap-3">
                        <div class="text-3xl tracking-widest flex gap-2">${item.e.join('➡️')}</div>
                        <h3 class="text-lg font-black text-slate-800 mt-2">${item.t}</h3>
                        ${status === 1 ? '<span class="text-blue-600 font-bold text-sm">✅ 已掌握</span>' : '<span class="text-slate-400 font-bold text-sm"># 未挑戰</span>'}
                    </button>
                `;
            });
            dirContainer.innerHTML = html;
        }

        function startSpeak(idx, forceStart = false) {
            if (!forceStart && !localStorage.getItem('tut_seen_t-connect')) {
                pendingTaskIdx = idx;
                pendingTaskType = 'speak';
                showTutorial('t-connect');
                return;
            }
            currentStoryIdx = idx;
            document.getElementById('speak-directory').style.display = 'none';
            const playArea = document.getElementById('speak-play');
            playArea.style.display = 'flex';
            
            const data = speakData[idx];
            
            let html = `
                <div class="w-full max-w-4xl flex justify-between items-center mb-4">
                    <button onclick="switchMode('speak')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-blue-100 text-blue-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">挑戰 ${idx + 1} / 10</span>
                </div>
                
                <div class="w-full max-w-4xl bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center">
                    <h2 class="text-2xl md:text-3xl font-black text-slate-800 mb-6">${data.t}</h2>
                    
                    <p class="text-slate-600 font-bold mb-4 w-full text-left">📝 請利用過渡詞，將以下 4 張圖片串聯成一個語意通順的故事：</p>
                    
                    <div class="flex flex-col md:flex-row gap-4 w-full mb-8">
            `;

            const transitions = ['首先', '接著', '然後', '最後'];
            data.e.forEach((emoji, i) => {
                html += `
                    <div class="seq-card flex-1">
                        <div class="text-slate-500 font-bold mb-2 text-sm">${transitions[i]}...</div>
                        <div class="text-6xl">${emoji}</div>
                        ${i < 3 ? '<div class="seq-arrow">➡️</div>' : ''}
                    </div>
                `;
            });

            html += `
                    </div>
                    
                    <div class="w-full bg-slate-800 text-white rounded-2xl p-6 text-center shadow-inner mt-4">
                        <h3 class="text-lg font-bold mb-4 text-slate-300">自己試著說一次後，點擊查看完美範本！</h3>
                        <button onclick="showSampleAnswer()" id="btn-show-sample" class="bg-blue-500 hover:bg-blue-600 text-white font-black px-8 py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-blue-700 active:border-b-0 active:translate-y-1">💡 查看參考故事</button>
                        
                        <div id="sample-answer-box" class="hidden mt-6 bg-slate-700 p-5 rounded-xl border border-slate-600 text-left">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-blue-400 font-bold">✨ 參考範本：</span>
                                <button onclick="speakText('${data.sample}')" class="bg-slate-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-slate-500 transition">🔊</button>
                            </div>
                            <p class="text-lg leading-relaxed text-slate-200 tracking-wide">${data.sample.replace(/(首先|接著|然後|最後)/g, '<span class="text-yellow-300 font-bold">$1</span>')}</p>
                            <button onclick="finishSpeakTask()" class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black px-8 py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1">✅ 我學會了！(獲得 20 EXP)</button>
                        </div>
                    </div>
                </div>
            `;
            playArea.innerHTML = html;
        }

        function showSampleAnswer() {
            document.getElementById('btn-show-sample').classList.add('hidden');
            document.getElementById('sample-answer-box').classList.remove('hidden');
            const sampleText = speakData[currentStoryIdx].sample;
            speakText(sampleText);
        }

        function finishSpeakTask() {
            stopStoryTTS();
            if (speakProgress[currentStoryIdx] !== 1) {
                stdExp += 20;
                localStorage.setItem('listenStandardExp', stdExp);
                document.getElementById('exp-display').innerText = stdExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                
                speakProgress[currentStoryIdx] = 1;
                localStorage.setItem('speakStandardProgress', JSON.stringify(speakProgress));
                showToast("口語練習完成！+20 EXP");
                
                if (listenProgress.filter(p=>p===1).length === listenData.length && speakProgress.filter(p=>p===1).length === speakData.length) {
                    localStorage.setItem('t_listen_2', 'true');
                }
            }
            switchMode('speak');
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = stdExp;
            switchMode('listen');
        }
    </script>
</body>
</html>
