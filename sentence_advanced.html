<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>句子與語法 - 拔尖擴充挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #fff1f2; /* 寶石淺紅背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #ffe4e6 1px, transparent 1px), linear-gradient(to bottom, #ffe4e6 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #fda4af; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #fff1f2; border-color: #e11d48; color: #9f1239; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #f1f5f9; border-color: #94a3b8; color: #475569; opacity: 0.6; pointer-events: none; }
        
        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }

        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #e11d48; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden bg-grid-pattern">

    <!-- 頂部導覽列 -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-rose-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-rose-700 p-1 rounded transition bg-rose-800">⬅️ 返回</a>
                <span>🚀 句子與語法 (拔尖版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-rose-800 px-3 py-1.5 rounded-full border border-rose-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth" id="main-scroll-area">
        
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <!-- 目錄 -->
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🚀 複雜句型特訓地圖</h2>
                
                <div class="bg-rose-50 border border-rose-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-rose-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+30)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 嘗試後答對 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-slate-200 border-2 border-slate-400 flex items-center justify-center text-lg shadow-sm">❌</span> 未完成</div>
                    </div>
                </div>

                <div id="directory-content" class="flex flex-col gap-8">
                    <!-- 目錄動態生成 -->
                </div>
            </div>
            
            <!-- 答題區 -->
            <div id="quest-play" class="w-full hidden flex-col items-center">
                <!-- 題目動態生成 -->
            </div>
        </div>
    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-rose-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-rose-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="window.closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4">
                <!-- 教學內容動態載入 -->
            </div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="window.closeTutorial()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-rose-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 反饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-lg text-center transform scale-90 transition-transform" id="feedback-content">
            <div id="feedback-icon" class="text-7xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-3xl font-black text-slate-800 mb-2">精準答對！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-6 text-lg leading-relaxed text-center"></div>
            <div class="flex gap-3 w-full mt-4 border-t border-slate-100 pt-4">
                <button onclick="window.backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-rose-600 hover:bg-rose-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-rose-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心設定 =================
        let sentAdvExp = parseInt(localStorage.getItem('sentAdvExp_v2')) || 0;
        document.getElementById('exp-display').innerText = sentAdvExp;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1;
        let currentQuestionIdx = -1;

        window.currentHints = [];

        window.cleanTextForSpeech = function(text) {
            if(!text) return "";
            return text.replace(/___/g, '什麼')
                       .replace(/<br\s*\/?>/gi, '。')
                       .replace(/<[^>]*>?/gm, '')
                       .replace(/[✅❌💡【】_]/g, '')
                       .replace(/&nbsp;/g, ' ')
                       .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDC00-\uDFFF]/g, ''); 
        };

        window.speakText = function(text, rate = 0.95) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(window.cleanTextForSpeech(text));
                msg.lang = 'zh-HK';
                msg.rate = rate; 
                window.speechSynthesis.speak(msg);
            }
        };

        window.showToast = function(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        };

        // ================= 1.5 學習錦囊內容 (教學資源庫) =================
        const tutorialContents = {
            's-adv-direct': `
                <div class="text-center mb-4"><span class="text-6xl">🗣️ ➡️ 👥</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">直接敘述 轉換為 間接敘述</p>
                <p class="mb-4 text-slate-600">當我們要轉述別人說的話時，就像一個小記者，記住「變身三部曲」：</p>
                <div class="bg-rose-50 p-4 rounded-xl border-2 border-rose-200 mb-3 space-y-3">
                    <p class="text-lg"><span class="bg-white font-black text-rose-700 border border-rose-300 px-2 py-1 rounded">1. 拆除符號</span> 👉 去掉冒號 [：] 和引號 [「」]</p>
                    <p class="text-lg"><span class="bg-white font-black text-blue-700 border border-blue-300 px-2 py-1 rounded">2. 人物變身</span> 👉 「我」變成「他/她」</p>
                    <p class="text-lg"><span class="bg-white font-black text-emerald-700 border border-emerald-300 px-2 py-1 rounded">3. 詞語變身</span> 👉 「這」變成「那」，「今天」變成「那天」</p>
                    <hr class="border-rose-200 my-2">
                    <p class="text-base text-slate-700 font-bold">例子：小明說：「<span class="text-blue-600">我</span>喜歡<span class="text-emerald-600">這</span>本書。」<br>✅ 小明說<span class="text-blue-600">他</span>喜歡<span class="text-emerald-600">那</span>本書。</p>
                </div>
            `,
            's-adv-fault': `
                <div class="text-center mb-4"><span class="text-6xl">🕵️‍♂️ 📝</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">語病大搜查 (找出錯在哪)</p>
                <p class="mb-4 text-slate-600">做一個句子醫生，找出句子裡生病的地方。常見的語病有這三種：</p>
                <div class="bg-purple-50 p-4 rounded-xl border-2 border-purple-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-purple-800 text-lg border-b border-purple-200 pb-1 mb-1">1. 詞語重複 (囉嗦)</p>
                        <p class="text-base text-slate-600 line-through">他<span class="text-rose-500 font-bold">非常十分</span>開心。</p>
                    </div>
                    <div>
                        <p class="font-black text-purple-800 text-lg border-b border-purple-200 pb-1 mb-1">2. 意思矛盾 (不合邏輯)</p>
                        <p class="text-base text-slate-600 line-through">他<span class="text-rose-500 font-bold">大約一定</span>會來參加派對。</p>
                    </div>
                    <div>
                        <p class="font-black text-purple-800 text-lg border-b border-purple-200 pb-1 mb-1">3. 搭配不當 (好朋友配錯了)</p>
                        <p class="text-base text-slate-600 line-through"><span class="text-rose-500 font-bold">發揮</span>良好的習慣。(應為：養成習慣)</p>
                    </div>
                </div>
            `,
            's-adv-passive': `
                <div class="text-center mb-4"><span class="text-6xl">🔄 🛡️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">進階「把/被」字句轉換</p>
                <p class="mb-4 text-slate-600">面對長句子，只要緊抓<span class="text-blue-600 font-bold">「誰是動作的承受者」</span>，就不會亂！</p>
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200 mb-3 text-center">
                    <p class="font-black text-lg text-blue-800 mb-2">主動 ➡️ 被動 (被字句)</p>
                    <p class="text-left text-slate-700 text-base mb-2">原句：[強烈的颱風] 吹倒了 [路旁的大樹]。</p>
                    <p class="text-left text-slate-700 text-base font-bold bg-white p-2 rounded">✅ [路旁的大樹] <span class="text-rose-500">被</span> [強烈的颱風] 吹倒了。</p>
                    <p class="text-left text-sm text-slate-500 mt-2">💡 秘訣：把原本在「後面」的東西，搬到「最前面」當主角！</p>
                </div>
            `,
            's-adv-conj': `
                <div class="text-center mb-4"><span class="text-6xl">🧩 🧠</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">高級關聯詞魔法</p>
                <p class="mb-4 text-slate-600">拔尖版的關聯詞更考驗你的邏輯推理能力：</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 space-y-3">
                    <p class="text-lg"><span class="bg-white font-black text-amber-700 border border-amber-300 px-2 py-1 rounded">與其...不如...</span> 👉 在兩個選項中，<span class="text-amber-600 font-bold">選擇後面</span>那個更好。</p>
                    <p class="text-lg"><span class="bg-white font-black text-rose-700 border border-rose-300 px-2 py-1 rounded">寧可...也(不)...</span> 👉 <span class="text-rose-600 font-bold">堅持前面</span>的選擇，不願妥協後面。</p>
                    <p class="text-lg"><span class="bg-white font-black text-emerald-700 border border-emerald-300 px-2 py-1 rounded">即使...也...</span> 👉 退一步假設，<span class="text-emerald-600 font-bold">結果依然不變</span>。</p>
                    <p class="text-lg"><span class="bg-white font-black text-blue-700 border border-blue-300 px-2 py-1 rounded">只有...才...</span> 👉 唯一的條件，沒有其他方法。</p>
                </div>
            `,
            's-adv-expand': `
                <div class="text-center mb-4"><span class="text-6xl">🎨 ✨</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">句子變美的最高境界</p>
                <p class="mb-4 text-slate-600">要選出最棒的擴寫句，<span class="text-emerald-600 font-bold">不是選最長的那一個</span>，而是選「畫面感」最豐富的！</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 mb-3">
                    <p class="font-black text-emerald-800 text-lg mb-2">如何判斷好句子？</p>
                    <p class="text-base text-slate-700 mb-1">✔️ 有沒有用到<span class="text-emerald-600 font-bold">生動的形容詞</span>？(如：五顏六色、震耳欲聾)</p>
                    <p class="text-base text-slate-700 mb-1">✔️ 有沒有用到<span class="text-emerald-600 font-bold">比喻(像...)</span> 或 <span class="text-emerald-600 font-bold">擬人</span>？</p>
                    <hr class="border-emerald-200 my-2">
                    <p class="text-sm text-slate-600">原句：風吹過。</p>
                    <p class="text-base font-bold mt-1">❌ 風很大地吹過這裡。</p>
                    <p class="text-base font-bold text-emerald-700">✅ <span class="bg-white px-1 rounded">微風輕輕地</span>吹過<span class="bg-white px-1 rounded">翠綠的草地</span>。</p>
                </div>
            `
        };

        window.showTutorial = function(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            
            if (!tutorialContents[categoryId]) {
                document.getElementById('tutorial-body').innerHTML = tutorialContents['s-adv-direct'];
            } else {
                document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId];
            }
            
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        };

        window.closeTutorial = function() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    window.startQuestion(targetIdx, true); 
                }
            }, 300);
        };

        window.getSubtleHint = function(category, clickedOptText) {
            if (category === 's-adv-direct') return "請留意人稱代名詞（我、你）、時間詞（今天、明天）和指示代名詞（這、那）的轉換喔！";
            if (category === 's-adv-fault') return "請仔細檢查句子是否有成分殘缺、語意重複或搭配不當的語病！";
            if (category === 's-adv-passive') return "請弄清楚誰是動作的發出者，誰是承受者！";
            if (category === 's-adv-conj') return "請仔細推敲前後兩個分句的邏輯關係，是轉折、因果還是條件？";
            if (category === 's-adv-expand') return "擴寫不僅要加長句子，更要加入生動的修飾詞或修辭手法喔！";
            return "請再仔細想一想喔！";
        };

        // ================= 2. 拔尖題庫 (200題 絕對精準、無重複) =================
        const categories = [
            { id: 's-adv-direct', title: '🗣️ 直接與間接敘述轉換 (40題)', color: 'rose' },
            { id: 's-adv-fault', title: '🕵️ 語病辨析 (無語病挑戰) (40題)', color: 'purple' },
            { id: 's-adv-passive', title: '🔄 進階句式轉換 (把/被) (40題)', color: 'blue' },
            { id: 's-adv-conj', title: '🧩 複雜邏輯關聯詞 (40題)', color: 'amber' },
            { id: 's-adv-expand', title: '🎨 高級句子擴寫與修飾 (40題)', color: 'emerald' }
        ];

        function formatData(pool, category, task) {
            return pool.map(item => ({
                category: category,
                task: task,
                qData: item
            }));
        }

        // --- 題型 1：直接敘述與間接敘述轉換 (40題) ---
        // 規則：我->他/她，你->對象，今天->那天，明天->第二天，這->那，這裡->那裡
        const directPool = [
            ['媽媽說：「我今天會晚點回家。」', '媽媽說她那天會晚點回家。', ['媽媽說她今天會晚點回家。', '媽媽說我那天會晚點回家。', '她說媽媽那天會晚點回家。'], '間接敘述中，引號內的「我」改為「她」，「今天」改為「那天」。'],
            ['老師對小明說：「你的功課做得很好。」', '老師對小明說他的功課做得很好。', ['老師對小明說你的功課做得很好。', '老師對小明說我的功課做得很好。', '小明對老師說他的功課做得很好。'], '間接敘述中，對話對象的「你」改為「他」。'],
            ['哥哥高興地說：「我明天要去游泳。」', '哥哥高興地說他第二天要去游泳。', ['哥哥高興地說他明天要去游泳。', '哥哥高興地說我第二天要去游泳。', '哥哥高興地說你明天要去游泳。'], '「我」改為「他」，「明天」改為「第二天」。'],
            ['小華問我：「你這裡有紅色的筆嗎？」', '小華問我那裡有沒有紅色的筆。', ['小華問我這裡有沒有紅色的筆。', '小華問我那裡有紅色的筆嗎。', '小華問他這裡有沒有紅色的筆。'], '「你」改為「我」，「這裡」改為「那裡」，疑問句改為「有沒有」。'],
            ['爸爸對我說：「你必須自己完成這項任務。」', '爸爸對我說我必須自己完成那項任務。', ['爸爸對我說他必須自己完成那項任務。', '爸爸對我說我必須自己完成這項任務。', '爸爸對我說你必須自己完成那項任務。'], '「你」改為「我」，「這」改為「那」。'],

            document.getElementById('progress-bar').style.width = percent + '%';

            let all = [{t: correctOpt, c: true}];
            wrongOpts.forEach(w => {
                if (w) all.push({t: w, c: false});
            });
            all.sort(() => Math.random() - 0.5);
            return all.map(x => ({ text: x.t, isCorrect: x.c }));
        };

            const qData = rawQuestDataObj[idx];
            const qType = qData.category;

                pendingQuestionIdx = idx; 
                window.showTutorial(qType);      
                return;

            document.getElementById('quest-play').innerHTML = html;

            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            window.renderDirectory();
        };

        window.getSubtleHint = function(category) {
            if (category === 's-adv-direct') return "請留意人稱代名詞（我、你）、時間詞（今天、明天）和指示代名詞（這、那）的轉換喔！";
            if (category === 's-adv-fault') return "請仔細檢查句子是否有成分殘缺、語意重複或搭配不當的語病！";
            if (category === 's-adv-passive') return "請弄清楚誰是動作的發出者，誰是承受者！";
            if (category === 's-adv-conj') return "請仔細推敲前後兩個分句的邏輯關係，是轉折、因果還是條件？";
            if (category === 's-adv-expand') return "擴寫不僅要加長句子，更要加入生動的修飾詞或修辭手法喔！";
            return "請再仔細想一想喔！";
        };

        window.checkSelectionAnswer = function(btnElement, isCorrect, clickedOptText) {
            const allBtns = document.querySelectorAll('.option-btn');
            const qData = rawQuestDataObj[currentQuestionIdx];
            
            if (isCorrect) {
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                btnElement.classList.add('correct');
                
                let answerText = clickedOptText;
                let sentence = qData.qData[0];
                
                if (sentence.includes('___')) {
                    let parts = clickedOptText.split('...');
                    if(parts.length >= 2) {
                        answerText = sentence.replace('___', parts[0]).replace('___', parts[1]);
                    } else {
                        answerText = sentence.replace('___', clickedOptText);
                    }
                }

                window.speakText("精準無誤！");
                window.handleCorrectAnswer(answerText);
            } else {
                btnElement.classList.add('wrong', 'shake');
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('sentAdvProgress', JSON.stringify(userProgress));
                
                let newHint = window.getSubtleHint(qData.category);

                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(newHint)) window.currentHints.push(newHint);

                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-2 mb-2 last:border-0 last:pb-0 last:mb-0">💡 ${h}</div>`).join('');
                
                document.getElementById('hint-text').innerHTML = combinedHintsHtml;
                document.getElementById('hint-tts-btn').onclick = () => window.speakText(window.currentHints.join('。'));
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                window.speakText("不對喔，" + newHint);
                
                setTimeout(() => { btnElement.classList.remove('shake'); }, 500);
            }
        };

        window.handleCorrectAnswer = function(completeText) {
            let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentQuestionIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 30 : 10;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 20; 
            }

            if (expGained > 0) {
                sentAdvExp += expGained;
                localStorage.setItem('sentAdvExp_v2', sentAdvExp);
                document.getElementById('exp-display').innerText = sentAdvExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentQuestionIdx] = finalStatus;
                localStorage.setItem('sentAdvProgress', JSON.stringify(userProgress));
            }

            let modalIcon = finalStatus === 1 ? '🌟' : '✅';
            let modalTitle = finalStatus === 1 ? '完美分析！語感極佳！' : '成功找出正解！';
            let expMsg = expGained > 0 
                ? `<span class="text-rose-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
            
            const qData = rawQuestDataObj[currentQuestionIdx];
            const expText = qData.qData[3] || '這選項在語法、邏輯與修辭上最為準確通順。';

            let combinedDesc = expMsg + `
                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-5 text-left text-indigo-900 rounded-r-xl font-bold">
                    <div class="flex justify-between items-center mb-4 pb-3 border-b border-indigo-200">
                        <span class="text-xl">📚 深度解析</span>
                        <button onclick="window.speakText('${expText.replace(/'/g, "\\'")}')" class="bg-white rounded-full w-12 h-12 flex items-center justify-center shadow-sm hover:bg-indigo-100 text-xl transition active:scale-95">🔊</button>
                    </div>
                    <div class="space-y-3 text-lg leading-relaxed">${expText}</div>
                </div>`;

            setTimeout(() => { window.showModal(modalIcon, modalTitle, combinedDesc); }, 800);
        };

        window.showModal = function(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    let nextIdx = currentQuestionIdx + 1;
                    if (nextIdx < rawQuestDataObj.length) window.startQuestion(nextIdx);
                    else { window.showToast("恭喜完成所有挑戰！"); window.backToDirectory(); }
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        };

        window.backToDirectoryFromModal = function() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                window.backToDirectory();
            }, 300);
        };

        window.onload = function() {
            document.getElementById('exp-display').innerText = sentAdvExp;
            window.renderDirectory();
        }
    </script>
</body>
</html>
