<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>綜合寫作專區 - 基礎寫作啟蒙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdf4; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #dcfce7 1px, transparent 1px), linear-gradient(to bottom, #dcfce7 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 優化：將填寫動感(pop)調弱，使視覺更舒適柔和 */
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.2s ease-out; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        /* 錯誤時的震動動感 */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 🌟 積木與槽位樣式 (支援局部遣返與紅色錯誤提示) */
        .tile-btn { transition: all 0.2s; box-shadow: 0 4px 0 #059669; cursor: pointer; user-select: none; }
        .tile-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        
        .slot-box { border: 2px dashed #34d399; background-color: #ecfdf5; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: flex-start; padding: 8px 12px; border-radius: 8px; cursor: pointer; color: #10b981; font-weight: bold; width: 100%; min-height: 60px; margin-bottom: 8px; }
        .slot-box.filled { border-style: solid; border-color: #059669; background-color: #10b981; color: white; box-shadow: 0 4px 0 #047857; }
        .slot-box.filled:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .slot-box.locked { border-style: solid; border-color: #047857; background-color: #059669; color: white; cursor: not-allowed; box-shadow: none; transform: translateY(4px); }
        
        /* 🚨 強制錯誤紅標樣式 (!important 確保覆蓋原本的顏色) */
        .wrong-slot { background-color: #ef4444 !important; border-color: #b91c1c !important; color: white !important; box-shadow: 0 4px 0 #991b1b !important; }

        /* 擴寫專用行內槽位 */
        .inline-slot { border: 2px dashed #8b5cf6; background-color: #f3e8ff; color: #7e22ce; padding: 2px 16px; border-radius: 6px; cursor: pointer; display: inline-block; margin: 0 4px; transition: all 0.2s; min-width: 80px; text-align: center; }
        .inline-slot.filled { border-style: solid; border-color: #7e22ce; background-color: #9333ea; color: white; box-shadow: 0 3px 0 #6b21a8; }
        .inline-slot.filled:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }
        .inline-slot.locked { border-style: solid; border-color: #581c87; background-color: #7e22ce; color: white; cursor: not-allowed; box-shadow: none; transform: translateY(3px); }

        .hidden-tile { visibility: hidden; pointer-events: none; }

        /* 稿紙設計 */
        .essay-pad {
            background-color: #fffbeb;
            background-image: repeating-linear-gradient(transparent, transparent 39px, #fde68a 39px, #fde68a 40px);
            border: 2px solid #f59e0b;
            line-height: 40px;
            font-size: 1.25rem;
            color: #334155;
            padding: 20px 30px;
            border-radius: 12px;
            min-height: 250px;
            text-align: justify;
        }
        .essay-pad p { margin-bottom: 0; text-indent: 2em; }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #059669; color: white; border-color: #047857; }
        .tab-inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden bg-grid-pattern">

    <!-- 頂部導覽列 (Emerald 配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-emerald-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-emerald-700 p-1 rounded transition bg-emerald-800">⬅️ 返回</a>
                <span>✍️ 綜合寫作專區 (基礎版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-emerald-800 px-3 py-1.5 rounded-full border border-emerald-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-300">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300 overflow-x-auto no-scrollbar">
            <button onclick="switchMode('seq')" id="tab-seq" class="tab-btn tab-active flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-emerald-600 whitespace-nowrap">🕵️ 看圖小偵探</button>
            <button onclick="switchMode('framework')" id="tab-framework" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">🏗️ 寫作積木</button>
            <button onclick="switchMode('expand')" id="tab-expand" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">✨ 五感擴寫段落</button>
            <button onclick="switchMode('tips')" id="tab-tips" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">💡 錦囊寶庫</button>
        </div>

        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth" id="main-scroll-area">
        
        <!-- ================= 模式 1：看圖小偵探 ================= -->
        <div id="seq-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="seq-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🕵️‍♂️ 看圖小偵探 (序列與邏輯)</h2>
                <p class="text-slate-600 font-bold mb-4">根據四格漫畫的線索，運用「起初 👉 接著 👉 然後 👉 最後」排順序吧！錯了只會退回那一句喔！</p>
                <div id="seq-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div id="seq-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- ================= 模式 2：寫作框架建構 ================= -->
        <div id="framework-mode" class="w-full max-w-5xl mx-auto hidden flex-col gap-4 lg:gap-6">
            <div id="framework-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🏗️ 寫作積木 (小步子三階魔法)</h2>
                <p class="text-slate-600 font-bold mb-4">挑戰「排詞成句 👉 排句成段 👉 排段成文」，看著文章一句一句長出來！</p>
                <div id="framework-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div id="framework-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- ================= 模式 3：五感擴寫段落 ================= -->
        <div id="expand-mode" class="w-full max-w-5xl mx-auto hidden flex-col gap-4 lg:gap-6">
            <div id="expand-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">✨ 句子變身大師 (五感擴寫)</h2>
                <p class="text-slate-600 font-bold mb-4">從詞庫裡挑選「顏色、聲音、感覺」的魔法詞語，把它們放進段落裡，讓文章活起來！</p>
                <div id="expand-content" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div id="expand-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- ================= 模式 4：錦囊寶庫 ================= -->
        <div id="tips-hub-mode" class="w-full max-w-6xl mx-auto hidden flex-col gap-6 h-full">
            <div class="w-full bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-slate-200">
                <h2 class="text-2xl md:text-3xl font-black text-emerald-800 mb-6 text-center">💡 寫作啟蒙錦囊寶庫</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="tips-grid"></div>
            </div>
        </div>

    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform duration-300 flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-emerald-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-emerald-600 flex items-center gap-2">📘 寫作小錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 反饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 pointer-events-none">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl text-center transform scale-90 transition-transform duration-300 flex flex-col max-h-[90vh] pointer-events-auto" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-4">太棒了！</h2>
            
            <div id="feedback-essay-container" class="hidden bg-emerald-50 border-4 border-emerald-200 p-6 rounded-2xl mb-6 shadow-inner text-left">
                <h3 class="text-emerald-800 font-black text-xl mb-3 border-b-2 border-emerald-200 pb-2 flex justify-between items-center">
                    <span>📝 你的完美作品：</span>
                    <button onclick="speakFullStory()" class="bg-white text-emerald-600 w-10 h-10 rounded-full flex items-center justify-center shadow hover:bg-emerald-100 transition text-xl">🔊</button>
                </h3>
                <div id="feedback-story" class="essay-pad"></div>
            </div>

            <p id="feedback-desc" class="text-emerald-600 font-black mb-6 text-xl"></p>
            
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-4 rounded-xl shadow transition text-lg md:text-xl">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg transition text-lg md:text-xl border-b-4 border-emerald-800 active:border-b-0 active:translate-y-1">挑戰下一篇 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態 =================
        let writeExp = parseInt(localStorage.getItem('writeBasicExp_v2')) || 0;
        document.getElementById('exp-display').innerText = writeExp;
        
        let currentMode = 'seq'; 
        let currentIdx = -1;
        let currentPhase = 1; 
        let currentSubTask = 0; 
        let currentMistakes = 0; 
        let pendingIdx = -1;
        let pendingType = '';

        // 通用拖拉/點擊入槽狀態 (支援局部鎖定)
        let sourceItems = []; 
        let targetSlots = []; 
        let reorderCorrect = []; 
        let reorderSource = [];
        let lockedSlots = []; 
        let wrongSlots = []; // 新增：用於記錄哪些槽位是錯的

        function cleanTextForSpeech(text) {
            return text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】_]/g, '').replace(/&nbsp;/g, ' ').replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, ''); 
        }

        // 強制選擇廣東話語音 (zh-HK)
        function speakText(text, rate = 0.9) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(cleanTextForSpeech(text));
                msg.lang = 'zh-HK'; 
                msg.rate = rate; 
                
                let voices = window.speechSynthesis.getVoices();
                let hkVoice = voices.find(v => v.lang === 'zh-HK' || v.lang === 'yue-HK');
                if (hkVoice) msg.voice = hkVoice;

                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // ================= 2. 學習錦囊 (教學庫) =================
        const allTips = [
            { id: 't-detective', title: "🕵️‍♂️ 看圖小偵探", content: "看圖說故事是有順序的喔！<br><br>我們可以用這四個神奇的「時間魔法詞」把它們串起來：<br>1️⃣ <span class='font-bold text-sky-600 bg-sky-50 px-2 rounded'>起初 / 剛開始</span> 👉 故事的第一張圖。<br>2️⃣ <span class='font-bold text-sky-600 bg-sky-50 px-2 rounded'>接著</span> 👉 發生的第二件事。<br>3️⃣ <span class='font-bold text-sky-600 bg-sky-50 px-2 rounded'>然後</span> 👉 發生的第三件事。<br>4️⃣ <span class='font-bold text-sky-600 bg-sky-50 px-2 rounded'>最後 / 終於</span> 👉 故事的大結局！", color: "sky" },
            { id: 't-three-stage', title: "🏗️ 三階寫作魔法", content: "寫作就像蓋房子，我們分三個步驟來完成！<br><br>1️⃣ <span class='font-bold text-blue-600'>排詞成句</span> 👉 把散落的詞語積木，排成通順的句子。<br>2️⃣ <span class='font-bold text-emerald-600'>排句成段</span> 👉 把剛才的句子，按「時間或動作先後」排成一段話。<br>3️⃣ <span class='font-bold text-rose-600'>排段成文</span> 👉 最後加上「開頭」和「結尾」，一篇完美文章就誕生啦！<br><br>💡 <span class='text-rose-500 font-bold'>別擔心排錯！排對的積木會變成綠色鎖住，排錯的才會退回給你重選喔！</span>", color: "emerald" },
            { id: 't-five-senses', title: "✨ 五感擴寫魔法", content: "句子太乾巴巴的？我們來幫它「穿上漂亮衣服」！<br><br>普通段落：<span class='text-slate-500'>公園有花，小鳥在叫。我們在玩。</span><br>🪄 加魔法：公園有<span class='font-bold text-purple-600 bg-purple-50 px-1 rounded'>五顏六色</span>的花。小鳥發出<span class='font-bold text-purple-600 bg-purple-50 px-1 rounded'>清脆</span>的叫聲。我們<span class='font-bold text-purple-600 bg-purple-50 px-1 rounded'>開心地</span>在玩。<br>💡 <span class='text-rose-500 font-bold'>在遊戲裡，點擊下方的詞語庫，把它們放進段落的空格裡吧！</span>", color: "purple" }
        ];

        function renderTipsHub() {
            const grid = document.getElementById('tips-grid');
            let html = '';
            allTips.forEach(tip => {
                html += `
                    <div class="bg-${tip.color}-50 border-2 border-${tip.color}-200 p-5 rounded-2xl shadow-sm hover:shadow-md transition">
                        <h3 class="text-xl font-black text-${tip.color}-800 mb-3 border-b border-${tip.color}-200 pb-2">${tip.title}</h3>
                        <p class="text-slate-700 text-sm md:text-base leading-relaxed">${tip.content}</p>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        const tutorialContents = {};
        allTips.forEach(tip => {
            tutorialContents[tip.id] = `
                <div class="bg-${tip.color}-50 p-6 rounded-2xl border-2 border-${tip.color}-200 mb-3">
                    <div class="text-center mb-4"><span class="text-6xl">${tip.title.split(' ')[0]}</span></div>
                    <p class="font-black text-${tip.color}-800 text-2xl mb-4 text-center">${tip.title.substring(2)}</p>
                    <p class="text-lg text-slate-700 leading-loose">${tip.content}</p>
                </div>
            `;
        });

        function showTutorial(tutKey) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            document.getElementById('tutorial-body').innerHTML = tutorialContents[tutKey];
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + tutKey, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingIdx !== -1) {
                    let targetIdx = pendingIdx;
                    let targetType = pendingType;
                    pendingIdx = -1;
                    if (targetType === 'seq') startSeq(targetIdx, true);
                    else if (targetType === 'framework') startFramework(targetIdx, true);
                    else startExpand(targetIdx, true);
                }
            }, 300);
        }

        function switchMode(mode) {
            currentMode = mode;
            const tabs = ['seq', 'framework', 'expand', 'tips'];
            tabs.forEach(t => {
                const tabBtn = document.getElementById('tab-' + t);
                const tabMode = document.getElementById(t + (t==='tips' ? '-hub-mode' : '-mode'));
                const tabPlay = document.getElementById(t + '-play');
                
                if (t === mode) {
                    tabBtn.className = "tab-btn tab-active flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-emerald-600 whitespace-nowrap";
                    if(tabMode) tabMode.style.display = 'flex';
                } else {
                    tabBtn.className = "tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap";
                    if(tabMode) tabMode.style.display = 'none';
                    if(tabPlay) tabPlay.style.display = 'none';
                }
            });

            if (mode === 'seq') renderSeqDirectory();
            else if (mode === 'framework') renderFrameworkDirectory();
            else if (mode === 'expand') renderExpandDirectory();
            else renderTipsHub();
            
            updateTotalProgress();
        }

        // ================= 3. 題庫資料 =================

        // --- 模組 1：看圖小偵探 (10篇) ---

                ans: ["漆黑", "亮晶晶", "皎潔", "涼爽"],
                hint: "夜空「漆黑」，星星「亮晶晶」，明月「皎潔」，微風「涼爽」。"
            }
        ];

        let seqProgress = JSON.parse(localStorage.getItem('seqBasicProgress')) || new Array(seqData.length).fill(0);
        let fwProgress = JSON.parse(localStorage.getItem('fwBasicProgress')) || new Array(fwData.length).fill(0);
        let exProgress = JSON.parse(localStorage.getItem('exBasicProgress')) || new Array(exData.length).fill(0);

        // ================= 4. 通用：重組與拖拉邏輯 (局部遣返核心 + 專屬動態提示) =================
        
        function initReorderState(correctArr) {
            reorderCorrect = [...correctArr];
            reorderSource = [...reorderCorrect].sort(() => Math.random() - 0.5);
            targetSlots = new Array(correctArr.length).fill(null);
            lockedSlots = new Array(correctArr.length).fill(false);
            wrongSlots = []; // 初始化時清空錯誤記錄
            window.currentHints = []; // 清空提示
        }

        function getFirstEmptySlot() {
            return targetSlots.indexOf(null);
        }

        function moveToTarget(sourceIdx) {
            let emptyIdx = getFirstEmptySlot();
            if (emptyIdx !== -1) {
                let chunk = reorderSource[sourceIdx];
                reorderSource[sourceIdx] = null; 
                targetSlots[emptyIdx] = chunk;
                speakText(chunk);
                renderCurrentPlayUI();
                
                // 檢查是否填滿，如果填滿才執行 checkReorderLogic
                if (!targetSlots.includes(null)) {
                    if (currentMode === 'seq') checkReorderLogic(finishSeqLevel);
                    else if (currentMode === 'framework') checkReorderLogic(advanceFwPhase);
                    else if (currentMode === 'expand') checkReorderLogic(finishExpandLevel);
                }
            }
        }

        function removeFromTarget(targetIdx) {
            if (lockedSlots[targetIdx]) return; 
            let chunk = targetSlots[targetIdx];
            if (chunk) {
                speakText(chunk + " 已移出");
                targetSlots[targetIdx] = null;
                wrongSlots = wrongSlots.filter(idx => idx !== targetIdx); // 移除錯誤標記
                let emptySourceIdx = reorderSource.indexOf(null);
                if(emptySourceIdx !== -1) reorderSource[emptySourceIdx] = chunk;
                else reorderSource.push(chunk);
                renderCurrentPlayUI();
            }
        }
        
        function removeFromExpand(targetIdx) {
            if (lockedSlots[targetIdx]) return;
            let word = targetSlots[targetIdx];
            if (word) {
                speakText(word + " 已移出");
                targetSlots[targetIdx] = null;
                wrongSlots = wrongSlots.filter(idx => idx !== targetIdx); 
                renderCurrentPlayUI();
            }
        }

        // 🌟 核心升級：因應學生答錯給予「特定的提示」，持續顯示，並標為紅色
        function checkReorderLogic(onComplete) {
            let isAllFilled = !targetSlots.includes(null);
            if (!isAllFilled) return;

            let isAllCorrect = true;
            let wrongIndices = [];

            for (let i = 0; i < targetSlots.length; i++) {
                if (targetSlots[i] === reorderCorrect[i]) {
                    lockedSlots[i] = true;
                } else {
                    isAllCorrect = false;
                    wrongIndices.push(i);
                }
            }

            if (isAllCorrect) {
                window.currentHints = []; // 答對時清空提示
                wrongSlots = [];
                onComplete();
            } else {
                currentMistakes++;
                if (currentMode === 'seq') {
                    seqProgress[currentIdx] = -1; localStorage.setItem('seqBasicProgress', JSON.stringify(seqProgress));
                } else if (currentMode === 'framework') {
                    fwProgress[currentIdx] = -1; localStorage.setItem('fwBasicProgress', JSON.stringify(fwProgress));
                } else if (currentMode === 'expand') {
                    exProgress[currentIdx] = -1; localStorage.setItem('exBasicProgress', JSON.stringify(exProgress));
                }

                wrongSlots = wrongIndices; // 記錄錯的槽位，讓 render 時標成紅色

                // 動態構建特定錯誤的提示
                let firstWrongIdx = wrongIndices[0];
                let wrongText = targetSlots[firstWrongIdx];
                let hintText = "";
                let specificHint = "";

                if (currentMode === 'seq') {
                    let timeWord = seqData[currentIdx].trans[firstWrongIdx];
                    specificHint = `「<span class="text-rose-600">${wrongText}</span>」不應該放在「${timeWord}」喔！<br>`;
                    hintText = seqData[currentIdx].hint;
                } else if (currentMode === 'framework') {
                    specificHint = `「<span class="text-rose-600">${wrongText}</span>」放錯位置囉！<br>`;
                    hintText = fwData[currentIdx].hint;
                } else {
                    specificHint = `「<span class="text-rose-600">${wrongText}</span>」放在這裡不太通順喔！<br>`;
                    hintText = exData[currentIdx].hint;
                }

                let combinedHint = specificHint + " 💡 技巧：" + hintText;
                
                // 累積提示，如果第二次錯別的地方，提示會增加
                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(combinedHint)) {
                    window.currentHints.push(combinedHint);
                }

                speakText("排錯了喔，請點擊紅色的積木移出，並查看提示！");
                
                // 重新渲染畫面（此時紅色錯誤積木會持續停留在上方，提示框也會顯示）
                renderCurrentPlayUI();

                // 3.5秒後自動退回
                setTimeout(() => {
                    let changed = false;
                    wrongIndices.forEach(idx => {
                        let chunk = targetSlots[idx];
                        if (chunk !== null && wrongSlots.includes(idx)) {
                            targetSlots[idx] = null;
                            
                            let slotElem = document.getElementById(`target-slot-${idx}`);
                            if (slotElem) {
                                slotElem.classList.remove('wrong-slot', 'shake');
                            }

                            if (currentMode !== 'expand') {
                                let emptySourceIdx = reorderSource.indexOf(null);
                                if(emptySourceIdx !== -1) reorderSource[emptySourceIdx] = chunk;
                                else reorderSource.push(chunk);
                            }
                            changed = true;
                        }
                    });
                    wrongSlots = [];
                    if (changed) renderCurrentPlayUI();
                }, 3500);
            }
        }

        // ================= 5. 各模式的 UI 渲染與過關邏輯 =================

        function renderCurrentPlayUI() {
            if (currentMode === 'seq') renderSeqUI();
            else if (currentMode === 'framework') renderFrameworkUI();
            else if (currentMode === 'expand') renderExpandUI();
        }

        // --- 模組 1：看圖小偵探 ---

                html += `
                    <button onclick="startSeq(${idx})" class="w-full text-left p-4 rounded-2xl border-2 ${borderClass} ${bgClass} hover:shadow-md transition group active:scale-95 flex flex-col items-center justify-center gap-2">

                if (chunk === null) {
                    html += `<div id="target-slot-${i}" class="slot-box flex-1 border-dashed border-sky-300 bg-sky-50 h-[56px] rounded-xl text-slate-400">點擊下方句子填入...</div>`;

                                 (isWrong ? 'slot-box wrong-slot shake cursor-pointer flex-1' : 'slot-box filled flex-1 bg-sky-500 border-sky-600 hover:bg-sky-600 cursor-pointer');
                    html += `<div id="target-slot-${i}" onclick="removeFromTarget(${i})" class="${btnClass} text-white font-bold px-4 py-3 h-[56px] flex items-center shadow pop">${chunk}</div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;

            html += `<div class="w-full border-t-2 border-dashed border-slate-200 my-4"></div>
                     <div class="text-center text-slate-500 font-bold mb-3 text-sm">👇 點擊下方句子，排入上方的時間框裡</div>
                     <div class="w-full flex flex-col gap-2">`;
            
            reorderSource.forEach((chunk, idx) => {

                        </div>
                    `;
                }
            });

            html += `</div>`;

            if (window.currentHints && window.currentHints.length > 0) {
                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-2 mb-2 last:border-0 last:pb-0 last:mb-0">💡 ${h}</div>`).join('');
                html += `
                    <div id="dynamic-hint-box" class="w-full mt-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm text-yellow-800 font-bold text-lg flex items-start gap-3 slide-up">

                        <button onclick="speakText('${window.currentHints.join('。').replace(/'/g, "\\'").replace(/<[^>]*>?/gm, '')}')" class="text-2xl hover:scale-110 transition bg-white rounded-full w-12 h-12 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>
                    </div>
                `;

            html += `</div>`;
            
            document.getElementById('seq-play').innerHTML = html;
        }

        function finishSeqLevel() {
            const data = seqData[currentIdx];
            speakText("故事排得非常完美！");
            
            let finalStory = `<p class="essay-paragraph font-black text-xl text-center text-slate-800 mb-4">${data.title}</p>`;
            let pContent = "";
            for(let i=0; i<4; i++){
                pContent += `<span class="text-sky-600 font-bold">${data.trans[i]}，</span>${data.ans[i]}`;
            }
            finalStory += `<p class="essay-paragraph leading-loose">${pContent}</p>`;

            let finalStatus = currentMistakes === 0 ? 1 : 2;
            let expGained = calcExp(finalStatus, seqProgress, currentIdx, 30, 15);

            if (expGained > 0) {
                writeExp += expGained;
                localStorage.setItem('writeBasicExp_v2', writeExp);
                updateExpDisplay();
            }

            showFeedbackModal(expGained, finalStory, () => {
                let nextIdx = currentIdx + 1;
                if (nextIdx < seqData.length) startSeq(nextIdx);
                else { showToast("恭喜完成小偵探挑戰！"); backToDirectory('seq'); }

                else if (status === 2) { bgClass = 'bg-emerald-50'; borderClass = 'border-emerald-400'; icon = ' <span class="text-emerald-600 font-bold ml-2">✅</span>'; }

                html += `

        }

        function startFramework(idx, forceStart = false) {
            const data = fwData[idx];
            if (!forceStart && !localStorage.getItem('tut_seen_' + data.tut)) {
                pendingIdx = idx; pendingType = 'framework'; showTutorial(data.tut); return;
            }
            currentIdx = idx; currentPhase = 1; currentSubTask = 0; currentMistakes = 0;
            
            document.getElementById('framework-directory').style.display = 'none';
            document.getElementById('framework-play').style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;

            setupFwPhase();
        }

        function setupFwPhase() {
            const data = fwData[currentIdx];
            if (currentPhase === 1) {
                if (currentSubTask === 0) initReorderState(data.introChunks);
                else if (currentSubTask >= 1 && currentSubTask <= 3) initReorderState(data.sents[currentSubTask - 1]);
                else if (currentSubTask === 4) initReorderState(data.conclChunks);
            }
            else if (currentPhase === 2) {
                initReorderState(data.sents.map(s => s.join('')));
            }
            else if (currentPhase === 3) {
                let introStr = data.introChunks.join('');
                let bodyStr = data.sents.map(s => s.join('')).join('');
                let conclStr = data.conclChunks.join('');
                initReorderState([introStr, bodyStr, conclStr]);
            }
            window.currentHints = []; // 清空提示
            renderFrameworkUI();
        }

            if (currentPhase === 1) {
                if (currentSubTask === 0) taskDesc = "第 1 句 / 共 5 句 (文章開頭)";
                else if (currentSubTask >= 1 && currentSubTask <= 3) taskDesc = `第 ${currentSubTask + 1} 句 / 共 5 句 (事情經過)`;

                taskDesc = "將剛才的三個經過句子，排成一段通順的段落";
            } else {

                        <div>

            if (currentPhase === 1 && currentSubTask > 0) {

            let isRow = currentPhase === 1;
            let wrapperClass = isRow ? "flex flex-wrap gap-2 justify-start" : "flex flex-col gap-3";

                html += `

                        <button onclick="speakText('${window.currentHints.join('。').replace(/'/g, "\\'").replace(/<[^>]*>?/gm, '')}')" class="text-2xl hover:scale-110 transition bg-white rounded-full w-12 h-12 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>

            setTimeout(() => {
                let btnClassB = isRow ? "tile-btn bg-emerald-500 text-white font-black text-xl py-3 px-4 rounded-xl shadow-md pop m-1" : "tile-btn bg-emerald-600 text-white font-bold text-lg py-4 px-5 rounded-xl shadow-md pop w-full text-left mb-2 leading-relaxed";
                let sourceBtnClassB = isRow ? "tile-btn bg-white border-2 border-slate-300 text-slate-700 hover:border-emerald-400 hover:bg-emerald-50 font-black text-xl py-3 px-4 rounded-xl shadow m-1" : "tile-btn bg-white border-2 border-slate-300 text-slate-700 hover:border-emerald-400 hover:bg-emerald-50 font-bold text-lg py-4 px-5 rounded-xl shadow w-full text-left mb-2 leading-relaxed";
                let slotClassB = isRow ? "slot-box min-w-[80px] h-[52px] m-1 flex-1" : "slot-box w-full min-h-[60px] mb-2";
                
                renderReorderTiles(btnClassB, sourceBtnClassB, slotClassB);
            }, 0);
        }

        function renderReorderTiles(btnClassBase, sourceBtnClassBase, slotClassBase) {
            const tArea = document.getElementById('reorder-target-area');
            const sArea = document.getElementById('reorder-source-area');
            if(!tArea || !sArea) return;

            let tHtml = '';
            targetSlots.forEach((chunk, idx) => {
                let isLocked = lockedSlots[idx];
                let isWrong = wrongSlots.includes(idx);
                let prefix = currentPhase === 1 ? '' : `<span class="bg-white text-emerald-600 px-2 py-0.5 rounded text-sm mr-2">${idx+1}</span>`;
                if (chunk === null) {
                    tHtml += `<div id="target-slot-${idx}" class="${slotClassBase} border-dashed border-emerald-300 bg-emerald-50 text-slate-400 text-sm md:text-base flex items-center justify-center">[ 框格 ${idx+1} ]</div>`;
                } else {
                    let sClass = isLocked ? 'locked bg-emerald-600 border-emerald-700 cursor-not-allowed' : 
                                 (isWrong ? 'wrong-slot shake cursor-pointer' : 'filled bg-emerald-500 border-emerald-600 hover:bg-emerald-600 cursor-pointer');
                    tHtml += `<div id="target-slot-${idx}" onclick="removeFromTarget(${idx})" class="${slotClassBase} ${sClass} text-white font-bold shadow pop flex items-center">${prefix}${chunk}</div>`;
                }
            });
            tArea.innerHTML = tHtml;

            let sHtml = '';
            let isRow = currentPhase === 1;
            reorderSource.forEach((chunk, idx) => {
                if (chunk === null) {
                    sHtml += `<div class="${slotClassBase} border-2 border-dashed border-slate-200 bg-slate-50 opacity-50"></div>`; 
                } else {
                    sHtml += `
                        <div class="flex items-center gap-2 ${isRow ? 'w-auto' : 'w-full'}">
                            <button onclick="moveToTarget(${idx})" class="${sourceBtnClassBase} flex-1">${chunk}</button>
                            <button onclick="speakText('${chunk.replace(/'/g, "\\'")}')" class="tts-btn flex-shrink-0 bg-emerald-50 text-emerald-600 ${isRow ? 'w-12 h-12 rounded-full self-center' : 'w-14 rounded-2xl'} text-2xl flex items-center justify-center shadow-sm border border-emerald-200 hover:bg-emerald-100 transition" title="朗讀此積木">🔊</button>
                        </div>
                    `;
                }
            });
            sArea.innerHTML = sHtml;
        }

        function advanceFwPhase() {
            speakText("拼得太好了！");
            setTimeout(() => {
                if (currentPhase === 1) {
                    if (currentSubTask < 4) {
                        currentSubTask++;
                        setupFwPhase();
                    } else {
                        currentPhase = 2; 
                        currentSubTask = 0;
                        setupFwPhase(); 
                    }
                } else if (currentPhase === 2) {
                    currentPhase = 3; 
                    currentSubTask = 0;
                    setupFwPhase();
                } else {
                    finishFwLevel();
                }
            }, 1000);
        }

        function finishFwLevel() {
            const data = fwData[currentIdx];
            let finalStory = `<p class="essay-paragraph font-black text-xl text-center text-slate-800 mb-4">${data.title}</p>`;
            finalStory += `<p class="essay-paragraph mb-2">${data.introChunks.join('')}</p>`;
            finalStory += `<p class="essay-paragraph mb-2">${data.sents.map(s => s.join('')).join('')}</p>`;
            finalStory += `<p class="essay-paragraph mb-2">${data.conclChunks.join('')}</p>`;

            let finalStatus = currentMistakes === 0 ? 1 : 2;
            let expGained = calcExp(finalStatus, fwProgress, currentIdx, 40, 20);

            if (expGained > 0) {
                writeExp += expGained;
                localStorage.setItem('writeBasicExp_v2', writeExp);
                updateExpDisplay();
            }

            showFeedbackModal(expGained, finalStory, () => {
                let nextIdx = currentIdx + 1;
                if (nextIdx < fwData.length) startFramework(nextIdx);
                else { showToast("恭喜完成框架挑戰！"); backToDirectory('framework'); }
            });
        }

        // --- 模組 3：五感擴寫段落 ---
        function renderExpandDirectory() {
            const dirContainer = document.getElementById('expand-content');
            let html = '';
            exData.forEach((item, idx) => {
                let status = exProgress[idx];
                let bgClass = 'bg-white';
                let borderClass = 'border-slate-200';
                let icon = ' <span class="text-slate-400 font-bold ml-2"># 未挑戰</span>';
                if (status === 1) { bgClass = 'bg-yellow-50'; borderClass = 'border-yellow-400'; icon = ' <span class="text-yellow-600 font-bold ml-2">🌟</span>'; }
                else if (status === 2) { bgClass = 'bg-emerald-50'; borderClass = 'border-emerald-400'; icon = ' <span class="text-emerald-600 font-bold ml-2">✅</span>'; }

                html += `
                    <button onclick="startExpand(${idx})" class="w-full text-left p-4 rounded-2xl border-2 ${borderClass} ${bgClass} hover:shadow-md transition group active:scale-95 flex justify-between items-center min-h-[100px]">
                        <div class="flex-1 pr-2">
                            <div class="mb-2 flex items-center gap-2">
                                <span class="text-2xl">${item.emoji}</span>
                                <span class="bg-purple-100 text-purple-800 text-xs px-2 py-1 rounded font-bold">${item.title}</span>
                            </div>
                            <h3 class="text-sm font-bold text-slate-500 truncate">原段落：${item.base.substring(0,25)}...</h3>
                        </div>
                        <div class="flex-shrink-0">${icon}</div>
                    </button>
                `;
            });
            dirContainer.innerHTML = html;
        }

        function startExpand(idx, forceStart = false) {
            const data = exData[idx];
            if (!forceStart && !localStorage.getItem('tut_seen_' + data.tut)) {
                pendingIdx = idx; pendingType = 'expand'; showTutorial(data.tut); return;
            }

            currentIdx = idx; currentMistakes = 0;
            initReorderState(data.ans); 
            reorderSource = [...data.bank].sort(() => Math.random() - 0.5); 
            
            document.getElementById('expand-directory').style.display = 'none';
            document.getElementById('expand-play').style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;

            renderExpandUI();
        }

        function renderExpandUI() {
            const data = exData[currentIdx];
            let html = `
                <div class="w-full max-w-4xl flex justify-between items-center mb-4">
                    <button onclick="backToDirectory('expand')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回</button>
                    <span class="bg-purple-100 text-purple-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">擴寫 ${currentIdx + 1} / 10</span>
                </div>
                
                <div class="slide-up w-full max-w-4xl bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-purple-500 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">${data.title}</span>
                    <div class="text-5xl md:text-6xl mb-4 text-center animate-bounce drop-shadow-md mt-2">${data.emoji}</div>
                    
                    <div class="w-full flex items-start gap-4 mb-4 mt-2 bg-purple-50 p-6 rounded-2xl border border-purple-100 shadow-inner">
                        <button onclick="speakText('請點擊下方詞庫的詞語，放入段落空格中，讓句子變生動。')" class="tts-btn flex-shrink-0 bg-white text-purple-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-purple-200 mt-1">🔊</button>
                        <div class="text-xl md:text-2xl font-bold text-slate-800 leading-loose">🪄 請點擊下方詞語，放入段落空格中：</div>
                    </div>

                    <div class="w-full bg-white p-6 rounded-2xl border-2 border-slate-200 mb-8 shadow-sm">
                        <div class="text-xl md:text-2xl font-bold text-slate-800 leading-loose flex flex-wrap items-center justify-start gap-y-3" id="expand-target-area">
            `;

            let templateStr = data.template;
            for (let i = 0; i < targetSlots.length; i++) {
                let chunk = targetSlots[i];
                let isLocked = lockedSlots[i];
                let isWrong = wrongSlots.includes(i);
                let slotHtml = "";
                if (chunk === null) {
                    slotHtml = `<span id="target-slot-${i}" class="inline-slot empty border-dashed border-purple-400 bg-purple-50 text-slate-400 font-normal">填入詞語</span>`;
                } else {
                    let sClass = isLocked ? 'locked bg-purple-600 border-purple-700 cursor-not-allowed' : 
                                 (isWrong ? 'wrong-slot shake cursor-pointer' : 'filled bg-purple-500 border-purple-600 hover:bg-purple-600 cursor-pointer');
                    slotHtml = `<span id="target-slot-${i}" onclick="removeFromExpand(${i})" class="inline-slot ${sClass} text-white font-bold pop shadow">${chunk}</span>`;
                }
                templateStr = templateStr.replace(`{${i}}`, slotHtml);
            }
            html += templateStr;
            
            html += `
                        </div>
                    </div>
                    
                    <div class="text-center text-slate-500 font-bold mb-3 text-sm">👇 詞語魔法庫</div>
                    <div class="w-full flex flex-wrap justify-center gap-3" id="expand-source-area">
            `;
            
            reorderSource.forEach((word, idx) => {
                if (word === null) {
                    html += `<div class="h-[52px] w-[100px] border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 opacity-50 m-1"></div>`;
                } else {
                    let isHidden = targetSlots.includes(word);
                    let btnClass = "tile-btn bg-white border-2 border-slate-300 text-slate-700 hover:border-purple-400 hover:bg-purple-50 font-black text-lg py-2.5 px-4 rounded-xl shadow m-1 active:scale-95 transition flex-1 text-center";
                    let wrapperClass = isHidden ? "hidden-tile" : "flex items-center gap-1 m-1";
                    html += `
                        <div class="${wrapperClass}">
                            <button onclick="moveToExpand(${idx})" class="${btnClass}">${word}</button>
                            <button onclick="speakText('${word.replace(/'/g, "\\'")}')" class="tts-btn bg-purple-50 text-purple-600 w-10 h-10 rounded-full text-xl flex items-center justify-center shadow-sm border border-purple-200 hover:bg-purple-100 transition">🔊</button>
                        </div>
                    `;
                }
            });

            html += `</div>`;

            if (window.currentHints && window.currentHints.length > 0) {
                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-2 mb-2 last:border-0 last:pb-0 last:mb-0">💡 ${h}</div>`).join('');
                html += `
                    <div id="dynamic-hint-box" class="w-full mt-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm text-yellow-800 font-bold text-lg flex items-start gap-3 slide-up">
                        <div class="flex-1" id="hint-text">${combinedHintsHtml}</div>
                        <button onclick="speakText('${window.currentHints.join('。').replace(/'/g, "\\'").replace(/<[^>]*>?/gm, '')}')" class="text-2xl hover:scale-110 transition bg-white rounded-full w-12 h-12 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>
                    </div>
                `;
            }

            html += `</div>`;
            
            document.getElementById('expand-play').innerHTML = html;
            
        }

        function moveToExpand(sourceIdx) {
            let emptySlotIdx = targetSlots.indexOf(null);
            if (emptySlotIdx !== -1) {
                targetSlots[emptySlotIdx] = reorderSource[sourceIdx];
                speakText(reorderSource[sourceIdx]);
                renderExpandUI();
                if (!targetSlots.includes(null)) {
                    checkReorderLogic(finishExpandLevel);
                }
            }
        }

        function finishExpandLevel() {
            const data = exData[currentIdx];
            speakText("段落變得真生動！");
            
            let finalStory = `<p class="essay-paragraph font-black text-xl text-center text-slate-800 mb-4">${data.title}</p>`;
            let filledTemplate = data.template;
            for (let i = 0; i < targetSlots.length; i++) {
                filledTemplate = filledTemplate.replace(`{${i}}`, `<span class="text-purple-600 font-bold">${data.ans[i]}</span>`);
            }
            finalStory += `<p class="essay-paragraph leading-loose">${filledTemplate}</p>`;

            let finalStatus = currentMistakes === 0 ? 1 : 2;
            let expGained = calcExp(finalStatus, exProgress, currentIdx, 20, 10);

            if (expGained > 0) {
                writeExp += expGained;
                localStorage.setItem('writeBasicExp_v2', writeExp);
                updateExpDisplay();
            }

            showFeedbackModal(expGained, finalStory, () => {
                let nextIdx = currentIdx + 1;
                if (nextIdx < exData.length) startExpand(nextIdx);
                else { showToast("恭喜完成擴寫挑戰！"); backToDirectory('expand'); }
            });
        }

        // ================= 輔助功能 =================
        function calcExp(finalStatus, progArr, idx, perfectExp, passExp) {
            let previousStatus = progArr[idx];
            let expGained = 0;
            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? perfectExp : passExp;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = perfectExp - passExp; 
            }
            if (finalStatus === 1 || previousStatus !== 1) {
                progArr[idx] = finalStatus;
            }
            return expGained;
        }

        function updateExpDisplay() {
            const expDisp = document.getElementById('exp-display');
            expDisp.innerText = writeExp;
            expDisp.classList.add('pop');
            setTimeout(() => expDisp.classList.remove('pop'), 400);
        }

        function showFeedbackModal(expGained, finalStoryHTML, nextAction) {
            let expMsg = expGained > 0 ? `獲得 ${expGained} 點經驗值 ✨` : `這篇已經成功過關囉！`;
            document.getElementById('feedback-desc').innerText = expMsg;
            
            document.getElementById('feedback-essay-container').classList.remove('hidden');
            document.getElementById('feedback-story').innerHTML = finalStoryHTML;
            
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            
            setTimeout(() => { speakFullStory(); }, 800);

            document.getElementById('next-btn').onclick = () => {
                modal.classList.add('opacity-0'); content.classList.add('scale-90');
                setTimeout(() => { modal.classList.add('hidden'); nextAction(); }, 300);
            };
            
            if(seqProgress.filter(p=>p>0).length===seqData.length && fwProgress.filter(p=>p>0).length===fwData.length && exProgress.filter(p=>p>0).length===exData.length) {
                localStorage.setItem('t_write_1', 'true');
            }
        }

        function speakFullStory() {
            let text = document.getElementById('feedback-story').innerText;
            speakText(text, 0.85); 
        }

        function backToDirectory(forceMode) {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            document.getElementById('seq-play').style.display = 'none';
            document.getElementById('framework-play').style.display = 'none';
            document.getElementById('expand-play').style.display = 'none';
            
            document.getElementById('seq-directory').style.display = 'block';
            document.getElementById('framework-directory').style.display = 'block';
            document.getElementById('expand-directory').style.display = 'block';
            
            if (forceMode) switchMode(forceMode);
            else switchMode(currentMode);
        }

        function backToDirectoryFromModal() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        function updateTotalProgress() {
            let seqSolved = seqProgress.filter(p => p > 0).length;
            let fwSolved = fwProgress.filter(p => p > 0).length;
            let exSolved = exProgress.filter(p => p > 0).length;
            let total = seqData.length + fwData.length + exData.length;
            let percent = ((seqSolved + fwSolved + exSolved) / total) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = writeExp;
            switchMode('seq');
        }
    </script>
</body>
</html>
