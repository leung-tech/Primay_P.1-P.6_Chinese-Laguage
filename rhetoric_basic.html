<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修辭與標點 - 基礎圖文配對</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #fffbeb; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #fef3c7 1px, transparent 1px), linear-gradient(to bottom, #fef3c7 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #fcd34d; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #fef3c7; border-color: #f59e0b; color: #b45309; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-amber-500 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-amber-600 p-1 rounded transition bg-amber-700">⬅️ 返回</a>
                <span>📝 修辭與標點 (基礎版)</span>

            <div class="flex gap-2 lg:gap-4 items-center bg-amber-600 px-3 py-1.5 rounded-full border border-amber-400 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>

        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">

    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">

                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🎯 基礎修辭標點地圖</h2>
                <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">

            <div id="quest-play" class="w-full hidden flex-col items-center"></div>
        </div>
    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-amber-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-amber-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="window.closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="window.closeTutorial()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-amber-700 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-xl text-center transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="feedback-content">

            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-4 text-base md:text-lg leading-relaxed text-left overflow-y-auto pr-2 flex-1 w-full"></div>
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">

            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態與輔助函數 =================
        let rhetExp = parseInt(localStorage.getItem('rhetBasicExp')) || 0;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1;
        let currentQuestionIdx = -1;

        // 用於記錄該題學生點錯的選項解釋 (累積提示)
        window.currentHints = [];

        document.getElementById('exp-display').innerText = rhetExp;

        window.cleanTextForSpeech = function(text) {
            if(!text) return "";
            return text.replace(/<br\s*\/?>/gi, '。')
                       .replace(/<[^>]*>?/gm, '')
                       .replace(/[✅❌💡【】_]/g, '')
                       .replace(/&nbsp;/g, ' ')
                       .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDC00-\uDFFF]/g, ''); 
        };

        window.speakText = function(text, rate = 0.95) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(window.cleanTextForSpeech(text));
                msg.lang = 'zh-HK';
                msg.rate = rate; 
                window.speechSynthesis.speak(msg);
            }
        };

        window.showToast = function(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        };

        // 🌟 新增：針對標點符號的語音轉譯器
        window.getTTSOptionText = function(opt) {
            if(opt === '。') return '句號';
            if(opt === '，') return '逗號';
            if(opt === '？') return '問號';
            if(opt === '！') return '感嘆號';
            if(opt === '、') return '頓號';
            if(opt === '：') return '冒號';
            return opt;
        };

        // ================= 2. 學習錦囊 (教學庫) =================
        const tutorialContents = {
            'r-punc-1': `

                </div>
                <div class="bg-green-50 p-4 rounded-xl border-l-4 border-green-500 mb-3 flex items-start gap-4">
                    <span class="text-4xl font-black text-green-600">，</span>
                    <div><span class="font-black text-slate-800 text-xl">逗號：</span><br>表示句子中間的<span class="text-green-600 font-bold">短暫停頓</span>。<br><span class="text-sm text-slate-500 bg-white px-2 py-1 rounded mt-1 inline-block">例：今天天氣很好，我們去公園玩。</span></div>
                </div>
                <div class="bg-purple-50 p-4 rounded-xl border-l-4 border-purple-500 mb-3 flex items-start gap-4">
                    <span class="text-4xl font-black text-purple-600">？</span>
                    <div><span class="font-black text-slate-800 text-xl">問號：</span><br>表示心裡有疑問，<span class="text-purple-600 font-bold">正在發問</span>。<br><span class="text-sm text-slate-500 bg-white px-2 py-1 rounded mt-1 inline-block">例：你吃過飯了嗎？</span></div>
                </div>
                <div class="bg-rose-50 p-4 rounded-xl border-l-4 border-rose-500 mb-3 flex items-start gap-4">

                </div>
            `,
            'r-punc-2': `
                <p class="mb-4 font-bold text-slate-600">進階標點符號可以幫我們表達更複雜的意思喔！</p>
                <div class="bg-orange-50 p-4 rounded-xl border-l-4 border-orange-500 mb-4 flex items-start gap-4">
                    <span class="text-4xl font-black text-orange-600">、</span>
                    <div><span class="font-black text-slate-800 text-xl">頓號：</span><br>用來分開一連串<span class="text-orange-600 font-bold">相同種類</span>的東西，像購物清單一樣！<br><span class="text-sm text-slate-500 bg-white px-2 py-1 rounded mt-2 inline-block">例：我喜歡吃蘋果、香蕉和西瓜。</span></div>
                </div>
                <div class="bg-teal-50 p-4 rounded-xl border-l-4 border-teal-500 mb-3 flex items-start gap-4">
                    <span class="text-4xl font-black text-teal-600 tracking-tighter">：「</span>
                    <div><span class="font-black text-slate-800 text-xl">冒號 和 引號：</span><br>用來<span class="text-teal-600 font-bold">提示和框住說的話</span>。冒號用在說話人之後。<br><span class="text-sm text-slate-500 bg-white px-2 py-1 rounded mt-2 inline-block">例：媽媽說：「快點來吃飯！」</span></div>
                </div>
            `,
            'r-meta': `
                <div class="text-center mb-6"><span class="text-6xl">🍌 🌙</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">什麼是「明喻」？</p>
                <p class="mb-4 text-slate-600">明喻就是把兩種<span class="text-amber-600 font-bold">不一樣的東西</span>，因為它們有<span class="bg-amber-100 px-2 rounded">相似的地方</span>（形狀、顏色），用<span class="font-black text-amber-600">「像」</span>字連起來！</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200">
                    <p class="font-black text-center text-xl mb-2 text-amber-800">🪄 明喻魔法公式：</p>
                    <p class="text-center font-bold text-lg"><span class="bg-white px-3 py-1 rounded shadow-sm">東西A</span> ➕ <span class="text-amber-600">像</span> ➕ <span class="bg-white px-3 py-1 rounded shadow-sm">東西B</span></p>
                    <hr class="my-3 border-amber-200">
                    <p class="text-slate-600 font-bold">例子：</p>
                    <p class="text-lg">彎彎的<span class="text-amber-600 font-bold">月亮</span> 🌙 <br>就像<br>彎彎的<span class="text-amber-600 font-bold">香蕉</span> 🍌。</p>
                </div>
            `,
            'r-person': `
                <div class="text-center mb-6"><span class="text-6xl">🌸 😄</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">什麼是「擬人」？</p>
                <p class="mb-4 text-slate-600">擬人就是把「死物」或「動植物」<span class="bg-emerald-100 px-2 rounded text-emerald-800 font-bold">當作真正的人</span>來寫，讓它們會做人類的動作！</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200">
                    <p class="font-black text-center text-xl mb-2 text-emerald-800">🪄 讓死物活起來的魔法：</p>
                    <p class="text-center font-bold text-lg mb-3">給它加上<span class="text-emerald-600 bg-white px-2 py-1 rounded shadow-sm">人類的動作</span></p>
                    <hr class="my-3 border-emerald-200">
                    <p class="text-slate-600 font-bold">對比一下：</p>
                    <p class="text-lg text-slate-500 line-through">普通寫法：花朵開了。</p>
                    <p class="text-lg font-bold text-emerald-700 mt-1">✨ 擬人寫法：花兒開心地<span class="bg-white px-2 rounded border border-emerald-300">笑了</span> 😄。</p>
                </div>
            `
        };

        window.showTutorial = function(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId];
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        };

        window.closeTutorial = function() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    window.startQuestion(targetIdx, true); 
                }
            }, 300);
        };

        // ================= 3. 基礎標點與修辭題庫 (160題 全解析版) =================
        const categories = [
            { id: 'r-punc-1', title: '🔴 基礎標點符號 (，。？！) - 40題', color: 'red' },
            { id: 'r-punc-2', title: '🟠 進階標點符號 (、：「) - 40題', color: 'orange' },
            { id: 'r-meta', title: '🌟 修辭手法：明喻句 (A像B) - 40題', color: 'amber' },
            { id: 'r-person', title: '🧚 修辭手法：擬人句 - 40題', color: 'emerald' }
        ];

        window.getPuncExp = function(punc) {
            if(punc==='，') return '逗號，表示句子中間的短暫停頓。';
            if(punc==='。') return '句號，表示一句話完整說完了。';
            if(punc==='？') return '問號，表示這是一句發問的話。';
            if(punc==='！') return '感嘆號，表示帶有強烈的感情或語氣。';
            if(punc==='、') return '頓號，用來分開連續相同種類的物品。';
            if(punc==='：') return '冒號，用來提示下面要說的話。';
            return '標點符號錯誤。';
        };

        window.formatPuncData = function(pool, category, task) {
            return pool.map(item => {
                let exp = `✅ ${item[1]}：${window.getPuncExp(item[1])}<br>❌ ${item[2][0]}：${window.getPuncExp(item[2][0])}<br>❌ ${item[2][1]}：${window.getPuncExp(item[2][1])}<br>❌ ${item[2][2]}：${window.getPuncExp(item[2][2])}`;
                return { category: category, task: task, sentence: item[0], correct: item[1], wrongs: item[2], explanation: exp };
            });
        };

        window.formatImgData = function(pool, category, task) {
            return pool.map(item => {
                let exp = `✅ ${item[1]}：${item[2]}<br>❌ ${item[3]}：${item[4]}<br>❌ ${item[5]}：${item[6]}<br>❌ ${item[7]}：${item[8]}`;
                return { category: category, task: task, sentence: item[0], correct: item[1], wrongs: [item[3], item[5], item[7]], explanation: exp };
            });
        };

        // --- 1. 基礎標點 (40題) ---
        const punc1Raw = [

            ['救命啊___有小偷！', '！', ['。','？','，']],

            ['蜘蛛在牆角忙著___自己的網。', '編織', '蜘蛛結網的動作就像人在編織毛衣一樣。', '拆除', '蜘蛛需要網來捕食。', '燒毀', '蜘蛛需要網。', '撕裂', '蜘蛛需要網。'],
            ['秋風像一把大掃帚，把落葉___乾淨。', '掃', '風把樹葉吹走，就像人用掃帚掃地。', '洗', '風不能洗。', '吃', '風不能吃。', '喝', '風不能喝。'],

            ['小汽車在公路上歡快地___著。', '奔馳', '車子開得快，就像人開心地奔跑。', '爬行', '汽車速度很快。', '睡覺', '汽車在行駛。', '發呆', '汽車在行駛。'],
            ['鬧鐘盡職地___著它的工作。', '堅守', '鬧鐘每天定時響，就像人堅守崗位。', '放棄', '鬧鐘很準時。', '逃避', '鬧鐘很準時。', '抱怨', '鬧鐘不會抱怨。'],
            ['夜空中的流星，像頑皮的孩子在___。', '溜滑梯', '流星滑落的軌跡，就像孩子在溜滑梯。', '睡覺', '流星是動態的。', '看書', '流星是動態的。', '發呆', '流星是動態的。']
        ];

        const rawQuestDataObj = [
            ...window.formatPuncData(punc1Raw, 'r-punc-1', '基礎標點：選出適合放在 ___ 位置的標點符號。'),
            ...window.formatPuncData(punc2Raw, 'r-punc-2', '進階標點：選出適合放在 ___ 位置的標點符號。'),
            ...window.formatImgData(metaPool, 'r-meta', '明喻句配對：根據想像，選出最適合的選項。'),
            ...window.formatImgData(personPool, 'r-person', '擬人句配對：找出能讓事物「活起來」的動作。')
        ];

        let userProgress = JSON.parse(localStorage.getItem('rhetBasicProgress')) || new Array(rawQuestDataObj.length).fill(0);

        window.renderDirectory = function() {
            const dirContainer = document.getElementById('directory-content');
            let html = '';
            categories.forEach(cat => {
                let hasQuestions = rawQuestDataObj.some(q => q.category === cat.id);
                if (hasQuestions) {
                    html += `
                        <div class="mb-6">
                            <div class="flex items-center justify-between border-b-2 border-${cat.color}-100 pb-2 mb-3">
                                <h3 class="text-xl font-bold text-${cat.color}-700">${cat.title}</h3>
                                <button onclick="window.showTutorial('${cat.id}')" class="bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-amber-300 hover:bg-amber-200 transition flex items-center gap-1 active:scale-95">📘 學習錦囊</button>
                            </div>
                            <div class="flex flex-wrap gap-3">
                    `;
                    rawQuestDataObj.forEach((q, idx) => {
                        if(q.category === cat.id) {
                            let status = userProgress[idx];
                            let btnClass = 'bg-white border-slate-300 text-slate-500 hover:bg-slate-50';
                            let icon = (idx + 1);

                            if (status === 1) {
                                btnClass = 'bg-yellow-100 border-yellow-400 text-yellow-700 shadow-inner';
                                icon = '🌟';
                            } else if (status === 2) {
                                btnClass = 'bg-emerald-100 border-emerald-400 text-emerald-700 shadow-inner';
                                icon = '✅';
                            } else if (status === -1) {
                                btnClass = 'bg-rose-100 border-rose-400 text-rose-700 shadow-inner';
                                icon = '❌';
                            }

                            html += `<button onclick="window.startQuestion(${idx})" class="lvl-btn ${btnClass} w-12 h-12 lg:w-14 lg:h-14 rounded-xl font-black text-base lg:text-lg border-b-4 flex items-center justify-center shadow-sm transition-transform">${icon}</button>`;
                        }
                    });
                    html += `</div></div>`;
                }
            });
            dirContainer.innerHTML = html;
            window.updateTotalProgress();
        };

        window.updateTotalProgress = function() {
            let solved = userProgress.filter(p => p === 1 || p === 2).length;
            let percent = (solved / rawQuestDataObj.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        };

        window.shuffleOptions = function(correct, wrongs) {
            let opts = [
                { text: correct, isCorrect: true },
                ...wrongs.map(w => ({ text: w, isCorrect: false }))
            ];
            return opts.sort(() => Math.random() - 0.5);
        };

        window.startQuestion = function(idx, forceStart = false) {
            const qData = rawQuestDataObj[idx];
            const qType = qData.category;
            
            if (!forceStart && !localStorage.getItem('tut_seen_' + qType)) {
                pendingQuestionIdx = idx; 
                window.showTutorial(qType);      
                return;                   
            }

            currentQuestionMistakes = 0; 
            currentQuestionIdx = idx;
            window.currentHints = []; 
            
            document.getElementById('quest-directory').style.display = 'none';
            const questPlay = document.getElementById('quest-play');
            questPlay.style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;
            
            const qCatTitle = categories.find(c => c.id === qType).title;
            const options = window.shuffleOptions(qData.correct, qData.wrongs);

            let ttsText = qData.sentence.replace(/___/g, '什麼');
            let sentenceHtml = qData.sentence.replace(/___/g, '<span class="text-amber-600 border-b-4 border-amber-500 px-6 font-black bg-amber-50 inline-block mx-1">?</span>');

            let html = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="window.backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-amber-100 text-amber-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">第 ${idx + 1} 題 / 共 160 題</span>
                </div>
                
                <div class="slide-up w-full bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-amber-500 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">
                        ${qCatTitle}
                    </span>
                    
                    <div class="w-full flex items-center gap-3 mt-4 mb-6">
                        <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">任務</span>
                        <h2 class="text-lg md:text-xl font-bold text-slate-700">${qData.task}</h2>
                    </div>

                    <div class="w-full flex items-start gap-4 mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-inner mt-2">
                        <button onclick="window.speakText('${ttsText.replace(/'/g, "\\'")}')" class="tts-btn flex-shrink-0 bg-white text-amber-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-amber-200 mt-1">🔊</button>
                        <div class="text-2xl md:text-3xl font-bold text-slate-800 leading-loose">${sentenceHtml}</div>
                    </div>

                    <div class="flex flex-col gap-3 w-full max-w-2xl mt-auto" id="options-container">
            `;
            
            // 標點符號的按鈕特別放大
            let isPunc = qType.includes('punc');
            let textClass = isPunc ? 'text-5xl md:text-6xl pb-8 pt-4' : 'text-2xl md:text-3xl py-6';

            options.forEach((optItem, oIdx) => {
                const isCorr = optItem.isCorrect;
                const letter = ['A','B','C','D'][oIdx];
                const safeOpt = optItem.text.replace(/'/g, "\\'");
                html += `
                <div class="flex items-stretch gap-2 w-full">
                    <button onclick="window.checkAnswer(this, ${isCorr}, '${safeOpt}')" class="option-btn flex-1 bg-white border-4 border-slate-200 text-slate-700 font-bold ${textClass} rounded-2xl hover:bg-amber-50 hover:border-amber-300 transition text-left flex items-center gap-4 px-6">
                        <span class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 mt-0.5">${letter}</span> 
                        <span class="leading-relaxed break-words option-text-span">${optItem.text}</span>
                    </button>
                    <button onclick="window.speakText(window.getTTSOptionText(this.previousElementSibling.querySelector('.option-text-span').innerText), 0.95)" class="tts-btn flex-shrink-0 bg-amber-50 text-amber-600 w-16 rounded-2xl text-3xl flex items-center justify-center shadow-sm border-2 border-amber-200 hover:bg-amber-100 transition" title="朗讀此選項">🔊</button>
                </div>`;
            });
            
            html += `
                    </div>
                    <!-- 💡 動態提示框 -->
                    <div id="dynamic-hint-box" class="hidden w-full max-w-2xl mt-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm text-yellow-800 font-bold text-lg flex items-start gap-3 slide-up">
                        <div class="flex-1 space-y-2" id="hint-text"></div>
                        <button id="hint-tts-btn" class="text-2xl hover:scale-110 transition bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>
                    </div>
                </div>
            `;
            document.getElementById('quest-play').innerHTML = html;
        };

        window.backToDirectory = function() {
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            window.renderDirectory();
        };

        window.checkAnswer = function(btnElement, isCorrect, clickedOptText) {
            const allBtns = document.querySelectorAll('.option-btn');
            const qData = rawQuestDataObj[currentQuestionIdx];
            
            if (isCorrect) {
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                btnElement.classList.add('correct');
                const expText = qData.explanation; 
                
                let completeSentence = qData.sentence.replace('___', clickedOptText);
                window.speakText("答對了！" + completeSentence);
                
                let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
                let previousStatus = userProgress[currentQuestionIdx];
                let expGained = 0;

                if (previousStatus !== 1 && previousStatus !== 2) {
                    expGained = finalStatus === 1 ? 15 : 5;
                } else if (previousStatus === 2 && finalStatus === 1) {
                    expGained = 10; 
                }

                if (expGained > 0) {
                    rhetExp += expGained;
                    localStorage.setItem('rhetBasicExp', rhetExp);
                    document.getElementById('exp-display').innerText = rhetExp;
                    document.getElementById('exp-display').classList.add('pop');
                    setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                }

                if (finalStatus === 1 || previousStatus !== 1) {
                    userProgress[currentQuestionIdx] = finalStatus;
                    localStorage.setItem('rhetBasicProgress', JSON.stringify(userProgress));
                }

                let modalIcon = finalStatus === 1 ? '🌟' : '✅';
                let modalTitle = finalStatus === 1 ? '太棒了！一次答對！' : '成功找出正解！';
                let expMsg = expGained > 0 
                    ? `<span class="text-amber-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                    : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
                
                // 🔥 全選項深度解析
                let combinedDesc = expMsg + `
                    <div class="bg-amber-50 border-l-4 border-amber-500 p-4 text-left text-amber-900 rounded-r-lg font-bold">
                        <div class="flex justify-between items-center mb-3 pb-2 border-b border-amber-200">
                            <span class="text-xl">📚 選項全解析</span>
                            <button onclick="window.speakText('${expText.replace(/'/g, "\\'")}')" class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm hover:bg-amber-100 text-xl transition active:scale-95">🔊</button>
                        </div>
                        <div class="space-y-3 text-base leading-relaxed">${expText}</div>
                    </div>`;

                setTimeout(() => { window.showModal(modalIcon, modalTitle, combinedDesc); }, 800);
            } else {
                // ❌ 答錯邏輯：動態累積提示
                btnElement.classList.add('wrong', 'shake');
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('rhetBasicProgress', JSON.stringify(userProgress));
                
                // 找出被點擊選項的解釋
                let lines = qData.explanation.split('<br>');
                let matchedLine = lines.find(l => l.includes(clickedOptText));
                let newHint = "請再仔細想一想喔！";
                
                if (matchedLine) {
                    newHint = matchedLine.replace(/^[✅❌]\s*/, ''); 
                }

                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(newHint)) {
                    window.currentHints.push(newHint);
                }

                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-2 mb-2 last:border-0 last:pb-0 last:mb-0">💡 ${h}</div>`).join('');
                
                document.getElementById('hint-text').innerHTML = combinedHintsHtml;
                document.getElementById('hint-tts-btn').onclick = () => window.speakText(window.currentHints.join('。'));
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                window.speakText("不對喔，" + newHint);
                
                setTimeout(() => {
                    btnElement.classList.remove('shake');
                }, 500);
            }
        };

        window.showModal = function(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    let nextIdx = currentQuestionIdx + 1;
                    if (nextIdx < rawQuestDataObj.length) window.startQuestion(nextIdx);
                    else { window.showToast("恭喜完成所有挑戰！"); window.backToDirectory(); }
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        };

        window.backToDirectoryFromModal = function() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                window.backToDirectory();
            }, 300);
        };

        window.onload = function() {
            document.getElementById('exp-display').innerText = rhetExp;
            window.renderDirectory();
        };
    </script>
