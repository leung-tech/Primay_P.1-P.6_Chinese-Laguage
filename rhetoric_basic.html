<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修辭與標點 - 基礎圖文配對</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #fffbeb; /* 溫暖的琥珀/淺黃背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #fef3c7 1px, transparent 1px), linear-gradient(to bottom, #fef3c7 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #fcd34d; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #fef3c7; border-color: #f59e0b; color: #b45309; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 (Amber 配色) -->

            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-amber-600 p-1 rounded transition bg-amber-700">⬅️ 返回</a>

            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-amber-600 px-3 py-1.5 rounded-full border border-amber-400 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-200">0</span></span>

        </div>

        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">

                <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-amber-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+15)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 嘗試後答對 (+5)</div>

                </div>

            </div>

        </div>
    </div>

    <!-- 學習小教學 Modal -->

    <div id="toast" class="toast-msg">提示訊息</div>

        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1; // 記錄被教學視窗攔截的題目 Index

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-HK';
                msg.rate = 0.85; 
                window.speechSynthesis.speak(msg);
            }

            'r-punc-2': `

        function showTutorial(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            
            // 載入對應內容
            document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId];
            
            // 顯示
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            
            // 記錄已看過此教學
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                // 如果有被攔截的題目，關閉教學後自動進入題目
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    startQuestion(targetIdx, true); // force=true 表示跳過檢查
                }
            }, 300);
        }

            { id: 'r-punc-1', title: '🔴 基礎標點符號 (，。？！)', color: 'red' },

        ];

        function generateData(pool, category, task, count) {
            let result = [];
            for (let i = 0; i < count; i++) {
                let item = pool[i % pool.length];
                result.push({ category: category, task: task, qData: item });
            }
            return result;
        }

        const rawQuestDataObj = [
            ...generateData(punc1Pool, 'r-punc-1', '基礎標點：選出適合放在 _ 位置的標點符號。', 30),
            ...generateData(punc2Pool, 'r-punc-2', '進階標點：選出適合放在 _ 位置的標點符號。', 30),
            ...generateData(metaPool, 'r-meta', '明喻句配對：根據想像，選出最適合的圖片。', 30),
            ...generateData(personPool, 'r-person', '擬人句配對：找出能讓事物「活起來」的動作。', 30)
        ]; // 總共 120 題

        let userProgress = JSON.parse(localStorage.getItem('rhetBasicProgress')) || new Array(rawQuestDataObj.length).fill(0);

        function renderDirectory() {
            const dirContainer = document.getElementById('directory-content');
            let html = '';
            categories.forEach(cat => {
                html += `
                    <div class="mb-6">
                        <div class="flex items-center justify-between border-b-2 border-${cat.color}-100 pb-2 mb-3">
                            <h3 class="text-xl font-bold text-${cat.color}-700">${cat.title}</h3>
                            <button onclick="showTutorial('${cat.id}')" class="bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-amber-300 hover:bg-amber-200 transition flex items-center gap-1 active:scale-95">📘 學習錦囊</button>
                        </div>
                        <div class="flex flex-wrap gap-3">
                `;
                rawQuestDataObj.forEach((q, idx) => {
                    if(q.category === cat.id) {
                        let status = userProgress[idx];
                        let btnClass = 'bg-white border-slate-300 text-slate-500 hover:bg-slate-50';
                        let icon = (idx + 1);

                        if (status === 1) {
                            btnClass = 'bg-yellow-100 border-yellow-400 text-yellow-700 shadow-inner';
                            icon = '🌟';
                        } else if (status === 2) {
                            btnClass = 'bg-emerald-100 border-emerald-400 text-emerald-700 shadow-inner';
                            icon = '✅';
                        } else if (status === -1) {
                            btnClass = 'bg-rose-100 border-rose-400 text-rose-700 shadow-inner';
                            icon = '❌';
                        }

                        html += `<button onclick="startQuestion(${idx})" class="lvl-btn ${btnClass} w-12 h-12 lg:w-14 lg:h-14 rounded-xl font-black text-base lg:text-lg border-b-4 flex items-center justify-center shadow-sm transition-transform">${icon}</button>`;
                    }
                });
                html += `</div></div>`;
            });
            dirContainer.innerHTML = html;
            updateTotalProgress();
        }

        function updateTotalProgress() {
            let solved = userProgress.filter(p => p === 1 || p === 2).length;
            let percent = (solved / rawQuestDataObj.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        let currentQuestionIdx = -1;

        function shuffleOptions(optionsArray, correctIndex) {
            let opts = optionsArray.map((opt, i) => ({ text: opt, isCorrect: i === correctIndex }));
            return opts.sort(() => Math.random() - 0.5);
        }

        function startQuestion(idx, forceStart = false) {
            const qData = rawQuestDataObj[idx];
            const qType = qData.category;
            
            // 🌟 自動攔截機制：如果這個類別的教學沒看過，強制彈出教學
            if (!forceStart && !localStorage.getItem('tut_seen_' + qType)) {
                pendingQuestionIdx = idx; // 記住想進入的題目
                showTutorial(qType);      // 彈出對應的教學視窗
                return;                   // 中斷進入題目
            }

            // --- 正式進入題目邏輯 ---
            currentQuestionMistakes = 0; 
            currentQuestionIdx = idx;
            document.getElementById('quest-directory').style.display = 'none';
            const questPlay = document.getElementById('quest-play');
            questPlay.style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;
            
            const qCatTitle = categories.find(c => c.id === qType).title;
            const qTask = qData.task;

            let html = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-amber-100 text-amber-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">第 ${idx + 1} 題 / 共 120 題</span>
                </div>
                
                <div class="slide-up w-full bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-amber-500 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">
                        ${qCatTitle}
                    </span>
                    
                    <div class="w-full flex items-center gap-3 mt-4 mb-4">
                        <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">任務</span>
                        <h2 class="text-lg md:text-xl font-bold text-slate-700">${qTask}</h2>
                    </div>
            `;

            const sentence = qData.qData[0];
            const correctAns = qData.qData[1];
            const wrongAns = qData.qData[2];

            const allOptions = [correctAns, ...wrongAns];
            const shuffledOpts = shuffleOptions(allOptions, 0);

            // 語音：遇到底線讀出「什麼」
            let ttsText = sentence.replace(/[_]/g, '什麼');

            // 畫面顯示：將底線替換成一個醒目的方塊
            let sentenceHtml = sentence.replace(/[_]+/g, '<span class="text-amber-600 border-b-4 border-amber-500 px-4 md:px-6 mx-1 font-black bg-amber-50 inline-block">?</span>');

            html += `
                <div class="w-full flex items-start gap-4 mb-8 bg-amber-50 p-6 rounded-2xl border border-amber-100 shadow-inner mt-4">
                    <button onclick="speakText('${ttsText}')" class="tts-btn flex-shrink-0 bg-white text-amber-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-amber-200">🔊</button>
                    <div class="text-2xl md:text-3xl font-bold text-slate-800 leading-relaxed">${sentenceHtml}</div>
                </div>

                <div class="grid grid-cols-2 gap-4 w-full mt-auto" id="options-container">
            `;
            
            // 如果是標點符號，按鈕文字要極大化
            let isPunc = qType.includes('punc');
            let textClass = isPunc ? 'text-5xl md:text-6xl pb-8 pt-4' : 'text-xl md:text-2xl py-6';

            shuffledOpts.forEach((opt) => {
                html += `<button onclick="checkSelectionAnswer(this, ${opt.isCorrect})" class="option-btn bg-white border-4 border-slate-200 text-slate-700 font-bold ${textClass} rounded-2xl hover:bg-amber-50 hover:border-amber-300 transition w-full text-center">${opt.text}</button>`;
            });
            
            html += `</div></div>`;
            questPlay.innerHTML = html;
        }

        // --- 選擇題檢查邏輯 ---
        function checkSelectionAnswer(btnElement, isCorrect) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.classList.add('correct');
                const qData = rawQuestDataObj[currentQuestionIdx];
                let answerText = qData.qData[1];
                let sentence = qData.qData[0];
                
                // 組合完整句子
                let completeSentence = sentence.replace(/[_]+/g, answerText);

                speakText("答對了！" + completeSentence.replace(/[A-Za-z0-9]/g, '')); // 語音過濾掉emoji
                handleCorrectAnswer(completeSentence);
            } else {
                btnElement.classList.add('wrong', 'shake');
                speakText("不對喔，請再想想看！");
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('rhetBasicProgress', JSON.stringify(userProgress));
                
                setTimeout(() => {
                    btnElement.classList.remove('wrong', 'shake');
                    allBtns.forEach(b => { if (!b.classList.contains('correct')) b.style.pointerEvents = 'auto'; });
                }, 1500);
            }
        }

        // --- 共通答對處理 ---
        function handleCorrectAnswer(completeText) {
            let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentQuestionIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 15 : 5;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 10; 
            }

            if (expGained > 0) {
                rhetExp += expGained;
                localStorage.setItem('rhetBasicExp', rhetExp);
                document.getElementById('exp-display').innerText = rhetExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentQuestionIdx] = finalStatus;
                localStorage.setItem('rhetBasicProgress', JSON.stringify(userProgress));
            }

            let modalIcon = finalStatus === 1 ? '🌟' : '✅';
            let modalTitle = finalStatus === 1 ? '太棒了！一次答對！' : '成功找出正解！';
            let expMsg = expGained > 0 
                ? `<span class="text-amber-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
            
            let combinedDesc = expMsg + `<div class="bg-amber-50 border-l-4 border-amber-500 p-4 text-left text-slate-800 rounded-r-lg font-bold text-2xl leading-relaxed">${completeText}</div>`;

            setTimeout(() => { showModal(modalIcon, modalTitle, combinedDesc); }, 1000);
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function backToDirectory() {
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function backToDirectoryFromModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        function goToNextQuestion() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                let nextIdx = currentQuestionIdx + 1;
                if (nextIdx < rawQuestDataObj.length) startQuestion(nextIdx);
                else { showToast("恭喜完成所有挑戰！"); backToDirectory(); }
            }, 300);
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = rhetExp;
            renderDirectory();
            document.getElementById('next-btn').onclick = goToNextQuestion;
        }
