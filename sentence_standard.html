<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>句子與語法 - 標準常規訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #fff7ed; /* 活力淺橘色背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #ffedd5 1px, transparent 1px), linear-gradient(to bottom, #ffedd5 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #fdba74; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #ffedd5; border-color: #f97316; color: #c2410c; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        /* 重組句子專用 */
        .chunk-btn { transition: all 0.2s; box-shadow: 0 4px 0 #ea580c; }
        .chunk-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .chunk-slot { transition: all 0.2s; border: 2px dashed #fdba74; background-color: #fff7ed; }

        /* 擴充句子插入點專用 */
        .insert-slot { border: 2px dashed #f97316; background-color: #ffedd5; color: #ea580c; transition: all 0.2s; cursor: pointer; }
        .insert-slot:hover { background-color: #fed7aa; transform: scale(1.05); }
        
        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }

        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-orange-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-orange-700 p-1 rounded transition bg-orange-800">⬅️ 返回</a>
                <span>📝 句子與語法 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-orange-800 px-3 py-1.5 rounded-full border border-orange-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <!-- 目錄 -->
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">⭐ 標準句型常規特訓</h2>
                
                <div class="bg-orange-50 border border-orange-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-orange-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+20)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 嘗試後答對 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 未完成</div>

                </div>

                <div id="directory-content" class="flex flex-col gap-8">

                </div>
            </div>
            
            <!-- 答題區 -->
            <div id="quest-play" class="w-full hidden flex-col items-center">
                <!-- 題目動態生成 -->
            </div>
        </div>
    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">

            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4">

            </div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-orange-700 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 反饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-sm text-center transform scale-90 transition-transform" id="feedback-content">

            <h2 id="feedback-title" class="text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-6 text-lg leading-relaxed text-center"></div>
            <div class="flex gap-3 w-full mt-4">

                <button id="next-btn" class="flex-[1.5] bg-orange-600 hover:bg-orange-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-orange-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心設定 =================
        let sentExp = parseInt(localStorage.getItem('sentStandardExp')) || 0;
        document.getElementById('exp-display').innerText = sentExp;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1; // 記錄被教學攔截的題目
        
        // 用於重組句子的狀態變數
        let reorderSource = []; 
        let reorderTarget = []; 
        let reorderCorrect = []; 

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-HK';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // ================= 1.5 學習錦囊內容 (教學資源庫) =================
        const tutorialContents = {
            's-insert': `
                <div class="text-center mb-4"><span class="text-6xl">🧩 ➕ 📝</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">如何精準「擴充句子」？</p>
                <p class="mb-4 text-slate-600">擴充句子就像幫詞語找好朋友，你要判斷新詞語應該放在哪裡！</p>
                <div class="bg-orange-50 p-4 rounded-xl border-2 border-orange-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-orange-800 text-lg border-b border-orange-200 pb-1 mb-2">1. 修飾物品的「的」👉 放在名詞前面</p>
                        <p class="text-base text-slate-600">例：把「美麗的」放入「這是一朵花」</p>
                        <p class="text-lg font-bold">✅ 這是一朵 <span class="text-white bg-orange-500 px-2 rounded">美麗的</span> 花。</p>
                    </div>
                    <div>
                        <p class="font-black text-rose-800 text-lg border-b border-rose-200 pb-1 mb-2">2. 修飾動作的「地」👉 放在動詞前面</p>
                        <p class="text-base text-slate-600">例：把「開心地」放入「妹妹在畫畫」</p>
                        <p class="text-lg font-bold">✅ 妹妹 <span class="text-white bg-rose-500 px-2 rounded">開心地</span> 在畫畫。</p>
                    </div>
                </div>
            `,
            's-conj': `
                <div class="text-center mb-4"><span class="text-6xl">🔗 💡</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">關聯詞魔法配對！</p>
                <p class="mb-4 text-slate-600">關聯詞能把兩個句子連起來，不同的關聯詞有不同的魔法效果喔：</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 space-y-3">
                    <p class="text-lg"><span class="bg-white font-black text-amber-700 border border-amber-300 px-2 py-1 rounded">因為...所以...</span> 👉 解釋原因和結果</p>
                    <p class="text-lg"><span class="bg-white font-black text-rose-700 border border-rose-300 px-2 py-1 rounded">雖然...但是...</span> 👉 事情有轉折 (意想不到)</p>
                    <p class="text-lg"><span class="bg-white font-black text-blue-700 border border-blue-300 px-2 py-1 rounded">不但...而且...</span> 👉 好的加好，壞的加壞 (遞進)</p>
                    <p class="text-lg"><span class="bg-white font-black text-emerald-700 border border-emerald-300 px-2 py-1 rounded">如果...就...</span> 👉 假設一種情況</p>
                </div>
            `,
            's-reorder-adv': `
                <div class="text-center mb-4"><span class="text-6xl">🕵️‍♂️ 🚂</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">破解長句子密碼！</p>
                <p class="mb-4 text-slate-600">遇到很長的句子不要怕，我們有「三步解碼法」：</p>
                <div class="bg-teal-50 p-4 rounded-xl border-2 border-teal-200 mb-3 space-y-3 text-lg font-bold text-teal-900">
                    <p>1️⃣ 先找 <span class="bg-white px-2 rounded text-rose-600 border border-rose-200">關聯詞</span> (因為、所以、雖然)，排在句首。</p>
                    <p>2️⃣ 再找 <span class="bg-white px-2 rounded text-blue-600 border border-blue-200">人物 / 時間</span> (他、今天、我們)。</p>
                    <p>3️⃣ 最後配對 <span class="bg-white px-2 rounded text-orange-600 border border-orange-200">動作 / 事情</span> 把它們連起來！</p>
                </div>
            `,
            's-rhetorical': `
                <div class="text-center mb-4"><span class="text-6xl">🔄 ❓</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">陳述句 VS 反問句</p>
                <p class="mb-4 text-slate-600">「反問句」表面上是問問題 (❓)，其實是用來表達非常肯定的意思！轉換時有一個大秘訣：</p>
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200 mb-3 text-center">
                    <p class="font-black text-xl text-blue-800 mb-2">✨ 變變變口訣 ✨</p>
                    <p class="text-lg font-bold mb-1"><span class="text-rose-600">有「不」</span> 變成 <span class="text-emerald-600">沒「不」</span></p>
                    <p class="text-lg font-bold"><span class="text-emerald-600">沒「不」</span> 變成 <span class="text-rose-600">有「不」</span></p>
                    <hr class="my-3 border-blue-200">
                    <p class="text-left text-slate-700 text-base">例：你不<span class="text-rose-500 font-bold">應該</span>生氣。<br>👉 你怎麼<span class="text-rose-500 font-bold">能</span>生氣呢？</p>
                </div>
            `
        };

        function showTutorial(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            
            document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId];
            
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    startQuestion(targetIdx, true); // force=true 略過攔截
                }
            }, 300);
        }

        // ================= 2. 標準語法題庫 (無重複，純淨 80 題) =================
        const categories = [
            { id: 's-insert', title: '🌟 擴充句子 (精準插入位置)', color: 'orange' },
            { id: 's-conj', title: '🔗 關聯詞運用 (邏輯配對)', color: 'amber' },
            { id: 's-reorder-adv', title: '🧩 進階重組 (長句與複句)', color: 'teal' },
            { id: 's-rhetorical', title: '🔄 句型轉換 (陳述與反問)', color: 'blue' }
        ];

        function formatData(pool, category, task) {
            return pool.map(item => ({
                category: category,
                task: task,
                qData: item
            }));
        }

        // --- 題型 A：擴充句子插入位置 (20題) ---
        const insertPool = [
            [['妹妹', '在畫畫。'], '開心地', 1],
            [['太陽', '升起來了。'], '慢慢地', 1],
            [['這是一朵', '花。'], '美麗的', 1],
            [['我們', '去公園玩。'], '星期天', 1],
            [['老師', '講解課文。'], '耐心地', 1],
            [['小狗', '搖尾巴。'], '高興地', 1],
            [['他', '跑過來。'], '急急忙忙地', 1],
            [['天空', '下起了大雨。'], '突然', 1],
            [['這件衣服', '太小了。'], '實在', 1],
            [['我', '完成功課。'], '每天都', 1],
            [['這是一本', '故事書。'], '有趣的', 1],
            [['小魚', '在水裡游。'], '自由自在地', 1],
            [['星星', '在夜空中閃爍。'], '明亮的', 0], 
            [['弟弟', '把飯吃完了。'], '大口大口地', 1],
            [['風', '吹過樹林。'], '輕輕地', 1],
            [['媽媽', '準備了晚餐。'], '精心', 1],
            [['同學們', '聽老師講故事。'], '專心地', 1],
            [['這座山', '很高。'], '真的', 1],
            [['小鳥', '在樹上唱歌。'], '快樂地', 1],
            [['汽車', '在公路上行駛。'], '飛快地', 1]
        ];

        // --- 題型 B：關聯詞填充 (20題) ---
        const conjPool = [
            ['___明天下大雨，我們___不去了。', ['如果...就...', '因為...所以...', '雖然...但是...'], 0],
            ['___他生病了，___他沒有來上學。', ['因為...所以...', '不但...而且...', '如果...就...'], 0],
            ['他___聰明，___非常勤奮。', ['不但...而且...', '雖然...但是...', '與其...不如...'], 0],
            ['___這次考試很難，___他還是考了滿分。', ['雖然...但是...', '因為...所以...', '只要...就...'], 0],

            ['他___自己受委屈，___不願意連累朋友。', ['寧可...也...', '與其...不如...', '不但...而且...'], 0],
            ['___天氣有多熱，他___堅持每天跑步。', ['無論...都...', '即使...也...', '雖然...但是...'], 0],
            ['___大家都同意，這件事___這麼決定了。', ['既然...就...', '因為...所以...', '如果...就...'], 0],
            ['這件衣服___款式好看，___價錢也很便宜。', ['不但...而且...', '雖然...但是...', '因為...所以...'], 0],
            ['這___一本普通的書，___一本魔法書。', ['不是...而是...', '不但...而且...', '不是...就是...'], 0],

            ['___你已經知道錯了，___應該馬上道歉。', ['既然...就...', '只要...就...', '因為...所以...'], 0],
            ['這隻小狗___可愛，___十分聰明。', ['不僅...還...', '不是...而是...', '寧可...也...'], 0],
            ['我們___在這裡等待，___主動去尋找線索。', ['與其...不如...', '不但...而且...', '既然...就...'], 0],
            ['___遇到多大的困難，我們___不能輕言放棄。', ['即使...也...', '只要...就...', '因為...所以...'], 0],
            ['這頓晚餐___豐盛，___非常美味。', ['不但...而且...', '雖然...但是...', '不是...而是...'], 0],
            ['___外面風雨交加，他___堅持要去送信。', ['儘管...還是...', '如果...就...', '既然...就...'], 0],
            ['___沒有你的幫助，我___無法完成這項任務。', ['如果...就...', '無論...都...', '雖然...但是...'], 0],

        ];

        // --- 題型 C：進階重組長句 (20題) ---
        const reorderAdvPool = [
            [['因為', '今天', '下大雨，', '所以', '比賽', '取消了。'], '🌧️'],
            [['雖然', '這道題', '很難，', '但是', '他', '算出來了。'], '✍️'],
            [['如果', '明天', '好天氣，', '我們', '就', '去郊遊。'], '☀️'],

            [['他', '不是', '在看書，', '就是', '在', '畫畫。'], '🎨'],
            [['老師', '常常', '教導我們，', '做人', '要', '誠實。'], '👨‍🏫'],
            [['這本', '故事書', '不但', '有趣，', '而且', '有教育意義。'], '📚'],
            [['因為', '他', '生病了，', '所以', '今天', '請假。'], '🤒'],
            [['雖然', '烏龜', '爬得慢，', '但是', '牠', '沒有放棄。'], '🐢'],
            [['我', '一回到家，', '就', '馬上', '開始', '做功課。'], '📝'],
            [['只有', '堅持不懈，', '才', '能', '實現', '夢想。'], '⭐'],
            [['他', '寧可', '自己吃虧，', '也', '不願意', '傷害別人。'], '❤️'],
            [['既然', '大家', '都有空，', '我們', '就', '去看電影吧。'], '🎬'],
            [['儘管', '路途', '遙遠，', '他', '還是', '準時到達了。'], '⏰'],
            [['與其', '浪費時間，', '不如', '多讀', '幾本', '好書。'], '📖']
        ];

        // --- 題型 D：句型轉換 (20題) ---
        const rhetoricalPool = [
            ['這點小事，你不應該生氣。（改為反問句）', ['這點小事，你怎麼能生氣呢？', '這點小事，你一定會生氣。', '這點小事，請你不要生氣。'], 0],
            ['這件事怎麼能怪他呢？（改為陳述句）', ['這件事不應該怪他。', '這件事一定要怪他。', '這件事難道不怪他嗎？'], 0],
            ['我們不能浪費食物。（改為反問句）', ['我們怎麼能浪費食物呢？', '我們一定不要浪費食物。', '我們是不會浪費食物的。'], 0],
            ['這難道不是一個好主意嗎？（改為陳述句）', ['這是一個好主意。', '這不是一個好主意。', '這可能是一個好主意。'], 0],
            ['父母的養育之恩，我們永遠不能忘記。（改為反問句）', ['父母的養育之恩，我們怎麼能忘記呢？', '父母的養育之恩，我們一定會忘記的。', '父母的養育之恩，請大家不要忘記。'], 0],
            ['遇到困難，我們怎麼能輕易放棄呢？（改為陳述句）', ['遇到困難，我們不能輕易放棄。', '遇到困難，我們必須輕易放棄。', '遇到困難，我們可能會輕易放棄。'], 0],
            ['破壞公物是不對的行為。（改為反問句）', ['破壞公物難道是對的行為嗎？', '破壞公物絕對是不對的行為。', '破壞公物可能是對的行為。'], 0],
            ['天下哪有免費的午餐呢？（改為陳述句）', ['天下沒有免費的午餐。', '天下一定有免費的午餐。', '天下其實有免費的午餐。'], 0],
            ['這美麗的風景，難道不令人陶醉嗎？（改為陳述句）', ['這美麗的風景令人陶醉。', '這美麗的風景不令人陶醉。', '這美麗的風景有時令人陶醉。'], 0],
            ['你做錯了事，應該向他道歉。（改為反問句）', ['你做錯了事，難道不應該向他道歉嗎？', '你做錯了事，一定要向他道歉。', '你做錯了事，請馬上向他道歉。'], 0],
            ['我們不應該欺負弱小。（改為反問句）', ['我們怎麼能欺負弱小呢？', '我們一定會欺負弱小的。', '我們是不會欺負弱小的。'], 0],
            ['難道這不是大家的責任嗎？（改為陳述句）', ['這是大家的責任。', '這不是大家的責任。', '這或許是大家的責任。'], 0],
            ['說謊是絕對不能被原諒的。（改為反問句）', ['說謊怎麼能被原諒呢？', '說謊一定會被原諒的。', '說謊有時能被原諒。'], 0],
            ['這麼簡單的問題，你怎麼會不懂呢？（改為陳述句）', ['這麼簡單的問題，你應該懂。', '這麼簡單的問題，你不應該懂。', '這麼簡單的問題，你可能不懂。'], 0],
            ['我們必須遵守交通規則。（改為反問句）', ['我們難道不必須遵守交通規則嗎？', '我們一定不必須遵守交通規則。', '我們有時必須遵守交通規則。'], 0],
            ['難道你沒有聽見上課鐘聲嗎？（改為陳述句）', ['你應該聽見上課鐘聲了。', '你沒有聽見上課鐘聲。', '你可能聽見上課鐘聲了。'], 0],
            ['隨地吐痰是沒有公德心的表現。（改為反問句）', ['隨地吐痰難道是有公德心的表現嗎？', '隨地吐痰絕對是沒有公德心的表現。', '隨地吐痰或許是有公德心的表現。'], 0],
            ['誰說世上沒有真正的友誼呢？（改為陳述句）', ['世上是有真正的友誼的。', '世上是沒有真正的友誼的。', '世上可能有真正的友誼。'], 0],
            ['我們應該愛護大自然。（改為反問句）', ['我們怎麼能不愛護大自然呢？', '我們一定會愛護大自然的。', '我們是不會愛護大自然的。'], 0],
            ['難道他不值得我們學習嗎？（改為陳述句）', ['他值得我們學習。', '他不值得我們學習。', '他可能值得我們學習。'], 0]
        ];

        // 總共純淨 80 題
        const rawQuestDataObj = [
            ...formatData(insertPool, 's-insert', '擴充句子：請點擊正確的位置，把詞語加入句子中。'),
            ...formatData(conjPool, 's-conj', '關聯詞：選出最合適的關聯詞填入空格。'),
            ...formatData(reorderAdvPool, 's-reorder-adv', '進階重組：請依正確順序點擊詞語，重組複句。'),
            ...formatData(rhetoricalPool, 's-rhetorical', '句型轉換：選出意思相同，但句型正確的選項。')
        ];

        let userProgress = JSON.parse(localStorage.getItem('sentStandardProgress')) || new Array(rawQuestDataObj.length).fill(0);

        function renderDirectory() {
            const dirContainer = document.getElementById('directory-content');
            let html = '';
            categories.forEach(cat => {
                html += `
                    <div class="mb-6">
                        <div class="flex items-center justify-between border-b-2 border-${cat.color}-100 pb-2 mb-3">
                            <h3 class="text-xl font-bold text-${cat.color}-700">${cat.title}</h3>
                            <button onclick="showTutorial('${cat.id}')" class="bg-orange-100 text-orange-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-orange-300 hover:bg-orange-200 transition flex items-center gap-1 active:scale-95">📘 學習錦囊</button>
                        </div>
                        <div class="flex flex-wrap gap-3">
                `;
                rawQuestDataObj.forEach((q, idx) => {
                    if(q.category === cat.id) {
                        let status = userProgress[idx];
                        let btnClass = 'bg-white border-slate-300 text-slate-500 hover:bg-slate-50';
                        let icon = (idx + 1);

                        if (status === 1) {
                            btnClass = 'bg-yellow-100 border-yellow-400 text-yellow-700 shadow-inner';
                            icon = '🌟';
                        } else if (status === 2) {
                            btnClass = 'bg-emerald-100 border-emerald-400 text-emerald-700 shadow-inner';
                            icon = '✅';
                        } else if (status === -1) {
                            btnClass = 'bg-rose-100 border-rose-400 text-rose-700 shadow-inner';
                            icon = '❌';
                        }

                        html += `<button onclick="startQuestion(${idx})" class="lvl-btn ${btnClass} w-12 h-12 lg:w-14 lg:h-14 rounded-xl font-black text-base lg:text-lg border-b-4 flex items-center justify-center shadow-sm transition-transform">${icon}</button>`;
                    }
                });
                html += `</div></div>`;
            });
            dirContainer.innerHTML = html;
            updateTotalProgress();
        }

        function updateTotalProgress() {
            let solved = userProgress.filter(p => p === 1 || p === 2).length;
            let percent = (solved / rawQuestDataObj.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        let currentQuestionIdx = -1;

        function shuffleOptions(optionsArray, correctIndex) {
            let opts = optionsArray.map((opt, i) => ({ text: opt, isCorrect: i === correctIndex }));
            return opts.sort(() => Math.random() - 0.5);
        }

        function startQuestion(idx, forceStart = false) {
            const qData = rawQuestDataObj[idx];
            const qType = qData.category;
            
            // 🌟 自動攔截機制：如果沒看過教學，強制彈出
            if (!forceStart && !localStorage.getItem('tut_seen_' + qType)) {
                pendingQuestionIdx = idx;
                showTutorial(qType);
                return;
            }

            currentQuestionMistakes = 0; 
            currentQuestionIdx = idx;
            document.getElementById('quest-directory').style.display = 'none';
            const questPlay = document.getElementById('quest-play');
            questPlay.style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;
            
            const qCatTitle = categories.find(c => c.id === qType).title;
            const qTask = qData.task;

            let html = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-orange-100 text-orange-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">第 ${idx + 1} 題 / 共 80 題</span>
                </div>
                
                <div class="slide-up w-full bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-orange-500 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">
                        ${qCatTitle}
                    </span>
                    
                    <div class="w-full flex items-center gap-3 mt-4 mb-4">
                        <span class="bg-orange-100 text-orange-800 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">任務</span>
                        <h2 class="text-lg md:text-xl font-bold text-slate-700">${qTask}</h2>
                    </div>
            `;

            if (qType === 's-insert') {
                // 擴充句子
                const chunks = qData.qData[0];
                const phrase = qData.qData[1];
                const ansPos = qData.qData[2];

                let ttsText = `請把「${phrase}」放入句子：` + chunks.join('');
                
                html += `
                    <div class="w-full text-center mb-6 mt-2">
                        <div class="inline-block bg-orange-100 text-orange-800 border-2 border-orange-300 rounded-2xl p-4 md:p-6 shadow-md">
                            <div class="text-sm font-bold text-orange-600 mb-2">準備加入的詞語</div>
                            <div class="text-4xl md:text-5xl font-black tracking-widest pop">${phrase}</div>
                        </div>
                    </div>
                    <button onclick="speakText('${ttsText}')" class="mb-6 bg-orange-100 text-orange-700 font-bold px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-orange-200 transition"><span class="text-2xl">🔊</span> 朗讀題目</button>

                    <div class="w-full bg-slate-50 p-6 md:p-8 rounded-2xl border-2 border-slate-200 flex flex-wrap items-center justify-center gap-2 mb-6 text-2xl md:text-3xl font-bold text-slate-700 leading-loose">
                `;

                for (let i = 0; i <= chunks.length; i++) {
                    const isCorr = (i === ansPos);
                    html += `<button onclick="checkInsertAnswer(this, ${isCorr}, '${phrase}', ${i})" class="insert-slot px-4 py-2 rounded-xl text-orange-400 font-black" title="點擊放入這裡">＋</button>`;
                    if (i < chunks.length) {
                        html += `<span>${chunks[i]}</span>`;
                    }
                }
                html += `</div></div>`;
                questPlay.innerHTML = html;

            } else if (qType === 's-reorder-adv') {
                // 進階重組句子
                const chunkArray = qData.qData[0];
                const fullSentence = chunkArray.join('');
                const emoji = qData.qData[1];
                
                reorderCorrect = [...chunkArray];
                reorderSource = [...reorderCorrect].sort(() => Math.random() - 0.5);
                reorderTarget = [];

                html += `
                    <div class="text-7xl md:text-8xl mb-4 text-center animate-bounce drop-shadow-md cursor-default select-none">${emoji}</div>
                    <button onclick="speakText('${fullSentence}')" class="mb-6 bg-teal-100 text-teal-700 font-bold px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-teal-200 transition"><span class="text-2xl">🔊</span> 聽聽完整句子</button>
                    
                    <!-- 目標放置區 -->
                    <div class="w-full bg-slate-50 p-4 md:p-6 rounded-2xl border-2 border-slate-200 min-h-[120px] flex flex-wrap content-start gap-2 mb-6" id="reorder-target-area">
                    </div>

                    <div class="w-full border-t-2 border-dashed border-slate-200 my-2"></div>

                    <!-- 來源點擊區 -->
                    <div class="text-center text-slate-500 font-bold mb-2 text-sm">👇 點擊下方詞語加入句子</div>
                    <div class="w-full flex flex-wrap justify-center gap-3" id="reorder-source-area">
                    </div>
                `;
                html += `</div>`;
                questPlay.innerHTML = html;
                renderReorderUI();

            } else {
                // 關聯詞 或 句型轉換
                const sentence = qData.qData[0];
                const options = qData.qData[1];
                const ansIdx = qData.qData[2];

                let ttsText = sentence.replace(/___/g, '什麼');
                let sentenceHtml = sentence.replace(/___/g, '<span class="text-orange-600 border-b-4 border-orange-500 px-4 md:px-6 mx-1 font-black bg-orange-50 inline-block">?</span>');

                html += `
                    <div class="w-full flex items-start gap-4 mb-8 bg-orange-50 p-6 rounded-2xl border border-orange-100 shadow-inner mt-4">
                        <button onclick="speakText('${ttsText}')" class="tts-btn flex-shrink-0 bg-white text-orange-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-orange-200">🔊</button>
                        <div class="text-2xl md:text-3xl font-bold text-slate-800 leading-relaxed">${sentenceHtml}</div>
                    </div>

                    <div class="grid grid-cols-1 gap-4 w-full mt-auto" id="options-container">
                `;
                
                const shuffledOpts = shuffleOptions(options, ansIdx);

                shuffledOpts.forEach((opt) => {
                    html += `<button onclick="checkSelectionAnswer(this, ${opt.isCorrect})" class="option-btn bg-white border-4 border-slate-200 text-slate-700 text-xl md:text-2xl font-bold py-5 rounded-2xl hover:bg-slate-50 transition w-full text-center">${opt.text}</button>`;
                });
                
                html += `</div></div>`;
                questPlay.innerHTML = html;
            }
        }

        // --- 擴充句子專用邏輯 ---
        function checkInsertAnswer(btnElement, isCorrect, phrase, index) {
            const allSlots = document.querySelectorAll('.insert-slot');
            allSlots.forEach(s => s.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.innerHTML = phrase;
                btnElement.className = "px-4 py-2 rounded-xl text-white font-black bg-orange-500 pop shadow-md mx-2";
                
                const qData = rawQuestDataObj[currentQuestionIdx].qData;
                let finalSentence = "";
                for (let i=0; i<=qData[0].length; i++){
                    if(i===index) finalSentence += phrase;
                    if(i<qData[0].length) finalSentence += qData[0][i];
                }
                
                speakText("答對了！" + finalSentence);
                handleCorrectAnswer(finalSentence);
            } else {
                btnElement.classList.add('bg-rose-200', 'border-rose-400', 'text-rose-700', 'shake');
                speakText("放在這裡好像不太通順喔！");
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('sentStandardProgress', JSON.stringify(userProgress));
                
                setTimeout(() => {
                    btnElement.classList.remove('bg-rose-200', 'border-rose-400', 'text-rose-700', 'shake');
                    allSlots.forEach(s => s.style.pointerEvents = 'auto');
                }, 1000);
            }
        }

        // --- 重組句子 UI 渲染與邏輯 ---
        function renderReorderUI() {
            const tArea = document.getElementById('reorder-target-area');
            const sArea = document.getElementById('reorder-source-area');
            if(!tArea || !sArea) return;

            let tHtml = '';
            if (reorderTarget.length === 0) {
                tHtml = '<span class="text-slate-400 font-bold m-auto">你的句子會顯示在這裡...</span>';
            } else {
                reorderTarget.forEach((chunk, idx) => {
                    tHtml += `<button onclick="removeFromTarget(${idx})" class="chunk-btn bg-orange-500 text-white font-black text-xl md:text-2xl py-3 px-5 rounded-xl shadow-md pop">${chunk}</button>`;
                });
            }
            tArea.innerHTML = tHtml;

            let sHtml = '';
            reorderSource.forEach((chunk, idx) => {
                if (chunk === null) {
                    sHtml += `<div class="chunk-slot w-24 h-14 md:w-32 md:h-16 rounded-xl"></div>`; 
                } else {
                    sHtml += `<button onclick="moveToTarget(${idx})" class="chunk-btn bg-white border-2 border-slate-300 text-slate-700 hover:border-orange-400 hover:bg-orange-50 font-black text-xl md:text-2xl py-3 px-5 rounded-xl shadow">${chunk}</button>`;
                }
            });
            sArea.innerHTML = sHtml;

            if (reorderTarget.length > 0 && reorderTarget.length === reorderCorrect.length) {
                checkReorderAnswer();
            }
        }

        function moveToTarget(sourceIdx) {
            let chunk = reorderSource[sourceIdx];
            reorderSource[sourceIdx] = null; 
            reorderTarget.push(chunk);
            speakText(chunk);
            renderReorderUI();
        }

        function removeFromTarget(targetIdx) {
            let chunk = reorderTarget[targetIdx];
            reorderTarget.splice(targetIdx, 1);
            let emptyIdx = reorderSource.indexOf(null);
            if(emptyIdx !== -1) reorderSource[emptyIdx] = chunk;
            renderReorderUI();
        }

        function checkReorderAnswer() {
            let isCorrect = true;
            for(let i=0; i<reorderCorrect.length; i++) {
                if(reorderTarget[i] !== reorderCorrect[i]) isCorrect = false;
            }

            if (isCorrect) {
                speakText("重組正確！" + reorderCorrect.join(''));
                handleCorrectAnswer(reorderCorrect.join(''));
            } else {
                speakText("順序好像有點不對喔，再試試看！");
                currentQuestionMistakes++;
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('sentStandardProgress', JSON.stringify(userProgress));
                
                const tArea = document.getElementById('reorder-target-area');
                tArea.classList.add('bg-rose-100', 'border-rose-400', 'shake');
                setTimeout(() => tArea.classList.remove('bg-rose-100', 'border-rose-400', 'shake'), 800);
                
                setTimeout(() => {
                    if(reorderTarget.length > 0) removeFromTarget(reorderTarget.length - 1);
                }, 1000);
            }
        }

        // --- 選擇題檢查邏輯 ---
        function checkSelectionAnswer(btnElement, isCorrect) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                btnElement.classList.add('correct');
                const qData = rawQuestDataObj[currentQuestionIdx];
                let answerText = "";
                
                if (qData.category === 's-conj') {
                    let parts = btnElement.innerText.split('...');
                    let sentence = qData.qData[0];
                    if(parts.length >= 2) {
                        sentence = sentence.replace('___', parts[0]).replace('___', parts[1]);
                    }
                    answerText = sentence.replace(/___/g, ''); 
                } else if (qData.category === 's-rhetorical') {
                    answerText = btnElement.innerText;
                }

                speakText("答對了！" + answerText);
                handleCorrectAnswer(answerText);
            } else {
                btnElement.classList.add('wrong', 'shake');
                speakText("不對喔，請再想想看！");
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('sentStandardProgress', JSON.stringify(userProgress));
                
                setTimeout(() => {
                    btnElement.classList.remove('wrong', 'shake');
                    allBtns.forEach(b => { if (!b.classList.contains('correct')) b.style.pointerEvents = 'auto'; });
                }, 1500);
            }
        }

        // --- 共通答對處理 ---
        function handleCorrectAnswer(completeText) {
            let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentQuestionIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 20 : 10;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 10; 
            }

            if (expGained > 0) {
                sentExp += expGained;
                localStorage.setItem('sentStandardExp', sentExp);
                document.getElementById('exp-display').innerText = sentExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentQuestionIdx] = finalStatus;
                localStorage.setItem('sentStandardProgress', JSON.stringify(userProgress));
            }

            let modalIcon = finalStatus === 1 ? '🌟' : '✅';
            let modalTitle = finalStatus === 1 ? '太棒了！一次答對！' : '成功找出正解！';
            let expMsg = expGained > 0 
                ? `<span class="text-orange-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
            
            let combinedDesc = expMsg + `<div class="bg-orange-50 border-l-4 border-orange-500 p-4 text-left text-slate-800 rounded-r-lg font-bold text-xl leading-relaxed">${completeText}</div>`;

            setTimeout(() => { showModal(modalIcon, modalTitle, combinedDesc); }, 1000);
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function backToDirectory() {
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function backToDirectoryFromModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        function goToNextQuestion() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                let nextIdx = currentQuestionIdx + 1;
                if (nextIdx < rawQuestDataObj.length) startQuestion(nextIdx);
                else { showToast("恭喜完成所有挑戰！"); backToDirectory(); }
            }, 300);
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = sentExp;
            renderDirectory();
            document.getElementById('next-btn').onclick = goToNextQuestion;
        }
    </script>
</body>
</html>
