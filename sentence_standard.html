<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>句子與語法 - 標準常規訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #fff7ed; /* 活力淺橘色背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #ffedd5 1px, transparent 1px), linear-gradient(to bottom, #ffedd5 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #fdba74; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #ffedd5; border-color: #f97316; color: #c2410c; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        /* 重組句子專用 */
        .chunk-btn { transition: all 0.2s; box-shadow: 0 4px 0 #ea580c; }
        .chunk-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .chunk-slot { transition: all 0.2s; border: 2px dashed #fdba74; background-color: #fff7ed; }

        /* 擴充句子插入點專用 */
        .insert-slot { border: 2px dashed #f97316; background-color: #ffedd5; color: #ea580c; transition: all 0.2s; cursor: pointer; min-width: 40px; text-align: center; }
        .insert-slot:hover { background-color: #fed7aa; transform: scale(1.05); }
        
        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-orange-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-orange-700 p-1 rounded transition bg-orange-800">⬅️ 返回</a>
                <span>📝 句子與語法 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-orange-800 px-3 py-1.5 rounded-full border border-orange-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">⭐ 複句與語法常規特訓</h2>
                <div class="bg-orange-50 border border-orange-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-orange-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+30)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 經提示過關 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 未完成</div>
                    </div>
                </div>
                <div id="directory-content" class="flex flex-col gap-8"></div>
            </div>
            <div id="quest-play" class="w-full hidden flex-col items-center"></div>
        </div>
    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-orange-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-orange-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-orange-700 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-xl text-center transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-2">🎉</div>
            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-4 text-base md:text-lg leading-relaxed text-left overflow-y-auto pr-2 flex-1 w-full"></div>
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-orange-600 hover:bg-orange-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-orange-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態 =================
        let sentStdExp = parseInt(localStorage.getItem('sentStdExp')) || 0;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1;
        let currentQuestionIdx = -1;
        window.currentHints = []; 
        
        let reorderSource = []; 
        let reorderTarget = []; 
        let reorderCorrect = []; 

        document.getElementById('exp-display').innerText = sentStdExp;

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】＋]/g, '').replace(/&nbsp;/g, ' ');
                let msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'zh-HK';
                msg.rate = 0.9; 
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // ================= 2. 學習錦囊 (教學庫) =================
        const tutorialContents = {
            's-complex-type': `
                <div class="text-center mb-4"><span class="text-6xl">🧩 🔗</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">什麼是「複句」？</p>
                <p class="mb-4 text-slate-600">複句就是由<span class="text-orange-600 font-bold">兩個或以上的小句子</span>，透過「關聯詞」連接起來的大句子！</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 space-y-3 font-bold text-amber-900 text-sm md:text-base">
                    <p><span class="bg-white px-2 rounded text-amber-700">💡 因果複句</span> 👉 因為...所以... (有原因和結果)</p>
                    <p><span class="bg-white px-2 rounded text-amber-700">💡 轉折複句</span> 👉 雖然...但是... (事情發生了意想不到的變化)</p>
                    <p><span class="bg-white px-2 rounded text-amber-700">💡 條件複句</span> 👉 只有...才... / 只要...就... (必須達到某個條件)</p>
                    <p><span class="bg-white px-2 rounded text-amber-700">💡 假設複句</span> 👉 如果...就... / 即使...也... (假設一種情況)</p>
                    <p><span class="bg-white px-2 rounded text-amber-700">💡 遞進複句</span> 👉 不但...而且... (程度更深一步)</p>
                    <p><span class="bg-white px-2 rounded text-amber-700">💡 並列複句</span> 👉 一邊...一邊... / 不是...而是... (兩件事同時存在)</p>
                    <p><span class="bg-white px-2 rounded text-amber-700">💡 選擇複句</span> 👉 不是...就是... / 與其...不如... (二選一)</p>
                    <p><span class="bg-white px-2 rounded text-amber-700">💡 承接複句</span> 👉 一...就... / 先...然後... (有時間先後順序)</p>
                </div>
            `,
            's-conj': `
                <div class="text-center mb-4"><span class="text-6xl">🤝 🖇️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">關聯詞的好朋友配對</p>
                <p class="mb-4 text-slate-600">填寫關聯詞時，要像偵探一樣分析前後兩個句子的關係：</p>
                <div class="bg-orange-50 p-4 rounded-xl border-2 border-orange-200 mb-3 space-y-3">
                    <p>✔️ 如果是<span class="font-bold text-orange-600">好的加好，壞的加壞</span> 👉 這是「遞進」，用<span class="bg-white px-1 rounded font-bold">不但...而且</span></p>
                    <p>✔️ 如果是<span class="font-bold text-orange-600">結果出乎意料</span> 👉 這是「轉折」，用<span class="bg-white px-1 rounded font-bold">雖然...但是</span></p>
                    <p>✔️ 如果是<span class="font-bold text-orange-600">唯一的方法</span> 👉 這是「條件」，用<span class="bg-white px-1 rounded font-bold">只有...才</span></p>
                </div>
            `,
            's-reorder-complex': `
                <div class="text-center mb-4"><span class="text-6xl">🏗️ 🚂</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">複句重組秘訣</p>
                <p class="mb-4 text-slate-600">遇到很長的積木不要怕，我們有「三步解碼法」：</p>
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200 mb-3 space-y-3 text-base font-bold text-blue-900">
                    <p>1️⃣ 先找 <span class="bg-white px-2 rounded text-rose-600">關聯詞</span> (因為、所以、雖然)，把它們分別排在兩個小句子的最前面。</p>
                    <p>2️⃣ 再找 <span class="bg-white px-2 rounded text-blue-600">人物 / 時間</span> (他、今天、我們)。</p>
                    <p>3️⃣ 最後把剩下的 <span class="bg-white px-2 rounded text-orange-600">動作 / 事情</span> 依邏輯連起來！</p>
                </div>
            `,
            's-insert': `
                <div class="text-center mb-4"><span class="text-6xl">🧩 ➕ 📝</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">如何精準「擴充句子」？</p>
                <p class="mb-4 text-slate-600">這關考驗你為詞語找對位置！點擊句子中的 <span class="text-orange-500 font-black border-2 border-orange-500 px-2 rounded border-dashed">＋</span> 號插入詞語：</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-emerald-800 text-lg border-b border-emerald-200 pb-1 mb-2">1. 修飾物品的「的」👉 放在名詞前面</p>
                        <p class="text-base text-slate-700">例：把「美麗的」放入「這是一朵花」<br>✅ 這是一朵 <span class="text-white bg-emerald-600 px-2 rounded">美麗的</span> 花。</p>
                    </div>
                    <div>
                        <p class="font-black text-emerald-800 text-lg border-b border-emerald-200 pb-1 mb-2">2. 修飾動作的「地」👉 放在動詞前面</p>
                        <p class="text-base text-slate-700">例：把「開心地」放入「妹妹在畫畫」<br>✅ 妹妹 <span class="text-white bg-emerald-600 px-2 rounded">開心地</span> 在畫畫。</p>
                    </div>
                </div>
            `,
            's-rhetorical': `
                <div class="text-center mb-4"><span class="text-6xl">🔄 ❓</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">陳述句 VS 反問句</p>
                <p class="mb-4 text-slate-600">「反問句」表面上是問問題，其實是用來表達非常肯定的意思！轉換時有一個大秘訣：</p>
                <div class="bg-indigo-50 p-4 rounded-xl border-2 border-indigo-200 mb-3 text-center">
                    <p class="font-black text-xl text-indigo-800 mb-2">✨ 變變變口訣 ✨</p>
                    <p class="text-lg font-bold mb-1"><span class="text-rose-600">有「不」</span> 變成 <span class="text-emerald-600">沒「不」</span></p>
                    <p class="text-lg font-bold"><span class="text-emerald-600">沒「不」</span> 變成 <span class="text-rose-600">有「不」</span></p>
                    <hr class="my-3 border-indigo-200">
                    <p class="text-left text-slate-700 text-base">例：你不<span class="text-rose-500 font-bold">應該</span>生氣。<br>👉 你難道<span class="text-rose-500 font-bold">應該</span>生氣嗎？</p>
                </div>
            `
        };

        function showTutorial(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId];
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    startQuestion(targetIdx, true); 
                }
            }, 300);
        }

        // ================= 3. 題庫資料 (150題) =================
        const categories = [
            { id: 's-complex-type', title: '🔍 認識複句類型 (30題)', color: 'blue' },
            { id: 's-conj', title: '🔗 關聯詞應用 (30題)', color: 'amber' },
            { id: 's-reorder-complex', title: '🧩 複句重組實戰 (30題)', color: 'teal' },
            { id: 's-insert', title: '➕ 擴充句子 (30題)', color: 'emerald' },
            { id: 's-rhetorical', title: '🔄 句型轉換 (30題)', color: 'indigo' }
        ];

        // --- 1. 認識複句類型 (MCQ) ---
        const complexTypePool = [
            ['因為今天下大雨，所以體育課取消了。', '因果複句', '轉折複句', '遞進複句', '條件複句', '句子中有「因為...所以...」，表達原因和結果的關係。'],
            ['雖然他生病了，但他依然堅持上學。', '轉折複句', '因果複句', '遞進複句', '並列複句', '句子中有「雖然...但...」，表示事情發生了意想不到的轉變。'],
            ['如果明天天氣好，我們就去郊遊。', '假設複句', '條件複句', '因果複句', '轉折複句', '句子中有「如果...就...」，提出一種假設的情況。'],
            ['只有多做運動，身體才會健康。', '條件複句', '假設複句', '因果複句', '遞進複句', '句子中有「只有...才...」，表示必須達到某個條件。'],
            ['他不但聰明，而且非常勤奮。', '遞進複句', '並列複句', '選擇複句', '轉折複句', '句子中有「不但...而且...」，表示程度更進一步。'],
            ['這支筆不是我的，而是小明的。', '並列複句', '選擇複句', '轉折複句', '因果複句', '句子中有「不是...而是...」，表示兩件事物平等的並列關係。'],
            ['與其在家裡發呆，不如去圖書館看書。', '選擇複句', '轉折複句', '假設複句', '條件複句', '句子中有「與其...不如...」，表示在兩者之中做出選擇。'],
            ['下課鐘聲一響，同學們就跑出課室。', '承接複句', '因果複句', '並列複句', '遞進複句', '句子中有「一...就...」，表示動作有時間先後順序。'],
            ['既然你答應了別人，就應該做到。', '因果複句', '假設複句', '條件複句', '轉折複句', '「既然...就...」也是一種因果關係（推論因果）。'],
            ['儘管路途遙遠，他還是準時到達了。', '轉折複句', '條件複句', '遞進複句', '假設複句', '「儘管...還是...」與「雖然...但是...」一樣，是轉折關係。'],
            ['即使明天下雪，比賽也會如期舉行。', '假設複句', '條件複句', '轉折複句', '因果複句', '「即使...也...」表示退一步的假設情況。'],
            ['只要你肯努力，就一定能成功。', '條件複句', '假設複句', '因果複句', '遞進複句', '「只要...就...」表示只要有這個條件，就會有這個結果。'],
            ['這本書不僅內容豐富，插圖還很精美。', '遞進複句', '並列複句', '轉折複句', '因果複句', '「不僅...還...」表示好的方面更加深一層。'],

                [opts[i], opts[j]] = [opts[j], opts[i]];

            return { options: opts, ansIdx: opts.indexOf(correct) };

            const tArea = document.getElementById('reorder-target-area');
            const sArea = document.getElementById('reorder-source-area');
            if(!tArea || !sArea) return;

            let tHtml = '';
            if (reorderTarget.length === 0) {

                });
            }
            tArea.innerHTML = tHtml;

            let sHtml = '';
            reorderSource.forEach((chunk, idx) => {

                    sHtml += `<div class="chunk-slot w-24 h-14 md:w-32 md:h-16 rounded-xl"></div>`;

            });
            sArea.innerHTML = sHtml;

            if (reorderTarget.length > 0 && reorderTarget.length === reorderCorrect.length) {

            let chunk = reorderSource[sourceIdx];

            speakText(chunk);

        function removeFromTarget(targetIdx) {
            let chunk = reorderTarget[targetIdx];
            reorderTarget.splice(targetIdx, 1);
            let emptyIdx = reorderSource.indexOf(null);
            if(emptyIdx !== -1) reorderSource[emptyIdx] = chunk;
            renderReorderUI();
        }

        function checkReorderAnswer() {
            let isCorrect = true;
            let correctCount = 0;
            for(let i=0; i<reorderTarget.length; i++) {
                if(reorderTarget[i] === reorderCorrect[i]) {
                    correctCount++;
                } else {
                    isCorrect = false;
                    break;
                }
            }

            const qData = rawQuestDataObj[currentQuestionIdx];

            if (isCorrect && reorderTarget.length === reorderCorrect.length) {
                speakText("完美的重組！");
                let expText = `✅ 正確句子：<br>${reorderCorrect.join('')}<br><br>💡 解析：${qData.hint}`;
                triggerSuccess(expText);
            } else if (reorderTarget.length === reorderCorrect.length) {
                currentQuestionMistakes++;
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('sentStdProgress', JSON.stringify(userProgress));
                
                let chunksToReturn = reorderTarget.splice(correctCount);
                for (let chunk of chunksToReturn) {
                    let emptyIdx = reorderSource.indexOf(null);
                    if(emptyIdx !== -1) {
                        reorderSource[emptyIdx] = chunk;
                    } else {
                        reorderSource.push(chunk);
                    }
                }

                let hintWord = reorderCorrect[correctCount];
                let newHint = `排錯了喔！正確的部分已保留。<br>👉 下一個應該是：「<span class="text-rose-600">${hintWord}</span>」<br>💡 技巧：${qData.hint}`;

                document.getElementById('hint-text').innerHTML = newHint;
                document.getElementById('hint-tts-btn').onclick = () => speakText(`排錯了喔。下一個應該是，${hintWord}`);
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("順序不對喔，請看提示！");
                
                const tArea = document.getElementById('reorder-target-area');
                tArea.classList.add('bg-rose-100', 'border-rose-400', 'shake');
                setTimeout(() => tArea.classList.remove('bg-rose-100', 'border-rose-400', 'shake'), 800);

                renderReorderUI();
            }
        }

        // --- 選擇題檢查邏輯 ---
        function checkMCQAnswer(btnElement, isCorrect, clickedOptText) {
            const allBtns = document.querySelectorAll('.option-btn');
            const qData = rawQuestDataObj[currentQuestionIdx];
            
            if (isCorrect) {
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                btnElement.classList.add('correct');
                const expText = qData.explanation; 
                
                speakText("精準！");
                triggerSuccess(expText);
            } else {
                btnElement.classList.add('wrong', 'shake');
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('sentStdProgress', JSON.stringify(userProgress));
                
                // 由於這裡的選擇題沒有像拔尖版那樣寫滿4個解析，我們提供通用錯誤提示
                let newHint = "請再仔細想一想喔！";
                if (qData.category === 's-complex-type') newHint = "複句判斷錯誤，請根據關聯詞再試一次！";
                if (qData.category === 's-conj') newHint = "這個關聯詞放在這裡意思不通順喔！";
                if (qData.category === 's-rhetorical') newHint = "注意有沒有「不」字，意思不能改變喔！";

                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(newHint)) window.currentHints.push(newHint);

                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-1 last:border-0 last:pb-0">💡 ${h}</div>`).join('');
                document.getElementById('hint-text').innerHTML = combinedHintsHtml;
                document.getElementById('hint-tts-btn').onclick = () => speakText(window.currentHints.join('。'));
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("不對喔，" + newHint);
                setTimeout(() => { btnElement.classList.remove('shake'); }, 500);
            }
        }

        // --- 插入題檢查邏輯 ---
        function checkInsertAnswer(btnElement, isCorrect) {
            const allSlots = document.querySelectorAll('.insert-slot');
            const qData = rawQuestDataObj[currentQuestionIdx];

            if (isCorrect) {
                allSlots.forEach(b => b.style.pointerEvents = 'none');
                btnElement.classList.add('bg-orange-500', 'text-white', 'pop');
                btnElement.innerText = qData.insertWord;

                let completeSentence = "";
                for (let i = 0; i <= qData.chunks.length; i++) {
                    if (i === qData.ansPos) completeSentence += qData.insertWord;
                    if (i < qData.chunks.length) completeSentence += qData.chunks[i];
                }

                speakText("答對了！" + completeSentence);
                triggerSuccess(`✅ 完整句子：<br>${completeSentence}<br><br>💡 解析：${qData.explanation}`);
            } else {
                btnElement.classList.add('bg-rose-200', 'text-rose-700', 'shake');
                currentQuestionMistakes++;
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('sentStdProgress', JSON.stringify(userProgress));

                let newHint = "放這裡讀起來不太通順喔！<br>" + qData.hint;
                
                document.getElementById('hint-text').innerHTML = `💡 ${newHint}`;
                document.getElementById('hint-tts-btn').onclick = () => speakText(newHint);
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');

                speakText("放在這裡好像不太通順喔！");
                
                setTimeout(() => {
                    btnElement.classList.remove('bg-rose-200', 'text-rose-700', 'shake');
                }, 1000);
            }
        }

        // --- 成功處理共通邏輯 ---
        function triggerSuccess(expText) {
            let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentQuestionIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 30 : 10;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 20; 
            }

            if (expGained > 0) {
                sentStdExp += expGained;
                localStorage.setItem('sentStdExp', sentStdExp);
                document.getElementById('exp-display').innerText = sentStdExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentQuestionIdx] = finalStatus;
                localStorage.setItem('sentStdProgress', JSON.stringify(userProgress));
            }

            let modalIcon = finalStatus === 1 ? '🌟' : '✅';
            let modalTitle = finalStatus === 1 ? '完美答對！' : '成功過關！';
            let expMsg = expGained > 0 
                ? `<span class="text-orange-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
            
            let combinedDesc = expMsg + `
                <div class="bg-orange-50 border-l-4 border-orange-500 p-4 text-left text-orange-900 rounded-r-lg font-bold">
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-orange-200">
                        <span class="text-xl">📚 深度解析</span>
                        <button onclick="speakText('${expText}')" class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm hover:bg-orange-100 text-xl transition active:scale-95">🔊</button>
                    </div>
                    <div class="space-y-3 text-base leading-relaxed">${expText}</div>
                </div>`;

            setTimeout(() => { showModal(modalIcon, modalTitle, combinedDesc); }, 800);
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    let nextIdx = currentQuestionIdx + 1;
                    if (nextIdx < rawQuestDataObj.length) startQuestion(nextIdx);
                    else { showToast("恭喜完成所有挑戰！"); backToDirectory(); }
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function backToDirectory() {
            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function backToDirectoryFromModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = sentStdExp;
            renderDirectory();
        }
    </script>
</body>
</html>
