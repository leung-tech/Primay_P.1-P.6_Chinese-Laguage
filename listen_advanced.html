<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聆聽與說話 - 拔尖進階特訓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #fdf4ff; -webkit-tap-highlight-color: transparent; }
        .bg-grid-pattern { background-image: linear-gradient(to right, #f3e8ff 1px, transparent 1px), linear-gradient(to bottom, #f3e8ff 1px, transparent 1px); background-size: 40px 40px; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #d8b4fe; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #faf5ff; border-color: #a855f7; color: #6b21a8; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }
        
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #9333ea; color: white; border-color: #7e22ce; }
        .tab-inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }
        
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg { visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }

        .tag-badge { background-color: #f3e8ff; color: #7e22ce; border-color: #d8b4fe; }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 (Purple 配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-purple-700 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-purple-800 p-1 rounded transition bg-purple-900">⬅️ 返回</a>
                <span>🗣️ 聆聽與說話 (拔尖版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-purple-900 px-3 py-1.5 rounded-full border border-purple-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('listen')" id="tab-listen" class="tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-purple-700">🎧 深度聆聽 (長篇推論)</button>
            <button onclick="switchMode('speak')" id="tab-speak" class="tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200">🗣️ 故事改編與延展</button>
        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <!-- 聆聽推論目錄 -->
        <div id="listen-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="listen-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2">🎧 拔尖長篇聆聽挑戰</h2>
                    <button onclick="showTutorial('t-adv-listen')" class="bg-purple-100 text-purple-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-purple-300 hover:bg-purple-200 transition">📘 學習錦囊</button>
                </div>
                <p class="text-slate-600 font-bold mb-4">超長篇章，資訊密集！每篇包含 8 道高難度推論題，考驗你的記憶與邏輯分析。</p>
                <div id="listen-content" class="flex flex-wrap gap-4"></div>
            </div>
            
            <div id="listen-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- 故事改編目錄 -->
        <div id="speak-mode" class="w-full max-w-5xl mx-auto hidden flex-col gap-4 lg:gap-6">
            <div id="speak-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2">🗣️ 故事改編與延展演講</h2>
                    <button onclick="showTutorial('t-adv-speak')" class="bg-purple-100 text-purple-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-purple-300 hover:bg-purple-200 transition">📘 學習錦囊</button>
                </div>
                <p class="text-slate-600 font-bold mb-4">升中面試必備：打破常規，給經典故事一個全新的反轉結局或獨特觀點！</p>
                <div id="speak-content" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="speak-play" class="w-full hidden flex-col items-center"></div>
        </div>

    </div>

    <!-- 學習錦囊 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform duration-300 flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-purple-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-purple-600 flex items-center gap-2">📘 拔尖神探錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-purple-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 pointer-events-none">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-[90%] max-w-sm text-center transform scale-90 transition-transform duration-300 pointer-events-auto" id="feedback-content">
            <div class="text-7xl mb-4">🎉</div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">精準推斷！</h2>
            <p id="feedback-desc" class="text-purple-600 font-bold mb-6 text-xl leading-relaxed">成功捕捉深層含義！</p>
            <div class="flex gap-3 w-full mt-4">
                <button id="next-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-3 rounded-xl shadow-lg transition text-xl border-b-4 border-purple-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態與語音 =================
        let advExp = parseInt(localStorage.getItem('listenAdvExp')) || 0;
        document.getElementById('exp-display').innerText = advExp;
        
        let currentMode = 'listen'; 
        let currentStoryIdx = -1;
        let currentQuestionIdx = -1;
        let storyUtterance = null; 
        
        // 用於處理教學 Modal 關閉後的自動跳轉
        let pendingTaskIdx = -1;
        let pendingTaskType = '';

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message; toast.className = "toast-msg show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // 強制廣東話 (zh-HK)
        function speakText(text, rate = 0.85) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-HK'; 
                msg.rate = rate; 
                window.speechSynthesis.speak(msg);
            }
        }

        // 播放與停止廣播
        function playStoryTTS() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const story = listenData[currentStoryIdx];
                let cleanText = story.text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】]/g, '').replace(/&nbsp;/g, ' ');
                
                storyUtterance = new SpeechSynthesisUtterance(cleanText);
                storyUtterance.lang = 'zh-HK'; 
                storyUtterance.rate = 0.85; 

                storyUtterance.onstart = function() {
                    document.getElementById('btn-play-story').classList.add('hidden');
                    document.getElementById('btn-stop-story').classList.remove('hidden');
                };
                storyUtterance.onend = function() {
                    document.getElementById('btn-play-story').classList.remove('hidden');
                    document.getElementById('btn-stop-story').classList.add('hidden');
                };
                storyUtterance.onerror = function() {
                    document.getElementById('btn-play-story').classList.remove('hidden');
                    document.getElementById('btn-stop-story').classList.add('hidden');
                };

                window.speechSynthesis.speak(storyUtterance);
            } else {
                showToast("您的瀏覽器不支援語音功能。");
            }
        }

        function stopStoryTTS() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const btnPlay = document.getElementById('btn-play-story');
                const btnStop = document.getElementById('btn-stop-story');
                if (btnPlay && btnStop) {
                    btnPlay.classList.remove('hidden');
                    btnStop.classList.add('hidden');
                }
            }
        }

        // ================= 2. 教學內容 =================
        const tutorialData = {
            't-adv-listen': `
                <div class="text-center mb-4"><span class="text-6xl">🧠 🕵️‍♂️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">拔尖聆聽：聽出言外之意</p>
                <p class="mb-4 text-slate-600">這關的故事非常長，且資訊密集。你必須運用高階邏輯：</p>
                <div class="bg-purple-50 p-4 rounded-xl border-2 border-purple-200 mb-3 space-y-3 font-bold text-purple-900">
                    <p>💡 <span class="bg-white px-2 py-1 rounded shadow-sm text-purple-600">抓矛盾點</span> 👉 人物說的話和他的動作不一致時，通常代表他在說謊或隱瞞。</p>
                    <p>💡 <span class="bg-white px-2 py-1 rounded shadow-sm text-purple-600">聽潛台詞</span> 👉 表面上的讚美，可能是暗諷；看似平淡的結尾，往往藏著文章的主旨。</p>
                    <p>💡 <span class="bg-white px-2 py-1 rounded shadow-sm text-purple-600">記憶細節</span> 👉 遇到長篇故事，可以邊聽邊在腦海中畫出時間線。</p>
                </div>
            `,
            't-adv-speak': `
                <div class="text-center mb-4"><span class="text-6xl">🔄 🎙️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">升中面試絕招：反轉思維</p>
                <p class="mb-4 text-slate-600">如果你講的故事和別人都一樣，考官是不會記住你的！嘗試運用「反轉思維」：</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 space-y-2 text-base font-bold text-slate-700">
                    <p>🐢 如果烏龜沒有贏？<span class="text-amber-600 font-normal">也許牠明白了自己的極限，選擇了游泳比賽。</span></p>
                    <p>🐺 如果大野狼是好人？<span class="text-amber-600 font-normal">也許牠只是想幫小紅帽趕走真正的壞人。</span></p>
                    <hr class="border-amber-200 my-2">
                    <p class="text-rose-600">👉 加入創意的結局，並說出一個全新的人生道理！</p>
                </div>
            `
        };

        function showTutorial(tutKey) {
            document.getElementById('tutorial-body').innerHTML = tutorialData[tutKey];
            const modal = document.getElementById('tutorial-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); document.getElementById('tutorial-content').classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + tutKey, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingTaskIdx !== -1) {
                    let targetIdx = pendingTaskIdx;
                    let targetType = pendingTaskType;
                    pendingTaskIdx = -1;
                    pendingTaskType = '';
                    if (targetType === 'listen') startListen(targetIdx, true);
                    else if (targetType === 'speak') startSpeak(targetIdx, true);
                }
            }, 300);
        }

        function updateTotalProgress() {
            let lDone = listenProgress.filter(p => p === 1).length;
            let sDone = speakProgress.filter(p => p === 1).length;
            let total = listenData.length + speakData.length;
            let percent = ((lDone + sDone) / total) * 100;
            const pb = document.getElementById('progress-bar');
            if (pb) pb.style.width = percent + '%';
        }

        function switchMode(mode) {
            stopStoryTTS();
            currentMode = mode;
            const tL = document.getElementById('tab-listen'), tS = document.getElementById('tab-speak');
            const mL = document.getElementById('listen-mode'), mS = document.getElementById('speak-mode');
            
            if(mode === 'listen') {
                tL.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-purple-700";
                tS.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                mL.style.display = 'flex'; mS.style.display = 'none';
                document.getElementById('listen-play').style.display = 'none';
                document.getElementById('listen-directory').style.display = 'block';
                renderListenDirectory();
            } else {
                tS.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-purple-700";
                tL.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                mL.style.display = 'none'; mS.style.display = 'flex';
                document.getElementById('speak-play').style.display = 'none';
                document.getElementById('speak-directory').style.display = 'block';
                renderSpeakDirectory();
            }
            updateTotalProgress();
        }

        // ================= 3. 聆聽推論題庫 (10篇, 每篇8題 = 80題) =================
        const listenData = [
            {
                title: '錢包的考驗', 
                text: '明仔在公園的長椅上撿到一個名牌錢包，打開一看，裡面有一大疊現金和許多證件。他滿心歡喜地跑到附近的警署，把錢包交給了當值的警察，心想失主一定會非常感激自己。沒想到半小時後，失主趕到警署，匆匆點算了一下現金，卻突然眉頭一皺，一口咬定少了一千元，並大聲指責是明仔偷拿了。明仔百口莫辯，委屈得掉下了眼淚。這時，老經驗的警長要求調取公園的監控錄像。畫面清晰顯示，失主在買雪糕時，自己不小心掉了一張千元大鈔在地上，被風吹走了。真相大白，失主羞愧地低下頭向明仔道歉。明仔擦乾眼淚，平靜地說：「沒關係，但我希望你以後不要隨便懷疑別人的善良。」',
                qs: [
                    ['提取資訊', '明仔在公園撿到的錢包裡有什麼？', '只有證件', '只有少量零錢', '一大筆現金和證件', '買雪糕的收據', 2],
                    ['人物心理', '失主一口咬定少了一千元時，明仔有什麼感覺？', '感到憤怒並大聲反駁', '百口莫辯，感到極度委屈而落淚', '覺得無所謂，反正沒拿', '心虛害怕被揭穿', 1],
                    ['弦外之音', '失主為什麼一開始要大聲指責明仔？', '他親眼看到明仔偷錢', '他主觀臆斷，不信任陌生人的善意，先入為主地懷疑', '警察教他這麼做的', '他想測試明仔是否誠實', 1],
                    ['邏輯推理', '警察最後是如何查明真相、還明仔清白的？', '搜查了明仔的口袋', '質問了賣雪糕的店員', '調取了公園的監控錄像尋找線索', '失主自己突然想起來了', 2],
                    ['語境理解', '文中「百口莫辯」是什麼意思？', '嘴巴太多不知道怎麼說', '就算有一百張嘴也辯解不清，形容受了極大委屈無法澄清', '不想和別人說話', '非常能言善道', 1],
                    ['人物評價', '明仔最後對失主說的話，展現了他怎樣的品格？', '膽小怕事，不敢追究', '得理不饒人，態度傲慢', '寬容大度，且堅守並捍衛善良的尊嚴', '貪圖失主的獎賞', 2],
                    ['人物心理', '失主道歉時為什麼會「羞愧地低下頭」？', '因為警察罵了他', '因為發現是自己弄丟的，且自己無端誣衊了好人，感到無地自容', '因為他的錢找不回來了', '因為他不想道歉', 1],
                    ['主旨歸納', '這個故事最想告訴我們什麼深刻的道理？', '撿到錢包不應該交給警察', '不要隨便吃雪糕', '在未查明真相前，不能憑偏見隨意懷疑別人的善意，應讓善良得到尊重', '公園裡的風很大', 2]
                ]
            },
            {
                title: '草船借箭的智慧', 
                text: '三國時期，周瑜十分嫉妒諸葛亮的才幹，便故意刁難他，要求他在十天內造出十萬支箭。諸葛亮卻笑著答應，並立下軍令狀，保證三天內完成。周瑜暗自高興，以為諸葛亮這次死定了。諸葛亮私下向魯肅借了二十隻小船，每隻船上紮滿了草把子。到了第三天夜裡，江面上起了大霧，面對面都看不清人。諸葛亮下令將船開到曹操的水寨前，並讓士兵擂鼓吶喊。曹操生性多疑，看不清虛實，不敢輕易出戰，只下令弓弩手朝江中放箭。一時間，萬箭齊發，紛紛射在草把子上。天亮前，諸葛亮滿載而歸。周瑜得知後，長嘆一聲：「諸葛亮神機妙算，我不如他。」',

            { e: '🐺👦🤝', t: '狼來了反轉：善良的狼', base: '放羊的孩子大喊「狼來了」，村民跑上山卻沒看到狼。其實，狼真的來了，但牠不是來吃羊的。', task: '如果這隻狼是善良的，牠來做什麼？請改編一個全新的結局，並給出一個不同的教訓。', sample: '大家好。其實，那隻狼是來報信的！牠告訴小男孩山後發生了山泥傾瀉，要大家快逃。但因為小男孩平時愛說謊，村民不信他。最後，幸好善良的狼親自跑下山把村民推走，才救了大家。這個反轉故事告訴我們：「有時候，我們眼中的『壞人』可能是來幫你的，不要被刻板印象蒙蔽了雙眼。」' },

            { e: '🦆💪🦢', t: '醜小鴨的驕傲', base: '醜小鴨在湖邊看到了美麗的天鵝，但牠發現自己並沒有變成天鵝，依然是一隻鴨子。', task: '如果牠沒有變成天鵝，牠該如何找回自信？請為醜小鴨編一個「接受不完美」的勵志結局。', sample: '大家好。醜小鴨發現自己沒變天鵝，一開始很失落。但後來，農場失火了，天鵝們只顧著飛走，而醜小鴨卻憑著牠巨大而強壯的翅膀，一次次撲滅火苗，救了大家。農場的動物都稱讚牠是英雄。這告訴我們：「不要盲目羨慕別人的美麗，接納真實的自己，平凡的外表下也可以有偉大的靈魂。」' },
            { e: '🦊🧀🐦', t: '狐狸與烏鴉續集：智取', base: '烏鴉嘴裡的肉被狐狸騙走後，非常生氣。幾天後，烏鴉又找到了一塊美味的乳酪，狐狸又來了。', task: '這次烏鴉變聰明了。請講述烏鴉是如何「反套路」狐狸，保住食物甚至教訓狐狸的？', sample: '各位好。狐狸故技重施，又誇烏鴉唱歌好聽。這次，烏鴉先把乳酪放在高高的樹杈上，然後大聲唱起歌來。歌聲引來了獵狗，狐狸嚇得落荒而逃。烏鴉這才慢慢享受乳酪。這個故事告訴我們：「吃一塹，長一智。只要我們保持冷靜，不被花言巧語迷惑，就能反敗為勝。」' },
            { e: '🐜🎸🦗', t: '螞蟻與蟋蟀：冬日救援', base: '冬天到了，蟋蟀冷得發抖，快餓死了。牠敲開了螞蟻的門乞求食物。', task: '原版故事中螞蟻拒絕了牠。請改編一個「互助雙贏」的溫馨結局。', sample: '大家好。螞蟻打開門，並沒有趕走蟋蟀，而是請牠進來喝熱湯。螞蟻說：「我們可以給你食物，但漫長的冬天很無聊，你可以為我們演奏音樂嗎？」蟋蟀感動極了，每天拉小提琴為螞蟻們解悶。這告訴我們：「每個人都有獨特的價值，包容與合作能讓冷酷的冬天變得溫暖無比。」' },
            { e: '👨‍🌾🌳🐰', t: '守株待兔的覺醒', base: '農夫天天守在樹樁旁等兔子，田裡的莊稼都荒廢了。有一天，他突然做了一個夢。', task: '農夫夢見了什麼讓他徹底清醒？他之後的行動是什麼？', sample: '各位。農夫夢見自己餓死在樹旁，而別人家的田地卻大豐收。他嚇出一身冷汗，醒來後看著荒蕪的土地，恍然大悟：「運氣是靠不住的！」他立刻拿起鋤頭，重新開始辛勤耕耘。秋天到了，他收穫了滿滿的糧食。這說明：「與其把希望寄託在虛無縹緲的運氣上，不如腳踏實地，用雙手創造未來。」' },
            { e: '🌱📏👨‍🌾', t: '拔苗助長之科學種田', base: '農夫覺得禾苗長得太慢，但他沒有把它們拔高，而是去請教了一位老學者。', task: '請講述農夫學到了什麼科學的種植方法？最後的結果如何？', sample: '大家好。老學者告訴農夫：「萬物生長都有規律，不能急躁，你需要做的是施肥和除蟲。」農夫聽取了建議，每天科學地澆水、施肥。幾個月後，他的禾苗長得比別人的都高大粗壯。這告訴我們：「做事必須遵循客觀規律，欲速則不達，只有用正確的方法默默耕耘，才能迎來真正的豐收。」' },
            { e: '🐦🏺🚫', t: '烏鴉喝水：現代難題', base: '烏鴉口渴了，找到一個半瓶水的瓶子，可是周圍一顆石子都沒有！', task: '在沒有石子的情況下，這隻聰明的現代烏鴉是如何喝到水的？', sample: '各位好。烏鴉找不著石子，但牠冷靜地觀察四周。牠發現旁邊有一根別人喝飲料丟棄的塑膠吸管。烏鴉靈機一動，用嘴叼起吸管，插進瓶子裡，輕輕鬆鬆地吸到了甘甜的水。這個現代故事告訴我們：「解決問題的方法不止一種。當舊經驗不管用時，我們要善於利用身邊的新工具，靈活變通。」' },
            { e: '🐸🦅🌍', t: '井底之蛙的廣闊世界', base: '一隻老鷹飛過井口，看見井底之蛙。老鷹決定用爪子把青蛙抓出水井，帶牠看看世界。', task: '青蛙第一次離開水井，牠看到了什麼令人震撼的景象？牠有什麼感悟？', sample: '大家好。老鷹帶著青蛙飛上高空。青蛙嚇得睜開眼睛，看見了連綿的群山、浩瀚的海洋和無邊無際的藍天。牠驚嘆道：「原來天空不是圓的，世界大得超乎想像！」牠為自己以前的自大感到羞愧。這告訴我們：「人的認知是受環境局限的。我們必須保持謙虛，勇於跳出舒適圈，才能看到真正的世界。」' }
        ];

        let speakProgress = JSON.parse(localStorage.getItem('speakAdvProgress')) || new Array(speakData.length).fill(0);

        function renderSpeakDirectory() {
            const dirContainer = document.getElementById('speak-content');
            let html = '';
            speakData.forEach((item, idx) => {
                let status = speakProgress[idx];
                let bgClass = 'bg-white';
                let borderClass = 'border-slate-200';
                if (status === 1) { bgClass = 'bg-purple-50'; borderClass = 'border-purple-400'; }
                
                html += `
                    <button onclick="startSpeak(${idx})" class="w-full text-left p-5 rounded-2xl border-2 ${borderClass} ${bgClass} hover:shadow-md transition active:scale-95 flex flex-col items-center gap-3">
                        <div class="text-4xl tracking-widest">${item.e}</div>
                        <h3 class="text-lg font-black text-slate-800">${item.t}</h3>
                        ${status === 1 ? '<span class="text-purple-600 font-bold text-sm">✅ 已掌握延展</span>' : '<span class="text-slate-400 font-bold text-sm"># 未挑戰</span>'}
                    </button>
                `;
            });
            dirContainer.innerHTML = html;
        }

        function startSpeak(idx, forceStart = false) {
            if (!forceStart && !localStorage.getItem('tut_seen_t-adv-speak')) {
                pendingTaskIdx = idx;
                pendingTaskType = 'speak';
                showTutorial('t-adv-speak');
                return;
            }
            currentStoryIdx = idx;
            document.getElementById('speak-directory').style.display = 'none';
            const playArea = document.getElementById('speak-play');
            playArea.style.display = 'flex';
            
            const data = speakData[idx];
            
            let html = `
                <div class="w-full max-w-4xl flex justify-between items-center mb-4">
                    <button onclick="switchMode('speak')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-purple-100 text-purple-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">挑戰 ${idx + 1} / 10</span>
                </div>
                
                <div class="w-full max-w-4xl bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center">
                    <div class="text-6xl md:text-8xl mb-6 bg-slate-50 p-6 rounded-3xl border-4 border-slate-100 w-full text-center shadow-inner cursor-default">${data.e}</div>
                    <h2 class="text-2xl font-black text-slate-800 mb-6">${data.t}</h2>
                    
                    <div class="w-full bg-slate-50 p-6 rounded-xl border border-slate-200 mb-6">
                        <p class="font-bold text-slate-500 mb-2">📜 原版故事開頭：</p>
                        <p class="text-lg text-slate-700 leading-relaxed">${data.base}</p>
                    </div>

                    <div class="w-full bg-rose-50 p-6 rounded-xl border border-rose-200 mb-8">
                        <p class="font-black text-rose-700 mb-2 flex items-center gap-2"><span class="text-2xl">🔥</span> 你的改編任務：</p>
                        <p class="text-xl text-rose-900 leading-relaxed font-bold">${data.task}</p>
                    </div>
                    
                    <div class="w-full bg-slate-800 text-white rounded-2xl p-6 text-center shadow-inner">
                        <h3 class="text-lg font-bold mb-4 text-slate-300">自己試著開口發表一次後，點擊查看完美範本！</h3>
                        <button onclick="showSampleAnswer()" id="btn-show-sample" class="bg-purple-500 hover:bg-purple-600 text-white font-black px-8 py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-purple-700 active:border-b-0 active:translate-y-1">💡 查看高分參考演講</button>
                        
                        <div id="sample-answer-box" class="hidden mt-6 bg-slate-700 p-5 rounded-xl border border-slate-600 text-left">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-purple-300 font-bold">✨ 拔尖參考範本：</span>
                                <button onclick="speakText('${data.sample}', 0.9)" class="bg-slate-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-slate-500 transition">🔊</button>
                            </div>
                            <p class="text-lg leading-relaxed text-slate-200 tracking-wide">${data.sample}</p>
                            <button onclick="finishSpeakTask()" class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black px-8 py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1">✅ 我學會了！(獲得 20 EXP)</button>
                        </div>
                    </div>
                </div>
            `;
            playArea.innerHTML = html;
        }

        function showSampleAnswer() {
            document.getElementById('btn-show-sample').classList.add('hidden');
            document.getElementById('sample-answer-box').classList.remove('hidden');
            const sampleText = speakData[currentStoryIdx].sample;
            speakText(sampleText);
        }

        function finishSpeakTask() {
            stopStoryTTS();
            if (speakProgress[currentStoryIdx] !== 1) {
                advExp += 20;
                localStorage.setItem('listenAdvExp', advExp);
                document.getElementById('exp-display').innerText = advExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                
                speakProgress[currentStoryIdx] = 1;
                localStorage.setItem('speakAdvProgress', JSON.stringify(speakProgress));
                showToast("高階口語延展完成！+20 EXP");
                
                if (listenProgress.filter(p=>p===1).length === listenData.length && speakProgress.filter(p=>p===1).length === speakData.length) {
                    localStorage.setItem('t_listen_3', 'true');
                }
            }
            switchMode('speak');
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = advExp;
            switchMode('listen');
        }
    </script>
</body>
</html>
