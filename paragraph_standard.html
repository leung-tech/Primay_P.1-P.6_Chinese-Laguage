<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>段落與實用文 - 標準常規訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdfa; /* 清新薄荷綠色背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #ccfbf1 1px, transparent 1px), linear-gradient(to bottom, #ccfbf1 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #0d9488; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #ccfbf1; border-color: #0d9488; color: #115e59; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        /* 段落重組專用按鈕 (長條狀，支援多行文字) */
        .chunk-btn { transition: all 0.2s; box-shadow: 0 4px 0 #0d9488; width: 100%; text-align: left; white-space: normal; line-height: 1.5; }
        .chunk-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .chunk-slot { transition: all 0.2s; border: 2px dashed #5eead4; background-color: #f0fdfa; width: 100%; height: 60px; border-radius: 0.75rem; margin-bottom: 0.5rem; }

        /* 模擬公文紙背景 */
        .letter-pad {
            background-color: #fcf8f2;
            background-image: repeating-linear-gradient(transparent, transparent 39px, #cbd5e1 39px, #cbd5e1 40px);
            border: 2px solid #94a3b8;
        }

        /* 沙盒專用槽位樣式 */
        .sandbox-slot {
            border: 2px dashed #0d9488;
            background-color: rgba(20, 184, 166, 0.05);
            transition: all 0.2s;
            cursor: pointer;
        }
        .sandbox-slot:hover {
            background-color: rgba(20, 184, 166, 0.15);
        }
        .sandbox-slot.filled {
            border-style: solid;
            background-color: #0d9488;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-teal-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-teal-700 p-1 rounded transition bg-teal-800">⬅️ 返回</a>
                <span>📝 段落與實用文 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-teal-800 px-3 py-1.5 rounded-full border border-teal-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('quest')" id="tab-quest" class="tab-btn flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-teal-600 text-teal-600">🚀 綜合寫作結構特訓 (150題)</button>
            <button onclick="switchMode('sandbox')" id="tab-sandbox" class="tab-btn flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200 text-slate-500">📐 實用文格式沙盒 (結構排版)</button>
        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🎯 中高年級常規段落格式訓練地圖</h2>
                <div class="bg-teal-50 border border-teal-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-teal-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+20)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 經提示過關 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-slate-100 border-2 border-slate-300 flex items-center justify-center text-lg shadow-sm">❓</span> 未完成</div>
                    </div>
                </div>
                <div id="directory-content" class="flex flex-col gap-8"></div>
            </div>
            
            <div id="quest-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <div id="sandbox-mode" class="w-full max-w-6xl mx-auto hidden flex-col lg:flex-row gap-6 h-full min-h-[500px]">
            <div class="lg:w-1/3 flex flex-col gap-4">
                <div class="bg-white rounded-2xl p-4 shadow-md border-t-4 border-teal-500">
                    <h3 class="font-black text-teal-800 text-lg mb-3">📁 選擇實用文範本：</h3>
                    <div class="grid grid-cols-2 gap-2" id="sandbox-templates">
                        </div>
                </div>

                <div class="bg-white rounded-2xl p-4 shadow-md flex-grow flex flex-col min-h-[250px]">
                    <h3 class="font-black text-teal-800 text-base mb-2 pb-2 border-b border-slate-100">🧱 點擊積木放入公文紙中：</h3>
                    <p class="text-xs text-slate-500 mb-3">請依順序，將正確的格式積木填入右邊對齊的框槽中。</p>
                    <div class="flex flex-col gap-2.5 overflow-y-auto max-h-[350px] pr-1" id="sandbox-bricks-area"></div>
                </div>
            </div>

            <div class="lg:w-2/3 bg-white rounded-3xl shadow-xl p-5 md:p-8 flex flex-col relative min-h-[500px]">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">📝</span>
                        <h2 class="font-black text-xl text-slate-700" id="sandbox-paper-title">實用文排版公文紙</h2>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="checkSandboxLayout()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded-xl transition shadow-sm text-sm">🔍 檢查排版</button>
                        <button onclick="resetSandbox()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded-xl transition text-sm">🔄 重置</button>
                    </div>
                </div>

                <div class="flex-grow letter-pad rounded-2xl p-6 flex flex-col gap-4 shadow-inner relative min-h-[380px]" id="sandbox-layout-pad">
                    </div>
                
                <div id="sandbox-hint-box" class="hidden mt-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl text-yellow-800 font-bold text-sm"></div>
            </div>
        </div>

    </div>

    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-teal-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-teal-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-teal-700 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-xl text-center transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-2">🎉</div>
            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-4 text-base md:text-lg leading-relaxed text-left overflow-y-auto pr-2 flex-1 w-full"></div>
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-teal-600 hover:bg-teal-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-teal-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態、分類與大腦字典 =================
        let paraExp = parseInt(localStorage.getItem('rhetStdExp')) || 0;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1;
        let currentQuestionIdx = -1;
        window.currentHints = []; 
        
        let reorderSource = []; 
        let reorderTarget = []; 
        let reorderCorrect = []; 

        const categories = [
            { id: 'p-reorder-std', title: '⏳ 排句成段：承接與因果 (30題)', color: 'teal' },
            { id: 'p-reorder-structure', title: '🧱 結構重組：總分或分總 (30題)', color: 'emerald' },
            { id: 'p-practical-notice', title: '📢 實用文格式：通告與啟事 (30題)', color: 'amber' },
            { id: 'p-practical-note', title: '📚 實用文格式：讀書筆記與海報 (30題)', color: 'cyan' },
            { id: 'p-practical-reorder', title: '🧩 實用文實戰：全文格式重組 (30題)', color: 'indigo' }
        ];

        document.getElementById('exp-display').innerText = paraExp;

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】]/g, '').replace(/&nbsp;/g, ' ');
                let msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'zh-HK';
                msg.rate = 0.92; 
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const genericExplanations = {
            '標題': '標題：指明通告或啟事的核心事宜，字體通常放大居中。',
            '上款': '上款：表明通告或書信的發送對象（如：全體學生：）。',
            '正文': '正文：詳細交代事情起因、具體內容（時間、地點）和要求。',
            '下款': '下款：發出通告或信件的單位、職銜和姓名（如：校長 陳大文）。',
            '署名': '署名：寫信人或留言人的姓名。',
            '日期': '日期：通告或信件發出的時間，通常寫在最後一行。',
            '天氣': '天氣：寫日記時，與日期並列在第一行的環境紀錄。',
            '總結': '總結：在段尾總結全文的核心意思 or 抒發感受。',
            '承上啟下': '過渡句/詞：使段落與段落之間連接自然。',
            '呼籲/要求': '呼籲段：在正文末尾要求大家遵守或注意的事項。'
        };

        function getGenericExp(term) {
            return genericExplanations[term] || '這是實用文或段落中的一個重要組成部分。';
        }

        // ================= 2. 學習錦囊 (教學庫) =================
        const tutorialContents = {
            'p-reorder-std': `
                <div class="text-center mb-4"><span class="text-6xl">🔗 ⏳</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">承接與因果排句成段</p>
                <p class="mb-4 text-slate-600">中高年級的段落重組，更側重觀察句子之間的<span class="text-teal-600 font-bold">「關聯詞」</span>和<span class="text-teal-600 font-bold">「邏輯承接」</span>：</p>
                <div class="bg-teal-50 p-4 rounded-xl border-2 border-teal-200 mb-3 space-y-3 text-sm font-bold text-teal-900 leading-loose">
                    <p>1️⃣ 先找出帶有「起點性質」的句子（如：交代時間、背景、原因）。</p>
                    <p>2️⃣ 利用「不但...而且...」、「然而」等轉折/遞進詞理清中段發展。</p>
                    <p>3️⃣ 帶有「結果、最後、因此」的句子通常是結尾。</p>
                </div>
            `,
            'p-reorder-structure': `
                <div class="text-center mb-4"><span class="text-6xl">🧱 🏛️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">總分與分總結構段落</p>
                <p class="mb-4 text-slate-600">說明文或描寫文最常用的段落結構是<span class="text-emerald-600 font-bold">「總——分」</span>或<span class="text-emerald-600 font-bold">「分——總」</span>：</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-emerald-800 text-lg mb-1">👑 總起句（總分）</p>
                        <p class="text-slate-700 text-sm">先寫一句總括段落大意的話。<br>例：這家店的玩具種類繁多。（後面開始列舉各種玩具）</p>
                    </div>
                    <hr class="border-emerald-200">
                    <div>
                        <p class="font-black text-emerald-800 text-lg mb-1">🏁 總結句（分總）</p>
                        <p class="text-slate-700 text-sm">先列舉細節，最後一句話進行歸納。<br>例：（寫滿了各種花香和美麗的昆蟲）...這真是一個美麗的花園啊！</p>
                    </div>
                </div>
            `,
            'p-practical-notice': `
                <div class="text-center mb-4"><span class="text-6xl">📢 📋</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">實用文格式：通告與啟事</p>
                <p class="mb-4 text-slate-600">通告和啟事是學校及社會機構常用的實用文，格式極其嚴謹：</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 text-sm font-bold text-amber-900 leading-loose">
                    <p>1️⃣ <span class="bg-white px-2 rounded text-amber-700">標題</span> 👉 放在正中間（例：關於舉辦中文朗誦比賽事宜）。</p>
                    <p>2️⃣ <span class="bg-white px-2 rounded text-amber-700">上款</span> 👉 靠左頂格，寫清楚對象（例：全體家長：）。</p>
                    <p>3️⃣ <span class="bg-white px-2 rounded text-amber-700">正文</span> 👉 交代原因、詳細活動資訊（日期、地點、對象）。</p>
                    <p>4️⃣ <span class="bg-white px-2 rounded text-amber-700">下款與日期</span> 👉 一律靠右排在最下方。</p>
                </div>
            `,
            'p-practical-note': `
                <div class="text-center mb-4"><span class="text-6xl">📚 🎨</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">實用文格式：讀書筆記與海報</p>
                <div class="bg-cyan-50 p-4 rounded-xl border-2 border-cyan-200 mb-3 space-y-3 text-sm font-bold text-cyan-900">
                    <p>📖 <span class="bg-white px-2 rounded text-cyan-700">讀書筆記</span> 👉 必須記錄書名、作者、好詞佳句，以及最重要、最佔篇幅的「讀後感/啟發」。</p>
                    <p>🎨 <span class="bg-white px-2 rounded text-cyan-700">宣傳海報</span> 👉 標題要極具吸引力，內容必須條列式列出活動時間、地點和參加方法，最下方通常會寫「歡迎踴躍參加」。</p>
                </div>
            `
        };

        function showTutorial(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId] || '<p>請觀察實用文排版，點擊左側積木填入正確的位置中。</p>';
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    startQuestion(targetIdx, true); 
                }
            }, 300);
        }

        // ================= 資料格式化輔助函數 =================
        function formatReorderData(pool, category, task) {
            return pool.map(item => {
                return { category: category, task: task, isReorder: true, chunks: item[0], hint: item[1] };
            });
        }

        function formatMCQData(pool, category, task) {
            return pool.map(item => {
                let correctOpt = item[1];
                let w1 = item[2], w2 = item[3], w3 = item[4];
                let specificHint = item[5]; 
                let exp = `✅ ${correctOpt}：${specificHint}<br>❌ ${w1}：${getGenericExp(w1)}<br>❌ ${w2}：${getGenericExp(w2)}<br>❌ ${w3}：${getGenericExp(w3)}`;
                return { category: category, task: task, sentence: item[0], isReorder: false, correct: correctOpt, wrongs: [w1, w2, w3], explanation: exp };
            });
        }

        function formatPracticalReorderData(pool, category, task) {
            return pool.map(item => {
                return { category: category, task: task, isReorder: true, sentence: '目標格式：' + item[2] + ' (' + item[0] + ')', chunks: item[1], target: item[2], hint: item[3] };
            });
        }

                    </div>
                    <div class="text-sm md:text-base font-bold text-teal-700 flex items-center gap-2 bg-teal-50 p-3 rounded-xl border border-teal-100">
                        <span>🎯 任務：${qData.task}</span>
                        <button onclick="speakText('${qData.isReorder ? qData.chunks.join('。') : qData.sentence}')" class="text-teal-600 hover:text-teal-800 text-lg p-1">🔊 朗讀題目</button>
                    </div>
            `;

            if (qData.isReorder) {
                reorderCorrect = [...qData.chunks];
                if (reorderSource.length === 0 || pendingQuestionIdx === -1) {
                    reorderSource = qData.chunks.map((text, i) => ({ id: i, text: text }));
                    reorderSource.sort(() => Math.random() - 0.5);
                    reorderTarget = [];
                }

                let chunksArea = `
                    <div class="flex flex-col gap-3 my-2">
                        <p class="text-xs md:text-sm font-black text-slate-500 flex items-center gap-1">📦 可選句子積木 (點擊移至下方)：</p>
                        <div id="reorder-source-container" class="flex flex-col gap-2"></div>
                        <p class="text-xs md:text-sm font-black text-slate-500 mt-4 flex items-center gap-1">📥 你的排列結果 (點擊可以收回)：</p>
                        <div id="reorder-target-container" class="flex flex-col gap-2 min-h-[80px] border-2 border-dashed border-teal-300 rounded-2xl p-3 bg-teal-50/30"></div>
                    </div>
                    <div class="flex gap-3 mt-4 pt-4 border-t border-slate-100">
                        <button onclick="checkReorderAnswer()" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white font-black py-3.5 px-6 rounded-xl transition shadow-md border-b-4 border-teal-800 active:border-b-0 active:translate-y-1">🔍 檢查答案</button>
                        <button onclick="resetReorder()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3.5 px-6 rounded-xl transition">🔄 重置</button>
                    </div>
                `;
                playArea.innerHTML = headerHtml + chunksArea + `</div>`;
                renderReorderChunks();
            } else {
                let options = [qData.correct, ...qData.wrongs];
                options.sort(() => Math.random() - 0.5);

                let questionText = `<div class="text-lg md:text-xl font-black text-slate-800 my-3 leading-relaxed">${qData.sentence}</div>`;
                let choicesHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-2">`;
                options.forEach(opt => {
                    choicesHtml += `
                        <button onclick="checkMCQAnswer(this, '${opt.replace(/'/g, "\\'")}')" class="option-btn bg-white border-2 border-slate-200 rounded-2xl p-4 text-left font-bold text-slate-700 hover:border-teal-500 hover:bg-teal-50/20 text-base">
                            ${opt}
                        </button>
                    `;
                });
                choicesHtml += `</div>`;
                playArea.innerHTML = headerHtml + questionText + choicesHtml + `</div>`;
            }
            document.getElementById('main-scroll-area').scrollTop = 0;
        }

        function renderReorderChunks() {
            const srcContainer = document.getElementById('reorder-source-container');
            const tgtContainer = document.getElementById('reorder-target-container');
            if (!srcContainer || !tgtContainer) return;

            srcContainer.innerHTML = '';
            reorderSource.forEach((item, index) => {
                srcContainer.innerHTML += `
                    <button onclick="moveChunk('toTarget', ${index})" class="chunk-btn bg-white border-2 border-slate-200 rounded-xl p-3 font-bold text-slate-700 hover:border-teal-400 hover:bg-teal-50/10 text-sm md:text-base">
                        ${item.text}
                    </button>
                `;
            });

            tgtContainer.innerHTML = '';
            if (reorderTarget.length === 0) {
                tgtContainer.innerHTML = `<div class="text-slate-400 text-center py-5 text-sm font-medium">請順序點擊上方句子放入此處...</div>`;
            } else {
                reorderTarget.forEach((item, index) => {
                    tgtContainer.innerHTML += `
                        <button onclick="moveChunk('toSource', ${index})" class="chunk-btn bg-teal-600 border-2 border-teal-700 text-white rounded-xl p-3 font-bold shadow-md text-sm md:text-base flex items-start gap-2">
                            <span class="inline-flex bg-teal-800 text-white text-xs px-2 py-0.5 rounded-md font-mono mt-0.5 flex-shrink-0">${index + 1}</span>
                            <span>${item.text}</span>
                        </button>
                    `;
                });
            }
        }

        function moveChunk(direction, index) {
            if (direction === 'toTarget') {
                const item = reorderSource.splice(index, 1)[0];
                reorderTarget.push(item);
            } else {
                const item = reorderTarget.splice(index, 1)[0];
                reorderSource.push(item);
            }
            renderReorderChunks();
        }

        function resetReorder() {
            const qData = rawQuestDataObj[currentQuestionIdx];
            reorderSource = qData.chunks.map((text, i) => ({ id: i, text: text })).sort(() => Math.random() - 0.5);
            reorderTarget = [];
            renderReorderChunks();
        }

        function checkReorderAnswer() {
            if (reorderSource.length > 0) {
                showToast('⚠️ 請先排列所有句子！');
                return;
            }

            let isCorrect = true;
            reorderTarget.forEach((item, index) => {
                if (item.text !== reorderCorrect[index]) {
                    isCorrect = false;
                }
            });

            if (isCorrect) {
                handleCorrectAnswer();
            } else {
                currentQuestionMistakes++;
                showToast('❌ 順序不正確，請重新理清因果或承接邏輯！');
                const tgt = document.getElementById('reorder-target-container');
                tgt.classList.add('shake');
                setTimeout(() => tgt.classList.remove('shake'), 400);
            }
        }

        function checkMCQAnswer(btnEl, selectedOpt) {
            const qData = rawQuestDataObj[currentQuestionIdx];
            if (selectedOpt === qData.correct) {
                btnEl.classList.add('correct');
                handleCorrectAnswer();
            } else {
                if (!btnEl.classList.contains('wrong')) {
                    btnEl.classList.add('wrong');
                    currentQuestionMistakes++;
                    showToast('❌ 答案不正確，請再看清楚結構喔！');
                }
            }
        }

        function handleCorrectAnswer() {
            const qData = rawQuestDataObj[currentQuestionIdx];
            let scoreEarned = 20;
            let progressVal = 2; // Perfect score

            if (currentQuestionMistakes > 0) {
                scoreEarned = 10;
                progressVal = 1; // Passed with hint
            }

            if (userProgress[currentQuestionIdx] < progressVal) {
                let expDiff = scoreEarned;
                if (userProgress[currentQuestionIdx] === 1 && progressVal === 2) {
                    expDiff = 10; 
                }
                paraExp += expDiff;
                userProgress[currentQuestionIdx] = progressVal;
                localStorage.setItem('rhetStdExp', paraExp);
                localStorage.setItem('rhetStdProgress', JSON.stringify(userProgress));
                document.getElementById('exp-display').innerText = paraExp;
            }

            let desc = '';
            if (qData.isReorder) {
                desc = `<p class="font-bold text-teal-700 mb-2">💡 正確段落全文流暢度對照：</p>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-slate-800 text-sm md:text-base leading-relaxed mb-4 font-medium">
                            ${reorderCorrect.map(t => `• ${t}`).join('<br>')}
                        </div>
                        <p class="text-slate-600 text-sm"><span class="font-black text-teal-600">🎯 架構精髓：</span>${qData.hint}</p>`;
            } else {
                desc = `<div class="bg-teal-50 p-4 rounded-xl border border-teal-200 text-slate-800 text-sm md:text-base leading-loose">
                            ${qData.explanation}
                        </div>`;
            }

            document.getElementById('feedback-title').innerText = currentQuestionMistakes === 0 ? '太棒了！完美全對 🌟' : '過關了！繼續加油 ✅';
            document.getElementById('feedback-icon').innerText = currentQuestionMistakes === 0 ? '🌟' : '🎉';
            document.getElementById('feedback-desc').innerHTML = desc;

            const nextBtn = document.getElementById('next-btn');
            if (currentQuestionIdx + 1 < rawQuestDataObj.length) {
                nextBtn.innerText = '下一題 ➡️';
                nextBtn.onclick = function() {
                    closeFeedbackModal();
                    startQuestion(currentQuestionIdx + 1, false);
                };
            } else {
                nextBtn.innerText = '完成全部特訓 🎉';
                nextBtn.onclick = function() {
                    closeFeedbackModal();
                    backToDirectory();
                };
            }

            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function closeFeedbackModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function backToDirectory() {
            document.getElementById('quest-play').classList.add('hidden');
            document.getElementById('quest-directory').classList.remove('hidden');
            renderDirectory();
        }

        function backToDirectoryFromModal() {
            closeFeedbackModal();
            backToDirectory();
        }

        // ================= 7. 實用文格式沙盒互動模組 (完整修復) =================
        function loadSandboxTemplate(type) {
            currentActiveTemplate = type;
            sandboxSelectedBrick = null;
            renderSandboxTemplates();

            const titleMap = {
                'letter': '✉️ 實用文排版公文紙 — 傳統書信格式',
                'notice': '📢 實用文排版公文紙 — 標準通告格式',
                'diary': '📓 實用文排版公文紙 — 常規日記排版',
                'notice_lost': '🔍 實用文排版公文紙 — 尋物啟事格式'
            };
            document.getElementById('sandbox-paper-title').innerText = titleMap[type] || '實用文排版公文紙';
            document.getElementById('sandbox-hint-box').classList.add('hidden');

            // 生成對齊插槽
            const pad = document.getElementById('sandbox-layout-pad');
            pad.innerHTML = '';
            
            sandboxSlots[type].forEach(slot => {
                let alignClass = 'text-center justify-center';
                if (slot.align === 'left-top' || slot.align === 'left') alignClass = 'text-left justify-start pl-3';
                if (slot.align === 'indent') alignClass = 'text-left justify-start pl-12';
                if (slot.align === 'right') alignClass = 'text-right justify-end pr-5';

                pad.innerHTML += `
                    <div id="${slot.id}" onclick="clickSandboxSlot('${slot.id}')" data-expected="${slot.expectedType}" class="sandbox-slot min-h-[46px] rounded-xl flex items-center p-2 text-xs md:text-sm font-bold text-teal-700/50 ${alignClass}">
                        ${slot.label}
                    </div>
                `;
            });

            // 打亂積木排序
            const bricksData = [...sandboxBricks[type]].sort(() => Math.random() - 0.5);
            const bricksArea = document.getElementById('sandbox-bricks-area');
            bricksArea.innerHTML = '';
            
            bricksData.forEach(brick => {
                bricksArea.innerHTML += `
                    <button id="${brick.id}" onclick="selectSandboxBrick('${brick.id}', '${brick.type}')" class="bg-white border-2 border-slate-200 text-slate-700 font-bold rounded-xl p-3 text-xs md:text-sm text-left shadow-sm hover:border-teal-500 hover:bg-teal-50/20 transition duration-150">
                        ${brick.name}
                    </button>
                `;
            });
        }

        function selectSandboxBrick(brickId, brickType) {
            if (sandboxSelectedBrick) {
                const oldEl = document.getElementById(sandboxSelectedBrick.id);
                if (oldEl) oldEl.classList.remove('border-teal-500', 'bg-teal-50/50', 'ring-2', 'ring-teal-400');
            }

            if (sandboxSelectedBrick && sandboxSelectedBrick.id === brickId) {
                sandboxSelectedBrick = null;
                return;
            }

            // 檢查該積木是否已經擺放在公文紙上，若是則點擊直接收回
            const slots = document.querySelectorAll('.sandbox-slot');
            let occupiedSlot = null;
            slots.forEach(s => {
                if (s.getAttribute('data-filled-id') === brickId) {
                    occupiedSlot = s;
                }
            });

            if (occupiedSlot) {
                removeBrickFromSlot(occupiedSlot, brickId);
                return;
            }

            sandboxSelectedBrick = { id: brickId, type: brickType, text: document.getElementById(brickId).innerText };
            document.getElementById(brickId).classList.add('border-teal-500', 'bg-teal-50/50', 'ring-2', 'ring-teal-400');
        }

        function clickSandboxSlot(slotId) {
            const slotEl = document.getElementById(slotId);
            
            // 槽位已有積木且目前沒有選中新積木：點擊移除還原
            if (slotEl.classList.contains('filled') && !sandboxSelectedBrick) {
                const brickId = slotEl.getAttribute('data-filled-id');
                removeBrickFromSlot(slotEl, brickId);
                return;
            }

            // 選中了積木：放入或替換
            if (sandboxSelectedBrick) {
                if (slotEl.classList.contains('filled')) {
                    const oldBrickId = slotEl.getAttribute('data-filled-id');
                    const oldBrickEl = document.getElementById(oldBrickId);
                    if (oldBrickEl) oldBrickEl.classList.remove('opacity-40', 'pointer-events-none');
                }

                slotEl.setAttribute('data-filled-id', sandboxSelectedBrick.id);
                slotEl.setAttribute('data-filled-type', sandboxSelectedBrick.type);
                slotEl.innerText = sandboxSelectedBrick.text;
                slotEl.classList.add('filled', 'bg-teal-600', 'text-white', 'border-solid');
                slotEl.style.color = '#ffffff';

                const srcBrickEl = document.getElementById(sandboxSelectedBrick.id);
                if (srcBrickEl) {
                    srcBrickEl.classList.add('opacity-40', 'pointer-events-none');
                    srcBrickEl.classList.remove('border-teal-500', 'bg-teal-50/50', 'ring-2', 'ring-teal-400');
                }

                sandboxSelectedBrick = null;
            }
        }

        function removeBrickFromSlot(slotEl, brickId) {
            slotEl.removeAttribute('data-filled-id');
            slotEl.removeAttribute('data-filled-type');
            slotEl.classList.remove('filled', 'bg-teal-600', 'text-white', 'border-solid');
            
            const origSlot = sandboxSlots[currentActiveTemplate].find(x => x.id === slotEl.id);
            slotEl.innerText = origSlot.label;
            slotEl.style.color = '';

            const brickEl = document.getElementById(brickId);
            if (brickEl) brickEl.classList.remove('opacity-40', 'pointer-events-none');
            sandboxSelectedBrick = null;
        }

        function checkSandboxLayout() {
            const slots = document.querySelectorAll('.sandbox-slot');
            let allCorrect = true;
            let hasEmpty = false;

            slots.forEach(s => {
                const expected = s.getAttribute('data-expected');
                const filledType = s.getAttribute('data-filled-type');
                if (!filledType) {
                    hasEmpty = true;
                }
                if (expected !== filledType) {
                    allCorrect = false;
                }
            });

            const hintBox = document.getElementById('sandbox-hint-box');
            hintBox.classList.remove('hidden');

            if (hasEmpty) {
                hintBox.className = "mt-4 bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-xl text-amber-800 font-bold text-sm slide-up";
                hintBox.innerText = "⚠️ 提示：公文紙上還有未填滿的格式，請把所有格式積木排好再進行檢查。";
                return;
            }

            if (allCorrect) {
                hintBox.className = "mt-4 bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-xl text-emerald-800 font-bold text-sm slide-up";
                hintBox.innerText = "🎉 恭喜！排版完全正確！格式非常標準，符合本實用文的寫作規範！(+30 EXP)";
                
                if (!sandboxCompleted.includes(currentActiveTemplate)) {
                    sandboxCompleted.push(currentActiveTemplate);
                    localStorage.setItem('sandboxCompleted', JSON.stringify(sandboxCompleted));
                    paraExp += 30;
                    localStorage.setItem('rhetStdExp', paraExp);
                    document.getElementById('exp-display').innerText = paraExp;
                    renderSandboxTemplates();
                }
            } else {
                hintBox.className = "mt-4 bg-rose-50 border-l-4 border-rose-500 p-4 rounded-r-xl text-rose-800 font-bold text-sm slide-up";
                hintBox.innerText = "❌ 排版不正確喔！有些積木的對齊方式或結構放錯了，請根據提示左右對齊重新調整！";
            }
        }

        function resetSandbox() {
            loadSandboxTemplate(currentActiveTemplate);
        }

        // 頁面初次載入
        window.onload = function() {
            renderDirectory();
            renderSandboxTemplates();
        };
    </script>
