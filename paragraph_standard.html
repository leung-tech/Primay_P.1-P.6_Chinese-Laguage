<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>段落與實用文 - 標準常規訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdfa; /* 清新薄荷綠色背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #ccfbf1 1px, transparent 1px), linear-gradient(to bottom, #ccfbf1 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #0d9488; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #ccfbf1; border-color: #0d9488; color: #115e59; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        /* 段落重組專用按鈕 (長條狀，支援多行文字) */
        .chunk-btn { transition: all 0.2s; box-shadow: 0 4px 0 #0d9488; width: 100%; text-align: left; white-space: normal; line-height: 1.5; }
        .chunk-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .chunk-slot { transition: all 0.2s; border: 2px dashed #5eead4; background-color: #f0fdfa; width: 100%; height: 60px; border-radius: 0.75rem; margin-bottom: 0.5rem; }

        /* 模擬公文紙背景 */
        .letter-pad {
            background-color: #fcf8f2;
            background-image: repeating-linear-gradient(transparent, transparent 39px, #cbd5e1 39px, #cbd5e1 40px);
            border: 2px solid #94a3b8;
        }

        /* 沙盒專用槽位樣式 */
        .sandbox-slot {
            border: 2px dashed #0d9488;
            background-color: rgba(20, 184, 166, 0.05);
            transition: all 0.2s;
            cursor: pointer;
        }
        .sandbox-slot:hover {
            background-color: rgba(20, 184, 166, 0.15);
        }
        .sandbox-slot.filled {
            border-style: solid;
            background-color: #0d9488;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .lvl-btn { transition: transform 0.2s; }
        .lvl-btn:hover { transform: scale(1.05); }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden">

    <!-- 頂部導覽列 (Teal 配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-teal-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-teal-700 p-1 rounded transition bg-teal-800">⬅️ 返回</a>
                <span>📝 段落與實用文 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-teal-800 px-3 py-1.5 rounded-full border border-teal-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-400">0</span></span>
            </div>
        </div>
        <div class="flex w-full bg-slate-100 border-b border-slate-300">
            <button onclick="switchMode('quest')" id="tab-quest" class="tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-teal-600">🚀 綜合寫作結構特訓 (150題)</button>
            <button onclick="switchMode('sandbox')" id="tab-sandbox" class="tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200">📐 實用文格式沙盒 (結構排版)</button>
        </div>
        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth bg-grid-pattern" id="main-scroll-area">
        
        <!-- 模式 1：常規寫作特訓 -->
        <div id="quest-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="quest-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🎯 中高年級常規段落格式訓練地圖</h2>
                <div class="bg-teal-50 border border-teal-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-teal-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 一次答對 (+20)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 經提示過關 (+10)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-rose-100 border-2 border-rose-400 flex items-center justify-center text-lg shadow-sm">❌</span> 未完成</div>
                    </div>
                </div>
                <div id="directory-content" class="flex flex-col gap-8"></div>
            </div>
            
            <div id="quest-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- 模式 2：實用文格式沙盒 -->
        <div id="sandbox-mode" class="w-full max-w-6xl mx-auto hidden flex-col lg:flex-row gap-6 h-full min-h-[500px]">
            <!-- 左側：選單與積木 -->
            <div class="lg:w-1/3 flex flex-col gap-4">
                <div class="bg-white rounded-2xl p-4 shadow-md border-t-4 border-teal-500">
                    <h3 class="font-black text-teal-800 text-lg mb-3">📁 選擇實用文範本：</h3>
                    <div class="grid grid-cols-2 gap-2" id="sandbox-templates">
                        <!-- 按鈕會由 JavaScript 動態生成以帶上剔號 -->
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-4 shadow-md flex-grow flex flex-col min-h-[250px]">
                    <h3 class="font-black text-teal-800 text-base mb-2 pb-2 border-b border-slate-100">🧱 點擊積木放入公文紙中：</h3>
                    <p class="text-xs text-slate-500 mb-3">請依順序，將正確的格式積木填入右邊對齊的框槽中。</p>
                    <div class="flex flex-col gap-2.5 overflow-y-auto max-h-[350px] pr-1" id="sandbox-bricks-area"></div>
                </div>
            </div>

            <!-- 右側：模擬寫作公文紙 -->
            <div class="lg:w-2/3 bg-white rounded-3xl shadow-xl p-5 md:p-8 flex flex-col relative min-h-[500px]">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">📝</span>
                        <h2 class="font-black text-xl text-slate-700" id="sandbox-paper-title">實用文排版公文紙</h2>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="checkSandboxLayout()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded-xl transition shadow-sm text-sm">🔍 檢查排版</button>
                        <button onclick="resetSandbox()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded-xl transition text-sm">🔄 重置</button>
                    </div>
                </div>

                <!-- 模擬公文紙格槽 (完美配合對齊) -->
                <div class="flex-grow letter-pad rounded-2xl p-6 flex flex-col gap-4 shadow-inner relative min-h-[380px]" id="sandbox-layout-pad">
                    <!-- 對齊槽位動態生成 -->
                </div>
                
                <div id="sandbox-hint-box" class="hidden mt-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl text-yellow-800 font-bold text-sm"></div>
            </div>
        </div>

    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-teal-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-teal-600 flex items-center gap-2">📘 學習錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-teal-700 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 答對全解析 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-xl text-center transform scale-90 transition-transform flex flex-col max-h-[90vh]" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-2">🎉</div>
            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-2">答對了！</h2>
            <div id="feedback-desc" class="text-slate-600 font-bold mb-4 text-base md:text-lg leading-relaxed text-left overflow-y-auto pr-2 flex-1 w-full"></div>
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl shadow transition text-lg">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-teal-600 hover:bg-teal-700 text-white font-black py-3 rounded-xl shadow-lg transition text-lg border-b-4 border-teal-800 active:border-b-0 active:translate-y-1">下一題 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態、分類與大腦字典 =================
        let paraExp = parseInt(localStorage.getItem('rhetStdExp')) || 0;
        let currentQuestionMistakes = 0; 
        let pendingQuestionIdx = -1;
        let currentQuestionIdx = -1;
        window.currentHints = []; 
        
        let reorderSource = []; 
        let reorderTarget = []; 
        let reorderCorrect = []; 

        const categories = [
            { id: 'p-reorder-std', title: '⏳ 排句成段：承接與因果 (30題)', color: 'teal' },
            { id: 'p-reorder-structure', title: '🧱 結構重組：總分或分總 (30題)', color: 'emerald' },
            { id: 'p-practical-notice', title: '📢 實用文格式：通告與啟事 (30題)', color: 'amber' },
            { id: 'p-practical-note', title: '📚 實用文格式：讀書筆記與海報 (30題)', color: 'cyan' },
            { id: 'p-practical-reorder', title: '🧩 實用文實戰：全文格式重組 (30題)', color: 'indigo' }
        ];

        document.getElementById('exp-display').innerText = paraExp;

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】]/g, '').replace(/&nbsp;/g, ' ');
                let msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'zh-HK';
                msg.rate = 0.92; 
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const genericExplanations = {
            '標題': '標題：指明通告或啟事的核心事宜，字體通常放大居中。',
            '上款': '上款：表明通告或書信的發送對象（如：全體學生：）。',
            '正文': '正文：詳細交代事情起因、具體內容（時間、地點）和要求。',
            '下款': '下款：發出通告或信件的單位、職銜和姓名（如：校長 陳大文）。',
            '署名': '署名：寫信人或留言人的姓名。',
            '日期': '日期：通告或信件發出的時間，通常寫在最後一行。',
            '天氣': '天氣：寫日記時，與日期並列在第一行的環境紀錄。',
            '總結': '總結：在段尾總結全文的核心意思 or 抒發感受。',
            '承上啟下': '過渡句/詞：使段落與段落之間連接自然。',
            '呼籲/要求': '呼籲段：在正文末尾要求大家遵守或注意的事項。'
        };

        function getGenericExp(term) {
            return genericExplanations[term] || '這是實用文或段落中的一個重要組成部分。';
        }

        // ================= 2. 學習錦囊 (教學庫) =================
        const tutorialContents = {
            'p-reorder-std': `
                <div class="text-center mb-4"><span class="text-6xl">🔗 ⏳</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">承接與因果排句成段</p>
                <p class="mb-4 text-slate-600">中高年級的段落重組，更側重觀察句子之間的<span class="text-teal-600 font-bold">「關聯詞」</span>和<span class="text-teal-600 font-bold">「邏輯承接」</span>：</p>
                <div class="bg-teal-50 p-4 rounded-xl border-2 border-teal-200 mb-3 space-y-3 text-sm font-bold text-teal-900 leading-loose">
                    <p>1️⃣ 先找出帶有「起點性質」的句子（如：交代時間、背景、原因）。</p>
                    <p>2️⃣ 利用「不但...而且...」、「然而」等轉折/遞進詞理清中段發展。</p>
                    <p>3️⃣ 帶有「結果、最後、因此」的句子通常是結尾。</p>
                </div>
            `,
            'p-reorder-structure': `
                <div class="text-center mb-4"><span class="text-6xl">🧱 🏛️</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">總分與分總結構段落</p>
                <p class="mb-4 text-slate-600">說明文或描寫文最常用的段落結構是<span class="text-emerald-600 font-bold">「總——分」</span>或<span class="text-emerald-600 font-bold">「分——總」</span>：</p>
                <div class="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 mb-3 space-y-4">
                    <div>
                        <p class="font-black text-emerald-800 text-lg mb-1">👑 總起句（總分）</p>
                        <p class="text-slate-700 text-sm">先寫一句總括段落大意的話。<br>例：這家店的玩具種類繁多。（後面開始列舉各種玩具）</p>
                    </div>
                    <hr class="border-emerald-200">
                    <div>
                        <p class="font-black text-emerald-800 text-lg mb-1">🏁 總結句（分總）</p>
                        <p class="text-slate-700 text-sm">先列舉細節，最後一句話進行歸納。<br>例：（寫滿了各種花香和美麗的昆蟲）...這真是一個美麗的花園啊！</p>
                    </div>
                </div>
            `,
            'p-practical-notice': `
                <div class="text-center mb-4"><span class="text-6xl">📢 📋</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">實用文格式：通告與啟事</p>
                <p class="mb-4 text-slate-600">通告和啟事是學校及社會機構常用的實用文，格式極其嚴謹：</p>
                <div class="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 mb-3 text-sm font-bold text-amber-900 leading-loose">
                    <p>1️⃣ <span class="bg-white px-2 rounded text-amber-700">標題</span> 👉 放在正中間（例：關於舉辦中文朗誦比賽事宜）。</p>
                    <p>2️⃣ <span class="bg-white px-2 rounded text-amber-700">上款</span> 👉 靠左頂格，寫清楚對象（例：全體家長：）。</p>
                    <p>3️⃣ <span class="bg-white px-2 rounded text-amber-700">正文</span> 👉 交代原因、詳細活動資訊（日期、地點、對象）。</p>
                    <p>4️⃣ <span class="bg-white px-2 rounded text-amber-700">下款與日期</span> 👉 一律靠右排在最下方。</p>
                </div>
            `,
            'p-practical-note': `
                <div class="text-center mb-4"><span class="text-6xl">📚 🎨</span></div>
                <p class="font-bold text-slate-700 mb-4 text-center">實用文格式：讀書筆記與海報</p>
                <div class="bg-cyan-50 p-4 rounded-xl border-2 border-cyan-200 mb-3 space-y-3 text-sm font-bold text-cyan-900">
                    <p>📖 <span class="bg-white px-2 rounded text-cyan-700">讀書筆記</span> 👉 必須記錄書名、作者、好詞佳句，以及最重要、最佔篇幅的「讀後感/啟發」。</p>
                    <p>🎨 <span class="bg-white px-2 rounded text-cyan-700">宣傳海報</span> 👉 標題要極具吸引力，內容必須條列式列出活動時間、地點和參加方法，最下方通常會寫「歡迎踴躍參加」。</p>
                </div>
            `
        };

        function showTutorial(categoryId) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            document.getElementById('tutorial-body').innerHTML = tutorialContents[categoryId];
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + categoryId, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingQuestionIdx !== -1) {
                    let targetIdx = pendingQuestionIdx;
                    pendingQuestionIdx = -1;
                    startQuestion(targetIdx, true); 
                }
            }, 300);
        }

        // ================= 資料格式化輔助函數 =================
        function formatReorderData(pool, category, task) {
            return pool.map(item => {
                return { category: category, task: task, isReorder: true, chunks: item[0], hint: item[1] };
            });
        }

        function formatMCQData(pool, category, task) {
            return pool.map(item => {
                let correctOpt = item[1];
                let w1 = item[2], w2 = item[3], w3 = item[4];
                let specificHint = item[5]; 
                let exp = `✅ ${correctOpt}：${specificHint}<br>❌ ${w1}：${getGenericExp(w1)}<br>❌ ${w2}：${getGenericExp(w2)}<br>❌ ${w3}：${getGenericExp(w3)}`;
                return { category: category, task: task, sentence: item[0], isReorder: false, correct: correctOpt, wrongs: [w1, w2, w3], explanation: exp };
            });
        }

        function formatPracticalReorderData(pool, category, task) {
            return pool.map(item => {

                        <div onclick="placeIntoSlot('${slot.id}')" class="w-full ${alignClass} py-3 px-5 sandbox-slot rounded-xl text-teal-500 border-2 font-bold text-sm" title="點擊將選擇的積木放置於此">
                            [槽位 ${idx+1}] ${slot.label}
                        </div>
                    `;
                }
            });
            pad.innerHTML = html;
        }

        function placeIntoSlot(slotId) {
            if (!sandboxSelectedBrick) {
                showToast("請先從左側點擊選擇一個格式積木！");
                speakText("請先選擇積木");
                return;
            }

            const currentSlots = sandboxSlots[currentActiveTemplate];
            const slot = currentSlots.find(s => s.id === slotId);
            
            slot.filled = sandboxSelectedBrick;
            sandboxSelectedBrick = null; 

            speakText("放置成功");
            renderSandboxBricks();
            renderSandboxPad();
        }

        function removeFromSlot(slotId) {
            const currentSlots = sandboxSlots[currentActiveTemplate];
            const slot = currentSlots.find(s => s.id === slotId);
            slot.filled = null;

            speakText("已取下");
            renderSandboxBricks();
            renderSandboxPad();
        }

        function resetSandbox() {
            const currentSlots = sandboxSlots[currentActiveTemplate];
            currentSlots.forEach(slot => slot.filled = null);
            sandboxSelectedBrick = null;
            document.getElementById('sandbox-hint-box').classList.add('hidden');
            renderSandboxBricks();
            renderSandboxPad();
            speakText("已重置格式。");
        }

        function checkSandboxLayout() {
            const currentSlots = sandboxSlots[currentActiveTemplate];
            const isAllFilled = currentSlots.every(slot => slot.filled !== null);
            
            if (!isAllFilled) {
                showToast("還有槽位沒有排好喔！");
                speakText("還有格式未排好喔，請繼續努力！");
                return;
            }

            let isCorrect = true;
            let firstWrongIdx = -1;
            for (let i = 0; i < currentSlots.length; i++) {
                if (currentSlots[i].filled.type !== currentSlots[i].expectedType) {
                    isCorrect = false;
                    firstWrongIdx = i;
                    break;
                }
            }

            const hintBox = document.getElementById('sandbox-hint-box');
            if (isCorrect) {
                let isAlreadyCompleted = sandboxCompleted.includes(currentActiveTemplate);
                let expAddedText = "";

                if (!isAlreadyCompleted) {
                    // 🌟 首次過關才加分，防止重覆刷分
                    sandboxCompleted.push(currentActiveTemplate);
                    localStorage.setItem('sandboxCompleted', JSON.stringify(sandboxCompleted));
                    
                    paraExp += 20;
                    localStorage.setItem('rhetStdExp', paraExp);
                    document.getElementById('exp-display').innerText = paraExp;
                    document.getElementById('exp-display').classList.add('pop');
                    setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
                    
                    expAddedText = "，恭喜獲得 20 點經驗值！";

                    // 🌟 與首頁連動：當4個範本全部挑戰成功
                    if (sandboxCompleted.length === 4) {
                        localStorage.setItem('t_para_2', 'true'); // index.html 的標準版打卡改為過關！
                        showToast("恭喜你完成全部實用文範本，首頁已為你打卡過關！");
                        speakText("太厲害了！你已完成所有實用文範本！");
                    }
                } else {
                    expAddedText = "。(本範本已過關，重複練習不重覆獲得經驗值)";
                }

                speakText("太完美了！實用文格式完全正確！" + (isAlreadyCompleted ? "" : "恭喜獲得 20 點經驗值"));
                showToast(isAlreadyCompleted ? "排版正確！" : "首次過關！+20 EXP");

                hintBox.className = "mt-4 bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-xl text-emerald-800 font-bold text-base pop";
                hintBox.innerHTML = `🌟 格式挑戰成功${expAddedText}<br>你成功拼砌了正確的【${currentActiveTemplate === 'letter' ? '書信' : currentActiveTemplate === 'notice' ? '通告' : currentActiveTemplate === 'diary' ? '日記' : '啟事'}】排版！請嘗試挑戰其他格式範本。`;
                hintBox.classList.remove('hidden');

                renderSandboxTemplates();
                renderSandboxBricks();
                renderSandboxPad();
            } else {
                let wrongSlotLabel = currentSlots[firstWrongIdx].label.split(' ➡️ ')[0];
                let expectedName = genericExplanations[currentSlots[firstWrongIdx].expectedType] || "該對齊部分";
                
                let hintStr = `排版順序有誤喔！正確的部分已為你保留。<br>👉 提示：在【<span class="text-rose-600">${wrongSlotLabel}</span>】的槽位，你應該放置的是：<span class="text-rose-600">${expectedName.split('：')[0]}</span>！`;
                speakText(`排版有誤。在${wrongSlotLabel}的槽位，你應該放，${expectedName.split('：')[0]}`);

                // 智能鷹架：只退回錯誤積木
                for (let i = firstWrongIdx; i < currentSlots.length; i++) {
                    currentSlots[i].filled = null;
                }

                hintBox.className = "mt-4 bg-yellow-50 border-l-4 border-yellow-500 p-4 rounded-r-xl text-yellow-800 font-bold text-sm shake";
                hintBox.innerHTML = hintStr;
                hintBox.classList.remove('hidden');

                renderSandboxBricks();
                renderSandboxPad();
            }
        }

        // ================= 5. 通用目錄渲染與闖關邏輯 =================
        function renderDirectory() {
            const dirContainer = document.getElementById('directory-content');
            if(!dirContainer) return;
            let html = '';
            categories.forEach(cat => {
                let hasQuestions = rawQuestDataObj.some(q => q.category === cat.id);
                if (hasQuestions) {
                    let tutId = '';
                    if (cat.id.includes('std')) tutId = 'p-reorder-std';
                    else if (cat.id.includes('structure')) tutId = 'p-reorder-structure';
                    else if (cat.id.includes('notice')) tutId = 'p-practical-notice';
                    else if (cat.id.includes('note')) tutId = 'p-practical-note';
                    else tutId = 'p-practical-notice'; 

                    html += `
                        <div class="mb-6">
                            <div class="flex items-center justify-between border-b-2 border-${cat.color}-100 pb-2 mb-3">
                                <h3 class="text-xl font-bold text-${cat.color}-700">${cat.title}</h3>
                                <button onclick="showTutorial('${tutId}')" class="bg-teal-100 text-teal-700 px-3 py-1.5 rounded-lg text-sm md:text-base font-bold shadow-sm border border-teal-300 hover:bg-teal-200 transition flex items-center gap-1 active:scale-95">📘 學習錦囊</button>
                            </div>
                            <div class="flex flex-wrap gap-3">
                    `;
                    rawQuestDataObj.forEach((q, idx) => {
                        if(q.category === cat.id) {
                            let status = userProgress[idx];
                            let btnClass = 'bg-white border-slate-300 text-slate-500 hover:bg-slate-50';
                            let icon = (idx + 1);

                            if (status === 1) {
                                btnClass = 'bg-yellow-100 border-yellow-400 text-yellow-700 shadow-inner';
                                icon = '🌟';
                            } else if (status === 2) {
                                btnClass = 'bg-emerald-100 border-emerald-400 text-emerald-700 shadow-inner';
                                icon = '✅';
                            } else if (status === -1) {
                                btnClass = 'bg-rose-100 border-rose-400 text-rose-700';
                                icon = '❌';
                            }

                            html += `<button onclick="startQuestion(${idx})" class="lvl-btn ${btnClass} w-12 h-12 lg:w-14 lg:h-14 rounded-xl font-black text-base lg:text-lg border-b-4 flex items-center justify-center shadow-sm transition-transform">${icon}</button>`;
                        }
                    });
                    html += `</div></div>`;
                }
            });
            dirContainer.innerHTML = html;
            updateTotalProgress();
        }

        function updateTotalProgress() {
            let solved = userProgress.filter(p => p === 1 || p === 2).length;
            let percent = (solved / rawQuestDataObj.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        function startQuestion(idx, forceStart = false) {
            const qData = rawQuestDataObj[idx];
            const qType = qData.category;
            
            let tutId = '';
            if (qType.includes('std')) tutId = 'p-reorder-std';
            else if (qType.includes('structure')) tutId = 'p-reorder-structure';
            else if (qType.includes('notice')) tutId = 'p-practical-notice';
            else if (qType.includes('note')) tutId = 'p-practical-note';
            else tutId = 'p-practical-notice';

            if (!forceStart && !localStorage.getItem('tut_seen_' + tutId)) {
                pendingQuestionIdx = idx; 
                showTutorial(tutId);      
                return;                   
            }

            currentQuestionMistakes = 0; 
            currentQuestionIdx = idx;
            window.currentHints = []; 
            
            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');

            document.getElementById('quest-directory').style.display = 'none';
            const questPlay = document.getElementById('quest-play');
            questPlay.style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;
            
            const qCatTitle = categories.find(c => c.id === qType).title;

            let html = `
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="backToDirectory()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-teal-100 text-teal-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">第 ${idx + 1} 題 / 共 150 題</span>
                </div>
                
                <div class="slide-up w-full bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-teal-600 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">
                        ${qCatTitle}
                    </span>
                    
                    <div class="w-full flex items-center gap-3 mt-4 mb-6">
                        <span class="bg-teal-100 text-teal-800 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">任務</span>
                        <h2 class="text-lg md:text-xl font-bold text-slate-700">${qData.task}</h2>
                    </div>
            `;

            if (qData.isReorder) {
                reorderCorrect = [...qData.chunks];
                reorderSource = [...reorderCorrect].sort(() => Math.random() - 0.5);
                reorderTarget = [];

                let isPractical = qType.includes('practical-reorder');
                let targetAreaClass = isPractical 
                    ? "w-full letter-pad p-4 md:p-6 rounded-2xl min-h-[250px] flex flex-col gap-2 mb-6" 
                    : "w-full bg-slate-50 p-4 md:p-6 rounded-2xl border-2 border-slate-200 min-h-[250px] flex flex-col gap-2 mb-6";
                let sourceAreaClass = "w-full flex flex-col gap-3";

                if (isPractical) {
                    html += `
                        <div class="w-full text-center mb-4">
                            <span class="bg-slate-100 text-slate-600 font-bold px-4 py-2 rounded-xl text-lg">${qData.sentence}</span>
                        </div>
                    `;
                }

                html += `
                    <!-- 目標放置區 -->
                    <div class="${targetAreaClass}" id="reorder-target-area"></div>
                    <div class="w-full border-t-2 border-dashed border-slate-200 my-2"></div>
                    <div class="text-center text-slate-500 font-bold mb-2 text-sm">👇 點擊下方段落依序排好</div>
                    <div class="${sourceAreaClass}" id="reorder-source-area"></div>

                    <!-- 動態提示框 -->
                    <div id="dynamic-hint-box" class="hidden w-full max-w-3xl mt-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm text-yellow-800 font-bold text-lg flex items-start gap-3">
                        <div class="flex-1 space-y-2" id="hint-text"></div>
                        <button id="hint-tts-btn" class="text-2xl hover:scale-110 transition bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>
                    </div>
                </div>`;
                questPlay.innerHTML = html;
                renderReorderUI(true); 
            } else {
                const { options, ansIdx } = shuffleOptions(qData.correct, qData.wrongs);
                let ttsText = qData.sentence;

                html += `
                    <div class="w-full flex items-start gap-4 mb-6 bg-teal-50 p-6 rounded-2xl border border-teal-100 shadow-inner">
                        <button onclick="speakText('${ttsText}')" class="tts-btn flex-shrink-0 bg-white text-teal-600 w-12 h-12 rounded-full text-2xl flex items-center justify-center shadow-md border border-teal-200">🔊</button>
                        <div class="text-2xl md:text-3xl font-bold text-slate-800 leading-loose">${qData.sentence}</div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full mt-auto" id="options-container">
                `;
                
                options.forEach((optText, oIdx) => {
                    const isCorr = (oIdx === ansIdx);
                    const safeOpt = optText.replace(/'/g, "\\'");
                    html += `<button onclick="checkAnswer(this, ${isCorr}, '${safeOpt}')" class="option-btn bg-white border-4 border-slate-200 text-slate-700 text-xl md:text-2xl py-6 px-4 rounded-2xl hover:bg-teal-50 hover:border-teal-300 transition w-full text-center flex flex-col items-center justify-center break-words"><span class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 mb-2">${['A','B','C','D'][oIdx]}</span> <span>${optText}</span></button>`;
                });
                
                html += `
                        </div>
                        <!-- 動態提示框 -->
                        <div id="dynamic-hint-box" class="hidden w-full max-w-3xl mt-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm text-yellow-800 font-bold text-lg flex items-start gap-3">
                            <div class="flex-1 space-y-2" id="hint-text"></div>
                            <button id="hint-tts-btn" class="text-2xl hover:scale-110 transition bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>
                        </div>
                    </div>
                `;
                questPlay.innerHTML = html;
            }
        }

        function renderReorderUI(isParagraph = true) {
            const tArea = document.getElementById('reorder-target-area');
            const sArea = document.getElementById('reorder-source-area');
            if(!tArea || !sArea) return;

            let btnClassBase = "chunk-btn bg-teal-600 text-white font-bold text-lg md:text-xl py-4 px-5 rounded-xl shadow-md pop w-full text-left leading-relaxed";
            let sourceBtnClassBase = "chunk-btn bg-white border-2 border-slate-300 text-slate-700 hover:border-teal-400 hover:bg-teal-50 font-bold text-lg md:text-xl py-4 px-5 rounded-xl shadow w-full text-left leading-relaxed";
            let slotClassBase = "chunk-slot w-full h-16 rounded-xl";

            let tHtml = '';
            if (reorderTarget.length === 0) {
                tHtml = '<span class="text-slate-400 font-bold m-auto">點擊下方段落排在這裡...</span>';
            } else {
                reorderTarget.forEach((chunk, idx) => {
                    let prefix = rawQuestDataObj[currentQuestionIdx].category.includes('practical') ? '' : (idx+1)+'. ';
                    tHtml += `<button onclick="removeFromTarget(${idx})" class="${btnClassBase}">${prefix}${chunk}</button>`;
                });
            }
            tArea.innerHTML = tHtml;

            let sHtml = '';
            reorderSource.forEach((chunk, idx) => {
                if (chunk === null) {
                    sHtml += `<div class="${slotClassBase}"></div>`; 
                } else {
                    sHtml += `<button onclick="moveToTarget(${idx})" class="${sourceBtnClassBase}">${chunk}</button>`;
                }
            });
            sArea.innerHTML = sHtml;

            if (reorderTarget.length > 0 && reorderTarget.length === reorderCorrect.length) {
                checkReorderAnswer();
            }
        }

        function moveToTarget(sourceIdx) {
            let chunk = reorderSource[sourceIdx];
            reorderSource[sourceIdx] = null; 
            reorderTarget.push(chunk);
            speakText(chunk);
            renderReorderUI();
        }

        function removeFromTarget(targetIdx) {
            let chunk = reorderTarget[targetIdx];
            reorderTarget.splice(targetIdx, 1);
            let emptyIdx = reorderSource.indexOf(null);
            if(emptyIdx !== -1) reorderSource[emptyIdx] = chunk;
            renderReorderUI();
        }

        function checkReorderAnswer() {
            let isCorrect = true;
            let correctCount = 0;
            for(let i=0; i<reorderTarget.length; i++) {
                if(reorderTarget[i] === reorderCorrect[i]) {
                    correctCount++;
                } else {
                    isCorrect = false;
                    break;
                }
            }

            const qData = rawQuestDataObj[currentQuestionIdx];

            if (isCorrect && reorderTarget.length === reorderCorrect.length) {
                speakText("完美的重組！");
                let joinChar = qData.category.includes('practical') ? '<br><br>' : ' ';
                let expText = `✅ 正確順序：<br><br>${reorderCorrect.join(joinChar)}<br><br>💡 解析：${qData.hint}`;
                triggerSuccess(expText);
            } else if (reorderTarget.length === reorderCorrect.length) {
                currentQuestionMistakes++;
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('rhetStdProgress', JSON.stringify(userProgress));
                
                let chunksToReturn = reorderTarget.splice(correctCount);
                for (let chunk of chunksToReturn) {
                    let emptyIdx = reorderSource.indexOf(null);
                    if(emptyIdx !== -1) {
                        reorderSource[emptyIdx] = chunk;
                    } else {
                        reorderSource.push(chunk);
                    }
                }

                let hintWord = reorderCorrect[correctCount];
                let newHint = `排錯了喔！正確的部分已保留。<br>👉 下接的應該是：「<span class="text-rose-600">${hintWord}</span>」<br>💡 技巧：${qData.hint}`;

                document.getElementById('hint-text').innerHTML = newHint;
                document.getElementById('hint-tts-btn').onclick = () => speakText(`排錯了喔。下一個應該是，${hintWord}`);
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("順序不對喔，請看提示！");
                
                const tArea = document.getElementById('reorder-target-area');
                tArea.classList.add('bg-rose-100', 'border-rose-400', 'shake');
                setTimeout(() => tArea.classList.remove('bg-rose-100', 'border-rose-400', 'shake'), 800);

                renderReorderUI();
            }
        }

        function checkAnswer(btnElement, isCorrect, clickedOptText) {
            const allBtns = document.querySelectorAll('.option-btn');
            const qData = rawQuestDataObj[currentQuestionIdx];
            
            if (isCorrect) {
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                btnElement.classList.add('correct');
                const expText = qData.explanation; 
                
                speakText("完美的判斷！");
                triggerSuccess(expText);
            } else {
                btnElement.classList.add('wrong', 'shake');
                currentQuestionMistakes++; 
                userProgress[currentQuestionIdx] = -1;
                localStorage.setItem('rhetStdProgress', JSON.stringify(userProgress));
                
                let lines = qData.explanation.split('<br>');
                let matchedLine = lines.find(l => l.includes(clickedOptText));
                let newHint = "請再仔細想一想喔！";
                
                if (matchedLine) {
                    newHint = matchedLine.replace(/^[✅❌]\s*/, ''); 
                }

                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(newHint)) window.currentHints.push(newHint);

                let combinedHintsHtml = window.currentHints.map(h => `<div class="border-b border-yellow-200 pb-1 last:border-0 last:pb-0">💡 ${h}</div>`).join('');
                document.getElementById('hint-text').innerHTML = combinedHintsHtml;
                document.getElementById('hint-tts-btn').onclick = () => speakText(window.currentHints.join('。'));
                document.getElementById('dynamic-hint-box').classList.remove('hidden');
                document.getElementById('dynamic-hint-box').classList.add('slide-up');
                
                speakText("不對喔，" + newHint);
                setTimeout(() => { btnElement.classList.remove('shake'); }, 500);
            }
        }

        function triggerSuccess(expText) {
            let finalStatus = currentQuestionMistakes === 0 ? 1 : 2;
            let previousStatus = userProgress[currentQuestionIdx];
            let expGained = 0;

            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? 30 : 10;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = 20; 
            }

            if (expGained > 0) {
                paraExp += expGained;
                localStorage.setItem('rhetStdExp', paraExp);
                document.getElementById('exp-display').innerText = paraExp;
                document.getElementById('exp-display').classList.add('pop');
                setTimeout(() => document.getElementById('exp-display').classList.remove('pop'), 400);
            }

            if (finalStatus === 1 || previousStatus !== 1) {
                userProgress[currentQuestionIdx] = finalStatus;
                localStorage.setItem('rhetStdProgress', JSON.stringify(userProgress));
            }

            let modalIcon = finalStatus === 1 ? '🌟' : '✅';
            let modalTitle = finalStatus === 1 ? '完美答對！' : '成功過關！';
            let expMsg = expGained > 0 
                ? `<span class="text-teal-600 block text-xl mb-4">獲得 ${expGained} 點經驗值 ✨</span>` 
                : `<span class="text-slate-500 block text-lg mb-4">這題已經成功過關囉！</span>`;
            
            let combinedDesc = expMsg + `
                <div class="bg-teal-50 border-l-4 border-teal-500 p-4 text-left text-teal-900 rounded-r-lg font-bold">
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-teal-200">
                        <span class="text-xl">📚 深度解析</span>
                        <button onclick="speakText('${expText}')" class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm hover:bg-teal-100 text-xl transition active:scale-95">🔊</button>
                    </div>
                    <div class="space-y-3 text-base leading-relaxed">${expText}</div>
                </div>`;

            setTimeout(() => { showModal(modalIcon, modalTitle, combinedDesc); }, 800);
        }

        function showModal(icon, title, desc) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-desc').innerHTML = desc;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.onclick = () => {
                modal.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    goToNextQuestion();
                }, 300);
            };

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
        }

        function backToDirectory() {
            let hintBox = document.getElementById('dynamic-hint-box');
            if(hintBox) hintBox.classList.add('hidden');
            document.getElementById('quest-play').style.display = 'none';
            document.getElementById('quest-directory').style.display = 'block';
            renderDirectory();
        }

        function backToDirectoryFromModal() {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        function goToNextQuestion() {
            let nextIdx = currentQuestionIdx + 1;
            if (nextIdx < rawQuestDataObj.length) {
                startQuestion(nextIdx);
            } else {
                showToast("恭喜完成所有挑戰！");
                backToDirectory();
            }
        }

        function switchMode(mode) {
            const tabQuest = document.getElementById('tab-quest');
            const tabSandbox = document.getElementById('tab-sandbox');
            const questMode = document.getElementById('quest-mode');
            const sandboxMode = document.getElementById('sandbox-mode');
            const progress = document.getElementById('progress-container');

            if (mode === 'quest') {
                tabQuest.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-teal-600";
                tabSandbox.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                questMode.style.display = 'flex';
                sandboxMode.style.display = 'none';
                progress.style.display = 'block';
                updateTotalProgress();
            } else {
                tabSandbox.className = "tab-btn tab-active flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-teal-600";
                tabQuest.className = "tab-btn tab-inactive flex-1 py-3 font-bold text-base lg:text-lg border-b-4 border-transparent hover:bg-slate-200";
                questMode.style.display = 'none';
                sandboxMode.style.display = 'flex'; 
                progress.style.display = 'none';
                loadSandboxTemplate('letter'); 
            }
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = paraExp;
            switchMode('quest'); 
            renderDirectory();
        }
    </script>
</body>
</html>
