<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>綜合寫作專區 - 標準常規特訓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: #eff6ff; /* 淺藍色背景 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #dbeafe 1px, transparent 1px), linear-gradient(to bottom, #dbeafe 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .shake { animation: shake 0.4s ease-in-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 選項按鈕樣式 */
        .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 #93c5fd; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .option-btn.correct { background-color: #eff6ff; border-color: #3b82f6; color: #1e3a8a; box-shadow: 0 0 0 transparent; transform: translateY(4px); pointer-events: none; }
        .option-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.6; pointer-events: none; }

        /* 積木與槽位樣式 */
        .tile-btn { transition: all 0.2s; box-shadow: 0 4px 0 #2563eb; cursor: pointer; user-select: none; }
        .tile-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        
        .slot-box { border: 2px dashed #93c5fd; background-color: #eff6ff; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: flex-start; padding: 12px 16px; border-radius: 8px; cursor: pointer; color: #3b82f6; font-weight: bold; width: 100%; min-height: 60px; margin-bottom: 8px; line-height: 1.6; }
        .slot-box.filled { border-style: solid; border-color: #2563eb; background-color: #3b82f6; color: white; box-shadow: 0 4px 0 #1d4ed8; }
        .slot-box.filled:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .slot-box.locked { border-style: solid; border-color: #1e40af; background-color: #2563eb; color: white; cursor: not-allowed; box-shadow: none; transform: translateY(4px); }
        .wrong-slot { background-color: #ef4444 !important; border-color: #b91c1c !important; color: white !important; box-shadow: 0 4px 0 #991b1b !important; }

        /* 擴寫專用行內槽位 */
        .inline-slot { border: 2px dashed #8b5cf6; background-color: #f3e8ff; color: #7e22ce; padding: 2px 16px; border-radius: 6px; cursor: pointer; display: inline-block; margin: 0 4px; transition: all 0.2s; min-width: 80px; text-align: center; }
        .inline-slot.filled { border-style: solid; border-color: #7e22ce; background-color: #9333ea; color: white; box-shadow: 0 3px 0 #6b21a8; }
        .inline-slot.filled:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }
        .inline-slot.locked { border-style: solid; border-color: #581c87; background-color: #7e22ce; color: white; cursor: not-allowed; box-shadow: none; transform: translateY(3px); }

        .hidden-tile { visibility: hidden; pointer-events: none; }

        /* 稿紙設計 */
        .essay-pad {
            background-color: #f8fafc;
            background-image: repeating-linear-gradient(transparent, transparent 39px, #cbd5e1 39px, #cbd5e1 40px);
            border: 2px solid #94a3b8;
            line-height: 40px;
            font-size: 1.25rem;
            color: #334155;
            padding: 20px 30px;
            border-radius: 12px;
            min-height: 250px;
            text-align: justify;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }
        .essay-pad p { margin-bottom: 0; text-indent: 2em; }
        
        .hl-boring { color: #94a3b8; text-decoration: line-through; margin: 0 4px; }
        .hl-magic { color: #2563eb; font-weight: 900; border-bottom: 3px solid #3b82f6; margin: 0 4px; padding-bottom: 2px; }

        .tts-btn { transition: transform 0.2s; }
        .tts-btn:active { transform: scale(0.9); }
        .tab-btn { transition: all 0.3s; }
        .tab-active { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .tab-inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }

        .toast-msg {
            visibility: hidden; min-width: 250px; background-color: #ef4444; color: #fff; text-align: center;
            border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast-msg.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-[100dvh] overflow-hidden bg-grid-pattern">

    <!-- 頂部導覽列 (Blue 配色) -->
    <div class="w-full bg-white shadow-md flex flex-col z-20 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-blue-600 text-white flex justify-between items-center w-full">
            <h1 class="text-base lg:text-2xl font-bold tracking-wider flex items-center gap-2">
                <a href="index.html" class="hover:bg-blue-700 p-1 rounded transition bg-blue-800">⬅️ 返回</a>
                <span>✍️ 綜合寫作專區 (標準版)</span>
            </h1>
            <div class="flex gap-2 lg:gap-4 items-center bg-blue-800 px-3 py-1.5 rounded-full border border-blue-500 shadow-inner">
                <span class="text-lg lg:text-xl">🏆</span>
                <span class="font-bold text-sm lg:text-lg">EXP: <span id="exp-display" class="text-yellow-300">0</span></span>
            </div>
        </div>
        
        <div class="flex w-full bg-slate-100 border-b border-slate-300 overflow-x-auto no-scrollbar">
            <button onclick="switchMode('expand')" id="tab-expand" class="tab-btn tab-active flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-blue-600 whitespace-nowrap">📝 記敘文細節放大鏡</button>
            <button onclick="switchMode('expo')" id="tab-expo" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">🔬 說明文結構工程師</button>
            <button onclick="switchMode('trans')" id="tab-trans" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">🔗 承上啟下過渡句</button>
            <button onclick="switchMode('tips')" id="tab-tips" class="tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap">💡 寫作錦囊</button>
        </div>

        <div id="progress-container" class="w-full bg-slate-200 h-2">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
        </div>
    </div>

    <!-- 主畫面區 -->
    <div class="flex-1 overflow-y-auto p-3 md:p-6 relative pb-20 scroll-smooth" id="main-scroll-area">
        
        <!-- ================= 模式 1：記敘文細節放大鏡 ================= -->
        <div id="expand-mode" class="w-full max-w-5xl mx-auto flex flex-col gap-4 lg:gap-6">
            <div id="expand-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">📝 記敘文細節放大鏡</h2>
                <p class="text-slate-600 font-bold mb-4">告別「流水帳」！請從選項中挑選使用了「修辭」或「生動細節」的高級句子，來替換原本枯燥的草稿吧！</p>
                <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-4 text-sm md:text-base font-bold text-slate-700">
                    <div class="text-blue-800 md:w-32 flex-shrink-0 flex items-center">💡 標記說明：</div>
                    <div class="flex flex-wrap gap-4 flex-1">
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-yellow-100 border-2 border-yellow-400 flex items-center justify-center text-lg shadow-sm">🌟</span> 完美寫作 (+20)</div>
                        <div class="flex items-center gap-2"><span class="w-8 h-8 rounded-lg bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center text-lg shadow-sm">✅</span> 順利過關 (+10)</div>
                    </div>
                </div>
                <div id="expand-content" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div id="expand-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- ================= 模式 2：說明文結構工程師 ================= -->
        <div id="expo-mode" class="w-full max-w-5xl mx-auto hidden flex-col gap-4 lg:gap-6">
            <div id="expo-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🔬 說明文結構工程師</h2>
                <p class="text-slate-600 font-bold mb-4">說明文講求邏輯！請將打亂的句子，按「總起 👉 數據/例子 👉 總結」的嚴謹順序重新排好。</p>
                <div id="expo-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div id="expo-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- ================= 模式 3：承上啟下過渡句 ================= -->
        <div id="trans-mode" class="w-full max-w-5xl mx-auto hidden flex-col gap-4 lg:gap-6">
            <div id="trans-directory" class="w-full bg-white rounded-3xl p-6 shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">🔗 承上啟下萬能膠</h2>
                <p class="text-slate-600 font-bold mb-4">文章段落之間不能斷層。請根據上下文語境，挑選最適合的「過渡句」把它們黏起來！</p>
                <div id="trans-content" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div id="trans-play" class="w-full hidden flex-col items-center"></div>
        </div>

        <!-- ================= 模式 4：錦囊寶庫 ================= -->
        <div id="tips-hub-mode" class="w-full max-w-6xl mx-auto hidden flex-col gap-6 h-full">
            <div class="w-full bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-slate-200">
                <h2 class="text-2xl md:text-3xl font-black text-blue-800 mb-6 text-center">💡 標準寫作錦囊寶庫</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="tips-grid"></div>
            </div>
        </div>

    </div>

    <!-- 學習小教學 Modal -->
    <div id="tutorial-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/70 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl transform scale-90 transition-transform duration-300 flex flex-col max-h-[90vh]" id="tutorial-content">
            <div class="flex justify-between items-center mb-4 border-b-2 border-blue-100 pb-3">
                <h2 id="tutorial-title" class="text-2xl md:text-3xl font-black text-blue-600 flex items-center gap-2">📘 寫作錦囊</h2>
                <button onclick="closeTutorial()" class="text-slate-400 hover:text-rose-500 text-4xl font-bold transition leading-none">&times;</button>
            </div>
            <div id="tutorial-body" class="flex-1 overflow-y-auto pr-2 text-slate-700 text-lg md:text-xl leading-relaxed space-y-4"></div>
            <div class="mt-6 pt-4 border-t-2 border-slate-100">
                <button onclick="closeTutorial()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition text-xl border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">我明白了！開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- 反饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 pointer-events-none">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl w-[95%] max-w-2xl text-center transform scale-90 transition-transform duration-300 flex flex-col max-h-[90vh] pointer-events-auto" id="feedback-content">
            <div id="feedback-icon" class="text-6xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-4">太棒了！</h2>
            
            <div id="feedback-essay-container" class="hidden bg-blue-50 border-4 border-blue-200 p-6 rounded-2xl mb-6 shadow-inner text-left">
                <h3 class="text-blue-800 font-black text-xl mb-3 border-b-2 border-blue-200 pb-2 flex justify-between items-center">
                    <span>📝 你的完美段落：</span>
                    <button onclick="speakFullStory()" class="bg-white text-blue-600 w-10 h-10 rounded-full flex items-center justify-center shadow hover:bg-blue-100 transition text-xl">🔊</button>
                </h3>
                <div id="feedback-story" class="essay-pad"></div>
            </div>

            <p id="feedback-desc" class="text-blue-600 font-black mb-6 text-xl"></p>
            
            <div class="flex gap-3 w-full mt-2 pt-4 border-t border-slate-100">
                <button onclick="backToDirectoryFromModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-4 rounded-xl shadow transition text-lg md:text-xl">⬅️ 目錄</button>
                <button id="next-btn" class="flex-[1.5] bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition text-lg md:text-xl border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">挑戰下一篇 ➡️</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">提示訊息</div>

    <script>
        // ================= 1. 核心狀態 =================
        let writeExp = parseInt(localStorage.getItem('writeStdExp')) || 0;
        document.getElementById('exp-display').innerText = writeExp;
        
        let currentMode = 'expand'; 
        let currentIdx = -1;
        let currentMistakes = 0; 
        let pendingIdx = -1;
        let pendingType = '';

        // 重組題型專用
        let reorderSource = []; 
        let targetSlots = []; 
        let reorderCorrect = []; 
        let lockedSlots = []; 
        let wrongSlots = []; 

        function cleanTextForSpeech(text) {
            return text.replace(/<br\s*\/?>/gi, '。').replace(/<[^>]*>?/gm, '').replace(/[✅❌💡【】_]/g, '').replace(/&nbsp;/g, ' ').replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, ''); 
        }

        function speakText(text, rate = 0.95) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(cleanTextForSpeech(text));
                msg.lang = 'zh-HK'; 
                msg.rate = rate; 
                let voices = window.speechSynthesis.getVoices();
                let hkVoice = voices.find(v => v.lang === 'zh-HK' || v.lang === 'yue-HK');
                if (hkVoice) msg.voice = hkVoice;
                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast-msg show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // ================= 2. 學習錦囊 (教學庫) =================
        const allTips = [
            { id: 't-expand-std', title: "📝 告別流水帳", content: "記敘文最怕寫成「我去了公園。我玩了滑梯。我回家了。」<br><br>💡 <span class='font-bold text-blue-600'>如何變高級？</span><br>1. 加上<span class='text-rose-500 font-bold'>心理描寫</span> (我的心像小鹿亂撞)。<br>2. 加上<span class='text-purple-500 font-bold'>修辭手法</span> (汗水像斷了線的珍珠)。<br>3. 加上<span class='text-emerald-500 font-bold'>動作細節</span> (他咬緊牙關，用力一蹬)。", color: "blue" },
            { id: 't-expo-std', title: "🔬 說明文結構", content: "說明文必須要有嚴謹的邏輯順序！<br><br>🧱 <span class='font-bold text-teal-600 bg-teal-50 px-2 rounded'>總起句</span> 👉 開頭先介紹主角是誰。<br>📊 <span class='font-bold text-teal-600 bg-teal-50 px-2 rounded'>說明特徵</span> 👉 接著用「列數字」或「舉例子」說明細節。<br>🏁 <span class='font-bold text-teal-600 bg-teal-50 px-2 rounded'>總結句</span> 👉 最後一句總結它的功用或好處。<br><br>💡 <span class='text-rose-500 font-bold'>注意「首先、其次、此外」等順序詞！</span>", color: "teal" },
            { id: 't-trans-std', title: "🔗 承上啟下過渡句", content: "文章段落之間需要「過渡句」來當萬能膠，才不會顯得斷層。<br><br>🪄 <span class='font-bold text-amber-600'>過渡句的作用：</span><br>前半句總結<span class='text-slate-500'>上一段</span>，後半句引出<span class='text-slate-500'>下一段</span>。<br>例：<span class='bg-amber-100 px-1 rounded'>雖然</span>早上的參觀很累，<span class='bg-amber-100 px-1 rounded'>但</span>下午的遊戲卻讓我們精神百倍。", color: "amber" }
        ];

        function renderTipsHub() {
            const grid = document.getElementById('tips-grid');
            let html = '';
            allTips.forEach(tip => {
                html += `
                    <div class="bg-${tip.color}-50 border-2 border-${tip.color}-200 p-5 rounded-2xl shadow-sm hover:shadow-md transition">
                        <h3 class="text-xl font-black text-${tip.color}-800 mb-3 border-b border-${tip.color}-200 pb-2">${tip.title}</h3>
                        <p class="text-slate-700 text-sm md:text-base leading-relaxed">${tip.content}</p>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        const tutorialContents = {};
        allTips.forEach(tip => {
            tutorialContents[tip.id] = `
                <div class="bg-${tip.color}-50 p-6 rounded-2xl border-2 border-${tip.color}-200 mb-3">
                    <div class="text-center mb-4"><span class="text-6xl">${tip.title.split(' ')[0]}</span></div>
                    <p class="font-black text-${tip.color}-800 text-2xl mb-4 text-center">${tip.title.substring(2)}</p>
                    <p class="text-lg text-slate-700 leading-loose">${tip.content}</p>
                </div>
            `;
        });

        function showTutorial(tutKey) {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            document.getElementById('tutorial-body').innerHTML = tutorialContents[tutKey];
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            localStorage.setItem('tut_seen_' + tutKey, 'true');
        }

        function closeTutorial() {
            const modal = document.getElementById('tutorial-modal');
            const content = document.getElementById('tutorial-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (pendingIdx !== -1) {
                    let targetIdx = pendingIdx;
                    let targetType = pendingType;
                    pendingIdx = -1;
                    if (targetType === 'expand') startExpand(targetIdx, true);
                    else if (targetType === 'expo') startExpo(targetIdx, true);
                    else if (targetType === 'trans') startTrans(targetIdx, true);
                }
            }, 300);
        }

        function switchMode(mode) {
            currentMode = mode;
            const tabs = ['expand', 'expo', 'trans', 'tips'];
            tabs.forEach(t => {
                const tabBtn = document.getElementById('tab-' + t);
                const tabMode = document.getElementById(t + (t==='tips' ? '-hub-mode' : '-mode'));
                const tabPlay = document.getElementById(t + '-play');
                
                if (t === mode) {
                    tabBtn.className = "tab-btn tab-active flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-blue-600 whitespace-nowrap";
                    if(tabMode) tabMode.style.display = 'flex';
                } else {
                    tabBtn.className = "tab-btn tab-inactive flex-1 py-3 px-2 font-bold text-sm md:text-base border-b-4 border-transparent hover:bg-slate-200 whitespace-nowrap";
                    if(tabMode) tabMode.style.display = 'none';
                    if(tabPlay) tabPlay.style.display = 'none';
                }
            });

            if (mode === 'expand') renderExpandDirectory();
            else if (mode === 'expo') renderExpoDirectory();
            else if (mode === 'trans') renderTransDirectory();
            else renderTipsHub();
            
            updateTotalProgress();
        }

        // ================= 3. 題庫資料 (中高年級進階) =================
        
        // --- 模組 1：記敘文細節放大鏡 (20題) ---
        // 玩法：給出一段文字，其中一句被劃掉，選出最生動的擴寫句替換。
        const expandData = [
            {

        // ================= 4. 通用：重組與拖拉邏輯 (局部遣返核心 + 專屬動態提示) =================
        
        function initReorderState(correctArr) {
            reorderCorrect = [...correctArr];
            reorderSource = [...reorderCorrect].sort(() => Math.random() - 0.5);
            targetSlots = new Array(correctArr.length).fill(null);
            lockedSlots = new Array(correctArr.length).fill(false);
            wrongSlots = []; 
            window.currentHints = []; 
        }

        function getFirstEmptySlot() {
            return targetSlots.indexOf(null);
        }

        function moveToTarget(sourceIdx) {
            let emptyIdx = getFirstEmptySlot();
            if (emptyIdx !== -1) {
                let chunk = reorderSource[sourceIdx];
                reorderSource[sourceIdx] = null; 
                targetSlots[emptyIdx] = chunk;
                speakText(chunk);
                renderCurrentPlayUI();
                
                if (!targetSlots.includes(null)) {
                    if (currentMode === 'expo') checkReorderLogic(finishExpoLevel);
                }
            }
        }

        function removeFromTarget(targetIdx) {
            if (lockedSlots[targetIdx]) return; 
            let chunk = targetSlots[targetIdx];
            if (chunk) {
                speakText("已移出");
                targetSlots[targetIdx] = null;
                wrongSlots = wrongSlots.filter(idx => idx !== targetIdx); 
                let emptySourceIdx = reorderSource.indexOf(null);
                if(emptySourceIdx !== -1) reorderSource[emptySourceIdx] = chunk;
                else reorderSource.push(chunk);
                renderCurrentPlayUI();
            }
        }

        function checkReorderLogic(onComplete) {
            let isAllFilled = !targetSlots.includes(null);
            if (!isAllFilled) return;

            let isAllCorrect = true;
            let wrongIndices = [];

            for (let i = 0; i < targetSlots.length; i++) {
                if (targetSlots[i] === reorderCorrect[i]) {
                    lockedSlots[i] = true;
                } else {
                    isAllCorrect = false;
                    wrongIndices.push(i);
                }
            }

            if (isAllCorrect) {
                window.currentHints = []; 
                wrongSlots = [];
                onComplete();
            } else {
                currentMistakes++;
                if (currentMode === 'expo') {
                    exProgress[currentIdx] = -1; localStorage.setItem('exStdProgress', JSON.stringify(exProgress));
                }

                wrongSlots = wrongIndices; 

                let hintText = expoData[currentIdx].hint;
                let combinedHint = "💡 結構提示：" + hintText;
                
                if (!window.currentHints) window.currentHints = [];
                if (!window.currentHints.includes(combinedHint)) {
                    window.currentHints.push(combinedHint);
                }

                speakText("排錯了喔，請點擊紅色的句子移出，並查看提示！");
                renderCurrentPlayUI();

                setTimeout(() => {
                    let changed = false;
                    wrongIndices.forEach(idx => {
                        let chunk = targetSlots[idx];
                        if (chunk !== null && wrongSlots.includes(idx)) {
                            targetSlots[idx] = null;
                            let emptySourceIdx = reorderSource.indexOf(null);
                            if(emptySourceIdx !== -1) reorderSource[emptySourceIdx] = chunk;
                            else reorderSource.push(chunk);
                            changed = true;
                        }
                    });
                    wrongSlots = [];
                    if (changed) renderCurrentPlayUI();
                }, 3500);
            }
        }

                    <div id="dynamic-hint-box" class="w-full mt-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm text-yellow-800 font-bold text-lg flex items-start gap-3 slide-up">
                        <div class="flex-1" id="hint-text">${combinedHintsHtml}</div>
                        <button onclick="speakText('${window.currentHints.join('。').replace(/'/g, "\\'").replace(/<[^>]*>?/gm, '')}')" class="text-2xl hover:scale-110 transition bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>
                    </div>
                `;
            }

            html += `</div>`;
            document.getElementById('expo-play').innerHTML = html;
            
            setTimeout(() => {
                let sHtml = '';
                let tHtml = '';
                
                targetSlots.forEach((chunk, idx) => {
                    let isLocked = lockedSlots[idx];
                    let isWrong = wrongSlots.includes(idx);
                    if (chunk === null) {
                        tHtml += `<div id="target-slot-${idx}" class="chunk-slot w-full h-16 rounded-xl border-dashed border-teal-300 bg-teal-50 text-slate-400 text-sm md:text-base flex items-center justify-center">[ 框格 ${idx+1} ]</div>`;
                    } else {
                        let sClass = isLocked ? 'locked bg-teal-600 border-teal-700 cursor-not-allowed' : 
                                     (isWrong ? 'wrong-slot shake cursor-pointer' : 'filled bg-teal-500 border-teal-600 hover:bg-teal-600 cursor-pointer');
                        tHtml += `<div id="target-slot-${idx}" onclick="removeFromTarget(${idx})" class="chunk-slot w-full min-h-[64px] rounded-xl text-white font-bold shadow pop flex items-center px-4 ${sClass}">${chunk}</div>`;
                    }
                });
                
                document.getElementById('reorder-target-area').innerHTML = tHtml;

                reorderSource.forEach((chunk, idx) => {
                    if (chunk === null) {
                        sHtml += `<div class="w-full h-[64px] border-2 border-dashed border-slate-200 bg-slate-50 opacity-50 rounded-xl"></div>`; 
                    } else {
                        sHtml += `
                            <div class="flex items-center gap-2 w-full">
                                <button onclick="moveToTarget(${idx})" class="chunk-btn bg-white border-2 border-slate-300 text-slate-700 hover:border-teal-400 hover:bg-teal-50 font-bold text-lg md:text-xl py-4 px-5 rounded-xl shadow flex-1 text-left leading-relaxed active:scale-95 transition">${chunk}</button>
                                <button onclick="speakText('${chunk.replace(/'/g, "\\'")}')" class="tts-btn flex-shrink-0 bg-teal-50 text-teal-600 w-14 rounded-2xl text-2xl flex items-center justify-center shadow-sm border border-teal-200 hover:bg-teal-100 transition" title="朗讀此句">🔊</button>
                            </div>
                        `;
                    }
                });
                document.getElementById('reorder-source-area').innerHTML = sHtml;
            }, 0);
        }

        function finishExpoLevel() {
            const data = expoData[currentIdx];
            speakText("邏輯非常清晰！");
            
            let finalStory = `<p class="essay-paragraph font-black text-xl text-center text-slate-800 mb-4">${data.title}</p>`;
            finalStory += `<p class="essay-paragraph leading-loose">${data.sents.join('')}</p>`;

            let finalStatus = currentMistakes === 0 ? 1 : 2;
            let expGained = calcExp(finalStatus, exProgress, currentIdx, 20, 10);

            if (expGained > 0) {
                writeExp += expGained;
                localStorage.setItem('writeStdExp', writeExp);
                updateExpDisplay();
            }

            document.getElementById('feedback-story').innerHTML = finalStory;
            showFeedbackModal(expGained, () => {
                let nextIdx = currentIdx + 1;
                if (nextIdx < expoData.length) startExpo(nextIdx);
                else { showToast("恭喜完成說明文挑戰！"); backToDirectory('expo'); }
            });
        }

        // --- 模組 3：承上啟下過渡句 ---
        function renderTransDirectory() {
            const dirContainer = document.getElementById('trans-content');
            let html = '';
            transData.forEach((item, idx) => {
                let status = trProgress[idx];
                let bgClass = 'bg-white';
                let borderClass = 'border-slate-200';
                let icon = ' <span class="text-slate-400 font-bold ml-2"># 未挑戰</span>';
                if (status === 1) { bgClass = 'bg-yellow-50'; borderClass = 'border-yellow-400'; icon = ' <span class="text-yellow-600 font-bold ml-2">🌟</span>'; }
                else if (status === 2) { bgClass = 'bg-emerald-50'; borderClass = 'border-emerald-400'; icon = ' <span class="text-emerald-600 font-bold ml-2">✅</span>'; }

                html += `
                    <button onclick="startTrans(${idx})" class="w-full text-left p-5 rounded-2xl border-2 ${borderClass} ${bgClass} hover:shadow-md transition group active:scale-95 flex flex-col items-start gap-2">
                        <div class="flex justify-between items-center w-full mb-1">
                            <span class="bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded font-bold">${item.emoji} ${item.title}</span>
                            ${icon}
                        </div>
                        <h3 class="text-base font-bold text-slate-600 truncate w-full">上文：${item.p1.substring(0,15)}...</h3>
                    </button>
                `;
            });
            dirContainer.innerHTML = html;
        }

        function startTrans(idx, forceStart = false) {
            const data = transData[idx];
            if (!forceStart && !localStorage.getItem('tut_seen_' + data.tut)) {
                pendingIdx = idx; pendingType = 'trans'; showTutorial(data.tut); return;
            }
            currentIdx = idx; currentMistakes = 0;
            
            document.getElementById('trans-directory').style.display = 'none';
            document.getElementById('trans-play').style.display = 'flex';
            document.getElementById('main-scroll-area').scrollTop = 0;
            renderTransUI();
        }

        function renderTransUI() {
            const data = transData[currentIdx];
            let html = `
                <div class="w-full max-w-4xl flex justify-between items-center mb-4">
                    <button onclick="backToDirectory('trans')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-300 transition">⬅️ 返回目錄</button>
                    <span class="bg-amber-100 text-amber-800 px-4 py-2 rounded-xl font-bold shadow-sm text-sm">過渡句 ${currentIdx + 1} / 10</span>
                </div>
                
                <div class="slide-up w-full max-w-4xl bg-white border-2 border-slate-200 rounded-3xl p-5 md:p-8 shadow-xl flex flex-col items-center relative transition-all duration-500">
                    <span class="absolute -top-4 bg-amber-500 text-white px-5 py-1.5 rounded-full font-bold shadow-md text-sm md:text-base">${data.title}</span>
                    
                    <div class="w-full bg-slate-50 p-6 rounded-2xl border-2 border-slate-200 mb-6 shadow-inner mt-4 flex flex-col gap-4 text-xl md:text-2xl font-bold text-slate-700 leading-loose">
                        <p class="essay-paragraph">${data.p1}</p>
                        <p class="essay-paragraph text-amber-600 bg-amber-100 border-2 border-dashed border-amber-400 px-4 py-2 rounded-xl text-center animate-pulse">👉 [請選出最適合的過渡句黏接在這裡] 👈</p>
                        <p class="essay-paragraph">${data.p2}</p>
                    </div>

                    <div class="w-full flex items-center gap-3 mb-4">
                        <button onclick="speakText('請選出最能承上啟下的過渡句。')" class="tts-btn flex-shrink-0 bg-white text-amber-600 w-10 h-10 rounded-full text-xl flex items-center justify-center shadow-md border border-amber-200">🔊</button>
                        <h2 class="text-lg md:text-xl font-black text-amber-800">請選出最能承上啟下的過渡句：</h2>
                    </div>

                    <div class="flex flex-col gap-3 w-full" id="options-container">
            `;

            let optsWithIdx = data.opts.map((opt, i) => ({ text: opt, isCorr: i === data.ans }));
            optsWithIdx.sort(() => Math.random() - 0.5);

            optsWithIdx.forEach((opt, oIdx) => {
                const safeOpt = opt.text.replace(/'/g, "\\'");
                const letter = ['A','B','C','D'][oIdx];
                html += `
                    <div class="flex gap-2 w-full">
                        <button onclick="checkTransAnswer(this, ${opt.isCorr}, '${safeOpt}')" class="option-btn flex-1 bg-white border-2 border-slate-200 text-slate-700 text-lg font-bold py-5 px-5 rounded-2xl hover:bg-amber-50 transition text-left flex items-start gap-4">
                            <span class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 mt-0.5">${letter}</span> 
                            <span class="leading-relaxed break-words">${opt.text}</span>
                        </button>
                        <button onclick="speakText('${safeOpt}')" class="tts-btn flex-shrink-0 bg-amber-50 text-amber-600 w-14 rounded-2xl text-2xl flex items-center justify-center shadow-sm border border-amber-200 hover:bg-amber-100 transition">🔊</button>
                    </div>
                `;
            });

            html += `</div>
                <div id="dynamic-hint-box" class="hidden w-full mt-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm text-yellow-800 font-bold text-lg flex items-start gap-3 slide-up">
                    <div class="flex-1 space-y-2" id="hint-text"></div>
                    <button id="hint-tts-btn" class="text-2xl hover:scale-110 transition bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm flex-shrink-0">🔊</button>
                </div>
            </div>`;
            
            document.getElementById('trans-play').innerHTML = html;
        }

        function checkTransAnswer(btnElement, isCorrect, optText) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');
            const data = transData[currentIdx];

            if (isCorrect) {
                btnElement.classList.add('correct');
                speakText("銜接得非常完美！");
                
                let finalStory = `<p class="essay-paragraph leading-loose">${data.p1}</p><p class="essay-paragraph font-black text-amber-700 leading-loose">${optText}</p><p class="essay-paragraph leading-loose">${data.p2}</p>`;
                
                let finalStatus = currentMistakes === 0 ? 1 : 2;
                let expGained = calcExp(finalStatus, trProgress, currentIdx, 20, 10);

                if (expGained > 0) {
                    writeExp += expGained;
                    localStorage.setItem('writeStdExp', writeExp);
                    updateExpDisplay();
                }

                let expMsg = expGained > 0 ? `獲得 ${expGained} 點經驗值 ✨` : `這題已經成功過關囉！`;
                document.getElementById('feedback-desc').innerHTML = `${expMsg}<br><br><div class="bg-amber-50 p-4 rounded-xl border border-amber-200 text-amber-900 text-left text-base leading-loose">💡 解析：${data.exp}</div>`;
                document.getElementById('feedback-story').innerHTML = finalStory;
                
                showFeedbackModal(expGained, () => {
                    let nextIdx = currentIdx + 1;
                    if (nextIdx < transData.length) startTrans(nextIdx);
                    else { showToast("恭喜完成過渡句挑戰！"); backToDirectory('trans'); }
                });
            } else {
                btnElement.classList.add('wrong', 'shake');
                currentMistakes++;
                trProgress[currentIdx] = -1;
                localStorage.setItem('trStdProgress', JSON.stringify(trProgress));

                const hintBox = document.getElementById('dynamic-hint-box');
                document.getElementById('hint-text').innerText = "提示：" + data.exp;
                document.getElementById('hint-tts-btn').onclick = () => speakText("提示：" + data.exp);
                hintBox.classList.remove('hidden');
                
                speakText("這句放這裡不太通順喔！");
                setTimeout(() => {
                    btnElement.classList.remove('shake');
                    allBtns.forEach(b => { if (!b.classList.contains('correct')) b.style.pointerEvents = 'auto'; });
                }, 1500);
            }
        }

        // ================= 輔助功能 =================
        function calcExp(finalStatus, progArr, idx, perfectExp, passExp) {
            let previousStatus = progArr[idx];
            let expGained = 0;
            if (previousStatus !== 1 && previousStatus !== 2) {
                expGained = finalStatus === 1 ? perfectExp : passExp;
            } else if (previousStatus === 2 && finalStatus === 1) {
                expGained = perfectExp - passExp; 
            }
            if (finalStatus === 1 || previousStatus !== 1) {
                progArr[idx] = finalStatus;
            }
            return expGained;
        }

        function updateExpDisplay() {
            const expDisp = document.getElementById('exp-display');
            expDisp.innerText = writeExp;
            expDisp.classList.add('pop');
            setTimeout(() => expDisp.classList.remove('pop'), 400);
        }

        function showFeedbackModal(expGained, nextAction) {
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-90'); }, 10);
            
            setTimeout(() => { speakFullStory(); }, 800);

            document.getElementById('next-btn').onclick = () => {
                modal.classList.add('opacity-0'); content.classList.add('scale-90');
                setTimeout(() => { modal.classList.add('hidden'); nextAction(); }, 300);
            };
            
            // Check master completion
            if(fwProgress.filter(p=>p>0).length===expandData.length && exProgress.filter(p=>p>0).length===expoData.length && trProgress.filter(p=>p>0).length===transData.length) {
                localStorage.setItem('t_write_2', 'true');
            }
        }

        function speakFullStory() {
            let text = document.getElementById('feedback-story').innerText;
            speakText(text, 0.85); 
        }

        function backToDirectory(forceMode) {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            document.getElementById('expand-play').style.display = 'none';
            document.getElementById('expo-play').style.display = 'none';
            document.getElementById('trans-play').style.display = 'none';
            
            document.getElementById('expand-directory').style.display = 'block';
            document.getElementById('expo-directory').style.display = 'block';
            document.getElementById('trans-directory').style.display = 'block';
            
            if (forceMode) switchMode(forceMode);
            else switchMode(currentMode);
        }

        function backToDirectoryFromModal() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            const modal = document.getElementById('feedback-modal');
            const content = document.getElementById('feedback-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                backToDirectory();
            }, 300);
        }

        function updateTotalProgress() {
            let fwSolved = fwProgress.filter(p => p > 0).length;
            let exSolved = exProgress.filter(p => p > 0).length;
            let trSolved = trProgress.filter(p => p > 0).length;
            let total = expandData.length + expoData.length + transData.length;
            let percent = ((fwSolved + exSolved + trSolved) / total) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        window.onload = function() {
            document.getElementById('exp-display').innerText = writeExp;
            switchMode('expand');
        }
    </script>
</body>
</html>
